<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Replacer - Working Version</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a2e;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: #fff;
            margin-bottom: 10px;
            font-size: 2rem;
        }

        .subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 30px;
            font-size: 0.9rem;
        }

        /* Drop Zone */
        .drop-zone {
            background: #16213e;
            border: 2px dashed #0f3460;
            border-radius: 16px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 20px;
        }

        .drop-zone:hover {
            border-color: #e94560;
            background: #1a1a4e;
        }

        .drop-zone.drag-over {
            border-color: #00ff88;
            background: #1a3a2e;
        }

        /* File Info */
        .file-info {
            background: #16213e;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .file-name {
            color: #fff;
            font-size: 14px;
        }

        .file-size {
            color: #888;
            font-size: 12px;
            margin-left: 10px;
        }

        .clear-btn {
            background: #e94560;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
        }

        .clear-btn:hover {
            background: #ff6b8a;
        }

        /* Editor Grid */
        .editor-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        @media (max-width: 768px) {
            .editor-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Panels */
        .panel {
            background: #16213e;
            border-radius: 12px;
            overflow: hidden;
        }

        .panel-header {
            background: #0f3460;
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .panel-title {
            color: #fff;
            font-weight: 600;
        }

        .panel-badge {
            background: #e94560;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 11px;
            margin-left: 8px;
        }

        .char-count {
            color: #888;
            font-size: 11px;
        }

        textarea {
            width: 100%;
            min-height: 300px;
            background: #0f3460;
            border: none;
            padding: 16px;
            color: #fff;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            line-height: 1.5;
            resize: vertical;
            outline: none;
        }

        textarea:focus {
            background: #1a4a7a;
        }

        /* Preview */
        .preview-panel {
            background: #16213e;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .preview-header {
            background: #0f3460;
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .preview-tabs {
            display: flex;
            gap: 8px;
        }

        .tab-btn {
            background: #0f3460;
            border: 1px solid #e94560;
            padding: 5px 12px;
            border-radius: 6px;
            color: #fff;
            cursor: pointer;
        }

        .tab-btn.active {
            background: #e94560;
        }

        .preview-content {
            padding: 16px;
            max-height: 400px;
            overflow: auto;
            background: #0f3460;
            border-radius: 0 0 12px 12px;
            color: #fff;
            font-family: monospace;
            font-size: 12px;
            white-space: pre-wrap;
        }

        /* Actions */
        .actions {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background: #e94560;
            color: white;
        }

        .btn-primary:hover {
            background: #ff6b8a;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: #0f3460;
            color: white;
        }

        .btn-secondary:hover {
            background: #1a4a7a;
        }

        .btn-success {
            background: #00ff88;
            color: #1a1a2e;
        }

        .btn-success:hover {
            background: #55ffaa;
        }

        /* Status */
        .status {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #333;
            padding: 10px 20px;
            border-radius: 8px;
            color: white;
            transform: translateX(400px);
            transition: transform 0.3s;
            z-index: 1000;
        }

        .status.show {
            transform: translateX(0);
        }

        .status.success {
            background: #00ff88;
            color: #1a1a2e;
        }

        .status.error {
            background: #e94560;
        }

        /* Diff highlighting */
        .diff-added {
            background: rgba(0, 255, 136, 0.3);
            color: #00ff88;
        }

        .diff-removed {
            background: rgba(233, 69, 96, 0.3);
            color: #ff6b8a;
            text-decoration: line-through;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔧 Code Replacer</h1>
        <div class="subtitle">Find & Replace • Live Preview • Diff View</div>

        <!-- Drop Zone -->
        <div class="drop-zone" id="dropZone">
            📁 Drop file here or click to browse<br>
            <small style="color: #888;">Supports .html, .js, .css, .txt, .json</small>
        </div>
        <input type="file" id="fileInput" style="display: none;" accept=".html,.htm,.js,.css,.txt,.json,.xml,.md">

        <!-- File Info -->
        <div class="file-info" id="fileInfo" style="display: none;">
            <div>
                📄 <span id="fileName"></span>
                <span class="file-size" id="fileSize"></span>
            </div>
            <button class="clear-btn" id="clearBtn">✕ Clear</button>
        </div>

        <!-- Editor Grid -->
        <div class="editor-grid" id="editorGrid" style="display: none;">
            <div class="panel">
                <div class="panel-header">
                    <div class="panel-title">🔍 Find <span class="panel-badge">Before</span></div>
                    <div class="char-count" id="beforeCount">0 chars</div>
                </div>
                <textarea id="beforeText" placeholder="Enter text to find..."></textarea>
            </div>
            <div class="panel">
                <div class="panel-header">
                    <div class="panel-title">✨ Replace With <span class="panel-badge">After</span></div>
                    <div class="char-count" id="afterCount">0 chars</div>
                </div>
                <textarea id="afterText" placeholder="Enter replacement text..."></textarea>
            </div>
        </div>

        <!-- Preview -->
        <div class="preview-panel" id="previewPanel" style="display: none;">
            <div class="preview-header">
                <div class="panel-title">👁️ Preview</div>
                <div class="preview-tabs">
                    <button class="tab-btn active" data-tab="diff">Diff View</button>
                    <button class="tab-btn" data-tab="code">Code View</button>
                </div>
                <div class="char-count" id="resultCount">0 chars</div>
            </div>
            <div class="preview-content" id="previewContent"></div>
        </div>

        <!-- Actions -->
        <div class="actions" id="actions" style="display: none;">
            <button class="btn-secondary" id="resetBtn">🔄 Reset</button>
            <button class="btn-primary" id="applyBtn">⚡ Apply</button>
            <button class="btn-success" id="downloadBtn">💾 Download</button>
        </div>

        <div class="actions" style="margin-top: 10px;">
            <button class="btn-secondary" id="caseBtn">🔤 Case Sensitive: OFF</button>
        </div>
    </div>

    <div class="status" id="status">Ready</div>

    <script>
        // State
        let originalContent = '';
        let currentContent = '';
        let caseSensitive = false;
        let currentTab = 'diff';

        // DOM elements
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const fileInfo = document.getElementById('fileInfo');
        const editorGrid = document.getElementById('editorGrid');
        const previewPanel = document.getElementById('previewPanel');
        const actions = document.getElementById('actions');
        const beforeText = document.getElementById('beforeText');
        const afterText = document.getElementById('afterText');
        const previewContent = document.getElementById('previewContent');
        const fileNameSpan = document.getElementById('fileName');
        const fileSizeSpan = document.getElementById('fileSize');
        const beforeCount = document.getElementById('beforeCount');
        const afterCount = document.getElementById('afterCount');
        const resultCount = document.getElementById('resultCount');
        const clearBtn = document.getElementById('clearBtn');
        const resetBtn = document.getElementById('resetBtn');
        const applyBtn = document.getElementById('applyBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const caseBtn = document.getElementById('caseBtn');
        const statusDiv = document.getElementById('status');

        function showStatus(msg, type = 'success') {
            statusDiv.textContent = msg;
            statusDiv.className = `status ${type} show`;
            setTimeout(() => statusDiv.classList.remove('show'), 2500);
        }

        function updateCounts() {
            beforeCount.textContent = beforeText.value.length + ' chars';
            afterCount.textContent = afterText.value.length + ' chars';
            if (currentContent) resultCount.textContent = currentContent.length + ' chars';
        }

        function escapeRegex(str) {
            return str.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        }

        function performReplacement() {
            if (!originalContent) {
                showStatus('No file loaded', 'error');
                return;
            }

            let findText = beforeText.value;
            let replaceText = afterText.value;

            if (!findText) {
                showStatus('Enter text to find', 'error');
                return;
            }

            try {
                let flags = 'g';
                if (!caseSensitive) flags += 'i';
                const regex = new RegExp(escapeRegex(findText), flags);
                const result = originalContent.replace(regex, replaceText);
                currentContent = result;
                updatePreview();
                showStatus('Replacement applied!', 'success');
            } catch (e) {
                showStatus('Error: ' + e.message, 'error');
            }
        }

        function updatePreview() {
            if (!originalContent) {
                previewContent.innerHTML = 'No file loaded';
                return;
            }

            const findText = beforeText.value;
            const replaceText = afterText.value;

            if (!findText) {
                if (currentTab === 'diff') {
                    previewContent.innerHTML = `<div style="white-space: pre-wrap;">${escapeHtml(originalContent)}</div>`;
                } else {
                    previewContent.innerHTML = `<pre style="white-space: pre-wrap;">${escapeHtml(originalContent)}</pre>`;
                }
                currentContent = originalContent;
                updateCounts();
                return;
            }

            try {
                let flags = 'g';
                if (!caseSensitive) flags += 'i';
                const regex = new RegExp(escapeRegex(findText), flags);
                const result = originalContent.replace(regex, replaceText);
                currentContent = result;

                if (currentTab === 'diff') {
                    // Show diff
                    let html = '';
                    let lastIndex = 0;
                    let searchText = originalContent;
                    let match;
                    const testRegex = new RegExp(escapeRegex(findText), flags);
                    
                    while ((match = testRegex.exec(searchText)) !== null) {
                        html += escapeHtml(searchText.substring(lastIndex, match.index));
                        html += `<span class="diff-removed">${escapeHtml(match[0])}</span>`;
                        html += `<span class="diff-added">${escapeHtml(replaceText)}</span>`;
                        lastIndex = match.index + match[0].length;
                    }
                    html += escapeHtml(searchText.substring(lastIndex));
                    previewContent.innerHTML = `<div style="white-space: pre-wrap; font-family: monospace; font-size: 12px;">${html}</div>`;
                } else {
                    previewContent.innerHTML = `<pre style="white-space: pre-wrap;">${escapeHtml(result)}</pre>`;
                }

                updateCounts();
            } catch (e) {
                previewContent.innerHTML = `<span style="color: #e94560;">Error: ${e.message}</span>`;
            }
        }

        function escapeHtml(text) {
            return text
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function loadFile(file) {
            if (!file) return;

            fileNameSpan.textContent = file.name;
            fileSizeSpan.textContent = `(${(file.size / 1024).toFixed(1)} KB)`;

            const reader = new FileReader();
            reader.onload = function(e) {
                originalContent = e.target.result;
                currentContent = originalContent;
                
                fileInfo.style.display = 'flex';
                editorGrid.style.display = 'grid';
                previewPanel.style.display = 'block';
                actions.style.display = 'flex';
                
                beforeText.value = '';
                afterText.value = '';
                
                updatePreview();
                showStatus(`Loaded "${file.name}"`, 'success');
            };
            reader.onerror = function() {
                showStatus('Error reading file', 'error');
            };
            reader.readAsText(file);
        }

        function clearAll() {
            originalContent = '';
            currentContent = '';
            fileInput.value = '';
            fileInfo.style.display = 'none';
            editorGrid.style.display = 'none';
            previewPanel.style.display = 'none';
            actions.style.display = 'none';
            beforeText.value = '';
            afterText.value = '';
            previewContent.innerHTML = '';
            showStatus('Cleared', 'success');
        }

        function downloadResult() {
            if (!currentContent) {
                showStatus('No content to download', 'error');
                return;
            }
            const blob = new Blob([currentContent], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'modified_file.txt';
            a.click();
            URL.revokeObjectURL(url);
            showStatus('Downloaded!', 'success');
        }

        function resetToOriginal() {
            if (originalContent) {
                currentContent = originalContent;
                updatePreview();
                showStatus('Reset to original', 'success');
            }
        }

        function toggleCaseSensitive() {
            caseSensitive = !caseSensitive;
            caseBtn.textContent = `🔤 Case Sensitive: ${caseSensitive ? 'ON' : 'OFF'}`;
            updatePreview();
        }

        // Tab switching
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentTab = btn.dataset.tab;
                updatePreview();
            });
        });

        // Event listeners
        dropZone.addEventListener('click', () => fileInput.click());
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('drag-over');
        });
        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('drag-over');
        });
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('drag-over');
            const file = e.dataTransfer.files[0];
            if (file) loadFile(file);
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files[0]) loadFile(e.target.files[0]);
        });

        clearBtn.addEventListener('click', clearAll);
        resetBtn.addEventListener('click', resetToOriginal);
        applyBtn.addEventListener('click', performReplacement);
        downloadBtn.addEventListener('click', downloadResult);
        caseBtn.addEventListener('click', toggleCaseSensitive);
        
        beforeText.addEventListener('input', updatePreview);
        afterText.addEventListener('input', updatePreview);

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                e.preventDefault();
                performReplacement();
            }
            if ((e.ctrlKey || e.metaKey) && e.key === 's') {
                e.preventDefault();
                downloadResult();
            }
        });

        updateCounts();
    </script>
</body>
</html>
