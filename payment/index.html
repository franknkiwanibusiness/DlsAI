<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Champions League Payment</title>
</head>
<body class="bg-gray-900 text-white flex items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-md bg-gray-800 rounded-3xl overflow-hidden shadow-2xl border border-gray-700">
        
        <div class="bg-blue-600 p-6 text-center">
            <h1 class="text-xl font-bold uppercase tracking-widest">Champions League</h1>
            <p class="text-blue-100 text-sm">Season Entry Fee</p>
        </div>

        <div class="p-8">
            <div class="flex flex-col items-center mb-8">
                <div class="relative">
                    <img id="userProfile" 
                         src="https://media.istockphoto.com/id/1480870803/photo/soccer-ball-flying-in-flames.jpg?s=612x612&w=0&k=20&c=RrWhysgAO7_BeiCJQiZoZajF20sa6r2uwW4HfaM1qpM=" 
                         alt="Profile" 
                         class="w-24 h-24 rounded-full border-4 border-blue-500 object-cover shadow-lg">
                    <div class="absolute bottom-0 right-0 bg-green-500 w-6 h-6 rounded-full border-2 border-gray-800"></div>
                </div>
                <h2 id="userName" class="mt-4 text-2xl font-semibold">User_Name_16Chr</h2>
                <p class="text-gray-400 text-sm uppercase tracking-tighter">Ready to Compete</p>
            </div>

            <div class="bg-gray-700/50 rounded-2xl p-4 mb-8">
                <div class="flex justify-between items-center">
                    <span class="text-gray-300">Amount to Pay</span>
                    <span class="text-3xl font-bold text-green-400">$3.00 <span class="text-sm font-normal text-gray-400 uppercase">USDC</span></span>
                </div>
            </div>

            <button onclick="handlePayment()" class="w-full bg-blue-500 hover:bg-blue-600 text-white font-bold py-4 rounded-xl transition-all active:scale-95 shadow-lg flex items-center justify-center gap-2">
                <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
                Pay with MiniPay
            </button>

            <p class="text-center text-xs text-gray-500 mt-6 uppercase tracking-widest">Secure No-KYC Transaction</p>
        </div>
    </div>

    <script>
        // Logic to trigger the transaction
        function handlePayment() {
            const amount = "3.00";
            const wallet = "YOUR_WALLET_ADDRESS_HERE";
            
            // This triggers the MiniPay wallet on mobile devices
            const minipayUrl = `https://minipay.to/pay?address=${wallet}&amount=${amount}&currency=USDC`;
            
            window.location.href = minipayUrl;
        }

        // Future: You can dynamically update the name/profile using your database
        // document.getElementById('userName').innerText = fetchedUserData.name;
    </script>
</body>
</html>
