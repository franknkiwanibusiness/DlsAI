<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UCL Secure Payment | MiniPay</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { -webkit-tap-highlight-color: transparent; user-select: none; }
        body { background: #000; color: #fff; font-family: sans-serif; overflow-x: hidden; }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .shimmer-btn {
            background: linear-gradient(135deg, #8458B3 0%, #a855f7 50%, #8458B3 100%);
            background-size: 200% auto;
            animation: shine 3s linear infinite;
        }

        @keyframes shine { to { background-position: 200% center; } }

        .loader-ring {
            border: 3px solid rgba(255,255,255,0.1);
            border-top: 3px solid #8458B3;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="flex flex-col min-h-screen">

    <header class="p-6 flex items-center justify-between border-b border-white/5">
        <button onclick="history.back()" class="text-white/40 text-[10px] font-black uppercase tracking-widest">← Back</button>
        <div class="text-right">
            <p class="text-[10px] font-black uppercase text-cyan-400 tracking-[0.2em]">Secure Terminal</p>
            <p class="text-[8px] font-bold text-white/20 uppercase">v2.1 Stable</p>
        </div>
    </header>

    <main class="flex-grow p-5 flex flex-col items-center">
        
        <div id="paymentIdentity" class="w-full max-w-sm glass-card rounded-[2rem] p-6 mb-6 flex items-center gap-4 animate-in fade-in zoom-in duration-500">
            <div class="relative w-16 h-16">
                <img id="userLogo" src="https://via.placeholder.com/150" class="w-full h-full rounded-full border-2 border-[#8458B3] object-cover">
                <div class="absolute -bottom-1 -right-1 bg-green-500 w-5 h-5 rounded-full border-2 border-black flex items-center justify-center">
                    <svg class="w-2 h-2 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="4" d="M5 13l4 4L19 7"/></svg>
                </div>
            </div>
            <div>
                <h2 id="userName" class="text-lg font-black italic uppercase tracking-tighter">Loading...</h2>
                <p id="userCountry" class="text-[8px] font-bold text-white/30 uppercase tracking-[0.2em]">Verifying Profile</p>
            </div>
        </div>

        <div class="w-full max-w-sm mb-6">
            <p class="text-[9px] font-black uppercase text-white/30 mb-2 tracking-[0.3em] text-center">1. Watch Tutorial</p>
            <div class="glass-card p-1 rounded-2xl overflow-hidden aspect-video">
                <iframe class="w-full h-full rounded-xl" src="https://www.youtube.com/embed/_0al3qQg9oY" frameborder="0" allowfullscreen></iframe>
            </div>
        </div>

        <div class="w-full max-w-sm glass-card rounded-[2rem] p-6 mb-6">
            <p class="text-[9px] font-black uppercase text-cyan-400 mb-4 tracking-widest text-center">2. Transfer Details</p>
            
            <div class="space-y-3">
                <div class="bg-black/40 rounded-xl p-4 border border-white/5 flex justify-between items-center">
                    <div>
                        <p class="text-[7px] uppercase text-white/30 font-black tracking-widest mb-1">Send to Number</p>
                        <p id="targetPhone" class="text-base font-black text-white">+27 84 673 7224</p> 
                    </div>
                    <button onclick="copyNumber()" id="copyBtn" class="bg-[#8458B3]/20 text-[#a855f7] px-3 py-1.5 rounded-lg text-[9px] font-black uppercase">Copy</button>
                </div>

                <div class="bg-black/40 rounded-xl p-4 border border-white/5 flex justify-between items-center">
                    <div>
                        <p class="text-[7px] uppercase text-white/30 font-black tracking-widest mb-1">Amount Due</p>
                        <p id="displayAmount" class="text-lg font-black italic text-green-400 tracking-tight">...</p>
                    </div>
                    <span class="text-[8px] font-black text-white/20 uppercase">cUSD</span>
                </div>
            </div>

            <a href="https://link.minipay.xyz/invite?ref=sVWZUHNR" class="mt-6 w-full py-4 bg-white text-black rounded-xl font-black uppercase tracking-widest text-[9px] flex items-center justify-center gap-2 active:scale-95 transition-all">
                Open MiniPay App
                <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="3" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/></svg>
            </a>
        </div>

        <div class="w-full max-w-sm px-4">
            <button id="payBtn" onclick="initiateMiniPay()" class="shimmer-btn w-full py-5 rounded-2xl font-black uppercase tracking-[0.2em] text-[11px] shadow-2xl active:scale-95 transition-all">
                I Have Sent the Money
            </button>
            <p class="text-center text-[7px] text-white/20 mt-5 px-6 font-bold uppercase tracking-widest">
                Verification takes 15-30m via Block-Verify
            </p>
        </div>
    </main>

    <div id="successModal" class="fixed inset-0 z-[100] bg-black hidden flex-col items-center justify-center p-8 text-center animate-in fade-in duration-500">
        <div class="w-16 h-16 bg-green-500 rounded-full flex items-center justify-center mb-6 shadow-[0_0_50px_rgba(34,197,94,0.3)]">
            <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"/></svg>
        </div>
        <h2 class="text-2xl font-black italic uppercase tracking-tighter mb-2">Request Sent</h2>
        <p class="text-white/40 text-[10px] mb-8 uppercase tracking-widest font-bold leading-loose">Checking Celo Network...<br>Check bracket in 15 mins</p>
        <button onclick="window.location.href='index.html'" class="glass-card px-12 py-4 rounded-xl text-[9px] font-black uppercase tracking-widest text-cyan-400">Back to Arena</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-app.js";
        import { getDatabase, ref, get, child, update } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDFHskUWiyHhZke3KT9kkOtFI_gPsKfiGo",
            authDomain: "itzhoyoo-f9f7e.firebaseapp.com",
            databaseURL: "https://itzhoyoo-f9f7e-default-rtdb.firebaseio.com",
            projectId: "itzhoyoo-f9f7e",
            storageBucket: "itzhoyoo-f9f7e.filestorage.app",
            appId: "1:1094792075584:web:d49e9c3f899d3cd31082a5"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const deviceId = localStorage.getItem('dls_ucl_final_v9');

        window.copyNumber = () => {
            const num = document.getElementById('targetPhone').innerText;
            navigator.clipboard.writeText(num);
            const btn = document.getElementById('copyBtn');
            btn.innerText = "COPIED!";
            setTimeout(() => btn.innerText = "COPY", 2000);
        };

        async function loadPaymentDetails() {
            if (!deviceId) { window.location.href = 'index.html'; return; }

            try {
                const snap = await get(child(ref(db), `users/${deviceId}`));
                if (snap.exists()) {
                    const user = snap.val();
                    document.getElementById('userLogo').src = user.photo || "https://via.placeholder.com/150";
                    document.getElementById('userName').innerText = user.team || "No Team Set";
                    document.getElementById('userCountry').innerText = `${user.country || 'Global'} Player`;

                    const rateRes = await fetch(`https://open.er-api.com/v6/latest/USD`);
                    const rateData = await rateRes.json();
                    const currency = user.currency || "USD";
                    const rate = rateData.rates[currency] || 1;
                    const amount = (3.00 * rate).toFixed(2);
                    document.getElementById('displayAmount').innerText = `${amount} ${currency}`;
                } else {
                    window.location.href = 'index.html';
                }
            } catch (e) {
                document.getElementById('displayAmount').innerText = "$3.00 USD";
            }
        }

        window.initiateMiniPay = async () => {
            const btn = document.getElementById('payBtn');
            btn.innerHTML = `<div class="loader-ring mx-auto"></div>`;
            btn.disabled = true;

            try {
                await update(ref(db, `users/${deviceId}`), {
                    paid: "PENDING",
                    status: "VERIFYING...",
                    payment_claim_time: new Date().toISOString()
                });

                document.getElementById('successModal').classList.remove('hidden');
                document.getElementById('successModal').classList.add('flex');
            } catch (e) {
                alert("Database Error.");
                btn.innerHTML = "I Have Sent the Money";
                btn.disabled = false;
            }
        };

        loadPaymentDetails();
    </script>
</body>
</html>
