<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UCL Secure Payment | MiniPay</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { -webkit-tap-highlight-color: transparent; user-select: none; }
        body { background: #000; color: #fff; font-family: sans-serif; }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .shimmer-btn {
            background: linear-gradient(135deg, #8458B3 0%, #a855f7 50%, #8458B3 100%);
            background-size: 200% auto;
            animation: shine 3s linear infinite;
        }

        @keyframes shine {
            to { background-position: 200% center; }
        }

        .loader-ring {
            border: 3px solid rgba(255,255,255,0.1);
            border-top: 3px solid #8458B3;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="flex flex-col min-h-screen">

    <header class="p-6 flex items-center justify-between border-b border-white/5">
        <button onclick="history.back()" class="text-white/40 text-sm font-black uppercase tracking-widest">← Back</button>
        <div class="text-right">
            <p class="text-[10px] font-black uppercase text-cyan-400 tracking-[0.2em]">Checkout</p>
            <p class="text-[8px] font-bold text-white/20 uppercase">Secure Terminal v2.1</p>
        </div>
    </header>

    <main class="flex-grow p-6 flex flex-col items-center justify-center">
        
        <div id="paymentIdentity" class="w-full max-w-sm glass-card rounded-[2.5rem] p-8 mb-6 text-center animate-in fade-in zoom-in duration-500">
            <div class="relative w-24 h-24 mx-auto mb-4">
                <img id="userLogo" src="https://via.placeholder.com/150" class="w-full h-full rounded-full border-4 border-[#8458B3] object-cover shadow-[0_0_30px_rgba(132,88,179,0.3)]">
                <div class="absolute -bottom-1 -right-1 bg-green-500 w-6 h-6 rounded-full border-4 border-black flex items-center justify-center">
                    <svg class="w-3 h-3 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="4" d="M5 13l4 4L19 7"/></svg>
                </div>
            </div>
            <h2 id="userName" class="text-2xl font-black italic uppercase tracking-tighter mb-1">Loading Team...</h2>
            <p id="userCountry" class="text-[10px] font-bold text-white/30 uppercase tracking-[0.3em]">Verifying Data</p>
        </div>

        <div class="w-full max-w-sm space-y-4 mb-8">
            <div class="flex justify-between items-center px-4">
                <span class="text-[10px] font-black uppercase text-white/40">Entry Fee</span>
                <span id="displayAmount" class="text-xl font-black italic text-white tracking-tight">...</span>
            </div>
            <div class="h-[1px] w-full bg-white/5"></div>
            <div class="flex justify-between items-center px-4">
                <span class="text-[10px] font-black uppercase text-white/40">Method</span>
                <div class="flex items-center gap-2">
                    <span class="bg-blue-600 text-[8px] font-black px-2 py-1 rounded uppercase">MiniPay</span>
                    <span class="text-[10px] font-bold text-white/60 italic">Exclusive</span>
                </div>
            </div>
        </div>

        <div class="w-full max-w-sm px-4">
            <button id="payBtn" onclick="initiateMiniPay()" class="shimmer-btn w-full py-5 rounded-2xl font-black uppercase tracking-[0.2em] text-[11px] shadow-2xl active:scale-95 transition-all flex items-center justify-center gap-3">
                <span>Confirm & Pay</span>
                <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2L3.5 20.29l.71.71L12 18l7.79 3 .71-.71L12 2z"/></svg>
            </button>
            <p class="text-center text-[9px] text-white/20 mt-6 px-8 font-medium leading-relaxed">
                By clicking pay, you agree to the 7-day tournament season rules. Prizes are distributed automatically via MiniPay.
            </p>
        </div>
    </main>

    <div id="successModal" class="fixed inset-0 z-[100] bg-black hidden flex-col items-center justify-center p-8 text-center animate-in fade-in duration-500">
        <div class="w-20 h-20 bg-green-500 rounded-full flex items-center justify-center mb-6 shadow-[0_0_50px_rgba(34,197,94,0.4)]">
            <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"/></svg>
        </div>
        <h2 class="text-3xl font-black italic uppercase tracking-tighter mb-2">Payment Verified</h2>
        <p class="text-white/40 text-xs mb-8">Your spot in the Champions League is confirmed!</p>
        <button onclick="window.location.href='index.html'" class="glass-card px-10 py-4 rounded-xl text-[10px] font-black uppercase tracking-widest">Back to Arena</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-app.js";
        import { getDatabase, ref, get, child, update } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDFHskUWiyHhZke3KT9kkOtFI_gPsKfiGo",
            authDomain: "itzhoyoo-f9f7e.firebaseapp.com",
            databaseURL: "https://itzhoyoo-f9f7e-default-rtdb.firebaseio.com",
            projectId: "itzhoyoo-f9f7e",
            storageBucket: "itzhoyoo-f9f7e.filestorage.app",
            appId: "1:1094792075584:web:d49e9c3f899d3cd31082a5"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const deviceId = localStorage.getItem('dls_ucl_final_v9');

        async function loadPaymentDetails() {
            if (!deviceId) {
                window.location.href = 'index.html';
                return;
            }

            const snap = await get(child(ref(db), `users/${deviceId}`));
            if (snap.exists()) {
                const user = snap.val();
                
                // Set UI Elements
                document.getElementById('userLogo').src = user.photo;
                document.getElementById('userName').innerText = user.team;
                document.getElementById('userCountry').innerText = `${user.country || 'Global'} Participant`;

                // Handle Currency Conversion (Local to User)
                try {
                    const rateRes = await fetch(`https://open.er-api.com/v6/latest/USD`);
                    const rateData = await rateRes.json();
                    const currency = user.currency || "USD";
                    const rate = rateData.rates[currency] || 1;
                    const localAmount = (3.00 * rate).toFixed(2);
                    
                    document.getElementById('displayAmount').innerText = `${localAmount} ${currency}`;
                } catch (e) {
                    document.getElementById('displayAmount').innerText = `$3.00 USD`;
                }
            } else {
                window.location.href = 'index.html';
            }
        }

        window.initiateMiniPay = async () => {
            const btn = document.getElementById('payBtn');
            const originalText = btn.innerHTML;
            btn.innerHTML = `<div class="loader-ring"></div>`;
            btn.disabled = true;

            // MiniPay Transaction Logic would go here
            // Simulation for your UI testing:
            setTimeout(async () => {
                try {
                    // Update Database to PENDING or PAID
                    await update(ref(db, `users/${deviceId}`), {
                        paid: "PENDING",
                        status: "ENTERING..."
                    });

                    document.getElementById('successModal').classList.remove('hidden');
                    document.getElementById('successModal').classList.add('flex');
                } catch (e) {
                    alert("Payment Failed. Try again.");
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                }
            }, 2000);
        };

        loadPaymentDetails();
    </script>
</body>
</html>
