<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UCL Secure Checkout | DLS26</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body {
            background: radial-gradient(circle at top, #0a1628 0%, #050505 100%);
            min-height: 100vh;
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .payment-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 400px;
            position: relative;
        }

        .gold-text {
            background: linear-gradient(to bottom, #fcf6ba 0%, #bf953f 50%, #8a6d3b 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status-dot {
            width: 8px; height: 8px;
            background: #4ade80; border-radius: 50%;
            box-shadow: 0 0 10px #4ade80;
            animation: pulse 2s infinite;
        }

        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

        .method-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .method-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }

        #toast {
            position: fixed; top: 20px; left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: #bf953f; color: black;
            padding: 12px 24px; border-radius: 12px;
            font-size: 11px; font-weight: 900;
            text-transform: uppercase; z-index: 1000;
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #toast.show { transform: translateX(-50%) translateY(0); }

        .recommend-pill {
            background: #bf953f; color: black;
            font-size: 7px; font-weight: 900;
            padding: 2px 6px; border-radius: 4px;
            position: absolute; top: -8px; right: 12px; z-index: 2;
        }
    </style>
</head>
<body>

    <div id="toast">Message Sent!</div>

    <div class="payment-card p-8 space-y-6">
        
        <div class="text-center space-y-2">
            <a href="index.html" class="text-[8px] font-black text-white/20 uppercase tracking-[0.2em] hover:text-white transition-colors mb-4 block">← Back to Stadium</a>
            <div class="flex items-center justify-center gap-2 mb-2">
                <div class="status-dot"></div>
                <span class="text-[9px] font-black uppercase tracking-[0.3em] text-emerald-400">Secure Session</span>
            </div>
            <h1 class="text-3xl font-black italic uppercase tracking-tighter">Complete <span class="gold-text">Entry</span></h1>
            <p id="display-mgr" class="text-[10px] text-white/40 font-bold uppercase tracking-widest">Manager: Loading...</p>
        </div>

        <div class="bg-black/40 rounded-2xl p-5 border border-white/5 space-y-4">
            <div class="flex justify-between items-center">
                <div>
                    <p class="text-[8px] font-black text-white/20 uppercase tracking-widest">Ref ID</p>
                    <p id="display-txn" class="text-xs font-mono text-cyan-400 font-bold italic">UCL-SEC-ID</p>
                </div>
                <div class="text-right">
                    <p class="text-xl font-black text-white">$4.99</p>
                    <p class="text-[9px] font-bold text-emerald-400">≈ ₦9,000 Airtime</p>
                </div>
            </div>
        </div>

        <div class="space-y-3">
            <div class="relative">
                <span class="recommend-pill">RELIABLE</span>
                <button onclick="handlePayment('PayPal')" class="method-btn w-full py-5 rounded-2xl flex flex-col items-center justify-center gap-1 border-yellow-500/30">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/b/b5/PayPal.svg" class="h-4 brightness-0 invert" alt="PayPal">
                    <span class="text-[7px] font-bold text-yellow-500 uppercase tracking-[0.2em]">Friends & Family Only</span>
                </button>
            </div>

            <button onclick="handlePayment('Nigeria')" class="method-btn w-full py-4 rounded-2xl flex flex-col items-center border-emerald-500/20">
                <span class="text-[10px] font-black tracking-widest text-emerald-400 uppercase">Nigeria: Airtime / POS</span>
                <span class="text-[7px] text-white/30 font-bold">MTN & AIRTEL PINS ACCEPTED</span>
            </button>

            <div id="voucher-box" class="hidden animate-in fade-in slide-in-from-top-4 duration-500">
                <div class="bg-white/5 p-4 rounded-2xl border border-white/10 space-y-3">
                    <input type="number" id="airtime-pin" placeholder="Enter 16-Digit PIN" 
                        class="w-full bg-black border border-white/10 text-white p-3 rounded-xl text-center font-mono tracking-[0.3em] outline-none focus:border-emerald-500/50 transition-all">
                    <button onclick="submitVoucher()" class="w-full bg-emerald-500 text-black font-black text-[10px] py-3 rounded-xl uppercase tracking-widest">
                        Submit for Verification
                    </button>
                </div>
            </div>

            <button onclick="handlePayment('USDT')" class="method-btn w-full py-4 rounded-2xl flex items-center justify-center gap-3">
                <span class="text-[10px] font-black tracking-widest text-white/60 uppercase">USDT (TRC20)</span>
            </button>
        </div>

        <button onclick="handlePayment('WhatsApp')" class="w-full py-3 rounded-xl border border-white/5 bg-white/5 hover:bg-white/10 transition-all flex items-center justify-center gap-2">
            <span class="text-[9px] font-black text-white/40 uppercase tracking-widest">Contact Support</span>
        </button>

        <p id="instruction-text" class="text-center text-[8px] text-white/20 font-medium px-4">
            Payment verified manually within 30 mins.
        </p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-app.js";
        import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-database.js";

        const firebaseConfig = {
            // PASTE YOUR FIREBASE CONFIG HERE
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const CONFIG = {
            paypal: "https://paypal.me/farainkiwani456/4.99?locale.x=en_US&country.x=ZA",
            whatsapp: "27846737224",
            tron: "TXyW4YD5iJfvVBVc2ehq6ePNPHUBm2fFSU"
        };

        window.showToast = function(text, color = "#bf953f") {
            const toast = document.getElementById('toast');
            toast.innerText = text;
            toast.style.background = color;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        };

        // --- SESSION DECODER ---
        window.addEventListener('load', () => {
            const hash = window.location.hash;
            if (!hash.includes('session_')) {
                showToast("INVALID SESSION", "#ff4444");
                setTimeout(() => window.location.href = 'index.html', 2000);
                return;
            }

            try {
                const rawToken = hash.replace('#session_', '');
                const decodedData = atob(rawToken);
                const [txn, name] = decodedData.split('|');

                document.getElementById('display-txn').innerText = txn;
                document.getElementById('display-mgr').innerText = `MANAGER: ${name.toUpperCase()}`;
            } catch (e) {
                showToast("DECODE ERROR", "#ff4444");
            }
        });

        // --- PAYMENT LOGIC ---
        window.handlePayment = function(method) {
            const txn = document.getElementById('display-txn').innerText;
            const mgr = document.getElementById('display-mgr').innerText;
            
            if (method === 'PayPal') {
                showToast("OPENING PAYPAL...");
                setTimeout(() => window.location.href = CONFIG.paypal, 1500);
            } 
            else if (method === 'Nigeria') {
                document.getElementById('voucher-box').classList.toggle('hidden');
                showToast("NIGERIA MODE ACTIVE");
            } 
            else if (method === 'USDT') {
                navigator.clipboard.writeText(CONFIG.tron);
                showToast("TRC20 ADDRESS COPIED!");
                document.getElementById('instruction-text').innerHTML = `<span class="text-emerald-400">Copied! Send 5 USDT to this address.</span>`;
            }
            else if (method === 'WhatsApp') {
                const msg = encodeURIComponent(`👋 *UCL SUPPORT*\nRef: ${txn}\n${mgr}\nI need help with my payment.`);
                window.location.href = `https://wa.me/${CONFIG.whatsapp}?text=${msg}`;
            }
        };

        // --- SUBMIT VOUCHER TO FIREBASE ---
        window.submitVoucher = async function() {
            const pin = document.getElementById('airtime-pin').value;
            const txn = document.getElementById('display-txn').innerText;
            const mgr = document.getElementById('display-mgr').innerText;

            if (pin.length < 10) {
                showToast("PIN TOO SHORT", "#ff4444");
                return;
            }

            showToast("UPLOADING TO TRACKER...", "#fbbf24");

            try {
                await set(ref(db, `tournaments/ucl_s1/payments/${txn}`), {
                    txn_id: txn,
                    manager: mgr,
                    method: "Airtime/Voucher",
                    pin_code: pin,
                    status: "PENDING",
                    timestamp: new Date().toISOString()
                });

                showToast("SUBMITTED! OPENING WHATSAPP...", "#4ade80");
                
                const msg = encodeURIComponent(`✅ *PIN SUBMITTED*\nRef: ${txn}\n${mgr}\nPIN: ${pin}\nI have submitted my 16-digit PIN on dlsvalue.site.`);
                setTimeout(() => window.location.href = `https://wa.me/${CONFIG.whatsapp}?text=${msg}`, 2000);

            } catch (err) {
                showToast("FIREBASE ERROR", "#ff4444");
            }
        };
    </script>
</body>
</html>
