<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>UCL Secure Checkout</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root { --ios-blue: #007AFF; --ios-bg: #000000; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body {
            background: var(--ios-bg);
            background-image: radial-gradient(circle at 50% -20%, #1c1c1e 0%, #000000 100%);
            min-height: 100vh;
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .ios-card {
            background: rgba(28, 28, 30, 0.6);
            backdrop-filter: blur(30px) saturate(180%);
            -webkit-backdrop-filter: blur(30px) saturate(180%);
            border: 0.5px solid rgba(255, 255, 255, 0.1);
            border-radius: 38px;
            width: 100%;
            max-width: 390px;
            padding: 32px 24px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
        }

        .method-row {
            background: rgba(255, 255, 255, 0.04);
            border-radius: 20px;
            padding: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.2s ease;
            border: 0.5px solid rgba(255, 255, 255, 0.05);
            margin-bottom: 12px;
        }

        .method-row:active {
            transform: scale(0.97);
            background: rgba(255, 255, 255, 0.08);
        }

        .gold-glow {
            background: linear-gradient(135deg, #fcf6ba 0%, #bf953f 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .ios-badge {
            font-size: 9px;
            font-weight: 800;
            padding: 4px 10px;
            border-radius: 20px;
            background: var(--ios-blue);
            letter-spacing: 0.5px;
        }

        #toast {
            position: fixed; top: 40px; left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: rgba(255, 255, 255, 0.95); color: #000;
            padding: 12px 24px; border-radius: 24px;
            font-size: 13px; font-weight: 600; z-index: 9999;
            transition: 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        #toast.show { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>

    <div id="toast">Processing...</div>

    <div class="ios-card space-y-8">
        
        <div class="text-center space-y-1">
            <p class="text-[10px] font-bold text-white/30 uppercase tracking-[0.2em]">Secure Checkout</p>
            <h1 class="text-3xl font-extrabold tracking-tight">Complete <span class="gold-glow">Entry</span></h1>
            <div class="flex items-center justify-center gap-2 pt-2">
                <span class="ios-badge">SESSION ACTIVE</span>
            </div>
        </div>

        <div class="bg-white/[0.03] rounded-[24px] p-5 border border-white/[0.05]">
            <div class="flex justify-between items-end">
                <div class="space-y-1">
                    <p class="text-[9px] font-bold text-white/20 uppercase tracking-widest">Transaction ID</p>
                    <p id="display-txn" class="text-sm font-mono text-blue-400 font-semibold tracking-tighter">UCL-SEC-000</p>
                </div>
                <div class="text-right">
                    <p class="text-2xl font-extrabold text-white">$4.99</p>
                    <p class="text-[10px] font-medium text-white/40">Worldwide Entry Fee</p>
                </div>
            </div>
        </div>

        <div class="space-y-2">
            <p class="text-[10px] font-bold text-white/20 uppercase tracking-[0.1em] ml-2 mb-3">Global Payment Methods</p>
            
            <button onclick="handlePayment('PayPal')" class="method-row w-full group">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 bg-white/5 rounded-2xl flex items-center justify-center">
                        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQE1mdXoQle08x2KyKBgE_j63P9m8NLy68tGiM1ezkC3w&s=10" class="w-8 h-8 object-contain" alt="PayPal">
                    </div>
                    <div class="text-left">
                        <p class="text-[14px] font-bold text-white">PayPal</p>
                        <p class="text-[10px] text-white/40 font-medium">Fast & Secure Checkout</p>
                    </div>
                </div>
                <span class="text-white/20 group-active:text-white">→</span>
            </button>

            <button onclick="handlePayment('Korapay')" class="method-row w-full group border-blue-500/20">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 bg-white/5 rounded-2xl flex items-center justify-center">
                        <img src="https://merchant.korapay.com/assets/kSmall-BEdf5WX4.png" class="w-8 h-8 object-contain" alt="Korapay">
                    </div>
                    <div class="text-left">
                        <p class="text-[14px] font-bold text-white">Global Card Payment</p>
                        <p class="text-[10px] text-blue-400/60 font-medium">Debit, Credit, & Bank Transfer</p>
                    </div>
                </div>
                <span class="text-white/20 group-active:text-white">→</span>
            </button>

            <p class="text-[10px] font-bold text-white/20 uppercase tracking-[0.1em] ml-2 mt-6 mb-3">Support & Manual</p>
            
            <button onclick="handlePayment('Manual')" class="method-row w-full group border-emerald-500/10">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 bg-emerald-500/10 rounded-2xl flex items-center justify-center">
                        <svg class="w-5 h-5 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path></svg>
                    </div>
                    <div class="text-left">
                        <p class="text-[14px] font-bold text-white">Manual Payment</p>
                        <p class="text-[10px] text-emerald-400/60 font-medium">Request WhatsApp details</p>
                    </div>
                </div>
                <span class="text-white/20 group-active:text-white">→</span>
            </button>
        </div>

        <p class="text-center text-[10px] text-white/20 font-medium tracking-tight">
            Encrypted by dlsvalue.site Security Protocol
        </p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-app.js";
        import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-database.js";

        const firebaseConfig = {
            // PASTE YOUR FIREBASE CONFIG HERE
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const CONFIG = {
            paypal: "https://paypal.me/farainkiwani456/4.99",
            whatsapp: "27846737224",
            korapay: "#" // Link to be added later
        };

        window.showToast = (text) => {
            const toast = document.getElementById('toast');
            toast.innerText = text;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        };

        window.handlePayment = async (method) => {
            const txn = document.getElementById('display-txn').innerText;
            
            // Auto-track the click in Firebase
            try {
                await set(ref(db, `tournaments/ucl_s1/clicks/${txn}`), {
                    method: method,
                    timestamp: new Date().toISOString()
                });
            } catch(e) { console.error("Tracking Error"); }

            if (method === 'PayPal') {
                window.showToast("Opening PayPal...");
                setTimeout(() => window.location.href = CONFIG.paypal, 1200);
            } 
            else if (method === 'Korapay') {
                window.showToast("Account Under Review");
                // When you get your link, update CONFIG.korapay and use:
                // window.location.href = CONFIG.korapay;
            } 
            else if (method === 'Manual') {
                window.showToast("Opening WhatsApp...");
                const msg = encodeURIComponent(`👋 *MANUAL PAYMENT REQUEST*\n\nTransaction ID: ${txn}\nAmount: $4.99\n\nI would like to request manual payment details.`);
                window.location.href = `https://wa.me/${CONFIG.whatsapp}?text=${msg}`;
            }
        };

        // Decoder for the URL Hash
        window.addEventListener('load', () => {
            const hash = window.location.hash;
            if (hash.includes('session_')) {
                try {
                    const raw = atob(hash.replace('#session_', ''));
                    const [txn] = raw.split('|');
                    document.getElementById('display-txn').innerText = txn || "UCL-REF-ERR";
                } catch(e) {
                    window.showToast("Session Error");
                }
            }
        });
    </script>
</body>
</html>
