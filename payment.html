<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UCL Secure Checkout | DLS26</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body {
            background: radial-gradient(circle at top, #0a1628 0%, #050505 100%);
            min-height: 100vh;
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow: hidden;
        }

        .payment-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 400px;
            position: relative;
            z-index: 1;
        }

        .gold-glow { box-shadow: 0 0 40px rgba(191, 149, 63, 0.1); }

        .gold-text {
            background: linear-gradient(to bottom, #fcf6ba 0%, #bf953f 50%, #8a6d3b 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status-dot {
            width: 8px; height: 8px;
            background: #4ade80; border-radius: 50%;
            box-shadow: 0 0 10px #4ade80;
            animation: pulse 2s infinite;
        }

        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

        .method-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        .method-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        /* Custom Notification Toast */
        #toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: #bf953f;
            color: black;
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 900;
            text-transform: uppercase;
            z-index: 100;
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        #toast.show { transform: translateX(-50%) translateY(0); }

        .recommend-pill {
            background: #bf953f;
            color: black;
            font-size: 7px;
            font-weight: 900;
            padding: 2px 6px;
            border-radius: 4px;
            position: absolute;
            top: -8px;
            right: 12px;
            z-index: 2;
        }
    </style>
</head>
<body>

    <div id="toast">Copied to Clipboard!</div>

    <div class="payment-card gold-glow p-8 space-y-8">
        
        <div class="text-center space-y-2">
            <div class="flex items-center justify-center gap-2 mb-4">
                <div class="status-dot"></div>
                <span class="text-[9px] font-black uppercase tracking-[0.3em] text-emerald-400">Live Secure Session</span>
            </div>
            <h1 class="text-3xl font-black italic uppercase tracking-tighter">Complete <span class="gold-text">Entry</span></h1>
            <p id="display-mgr" class="text-[10px] text-white/40 font-bold uppercase tracking-widest pt-1">Manager: Connecting...</p>
        </div>

        <div id="session-box" class="bg-black/40 rounded-2xl p-6 border border-white/5 space-y-4">
            <div class="flex justify-between items-start border-b border-white/5 pb-4">
                <div>
                    <p class="text-[8px] font-black text-white/20 uppercase tracking-widest">Transaction ID</p>
                    <p id="display-txn" class="text-xs font-mono text-cyan-400 font-bold tracking-tighter italic">UCL-SEC-ID</p>
                </div>
                <div class="text-right">
                    <p class="text-[8px] font-black text-white/20 uppercase tracking-widest">Global Fee</p>
                    <p class="text-xl font-black text-white">$4.99</p>
                    <p id="ngn-price" class="text-[10px] font-bold text-emerald-400 mt-0.5">≈ ₦8,000</p>
                </div>
            </div>
        </div>

        <div class="space-y-4">
            <div class="relative">
                <span class="recommend-pill">RECOMMENDED</span>
                <button onclick="handlePayment('PayPal')" class="method-btn w-full py-5 rounded-2xl flex flex-col items-center justify-center gap-1 border-yellow-500/30">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/b/b5/PayPal.svg" class="h-4 brightness-0 invert" alt="PayPal">
                    <span class="text-[7px] font-bold text-yellow-500 uppercase tracking-widest">Friends & Family Only</span>
                </button>
            </div>

            <button onclick="handlePayment('Nigeria')" class="method-btn w-full py-4 rounded-2xl flex items-center justify-center gap-3">
                <span class="text-[10px] font-black tracking-widest text-emerald-400 uppercase">Nigeria: Bank / OPay</span>
            </button>

            <button onclick="handlePayment('USDT')" class="method-btn w-full py-4 rounded-2xl flex items-center justify-center gap-3">
                <span class="text-[10px] font-black tracking-widest text-white/60 uppercase">USDT (TRC20)</span>
            </button>

            <button onclick="handlePayment('Bitcoin')" class="method-btn w-full py-4 rounded-2xl flex items-center justify-center gap-3 opacity-30">
                <span class="text-[10px] font-black tracking-widest text-white/40 uppercase">Bitcoin (High Fees)</span>
            </button>
        </div>

        <div class="text-center">
            <p id="instruction-text" class="text-[8px] text-white/20 font-medium px-4">
                Verify your transaction via WhatsApp: <span class="text-white/60">+27 84 673 7224</span>
            </p>
        </div>

    </div>

    <script>
        const CONFIG = {
            paypal: "https://paypal.me/farainkiwani456/4.99?locale.x=en_US&country.x=ZA",
            whatsapp: "27846737224",
            tron: "TXyW4YD5iJfvVBVc2ehq6ePNPHUBm2fFSU"
        };

        function showToast(text, color = "#bf953f") {
            const toast = document.getElementById('toast');
            toast.innerText = text;
            toast.style.background = color;
            toast.classList.add('show');
            setTimeout(() => { toast.classList.remove('show'); }, 3000);
        }

        // --- PRODUCTION DECODER ---
        window.addEventListener('load', () => {
            const hash = window.location.hash;
            if (!hash.includes('session_')) {
                document.body.innerHTML = `<div class='text-center space-y-4'><p class='text-red-500 font-black text-xs uppercase tracking-widest'>Invalid Session</p><a href='index.html' class='text-[10px] text-white/20 underline'>Return to Home</a></div>`;
                return;
            }

            try {
                const rawToken = hash.replace('#session_', '');
                const decodedData = atob(rawToken);
                const [txn, name] = decodedData.split('|');

                document.getElementById('display-txn').innerText = txn;
                document.getElementById('display-mgr').innerText = `Manager: ${name}`;
            } catch (e) {
                showToast("SESSION DECODE ERROR", "#ff4444");
            }
        });

        function handlePayment(method) {
            const txn = document.getElementById('display-txn').innerText;
            const mgr = document.getElementById('display-mgr').innerText;
            
            if (method === 'PayPal') {
                showToast("REDIRECTING... USE FRIENDS & FAMILY");
                setTimeout(() => { window.location.href = CONFIG.paypal; }, 1500);
            } 
            else if (method === 'Nigeria') {
                showToast("OPENING WHATSAPP BRIDGE...");
                const msg = encodeURIComponent(`🇳🇬 *UCL NIGERIA ENTRY*\nRef: ${txn}\n${mgr}\nI want to pay ₦8,000 via Bank/OPay.`);
                setTimeout(() => { window.location.href = `https://wa.me/${CONFIG.whatsapp}?text=${msg}`; }, 1000);
            } 
            else if (method === 'USDT') {
                navigator.clipboard.writeText(CONFIG.tron);
                showToast("USDT ADDRESS COPIED TO CLIPBOARD!");
                document.getElementById('instruction-text').innerHTML = `<span class='text-emerald-400'>Address Copied! Send 4.99 USDT (TRC20) now.</span>`;
            }
            else if (method === 'Bitcoin') {
                showToast("FEE WARNING: USE PAYPAL OR USDT", "#ff4444");
            }
        }
    </script>
</body>
</html>
