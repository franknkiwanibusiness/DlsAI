<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Chat Application</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Smooth custom scrollbar for clean aesthetics */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #f1f1f1; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
  </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans antialiased flex justify-center min-h-screen">

  <div class="w-full max-w-md bg-white flex flex-col min-h-screen shadow-xl border-x border-slate-200 relative">
    
    <header class="sticky top-0 z-50 bg-white border-b border-slate-200 px-4 py-3 flex items-center justify-between shadow-sm">
      <div class="flex items-center space-x-3">
        <div class="w-3 h-3 bg-emerald-500 rounded-full animate-pulse"></div>
        <span class="font-bold tracking-tight text-lg text-slate-800">System Chat</span>
      </div>
      <span class="text-xs font-semibold uppercase tracking-wider text-slate-400 bg-slate-100 px-2 py-1 rounded">Flash 3.5</span>
    </header>

    <main id="chat-feed" class="flex-1 overflow-y-auto p-4 space-y-4 pb-32">
      <div class="flex flex-col items-start max-w-[85%]">
        <div class="bg-slate-100 text-slate-800 text-sm p-3 rounded-2xl rounded-tl-none border border-slate-200 shadow-sm">
          Connection established. Ready to process text data and attachments.
        </div>
      </div>
    </main>

    <div class="absolute bottom-0 left-0 right-0 bg-white border-t border-slate-200 p-3 z-40">
      
      <div id="file-preview" class="hidden mb-2 p-2 bg-slate-50 border border-slate-200 rounded-lg flex items-center justify-between text-xs text-slate-600">
        <div class="flex items-center space-x-2 truncate">
          <svg class="w-4 h-4 text-slate-400 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13"></path></svg>
          <span id="file-name" class="truncate font-medium">filename.pdf</span>
        </div>
        <button id="remove-file" class="text-slate-400 hover:text-slate-600 font-bold px-1">✕</button>
      </div>

      <form id="chat-form" class="flex items-center space-x-2">
        <label class="cursor-pointer p-2.5 text-slate-500 hover:text-slate-800 hover:bg-slate-100 rounded-xl transition border border-slate-200">
          <input type="file" id="file-input" class="hidden" accept="image/*,application/pdf,text/*">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
        </label>

        <input type="text" id="message-input" placeholder="Type a message..." autocomplete="off" required
          class="flex-1 bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-slate-800 focus:bg-white transition text-slate-800 placeholder-slate-400">

        <button type="submit" class="bg-slate-900 hover:bg-slate-800 text-white p-2.5 rounded-xl transition shadow-sm shrink-0">
          <svg class="w-5 h-5 transform rotate-90" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9-2-9-18-9 18 9-2zm0 0v-8"></path></svg>
        </button>
      </form>
    </div>

  </div>

  <script>
    const chatForm = document.getElementById('chat-form');
    const messageInput = document.getElementById('message-input');
    const fileInput = document.getElementById('file-input');
    const filePreview = document.getElementById('file-preview');
    const fileNameSpan = document.getElementById('file-name');
    const removeFileBtn = document.getElementById('remove-file');
    const chatFeed = document.getElementById('chat-feed');

    let attachedFile = null;

    // Handle File Selection
    fileInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = function(event) {
          attachedFile = {
            name: file.name,
            mimeType: file.type,
            base64: event.target.result.split(',')[1] // Strip data URL prefix
          };
          fileNameSpan.textContent = file.name;
          filePreview.classList.remove('hidden');
        };
        reader.readAsDataURL(file);
      }
    });

    // Clear File Selection
    removeFileBtn.addEventListener('click', () => {
      attachedFile = null;
      fileInput.value = '';
      filePreview.classList.add('hidden');
    });

    // Append Messages Helper
    function appendMessage(text, isUser = false) {
      const wrapper = document.createElement('div');
      wrapper.className = `flex flex-col ${isUser ? 'items-end ml-auto' : 'items-start'} max-w-[85%]`;

      const bubble = document.createElement('div');
      bubble.className = isUser 
        ? 'bg-slate-900 text-white text-sm p-3 rounded-2xl rounded-tr-none border border-slate-900 shadow-sm'
        : 'bg-slate-100 text-slate-800 text-sm p-3 rounded-2xl rounded-tl-none border border-slate-200 shadow-sm';
      
      bubble.textContent = text;
      wrapper.appendChild(bubble);
      chatFeed.appendChild(wrapper);
      chatFeed.scrollTop = chatFeed.scrollHeight;
    }

    // Submit Handler
    chatForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const message = messageInput.value.trim();
      if (!message && !attachedFile) return;

      // Render user message instantly
      let userDisplay = message;
      if (attachedFile) userDisplay += ` [Attachment: ${attachedFile.name}]`;
      appendMessage(userDisplay, true);

      // Cache request data & clear inputs
      const requestPayload = { message, file: attachedFile };
      messageInput.value = '';
      attachedFile = null;
      fileInput.value = '';
      filePreview.classList.add('hidden');

      // Set temporary loading response state
      const loadingWrapper = document.createElement('div');
      loadingWrapper.className = 'flex flex-col items-start max-w-[85%]';
      loadingWrapper.innerHTML = `<div class="bg-slate-100 text-slate-400 text-sm p-3 rounded-2xl rounded-tl-none border border-slate-200 italic animate-pulse">Processing...</div>`;
      chatFeed.appendChild(loadingWrapper);
      chatFeed.scrollTop = chatFeed.scrollHeight;

      try {
        const response = await fetch('/api/ai.js', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(requestPayload)
        });

        const data = await response.json();
        loadingWrapper.remove();

        if (data.reply) {
          appendMessage(data.reply, false);
        } else {
          appendMessage("Error parsing structural response metadata.", false);
        }
      } catch (err) {
        loadingWrapper.remove();
        appendMessage("Network connection anomaly detected.", false);
      }
    });
  </script>
</body>
</html>
