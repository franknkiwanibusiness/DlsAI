<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FrostLens Pro | Analytics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');
        body { font-family: 'Inter', sans-serif; background: #f8fafc; overflow: hidden; }
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.3); }
        #splash { position: fixed; inset: 0; background: white; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.5s ease-out; }
        .loader { width: 40px; height: 40px; border: 4px solid #f3f4f6; border-bottom-color: #3b82f6; border-radius: 50%; animation: rotation 0.8s linear infinite; }
        @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .dot { transition: all 0.3s ease-in-out; }
        input:checked ~ .dot { transform: translateX(100%); background-color: #3b82f6; }
    </style>
</head>
<body class="h-screen flex flex-col">

    <div id="splash">
        <div class="loader mb-4"></div>
        <h1 class="text-xl font-semibold tracking-tighter text-slate-800 uppercase">FrostLens</h1>
    </div>

    <header class="p-6 bg-white/80 backdrop-blur-md border-b flex justify-between items-center sticky top-0 z-10">
        <div>
            <h2 id="view-title" class="text-2xl font-bold text-slate-900 leading-none">Upload</h2>
            <div class="flex flex-col gap-0.5 mt-1">
                <p id="view-subtitle" class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Size Optimization Enabled</p>
                <!-- API Credits Badge -->
                <p id="api-limits" class="text-[9px] text-slate-500 font-medium hidden">
                    App Remaining: <span id="app-remaining" class="font-bold text-blue-600">--</span> | IP Remaining: <span id="user-remaining" class="font-bold text-indigo-600">--</span>
                </p>
            </div>
        </div>
        <div class="w-10 h-10 rounded-2xl bg-blue-600 flex items-center justify-center shadow-lg shadow-blue-200">
            <i class="fa-solid fa-chart-pie text-white text-xs"></i>
        </div>
    </header>

    <main class="flex-1 overflow-y-auto p-5 pb-28">
        
        <section id="upload-view" class="space-y-6">
            <div class="bg-white p-4 rounded-3xl border border-slate-100 shadow-sm flex items-center justify-between">
                <div class="flex items-center space-x-3">
                    <div class="bg-blue-50 p-2 rounded-lg text-blue-500"><i class="fa-solid fa-wand-magic-sparkles"></i></div>
                    <div>
                        <p class="text-sm font-semibold text-slate-700">Optimize Size</p>
                        <p id="compress-status" class="text-[10px] text-slate-400 italic">Reduces size by ~60%</p>
                    </div>
                </div>
                <label class="flex items-center cursor-pointer relative">
                    <input type="checkbox" id="compress-toggle" class="sr-only" checked>
                    <div class="block w-10 h-6 bg-slate-200 rounded-full transition"></div>
                    <div class="dot absolute left-1 top-1 bg-white w-4 h-4 rounded-full transition shadow-sm"></div>
                </label>
            </div>

            <div id="drop-zone" class="aspect-square border-2 border-dashed border-slate-200 rounded-[2rem] flex flex-col items-center justify-center bg-white hover:bg-slate-50 transition-all group active:scale-95">
                <div class="bg-slate-50 p-6 rounded-full group-hover:bg-blue-100 group-hover:text-blue-600 transition-colors mb-4 text-slate-300">
                    <i class="fa-solid fa-plus text-3xl"></i>
                </div>
                <p class="text-slate-600 font-semibold">Add Files</p>
                <input type="file" id="file-input" multiple accept="image/*" class="hidden">
            </div>

            <div id="progress-container" class="hidden space-y-3">
                <div class="flex justify-between items-end">
                    <div class="space-y-1">
                        <span id="status-text" class="text-[11px] font-bold text-slate-500 uppercase">Ready</span>
                        <div id="size-stats" class="text-[10px] text-blue-600 font-medium"></div>
                    </div>
                    <span id="percent-text" class="text-lg font-bold text-slate-800">0%</span>
                </div>
                <div class="w-full bg-slate-100 rounded-full h-1.5 overflow-hidden">
                    <div id="progress-bar" class="bg-blue-500 h-full w-0 transition-all duration-300"></div>
                </div>
            </div>
        </section>

        <section id="gallery-view" class="hidden">
            <div id="empty-state" class="text-center py-20 text-slate-300">
                <i class="fa-solid fa-box-open text-4xl mb-4 opacity-10"></i>
                <p class="text-sm">Empty Gallery</p>
            </div>
            <div id="gallery-grid" class="grid grid-cols-2 gap-4"></div>
        </section>
    </main>

    <nav class="fixed bottom-6 left-6 right-6 h-16 glass rounded-2xl flex justify-around items-center px-4 shadow-xl z-20">
        <button onclick="switchTab('upload')" id="nav-upload" class="flex flex-col items-center space-y-1 text-blue-600">
            <i class="fa-solid fa-cloud-arrow-up text-xl"></i>
            <span class="text-[9px] font-bold uppercase tracking-widest">Upload</span>
        </button>
        <button onclick="switchTab('gallery')" id="nav-gallery" class="flex flex-col items-center space-y-1 text-slate-400">
            <i class="fa-solid fa-layer-group text-xl"></i>
            <span class="text-[9px] font-bold uppercase tracking-widest">Library</span>
        </button>
    </nav>

    <script>
        const CLIENT_ID = "891e5bb4aa94282";
        const fileInput = document.getElementById('file-input');
        const dropZone = document.getElementById('drop-zone');
        const compressToggle = document.getElementById('compress-toggle');

        window.addEventListener('load', () => {
            setTimeout(() => { document.getElementById('splash').style.opacity = '0'; setTimeout(() => document.getElementById('splash').remove(), 500); }, 1000);
            renderGallery();
            displayStoredLimits();
        });

        function formatSize(bytes) {
            if (bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        function switchTab(view) {
            const isUpload = view === 'upload';
            document.getElementById('upload-view').classList.toggle('hidden', !isUpload);
            document.getElementById('gallery-view').classList.toggle('hidden', isUpload);
            document.getElementById('view-title').innerText = isUpload ? 'Upload' : 'Library';
            document.getElementById('nav-upload').className = isUpload ? 'flex flex-col items-center space-y-1 text-blue-600' : 'flex flex-col items-center space-y-1 text-slate-400';
            document.getElementById('nav-gallery').className = !isUpload ? 'flex flex-col items-center space-y-1 text-blue-600' : 'flex flex-col items-center space-y-1 text-slate-400';
            if(!isUpload) renderGallery();
        }

        dropZone.onclick = () => fileInput.click();
        fileInput.onchange = (e) => handleFiles(e.target.files);

        async function compressImage(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let w = img.width, h = img.height;
                        if (w > 1500) { h = (1500 / w) * h; w = 1500; }
                        canvas.width = w; canvas.height = h;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, w, h);
                        canvas.toBlob((blob) => {
                            resolve(new File([blob], file.name, { type: 'image/jpeg' }));
                        }, 'image/jpeg', 0.6);
                    };
                };
            });
        }

        function updateLimitDisplay(clientRemaining, userRemaining) {
            const apiLimitsEl = document.getElementById('api-limits');
            const appRemainingEl = document.getElementById('app-remaining');
            const userRemainingEl = document.getElementById('user-remaining');

            if (clientRemaining !== null && userRemaining !== null) {
                appRemainingEl.innerText = clientRemaining;
                userRemainingEl.innerText = userRemaining;
                apiLimitsEl.classList.remove('hidden');
                
                // Save it locally so it stays visible on page reload
                localStorage.setItem('imgur_limits', JSON.stringify({ clientRemaining, userRemaining }));
            }
        }

        function displayStoredLimits() {
            const stored = localStorage.getItem('imgur_limits');
            if (stored) {
                const { clientRemaining, userRemaining } = JSON.parse(stored);
                updateLimitDisplay(clientRemaining, userRemaining);
            }
        }

        async function handleFiles(files) {
            if (files.length === 0) return;
            const container = document.getElementById('progress-container');
            const bar = document.getElementById('progress-bar');
            const status = document.getElementById('status-text');
            const stats = document.getElementById('size-stats');
            
            container.classList.remove('hidden');
            let images = JSON.parse(localStorage.getItem('my_images') || '[]');

            for (let i = 0; i < files.length; i++) {
                const originalSize = files[i].size;
                let fileToUpload = files[i];
                let sizeDisplay = `Original: ${formatSize(originalSize)}`;

                if (compressToggle.checked) {
                    status.innerText = `Compressing ${i + 1}...`;
                    fileToUpload = await compressImage(files[i]);
                    sizeDisplay = `${formatSize(originalSize)} ➔ ${formatSize(fileToUpload.size)}`;
                }

                stats.innerText = sizeDisplay;
                status.innerText = `Uploading to Imgur...`;
                
                try {
                    const link = await uploadToImgur(fileToUpload);
                    images.push({ link, size: formatSize(fileToUpload.size), timestamp: Date.now() });
                    localStorage.setItem('my_images', JSON.stringify(images));
                } catch (err) { alert("Failed to upload " + files[i].name); }

                const step = ((i + 1) / files.length) * 100;
                bar.style.width = `${step}%`;
                document.getElementById('percent-text').innerText = `${Math.round(step)}%`;
            }

            status.innerText = "All Assets Stored";
            setTimeout(() => { container.classList.add('hidden'); switchTab('gallery'); }, 1000);
        }

        async function uploadToImgur(file) {
            const formData = new FormData();
            formData.append('image', file);
            
            const res = await fetch('https://api.imgur.com/3/image', {
                method: 'POST',
                headers: { Authorization: `Client-ID ${CLIENT_ID}` },
                body: formData
            });

            // Extract Imgur rate limit data out of response headers
            const clientRemaining = res.headers.get('X-RateLimit-ClientRemaining');
            const userRemaining = res.headers.get('X-RateLimit-UserRemaining');
            updateLimitDisplay(clientRemaining, userRemaining);

            const data = await res.json();
            if (!res.ok) throw new Error(data.data.error || 'Upload failed');
            return data.data.link;
        }

        function renderGallery() {
            const images = JSON.parse(localStorage.getItem('my_images') || '[]');
            document.getElementById('empty-state').classList.toggle('hidden', images.length > 0);
            const grid = document.getElementById('gallery-grid');
            grid.innerHTML = '';

            images.slice().reverse().forEach((img, index) => {
                const div = document.createElement('div');
                div.className = "bg-white rounded-3xl overflow-hidden shadow-sm border border-slate-100 group relative";
                div.innerHTML = `
                    <div class="absolute top-2 left-2 px-2 py-1 bg-black/50 backdrop-blur-md rounded-lg text-[8px] text-white font-bold uppercase tracking-widest z-10">
                        ${img.size || 'IMG'}
                    </div>
                    <div class="h-36 overflow-hidden bg-slate-50">
                        <img src="${img.link}" class="w-full h-full object-cover">
                    </div>
                    <div class="p-2 flex justify-between bg-white">
                        <button onclick="copyLink('${img.link}')" class="flex-1 py-2 text-blue-500 rounded-xl hover:bg-blue-50 transition"><i class="fa-solid fa-link"></i></button>
                        <button onclick="deleteImg(${images.length - 1 - index})" class="flex-1 py-2 text-red-400 rounded-xl hover:bg-red-50 transition"><i class="fa-solid fa-trash"></i></button>
                    </div>
                `;
                grid.appendChild(div);
            });
        }

        function copyLink(link) { navigator.clipboard.writeText(link); }
        function deleteImg(index) {
            let images = JSON.parse(localStorage.getItem('my_images') || '[]');
            images.splice(index, 1);
            localStorage.setItem('my_images', JSON.stringify(images));
            renderGallery();
        }
    </script>
</body>
</html>
