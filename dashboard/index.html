<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MINIMISTY | MASTER ADMIN</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --ios-blue: #007AFF;
            --ios-green: #28a745;
            --ios-red: #dc3545;
            --bg: #F2F2F7;
            --card: #FFFFFF;
            --border: 3px solid #000000;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            margin: 0; background: var(--bg); font-family: 'Inter', sans-serif;
            color: #000; height: 100vh; overflow: hidden; display: flex; flex-direction: column;
        }

        /* --- STICKY TOP --- */
        .sticky-header {
            background: var(--bg); padding: 15px; z-index: 100;
            border-bottom: 2px solid #000;
        }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .header h1 { font-weight: 900; font-size: 1.2rem; margin: 0; }
        .live-indicator {
            background: #000; color: #fff; padding: 4px 10px; border-radius: 50px;
            font-size: 0.6rem; font-weight: 900; display: flex; align-items: center; gap: 5px;
        }
        .pulse { width: 6px; height: 6px; background: var(--ios-green); border-radius: 50%; animation: blink 1.2s infinite; }

        .profit-banner {
            background: var(--ios-green); color: #fff; border: var(--border);
            border-radius: 15px; padding: 15px; margin-bottom: 10px; box-shadow: 4px 4px 0 #000;
        }
        .profit-banner h2 { margin: 0; font-size: 1.8rem; font-weight: 900; }
        .profit-banner p { margin: 0; font-weight: 700; opacity: 0.9; font-size: 0.6rem; text-transform: uppercase; }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
        .stat-card {
            background: var(--card); border: 2px solid #000; border-radius: 12px;
            padding: 8px; box-shadow: 2px 2px 0 #000;
        }
        .stat-card label { font-size: 0.5rem; font-weight: 900; color: #666; text-transform: uppercase; }
        .stat-card .val { font-size: 0.9rem; font-weight: 900; display: block; }

        /* --- SCROLL AREA --- */
        .scroll-area { flex: 1; overflow-y: auto; padding: 10px 15px 120px 15px; -webkit-overflow-scrolling: touch; }
        .order-card {
            background: var(--card); border: 2px solid #000; border-radius: 15px;
            padding: 12px; margin-bottom: 10px; box-shadow: 3px 3px 0 #000;
        }

        .status-SUCCESS { background: var(--ios-green); color: #fff; }
        .status-FAILED, .status-CANCELLED { background: var(--ios-red); color: #fff; }
        .status-PENDING { background: #ffc107; color: #000; }

        .status-pill {
            font-size: 0.5rem; font-weight: 900; padding: 2px 8px;
            border-radius: 50px; border: 1.5px solid #000; text-transform: uppercase;
        }
        
        .customer-info { font-size: 0.8rem; font-weight: 900; }
        .detail-row { font-size: 0.65rem; color: #444; margin-top: 2px; font-weight: 600; }

        /* --- STICKY FOOTER --- */
        .sticky-footer {
            position: fixed; bottom: 0; width: 100%; background: #fff;
            border-top: 3px solid #000; display: grid; grid-template-columns: 1fr 1fr 1fr;
            padding: 10px; z-index: 140;
        }
        .footer-item {
            text-align: center; font-size: 0.6rem; font-weight: 900; text-transform: uppercase;
            display: flex; flex-direction: column; gap: 4px;
        }

        /* --- ACTION PANEL --- */
        #actionPanel {
            position: fixed; bottom: -100%; left: 0; width: 100%; background: #fff;
            border-top: 5px solid #000; border-radius: 25px 25px 0 0; z-index: 200;
            transition: 0.3s ease-out; padding: 20px; box-shadow: 0 -10px 40px rgba(0,0,0,0.3);
        }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; z-index: 150; }
        .btn-action {
            width: 100%; padding: 12px; border-radius: 10px; border: 2px solid #000;
            font-weight: 900; margin-top: 8px; font-size: 0.75rem;
        }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>
</head>
<body>

    <div class="overlay" id="overlay" onclick="closePanel()"></div>

    <div class="sticky-header">
        <div class="header">
            <h1>MINIMISTY HQ</h1>
            <div class="live-indicator"><div class="pulse"></div> <span id="liveCount">0</span> LIVE</div>
        </div>
        <div class="profit-banner">
            <p>NET PROFIT (HUMIDIFIERS)</p>
            <h2 id="totalProfit">$0.00</h2>
        </div>
        <div class="stats-grid">
            <div class="stat-card"><label>REVENUE</label><span class="val" id="totalRev">$0</span></div>
            <div class="stat-card"><label>FAILED</label><span class="val" id="failedCount" style="color:var(--ios-red)">0</span></div>
            <div class="stat-card"><label>SUCCESS</label><span class="val" id="orderCount">0</span></div>
        </div>
    </div>

    <div class="scroll-area" id="orderList"></div>

    <div class="sticky-footer">
        <div class="footer-item" onclick="location.reload()">🔄 Refresh</div>
        <div class="footer-item" onclick="alert('Inventory: 500+ Humidifiers')">📦 Stock</div>
        <div class="footer-item" onclick="alert('Settings Locked')">⚙️ Config</div>
    </div>

    <div id="actionPanel">
        <h3 id="pName" style="margin:0 0 5px 0;">Customer Name</h3>
        <p id="pEmail" style="margin:0 0 10px 0; color:var(--ios-blue); font-size:0.8rem; font-weight:700;"></p>
        
        <div id="pBox" style="background:#f0f0f0; padding:12px; border-radius:10px; font-size:0.75rem; line-height:1.4; font-weight:600; border:1px solid #ddd;"></div>

        <div style="margin-top:15px;">
            <label style="font-size:0.6rem; font-weight:900;">UPDATE TRACKING STATUS</label>
            <select id="statusSelect" style="width:100%; padding:10px; border:2px solid #000; border-radius:8px; font-weight:700; margin-top:5px;">
                <option value="SUCCESS">SUCCESS</option>
                <option value="FAILED">FAILED</option>
                <option value="CANCELLED">CANCELLED</option>
                <option value="SHIPPED">SHIPPED</option>
            </select>
            <button class="btn-action" style="background:var(--ios-blue); color:#fff;" onclick="updateStatus()">UPDATE STATUS</button>
        </div>

        <button class="btn-action" style="background:#000; color:#fff;" onclick="manualPush()">FORCE PUSH TO CJ</button>
        <button class="btn-action" style="background:#fff; color:#888;" onclick="closePanel()">CLOSE</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-app.js";
        import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-database.js";

        const fbConfig = {
            apiKey: "AIzaSyDFHskUWiyHhZke3KT9kkOtFI_gPsKfiGo",
            authDomain: "itzhoyoo-f9f7e.firebaseapp.com",
            databaseURL: "https://itzhoyoo-f9f7e-default-rtdb.firebaseio.com",
            projectId: "itzhoyoo-f9f7e",
            appId: "1:1094792075584:web:d49e9c3f899d3cd31082a5"
        };
        const app = initializeApp(fbConfig);
        const db = getDatabase(app);

        const COST = 21.00;
        const PRICE = 41.99;
        let activeId = null;
        let activeOrder = null;

        window.openOrder = (id, data) => {
            activeId = id;
            activeOrder = JSON.parse(decodeURIComponent(data));
            document.getElementById('pName').innerText = activeOrder.customer.name;
            document.getElementById('pEmail').innerText = activeOrder.customer.email;
            document.getElementById('statusSelect').value = activeOrder.status;
            document.getElementById('pBox').innerHTML = `
                <b>PHONE:</b> ${activeOrder.customer.phone || 'N/A'}<br>
                <b>ADDRESS:</b> ${activeOrder.customer.addr}<br>
                <b>CITY:</b> ${activeOrder.customer.city}
            `;
            document.getElementById('actionPanel').style.bottom = "0";
            document.getElementById('overlay').style.display = "block";
        };

        window.closePanel = () => {
            document.getElementById('actionPanel').style.bottom = "-100%";
            document.getElementById('overlay').style.display = "none";
        };

        window.updateStatus = async () => {
            const newStatus = document.getElementById('statusSelect').value;
            await update(ref(db, `transactions/${activeId}`), { status: newStatus });
            alert("Status Updated!");
            closePanel();
        };

        window.manualPush = async () => {
            if(!confirm("Manual push to CJ?")) return;
            const res = await fetch('/api/place-order', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ details: {id: activeOrder.orderId || Date.now()}, customer: activeOrder.customer, q: 1 })
            });
            const out = await res.json();
            alert(out.success ? "PUSHED!" : "ERROR: " + out.details);
        };

        onValue(ref(db, 'live_visitors'), s => document.getElementById('liveCount').innerText = s.exists() ? Object.keys(s.val()).length : 0);

        onValue(ref(db, 'transactions'), snap => {
            if(!snap.exists()) return;
            const entries = Object.entries(snap.val()).reverse();
            let rev = 0, failed = 0, success = 0, html = "";

            entries.forEach(([id, tx]) => {
                const isS = tx.status === "SUCCESS" || tx.status === "SHIPPED";
                if(isS) { rev += PRICE; success++; } else { failed++; }
                
                const enc = encodeURIComponent(JSON.stringify(tx));
                html += `
                <div class="order-card" onclick="openOrder('${id}', '${enc}')">
                    <div style="display:flex; justify-content:space-between; align-items:start;">
                        <div class="customer-info">${tx.customer?.name || 'User'}</div>
                        <span class="status-pill status-${tx.status}">${tx.status}</span>
                    </div>
                    <div class="detail-row">${tx.customer?.email || 'No Email'}</div>
                    <div class="detail-row">1x Mist Humidifier</div>
                    <div style="margin-top:8px; font-weight:900; font-size:0.8rem; display:flex; justify-content:space-between;">
                        <span>$${isS ? PRICE : '0.00'}</span>
                        <span style="color:var(--ios-blue)">MANAGE →</span>
                    </div>
                </div>`;
            });

            document.getElementById('totalRev').innerText = `$${rev.toFixed(0)}`;
            document.getElementById('failedCount').innerText = failed;
            document.getElementById('orderCount').innerText = success;
            document.getElementById('totalProfit').innerText = `$${(success * (PRICE - COST)).toFixed(2)}`;
            document.getElementById('orderList').innerHTML = html;
        });
    </script>
</body>
</html>
