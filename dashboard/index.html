<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ MINIMISTY AI CODE EDITOR</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom Neubrutalist Styles */
        .brutal-card {
            border: 4px solid #000000;
            box-shadow: 5px 5px 0px #000000;
        }
        .brutal-btn {
            border: 3px solid #000000;
            box-shadow: 3px 3px 0px #000000;
            transition: all 0.1s ease;
        }
        .brutal-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 1px 1px 0px #000000;
        }
    </style>
</head>
<body class="bg-[#f0f0f0] text-[#1a1a1a] p-4 min-h-screen font-mono">

    <div class="max-w-4xl mx-auto">
        <header class="brutal-card bg-[#00e6ff] p-6 mb-6 text-center">
            <h1 class="text-2xl md:text-4xl font-black tracking-wider uppercase">⚡ Code Surgical Optimizer</h1>
            <p class="text-xs md:text-sm font-bold mt-1 bg-white inline-block px-2 border-2 border-black">Powered by Vercel Serverless & Gemini 3.1 Flash-Lite</p>
        </header>

        <div class="grid grid-cols-1 gap-6">
            
            <section class="brutal-card bg-white p-6">
                <h2 class="font-black text-lg mb-4 border-b-4 border-black pb-2 uppercase">1. Load Target File</h2>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                    <label class="brutal-card bg-[#ffde43] p-4 flex flex-col items-center justify-center cursor-pointer hover:bg-[#ffeb73]">
                        <span class="font-black text-sm">📁 UPLOAD DOCUMENT HTML</span>
                        <input type="file" id="htmlFileInput" accept=".html" class="hidden">
                        <span id="fileNameLabel" class="text-xs mt-1 font-bold text-gray-700">No file selected</span>
                    </label>

                    <div class="flex flex-col">
                        <textarea id="rawCodeInput" placeholder="...or paste raw HTML structure here" class="brutal-card p-2 text-xs h-24 w-full focus:outline-none focus:bg-yellow-50 resize-none font-mono"></textarea>
                    </div>
                </div>

                <div id="shrinkBadge" class="hidden brutal-card bg-[#b573ff] p-3 mb-4 flex justify-between items-center">
                    <span class="font-bold text-xs text-white">📦 Code Encapsulated (~<span id="charCount">0</span> characters)</span>
                    <button id="toggleViewCodeBtn" class="brutal-btn bg-white px-2 py-0.5 text-xs font-black uppercase">Expand/View</button>
                </div>
                
                <div id="codePreviewWrapper" class="hidden mb-4">
                    <textarea id="inspectedCodeArea" class="w-full h-48 brutal-card p-2 text-xs bg-gray-900 text-green-400 font-mono" readonly></textarea>
                </div>

                <div class="mt-4">
                    <label class="block text-xs font-black uppercase mb-1">2. Optimization Prompt Instructions:</label>
                    <textarea id="promptInput" placeholder="e.g., 'Surgically insert the new multi-link text area parser and update the database target node paths...'" class="w-full h-20 brutal-card p-3 font-bold text-sm focus:outline-none focus:bg-cyan-50" required></textarea>
                </div>

                <button id="submitJobBtn" class="w-full mt-4 brutal-btn bg-[#00ff66] hover:bg-[#40ff8c] text-black font-black p-4 text-md uppercase tracking-wider">Execute Surgical Optimization</button>
            </section>

            <section id="statusPanel" class="hidden brutal-card bg-black text-[#00ff66] p-4 min-h-[80px]">
                <div class="flex items-center space-x-2">
                    <span class="animate-ping h-2 w-2 rounded-full bg-red-500"></span>
                    <span class="font-black text-xs uppercase tracking-widest text-red-400">ENGINE EVENT LOG BUFFER:</span>
                </div>
                <p id="liveStatusTicker" class="text-sm font-bold mt-2 font-mono">> Standing by to stream transaction pipelines...</p>
            </section>

            <section id="outputWorkspace" class="hidden brutal-card bg-white p-6">
                <div class="flex flex-wrap justify-between items-center border-b-4 border-black pb-3 mb-4 gap-2">
                    <h2 class="font-black text-xl uppercase">3. Generation Render Workspace</h2>
                    <div class="flex space-x-2">
                        <button id="copyOutputBtn" class="brutal-btn bg-[#00e6ff] text-xs font-black px-3 py-1.5 uppercase">Copy Code</button>
                        <button id="downloadOutputBtn" class="brutal-btn bg-[#ffde43] text-xs font-black px-3 py-1.5 uppercase">Download</button>
                    </div>
                </div>

                <div class="flex space-x-2 mb-4">
                    <button id="tabCodeBtn" class="brutal-btn bg-black text-white text-xs font-black px-4 py-1 uppercase">Source Code View</button>
                    <button id="tabPreviewBtn" class="brutal-btn bg-white text-black text-xs font-black px-4 py-1 uppercase">Live View Sandbox</button>
                </div>

                <div id="viewCodeContainer" class="block">
                    <textarea id="finalCodeOutput" class="w-full h-80 brutal-card p-3 bg-gray-900 text-cyan-400 font-mono text-xs" readonly></textarea>
                </div>

                <div id="viewPreviewContainer" class="hidden">
                    <div class="brutal-card bg-white overflow-hidden h-80 w-full">
                        <iframe id="sandboxIframe" sandbox="allow-scripts" class="w-full h-full bg-white"></iframe>
                    </div>
                </div>
            </section>

        </div>
    </div>

    <script type="module">
        // Configurations pointing directly to your Vercel server endpoint
        const VERCEL_API_ENDPOINT = "/api/gemini-surgical-edit"; 

        let workingActiveCodeString = "";

        // UI DOM Registries
        const htmlFileInput = document.getElementById('htmlFileInput');
        const fileNameLabel = document.getElementById('fileNameLabel');
        const rawCodeInput = document.getElementById('rawCodeInput');
        const shrinkBadge = document.getElementById('shrinkBadge');
        const charCount = document.getElementById('charCount');
        const toggleViewCodeBtn = document.getElementById('toggleViewCodeBtn');
        const codePreviewWrapper = document.getElementById('codePreviewWrapper');
        const inspectedCodeArea = document.getElementById('inspectedCodeArea');
        const promptInput = document.getElementById('promptInput');
        const submitJobBtn = document.getElementById('submitJobBtn');
        
        const statusPanel = document.getElementById('statusPanel');
        const liveStatusTicker = document.getElementById('liveStatusTicker');
        
        const outputWorkspace = document.getElementById('outputWorkspace');
        const finalCodeOutput = document.getElementById('finalCodeOutput');
        const sandboxIframe = document.getElementById('sandboxIframe');
        
        const copyOutputBtn = document.getElementById('copyOutputBtn');
        const downloadOutputBtn = document.getElementById('downloadOutputBtn');
        const tabCodeBtn = document.getElementById('tabCodeBtn');
        const tabPreviewBtn = document.getElementById('tabPreviewBtn');
        const viewCodeContainer = document.getElementById('viewCodeContainer');
        const viewPreviewContainer = document.getElementById('viewPreviewContainer');

        // Textarea inputs mapping logic
        rawCodeInput.addEventListener('input', () => {
            if(rawCodeInput.value.trim().length > 0) {
                processCodeInjest(rawCodeInput.value);
            } else {
                hideEncapsulation();
            }
        });

        // HTML file processing logic
        htmlFileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            fileNameLabel.textContent = file.name;
            
            const reader = new FileReader();
            reader.onload = (event) => {
                processCodeInjest(event.target.result);
            };
            reader.readAsText(file);
        });

        function processCodeInjest(code) {
            workingActiveCodeString = code;
            charCount.textContent = code.length;
            inspectedCodeArea.value = code;
            shrinkBadge.classList.remove('hidden');
        }

        function hideEncapsulation() {
            workingActiveCodeString = "";
            shrinkBadge.classList.add('hidden');
            codePreviewWrapper.classList.add('hidden');
        }

        // Toggle Expand Code Codeview
        toggleViewCodeBtn.addEventListener('click', () => {
            codePreviewWrapper.classList.toggle('hidden');
        });

        // Communication Core Pipeline
        submitJobBtn.addEventListener('click', async () => {
            if (!workingActiveCodeString) {
                alert("Please add code via upload file or paste input box framework first!");
                return;
            }
            if (!promptInput.value.trim()) {
                alert("Please specify targeted prompt optimizations rules!");
                return;
            }

            // Lock layouts UI rules
            submitJobBtn.disabled = true;
            statusPanel.classList.remove('hidden');
            outputWorkspace.classList.add('hidden');
            
            // Sequential Pipeline Tickers Simulation logs
            logTickerUpdate("Initializing network handshake to remote Vercel node arrays...");
            
            try {
                setTimeout(() => logTickerUpdate("Injecting original source context block parameters..."), 1200);
                setTimeout(() => logTickerUpdate("Gemini 3.1 Flash-Lite scanning index line maps for edits..."), 2500);
                setTimeout(() => logTickerUpdate("Compiling surgical code changes blocks (Executing diff-assembly)..."), 4200);

                const serverResponse = await fetch(VERCEL_API_ENDPOINT, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        sourceCode: workingActiveCodeString,
                        userInstructions: promptInput.value
                    })
                });

                if (!serverResponse.ok) throw new Error(`HTTP System Failure: ${serverResponse.statusText}`);
                
                const data = await serverResponse.json();
                
                logTickerUpdate("Transaction success! Parsing complete codebase payloads...");
                
                // Load payload code properties out 
                const outputCleanCode = data.optimizedCode;
                finalCodeOutput.value = outputCleanCode;

                // Sync live evaluation runtime environments via Blob Object URLs safely
                const blob = new Blob([outputCleanCode], { type: 'text/html' });
                sandboxIframe.src = URL.createObjectURL(blob);

                // Reveal resolution pane elements
                setTimeout(() => {
                    statusPanel.classList.add('hidden');
                    outputWorkspace.classList.remove('hidden');
                    submitJobBtn.disabled = false;
                }, 800);

            } catch (err) {
                logTickerUpdate(`Fatal Error Handler Intercept: ${err.message}`);
                submitJobBtn.disabled = false;
            }
        });

        function logTickerUpdate(str) {
            liveStatusTicker.textContent = `> ${str}`;
        }

        // Output Panel Utilities Tabs Actions
        tabCodeBtn.addEventListener('click', () => {
            tabCodeBtn.className = "brutal-btn bg-black text-white text-xs font-black px-4 py-1 uppercase";
            tabPreviewBtn.className = "brutal-btn bg-white text-black text-xs font-black px-4 py-1 uppercase";
            viewCodeContainer.classList.remove('hidden');
            viewPreviewContainer.classList.add('hidden');
        });

        tabPreviewBtn.addEventListener('click', () => {
            tabPreviewBtn.className = "brutal-btn bg-black text-white text-xs font-black px-4 py-1 uppercase";
            tabCodeBtn.className = "brutal-btn bg-white text-black text-xs font-black px-4 py-1 uppercase";
            viewPreviewContainer.classList.remove('hidden');
            viewCodeContainer.classList.add('hidden');
        });

        // Copy and Download Event Rules Action Interacts
        copyOutputBtn.addEventListener('click', () => {
            finalCodeOutput.select();
            document.execCommand('copy');
            alert('Optimized Source copied directly to systemic clipboard clipboard!');
        });

        downloadOutputBtn.addEventListener('click', () => {
            const blob = new Blob([finalCodeOutput.value], { type: "text/html" });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = "optimized_layout_output.html";
            link.click();
        });
    </script>
</body>
</html>
