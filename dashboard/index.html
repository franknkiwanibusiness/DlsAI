<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MINIMISTY // Surgical Code Dev Suite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0b0f19;
            background-image: 
                radial-gradient(at 0% 0%, rgba(16, 185, 129, 0.05) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(0, 230, 255, 0.07) 0px, transparent 50%);
        }
        /* Frosted Glass Overlay Design */
        .glass-panel {
            background: rgba(17, 24, 39, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        /* Custom Scrollbars */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.2);
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(0, 230, 255, 0.3);
        }
    </style>
</head>
<body class="text-slate-100 min-h-screen antialiased selection:bg-cyan-500 selection:text-black">

    <div class="max-w-3xl mx-auto px-4 py-6 md:py-12">
        
        <header class="mb-8 text-center md:text-left flex flex-col md:flex-row justify-between items-center gap-4 border-b border-slate-800 pb-6">
            <div>
                <h1 class="text-2xl md:text-3xl font-black tracking-tighter uppercase bg-gradient-to-r from-emerald-400 via-cyan-400 to-blue-500 bg-clip-text text-transparent">
                    MINIMISTY // Dev Patcher
                </h1>
                <p class="text-xs text-slate-400 font-mono mt-1">Surgical HTML Engine v3.1 Flash-Lite</p>
            </div>
            <div class="px-3 py-1 bg-slate-900/80 border border-slate-800 rounded-full text-[10px] tracking-widest font-mono text-cyan-400 uppercase">
                Vercel Serverless Gateway Active
            </div>
        </header>

        <main class="space-y-6">
            
            <section class="glass-panel rounded-2xl p-5 md:p-6 shadow-xl">
                <div class="flex items-center space-x-3 mb-4">
                    <div class="h-6 w-6 rounded-md bg-cyan-500/10 border border-cyan-500/30 flex items-center justify-center text-cyan-400 font-bold text-xs">1</div>
                    <h2 class="text-sm font-bold tracking-wider uppercase text-slate-200 font-mono">Injest Target File</h2>
                </div>
                
                <div class="grid grid-cols-1 gap-4">
                    <label class="group relative flex flex-col items-center justify-center p-6 border-2 border-dashed border-slate-700 hover:border-cyan-500/50 bg-slate-950/40 hover:bg-slate-950/80 rounded-xl transition-all duration-200 cursor-pointer text-center">
                        <div class="space-y-1">
                            <p class="text-xs font-bold tracking-wide text-slate-300 group-hover:text-cyan-400 transition-colors font-mono">
                                📁 CHOOSE OR DROP SOURCE FILE
                            </p>
                            <p id="fileNameLabel" class="text-[11px] text-slate-500 font-mono">Accepts native .html profiles</p>
                        </div>
                        <input type="file" id="htmlFileInput" accept=".html" class="hidden">
                    </label>

                    <div class="relative">
                        <textarea id="rawCodeInput" placeholder="...or paste raw active markup elements directly here" class="w-full h-24 bg-slate-950/60 border border-slate-800 rounded-xl p-3 text-xs font-mono text-emerald-400 placeholder-slate-600 focus:outline-none focus:border-slate-700 resize-none transition-all"></textarea>
                    </div>
                </div>

                <div id="shrinkBadge" class="hidden mt-4 p-3 bg-slate-900/90 border border-slate-800 rounded-xl flex items-center justify-between transition-all duration-200">
                    <div class="flex items-center space-x-2">
                        <span class="h-2 w-2 rounded-full bg-emerald-500 animate-pulse"></span>
                        <p class="text-xs font-mono text-slate-300">Code Document Buffered (<span id="charCount" class="text-cyan-400">0</span> bytes)</p>
                    </div>
                    <button id="toggleViewCodeBtn" class="text-[10px] font-mono tracking-wider uppercase bg-slate-800 hover:bg-slate-700 text-slate-300 px-2.5 py-1 rounded-md border border-slate-700 transition-all">
                        Inspect
                    </button>
                </div>
                
                <div id="codePreviewWrapper" class="hidden mt-3">
                    <textarea id="inspectedCodeArea" class="w-full h-40 bg-black/80 border border-slate-800 rounded-xl p-3 text-[11px] font-mono text-slate-400 focus:outline-none" readonly></textarea>
                </div>
            </section>

            <section class="glass-panel rounded-2xl p-5 md:p-6 shadow-xl">
                <div class="flex items-center space-x-3 mb-4">
                    <div class="h-6 w-6 rounded-md bg-emerald-500/10 border border-emerald-500/30 flex items-center justify-center text-emerald-400 font-bold text-xs">2</div>
                    <h2 class="text-sm font-bold tracking-wider uppercase text-slate-200 font-mono">Modifications Blueprint</h2>
                </div>
                
                <div class="space-y-1">
                    <textarea id="promptInput" placeholder="Instruct the patcher precisely (e.g., 'Update the hero image arrays into object fields and target our production environment nodes...')" class="w-full h-24 bg-slate-950/60 border border-slate-800 rounded-xl p-3 text-xs font-mono text-slate-200 placeholder-slate-600 focus:outline-none focus:border-slate-700 transition-all" required></textarea>
                </div>

                <button id="submitJobBtn" class="w-full mt-4 bg-gradient-to-r from-emerald-500 to-cyan-500 hover:from-emerald-400 hover:to-cyan-400 text-slate-950 font-black font-mono py-3.5 px-4 rounded-xl text-xs uppercase tracking-widest transition-all duration-200 transform active:scale-[0.99] shadow-lg shadow-cyan-500/10">
                    Run Isolation Execution
                </button>
            </section>

            <section id="statusPanel" class="hidden glass-panel rounded-xl p-4 bg-black/40 border border-red-500/20">
                <div class="flex items-center space-x-2.5">
                    <span class="relative flex h-2 w-2">
                        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75"></span>
                        <span class="relative inline-flex rounded-full h-2 w-2 bg-red-500"></span>
                    </span>
                    <span class="text-[10px] font-mono uppercase tracking-widest text-red-400/80">System Activity Pipe:</span>
                </div>
                <p id="liveStatusTicker" class="text-xs font-mono text-slate-300 mt-2 pl-4 border-l border-slate-800">> Handshaking pipeline structures...</p>
            </section>

            <section id="outputWorkspace" class="hidden glass-panel rounded-2xl p-5 md:p-6 shadow-xl space-y-4">
                <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-3 border-b border-slate-800 pb-4">
                    <div class="flex items-center space-x-3">
                        <div class="h-6 w-6 rounded-md bg-blue-500/10 border border-blue-500/30 flex items-center justify-center text-blue-400 font-bold text-xs">3</div>
                        <h2 class="text-sm font-bold tracking-wider uppercase text-slate-200 font-mono">Workspace Outcome</h2>
                    </div>
                    <div class="flex items-center space-x-2 self-end sm:self-auto">
                        <button id="copyOutputBtn" class="bg-slate-800 hover:bg-slate-700 text-slate-200 text-[10px] font-mono uppercase tracking-wider px-3 py-1.5 rounded-lg border border-slate-700 transition-all">Copy Code</button>
                        <button id="downloadOutputBtn" class="bg-cyan-950/60 hover:bg-cyan-900/60 text-cyan-400 text-[10px] font-mono uppercase tracking-wider px-3 py-1.5 rounded-lg border border-cyan-800/50 transition-all">Download</button>
                    </div>
                </div>

                <div class="flex space-x-1.5 p-1 bg-slate-950/80 rounded-xl border border-slate-800 max-w-[280px]">
                    <button id="tabCodeBtn" class="flex-1 text-center text-[10px] font-mono font-bold uppercase tracking-wider py-1.5 rounded-lg bg-slate-800 text-white transition-all">Source</button>
                    <button id="tabPreviewBtn" class="flex-1 text-center text-[10px] font-mono font-bold uppercase tracking-wider py-1.5 rounded-lg text-slate-400 hover:text-slate-200 transition-all">Live Preview</button>
                </div>

                <div id="viewCodeContainer" class="block">
                    <textarea id="finalCodeOutput" class="w-full h-96 bg-slate-950/80 border border-slate-900 rounded-xl p-3 text-xs font-mono text-cyan-400 focus:outline-none" readonly></textarea>
                </div>

                <div id="viewPreviewContainer" class="hidden">
                    <div class="bg-white rounded-xl overflow-hidden h-96 w-full border border-slate-800">
                        <iframe id="sandboxIframe" sandbox="allow-scripts" class="w-full h-full bg-white"></iframe>
                    </div>
                </div>
            </section>

        </main>
    </div>

    <script type="module">
        const VERCEL_API_ENDPOINT = "/api/gemini-surgical-edit"; 
        let workingActiveCodeString = "";

        // Component Elements Hookup
        const htmlFileInput = document.getElementById('htmlFileInput');
        const fileNameLabel = document.getElementById('fileNameLabel');
        const rawCodeInput = document.getElementById('rawCodeInput');
        const shrinkBadge = document.getElementById('shrinkBadge');
        const charCount = document.getElementById('charCount');
        const toggleViewCodeBtn = document.getElementById('toggleViewCodeBtn');
        const codePreviewWrapper = document.getElementById('codePreviewWrapper');
        const inspectedCodeArea = document.getElementById('inspectedCodeArea');
        const promptInput = document.getElementById('promptInput');
        const submitJobBtn = document.getElementById('submitJobBtn');
        
        const statusPanel = document.getElementById('statusPanel');
        const liveStatusTicker = document.getElementById('liveStatusTicker');
        
        const outputWorkspace = document.getElementById('outputWorkspace');
        const finalCodeOutput = document.getElementById('finalCodeOutput');
        const sandboxIframe = document.getElementById('sandboxIframe');
        
        const copyOutputBtn = document.getElementById('copyOutputBtn');
        const downloadOutputBtn = document.getElementById('downloadOutputBtn');
        const tabCodeBtn = document.getElementById('tabCodeBtn');
        const tabPreviewBtn = document.getElementById('tabPreviewBtn');
        const viewCodeContainer = document.getElementById('viewCodeContainer');
        const viewPreviewContainer = document.getElementById('viewPreviewContainer');

        // Dynamic code state binding
        rawCodeInput.addEventListener('input', () => {
            if(rawCodeInput.value.trim().length > 0) {
                syncCodeState(rawCodeInput.value);
            } else {
                purgeCodeState();
            }
        });

        htmlFileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            fileNameLabel.textContent = file.name;
            
            const reader = new FileReader();
            reader.onload = (event) => {
                // BUG FIX: Inject file data cleanly into both state strings and sync view fields instantly
                rawCodeInput.value = event.target.result;
                syncCodeState(event.target.result);
            };
            reader.readAsText(file);
        });

        function syncCodeState(code) {
            workingActiveCodeString = code;
            charCount.textContent = new Blob([code]).size;
            inspectedCodeArea.value = code;
            shrinkBadge.classList.remove('hidden');
        }

        function purgeCodeState() {
            workingActiveCodeString = "";
            shrinkBadge.classList.add('hidden');
            codePreviewWrapper.classList.add('hidden');
            fileNameLabel.textContent = "Accepts native .html profiles";
        }

        toggleViewCodeBtn.addEventListener('click', () => {
            codePreviewWrapper.classList.toggle('hidden');
            toggleViewCodeBtn.textContent = codePreviewWrapper.classList.contains('hidden') ? "Inspect" : "Hide";
        });

        // Network Handshake Delivery Architecture
        submitJobBtn.addEventListener('click', async () => {
            if (!workingActiveCodeString) {
                alert("Please drag an HTML file or paste code elements into execution arrays first!");
                return;
            }
            if (!promptInput.value.trim()) {
                alert("Please define surgical instructions for development tracking!");
                return;
            }

            // Lock layouts UI states
            submitJobBtn.disabled = true;
            statusPanel.classList.remove('hidden');
            outputWorkspace.classList.add('hidden');
            
            updateLiveTicker("Configuring serverless asynchronous callback networks...");
            
            try {
                setTimeout(() => updateLiveTicker("Streaming payload blocks into Gemini 3.1 context isolation arrays..."), 1000);
                setTimeout(() => updateLiveTicker("Scanning codebase paths... Processing target structure modifications..."), 2400);
                setTimeout(() => updateLiveTicker("Compiling modifications... Synthesizing outcome variables..."), 4000);

                const serverResponse = await fetch(VERCEL_API_ENDPOINT, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        sourceCode: workingActiveCodeString,
                        userInstructions: promptInput.value
                    })
                });

                if (!serverResponse.ok) throw new Error(`Gateway Error Status: ${serverResponse.statusText}`);
                
                const data = await serverResponse.json();
                
                updateLiveTicker("Payload compiled successfully. Structuring display grids...");
                
                const responseCode = data.optimizedCode;
                finalCodeOutput.value = responseCode;

                // Bind updated layout to sandbox workspace frame safely via Blobs
                const blob = new Blob([responseCode], { type: 'text/html' });
                sandboxIframe.src = URL.createObjectURL(blob);

                setTimeout(() => {
                    statusPanel.classList.add('hidden');
                    outputWorkspace.classList.remove('hidden');
                    submitJobBtn.disabled = false;
                }, 600);

            } catch (err) {
                updateLiveTicker(`Operational Interrupt: ${err.message}`);
                submitJobBtn.disabled = false;
            }
        });

        function updateLiveTicker(msg) {
            liveStatusTicker.textContent = `> ${msg}`;
        }

        // Workspace Navigation Management Tabs
        tabCodeBtn.addEventListener('click', () => {
            tabCodeBtn.className = "flex-1 text-center text-[10px] font-mono font-bold uppercase tracking-wider py-1.5 rounded-lg bg-slate-800 text-white transition-all";
            tabPreviewBtn.className = "flex-1 text-center text-[10px] font-mono font-bold uppercase tracking-wider py-1.5 rounded-lg text-slate-400 hover:text-slate-200 transition-all";
            viewCodeContainer.classList.remove('hidden');
            viewPreviewContainer.classList.add('hidden');
        });

        tabPreviewBtn.addEventListener('click', () => {
            tabPreviewBtn.className = "flex-1 text-center text-[10px] font-mono font-bold uppercase tracking-wider py-1.5 rounded-lg bg-slate-800 text-white transition-all";
            tabCodeBtn.className = "flex-1 text-center text-[10px] font-mono font-bold uppercase tracking-wider py-1.5 rounded-lg text-slate-400 hover:text-slate-200 transition-all";
            viewPreviewContainer.classList.remove('hidden');
            viewCodeContainer.classList.add('hidden');
        });

        // Copy and download data streams pipelines
        copyOutputBtn.addEventListener('click', () => {
            finalCodeOutput.select();
            document.execCommand('copy');
            alert('Optimized source code sent directly to device clip-cache!');
        });

        downloadOutputBtn.addEventListener('click', () => {
            const blob = new Blob([finalCodeOutput.value], { type: "text/html" });
            const downloader = document.createElement("a");
            downloader.href = URL.createObjectURL(blob);
            downloader.download = "optimized_layout_output.html";
            downloader.click();
        });
    </script>
</body>
</html>
