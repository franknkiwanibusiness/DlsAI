<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UCL | ELITE BRACKET</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; color: #fff; font-family: 'Inter', sans-serif; scroll-behavior: smooth; overflow-x: hidden; }
        
        /* --- DYNAMIC STAGE BORDERS --- */
        .border-r16 { border: 2.5px solid #ffffff !important; box-shadow: 0 0 15px rgba(255, 255, 255, 0.1); }
        .border-qf  { border: 2.5px solid #22d3ee !important; box-shadow: 0 0 15px rgba(34, 211, 238, 0.2); }
        .border-sf  { border: 2.5px solid #ec4899 !important; box-shadow: 0 0 15px rgba(236, 72, 153, 0.2); }
        .border-final { border: 2.5px solid #fbbf24 !important; box-shadow: 0 0 30px rgba(251, 191, 36, 0.4); }

        .ucl-card {
            background: rgba(10, 10, 10, 0.95);
            border-radius: 32px;
            position: relative;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* --- YELLOW TBA BOX (500% VISIBLE) --- */
        .tba-box {
            background: rgba(251, 191, 36, 0.03);
            border: 3px dashed #fbbf24;
            border-radius: 32px;
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 32px;
        }
        .tba-text {
            color: #fbbf24;
            font-size: 20px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            text-shadow: 0 0 15px rgba(251, 191, 36, 0.5);
            animation: pulse-yellow 2s infinite;
        }

        /* --- LOADING SPINNER & BLUR --- */
        #loading-overlay {
            position: fixed; inset: 0; z-index: 999;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(15px);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.5s ease;
        }
        .spinner {
            width: 50px; height: 50px;
            border: 5px solid rgba(34, 211, 238, 0.1);
            border-top: 5px solid #22d3ee;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        /* --- WINNER & PERSONAL HIGHLIGHTS --- */
        .active-team-row { background: rgba(255, 255, 255, 0.03); border-radius: 20px; padding: 14px 18px; border-left: 4px solid rgba(255,255,255,0.1); transition: 0.3s; }
        .winner-glow { border-left-color: #22d3ee !important; background: rgba(34, 211, 238, 0.12) !important; }
        .loser-fade { opacity: 0.25; filter: grayscale(1); }
        
        .user-team-row { border: 2px solid #fbbf24 !important; background: rgba(251, 191, 36, 0.1) !important; box-shadow: inset 0 0 15px rgba(251, 191, 36, 0.1); }
        .you-tag { background: #fbbf24; color: #000; font-size: 7px; font-weight: 900; padding: 2px 5px; border-radius: 3px; margin-right: 8px; text-transform: uppercase; }
        
        .promoted-badge { background: #22d3ee; color: #000; font-size: 7px; font-weight: 900; padding: 2px 6px; border-radius: 4px; margin-left: 8px; }
        .champ-badge { background: #fbbf24; color: #000; font-size: 8px; font-weight: 900; padding: 3px 8px; border-radius: 6px; margin-left: 8px; box-shadow: 0 0 15px #fbbf24; animation: bounce 1s infinite; }

        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes pulse-yellow { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(0.95); } }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-3px); } }

        .sticky-header { position: sticky; top: 0; z-index: 100; background: rgba(0, 0, 0, 0.9); border-bottom: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px); }
        .leg-indicator { font-size: 8px; font-weight: 900; letter-spacing: 2px; color: rgba(255,255,255,0.3); text-transform: uppercase; }
        ::-webkit-scrollbar { width: 0px; }
    .gold-text {
    background: linear-gradient(to bottom, #fcf6ba 0%, #bf953f 50%, #8a6d3b 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

/* Glass Menu Transition */
#sideMenu {
    background: rgba(5, 5, 5, 0.98);
    backdrop-filter: blur(40px);
    transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
}

    </style>
</head>
<body class="pb-40">

    <div id="loading-overlay">
        <div class="spinner mb-4"></div>
        <span class="text-[10px] font-black tracking-[0.3em] text-cyan-400 uppercase">Syncing Elite Bracket...</span>
    </div>

    <header class="sticky-header px-6 py-5 flex justify-between items-center">
        <div>
            <h1 class="text-[10px] font-black tracking-[0.4em] uppercase">UCL <span class="text-cyan-400">Brackets</span></h1>
            <div class="flex items-center mt-1">
                <span class="w-1.5 h-1.5 bg-emerald-500 rounded-full animate-pulse mr-2"></span>
                <span class="text-[7px] font-black text-white/40 uppercase tracking-widest">Live Aggregates On</span>
            </div>
        </div>
        <div class="flex gap-4">
            <a href="#r16" class="text-[8px] font-black opacity-40 hover:opacity-100 uppercase">R16</a>
            <a href="#qf" class="text-[8px] font-black text-cyan-400 uppercase">QF</a>
            <a href="#sf" class="text-[8px] font-black text-pink-500 uppercase">SF</a>
            <a href="#final" class="text-[8px] font-black text-amber-400 uppercase">FINAL</a>
        </div>
    </header>

    <main id="bracket-main" class="max-w-md mx-auto px-5 mt-10 space-y-24 opacity-0 transition-opacity duration-700">
        
        <section id="r16">
            <h2 class="text-[11px] font-black uppercase tracking-[0.5em] text-white italic mb-8">Round of 16</h2>
            <div id="r16-list" class="space-y-8"></div>
        </section>

        <section id="qf">
            <h2 class="text-[11px] font-black uppercase tracking-[0.5em] text-cyan-400 italic mb-8">Quarter Finals</h2>
            <div id="qf-list" class="space-y-8"></div>
        </section>

        <section id="sf">
            <h2 class="text-[11px] font-black uppercase tracking-[0.5em] text-pink-500 italic mb-8">Semi Finals</h2>
            <div id="sf-list" class="space-y-8"></div>
        </section>

        <section id="final">
            <h2 class="text-[12px] font-black uppercase tracking-[0.6em] text-amber-400 italic mb-10 text-center">The Grand Final</h2>
            <div id="final-list" class="space-y-12"></div>
        </section>
<button id="menuTrigger" class="fixed bottom-6 left-6 z-[250] flex items-center gap-3 bg-white/5 backdrop-blur-xl border border-white/10 p-2 pr-5 rounded-2xl shadow-2xl active:scale-95 transition-all">
    <div class="w-10 h-10 bg-white/5 rounded-xl flex flex-col items-center justify-center gap-1.5 border border-white/5">
        <div class="w-5 h-0.5 bg-cyan-400"></div>
        <div class="w-3 h-0.5 bg-white"></div>
        <div class="w-5 h-0.5 bg-pink-500"></div>
    </div>
    <span class="text-[10px] font-black text-white/80 uppercase tracking-[0.3em]">Menu</span>
</button>

<div id="sideMenu" class="fixed inset-0 z-[300] translate-x-[-100%]">
    <div class="h-full flex flex-col p-10 justify-center relative">
        <button id="closeMenu" class="absolute top-10 right-10 text-[10px] font-black text-white/20 uppercase tracking-widest hover:text-white transition-colors">
            Close ×
        </button>

        <nav class="space-y-8">
            <a href="index.html" class="block group">
                <h2 class="text-5xl font-black italic text-white tracking-tighter group-hover:text-cyan-400 transition-colors">DASHBOARD</h2>
            </a>

            <a href="fixtures.html" class="block">
                <span class="text-[9px] font-bold text-pink-500 uppercase tracking-widest">Currently On</span>
                <h2 class="text-5xl font-black italic gold-text tracking-tighter">FIXTURES</h2>
            </a>

            <a href="standings.html" class="block group">
                <h2 class="text-5xl font-black italic text-white tracking-tighter group-hover:text-yellow-500 transition-colors">STANDINGS</h2>
            </a>

            <a href="rules.html" class="block group">
                <h2 class="text-5xl font-black italic text-white tracking-tighter group-hover:text-emerald-400 transition-colors">RULES</h2>
            </a>
        </nav>

        <div class="mt-12">
            <a href="https://wa.me/27846737224" target="_blank" class="inline-flex items-center gap-3 bg-white/5 border border-white/10 px-6 py-4 rounded-2xl active:scale-95 transition-all">
                <div class="w-8 h-8 bg-[#25D366] rounded-lg flex items-center justify-center shadow-[0_0_15px_rgba(37,211,102,0.2)]">
                    <svg class="w-5 h-5 text-white" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
                    </svg>
                </div>
                <div>
                    <span class="block text-[8px] font-black text-white/30 uppercase tracking-[0.2em]">Live Support</span>
                    <span class="text-xs font-black text-white uppercase tracking-tighter italic">WhatsApp Help</span>
                </div>
            </a>
        </div>

        <div class="mt-8 border-t border-white/5 pt-8">
            <p class="text-[9px] font-black text-white/20 uppercase tracking-[0.4em]">DLS26 UCL Official Hub</p>
        </div>
    </div>
</div>


    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDFHskUWiyHhZke3KT9kkOtFI_gPsKfiGo",
            authDomain: "itzhoyoo-f9f7e.firebaseapp.com",
            databaseURL: "https://itzhoyoo-f9f7e-default-rtdb.firebaseio.com",
            projectId: "itzhoyoo-f9f7e",
            storageBucket: "itzhoyoo-f9f7e.filestorage.app",
            messagingSenderId: "1094792075584",
            appId: "1:1094792075584:web:d49e9c3f899d3cd31082a5"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- USER SETTING ---
        const MY_TEAM = "REAL MADRID"; // Change this to your team name

        onValue(ref(db, 'tournaments/ucl_s1/fixtures'), (snap) => {
            const data = snap.val() || {};
            
            renderStage('r16-list', data, 'r16_tie', 8, 'border-r16');
            renderStage('qf-list', data, 'qf_tie', 4, 'border-qf');
            renderStage('sf-list', data, 'sf_tie', 2, 'border-sf');
            renderStage('final-list', data, 'final_tie', 1, 'border-final', true);

            document.getElementById('loading-overlay').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('loading-overlay').style.display = 'none';
                document.getElementById('bracket-main').style.opacity = '1';
            }, 500);
        });

        function renderStage(containerId, data, prefix, count, borderClass, isFinal = false) {
            const container = document.getElementById(containerId);
            if(!container) return;
            container.innerHTML = "";

            for(let i=1; i<=count; i++) {
                const tieId = `${prefix}_${i}`;
                const tie = data[tieId];
                
                if(!tie) {
                    container.innerHTML += `<div class="tba-box"><span class="tba-text">Awaiting Draw</span></div>`;
                    continue;
                }

                // Automation: Auto-calculate aggregate and check status
                const scoreA = (tie.leg1?.hScore || 0) + (tie.leg2?.aScore || 0);
                const scoreB = (tie.leg1?.aScore || 0) + (tie.leg2?.hScore || 0);
                const isFinished = tie.leg1?.status === "FINISHED" && (isFinal || tie.leg2?.status === "FINISHED");
                const winner = isFinished ? (scoreA > scoreB ? 'A' : scoreB > scoreA ? 'B' : 'TIE') : null;

                const isUserA = tie.teamA?.toUpperCase() === MY_TEAM.toUpperCase();
                const isUserB = tie.teamB?.toUpperCase() === MY_TEAM.toUpperCase();

                container.innerHTML += `
                    <div class="ucl-card ${borderClass} mb-8">
                        <div class="bg-white/5 px-6 py-3 flex justify-between items-center border-b border-white/5">
                            <div class="flex gap-4">
                                <div class="flex flex-col">
                                    <span class="leg-indicator">Leg 1</span>
                                    <span class="text-[10px] font-black">${tie.leg1?.hScore || 0}-${tie.leg1?.aScore || 0}</span>
                                </div>
                                ${!isFinal ? `
                                <div class="flex flex-col opacity-40">
                                    <span class="leg-indicator">Leg 2</span>
                                    <span class="text-[10px] font-black">${tie.leg2?.hScore || 0}-${tie.leg2?.aScore || 0}</span>
                                </div>` : ''}
                            </div>
                            <div class="text-[13px] font-black italic ${isFinished ? 'text-cyan-400' : 'text-white/20'}">AGG: ${scoreA}-${scoreB}</div>
                        </div>

                        <div class="p-5 space-y-3">
                            <div class="active-team-row ${isUserA ? 'user-team-row' : ''} ${winner === 'A' ? 'winner-glow' : (winner === 'B' ? 'loser-fade' : '')} flex justify-between items-center transition-all">
                                <div class="flex items-center">
                                    ${isUserA ? '<span class="you-tag">&lt;YOU&gt;</span>' : ''}
                                    <span class="text-[15px] font-black uppercase tracking-tight">${tie.teamA || "TBA"}</span>
                                    ${winner === 'A' ? (isFinal ? '<span class="champ-badge">CHAMPION</span>' : '<span class="promoted-badge">PROMOTED</span>') : ''}
                                </div>
                                <span class="text-2xl font-black italic ${winner === 'A' ? 'text-cyan-400' : 'text-white/20'}">${scoreA}</span>
                            </div>

                            <div class="active-team-row ${isUserB ? 'user-team-row' : ''} ${winner === 'B' ? 'winner-glow' : (winner === 'A' ? 'loser-fade' : '')} flex justify-between items-center transition-all">
                                <div class="flex items-center">
                                    ${isUserB ? '<span class="you-tag">&lt;YOU&gt;</span>' : ''}
                                    <span class="text-[15px] font-black uppercase tracking-tight">${tie.teamB || "TBA"}</span>
                                    ${winner === 'B' ? (isFinal ? '<span class="champ-badge">CHAMPION</span>' : '<span class="promoted-badge">PROMOTED</span>') : ''}
                                </div>
                                <span class="text-2xl font-black italic ${winner === 'B' ? 'text-cyan-400' : 'text-white/20'}">${scoreB}</span>
                            </div>
                        </div>

                        <div class="bg-white/5 py-2 text-center" data-kickoff="${tie.startTime || 0}">
                             <span class="text-[8px] font-black uppercase tracking-[0.2em] timer-span text-white/20">Awaiting Signal</span>
                        </div>
                    </div>
                `;
            }
            startTimers();
        }

        function startTimers() {
            if(window.tInt) clearInterval(window.tInt);
            window.tInt = setInterval(() => {
                document.querySelectorAll('[data-kickoff]').forEach(el => {
                    const start = parseInt(el.dataset.kickoff);
                    const span = el.querySelector('.timer-span');
                    if(!start || !span) return;
                    const diff = start - Date.now();
                    
                    span.className = "text-[8px] font-black uppercase tracking-[0.2em] timer-span";
                    if(diff > 0) {
                        const h = Math.floor(diff/36e5).toString().padStart(2,'0');
                        const m = Math.floor((diff%36e5)/6e4).toString().padStart(2,'0');
                        const s = Math.floor((diff%6e4)/1000).toString().padStart(2,'0');
                        span.innerText = `KICKOFF IN: ${h}:${m}:${s}`;
                        span.classList.add('text-cyan-400');
                    } else if (diff > -600000) {
                        span.innerText = "MATCH LIVE";
                        span.classList.add('text-pink-500', 'animate-pulse');
                    } else {
                        span.innerText = "FULL TIME";
                        span.classList.add('text-white/10');
                    }
                });
            }, 1000);
        }
    const menuBtn = document.getElementById('menuTrigger');
const menuOverlay = document.getElementById('sideMenu');
const closeBtn = document.getElementById('closeMenu');

menuBtn.onclick = () => {
    menuOverlay.classList.remove('translate-x-[-100%]');
    document.body.style.overflow = 'hidden';
};

closeBtn.onclick = () => {
    menuOverlay.classList.add('translate-x-[-100%]');
    document.body.style.overflow = '';
};

    </script>
</body>
</html>
