<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#070710">
    <link rel="icon" type="image/jpeg" href="https://i.imgur.com/8EEl86u.jpeg">
    <link rel="shortcut icon" type="image/jpeg" href="https://i.imgur.com/8EEl86u.jpeg">
    <link rel="apple-touch-icon" href="https://i.imgur.com/8EEl86u.jpeg">
    <title>Listing — Siterifty</title>
    <meta name="robots" content="noindex">
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #070710;
            --surface: #0e0e1c;
            --surface2: #141426;
            --surface3: #1a1a30;
            --border: rgba(255,255,255,0.06);
            --border-hover: rgba(255,255,255,0.14);
            --accent: #9b5de5;
            --accent2: #e879a0;
            --accent3: #38bdf8;
            --accent-glow: rgba(155,93,229,0.15);
            --green: #2dd4a0;
            --yellow: #f5c842;
            --red: #f87171;
            --text: #ede9ff;
            --text2: #b8b3d8;
            --muted: #6b6890;
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 18px;
            --radius-xl: 24px;
        }
        *, *::before, *::after {
            font-family: 'DM Sans', sans-serif;
            box-sizing: border-box; margin: 0; padding: 0;
            -webkit-tap-highlight-color: transparent;
            -webkit-font-smoothing: antialiased;
        }
        input, textarea, select { user-select: text; -webkit-user-select: text; }
        * { scrollbar-width: none; -ms-overflow-style: none; }
        *::-webkit-scrollbar { display: none; }
        html { background: var(--bg); overflow-x: hidden; }
        body { background: var(--bg); min-height: 100svh; padding-top: 64px; -webkit-overflow-scrolling: touch; }

        /* ── ANIMATIONS ── */
        @keyframes blade-chase { 0%{opacity:.12}5%{opacity:1}25%{opacity:.18}100%{opacity:.12} }
        .blade { animation: blade-chase 1.4s linear infinite; }
        .b-1{animation-delay:-1.40s}.b-2{animation-delay:-1.26s}.b-3{animation-delay:-1.12s}
        .b-4{animation-delay:-0.98s}.b-5{animation-delay:-0.84s}.b-6{animation-delay:-0.70s}
        .b-7{animation-delay:-0.56s}.b-8{animation-delay:-0.42s}.b-9{animation-delay:-0.28s}.b-10{animation-delay:-0.14s}
        @keyframes line-slide { 0%{transform:translateX(-100%)}100%{transform:translateX(500%)} }
        @keyframes modalPop { 0%{opacity:0;transform:scale(.94) translateY(8px)}100%{opacity:1;transform:scale(1) translateY(0)} }
        @keyframes fadeUp { from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none} }
        @keyframes shimmer { 0%{background-position:200% 0}100%{background-position:-200% 0} }
        @keyframes glow-pulse { 0%,100%{opacity:.4}50%{opacity:.8} }
        @keyframes reveal-pop { 0%{transform:scale(.88);opacity:0}60%{transform:scale(1.04)}100%{transform:scale(1);opacity:1} }

        /* ── HEADER ── */
        header {
            position: fixed; top: 0; left: 0; right: 0; z-index: 100;
            height: 64px; padding: 0 max(20px, env(safe-area-inset-left)) 0 max(20px, env(safe-area-inset-right));
            display: flex; align-items: center; justify-content: space-between; gap: 12px;
            background: rgba(7,7,16,0.88); backdrop-filter: blur(32px) saturate(180%);
            -webkit-backdrop-filter: blur(32px) saturate(180%);
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        header::after {
            content:''; position:absolute; bottom:-1px; left:0;
            width:22%; height:1px;
            background:linear-gradient(90deg,transparent,var(--accent),var(--accent2),transparent);
            animation:line-slide 4s ease-in-out infinite;
        }
        .wordmark {
            font-family:'Syne',sans-serif; font-weight:800; font-size:1.05rem;
            letter-spacing:-0.05em; color:var(--text); white-space:nowrap; text-decoration:none;
        }
        .wordmark span { background:linear-gradient(135deg,var(--accent),var(--accent2)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; font-weight:500; }
        .header-right { display:flex; align-items:center; gap:10px; }
        .avatar {
            width:34px; height:34px; border-radius:999px;
            background:linear-gradient(135deg,var(--accent),var(--accent2));
            border:1.5px solid rgba(255,255,255,0.1);
            display:flex; align-items:center; justify-content:center;
            font-family:'Syne',sans-serif; font-size:13px; font-weight:700; color:#fff;
            flex-shrink:0; cursor:pointer; overflow:hidden; transition:opacity .15s,transform .15s;
        }
        .avatar:hover { opacity:.85; transform:scale(1.05); }
        .avatar img { width:100%; height:100%; object-fit:cover; border-radius:999px; display:block; }
        .back-btn {
            display:inline-flex; align-items:center; gap:5px;
            background:var(--surface2); border:1px solid var(--border);
            border-radius:999px; padding:6px 13px;
            font-family:'Syne',sans-serif; font-size:11px; font-weight:600;
            color:var(--muted); cursor:pointer; text-decoration:none;
            transition:background .15s,color .15s,border-color .15s; white-space:nowrap;
        }
        .back-btn:hover { background:var(--surface3); color:var(--text); border-color:var(--border-hover); }

        /* ── PAGE ── */
        .page-wrap {
            max-width: 700px; margin: 0 auto;
            padding: 28px 16px max(100px, calc(80px + env(safe-area-inset-bottom)));
            animation: fadeUp .35s ease both;
        }

        /* ── CHAT MODAL ── */
        .chat-overlay {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 2000;
            background: rgba(0, 0, 0, 0.80);
            backdrop-filter: blur(24px) saturate(150%);
            -webkit-backdrop-filter: blur(24px) saturate(150%);
            align-items: flex-end;
            justify-content: center;
            padding: 0;
        }
        .chat-overlay.open {
            display: flex;
        }
        @media(min-width: 600px) {
            .chat-overlay {
                align-items: center;
                padding: 20px;
            }
        }

        .chat-modal {
            width: 100%;
            max-width: 480px;
            max-height: calc(100svh - 40px);
            background: linear-gradient(160deg, #0f0f20 0%, #08071a 100%);
            border: 1px solid rgba(155, 93, 229, 0.20);
            border-top: 1px solid rgba(155, 93, 229, 0.30);
            border-radius: 24px 24px 0 0;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 1px 0 rgba(155, 93, 229, 0.10) inset,
                        0 0 0 1px rgba(155, 93, 229, 0.10),
                        0 32px 80px rgba(0, 0, 0, 0.90),
                        0 8px 32px rgba(155, 93, 229, 0.12);
            animation: modalPop 0.30s cubic-bezier(0.34, 1.2, 0.64, 1) both;
            position: relative;
        }
        @media(min-width: 600px) {
            .chat-modal {
                border-radius: 24px;
            }
        }

        .chat-header {
            flex-shrink: 0;
            padding: 20px 24px 16px;
            background: linear-gradient(180deg, #0f0f20 0%, rgba(15, 15, 32, 0.97) 100%);
            border-bottom: 1px solid rgba(255, 255, 255, 0.10);
            border-radius: 24px 24px 0 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .chat-header-content {
            flex: 1;
        }

        .chat-title {
            font-family: 'Syne', sans-serif;
            font-size: 1.1rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            color: var(--text);
            margin-bottom: 4px;
        }

        .chat-subtitle {
            font-size: 11px;
            color: var(--muted);
            letter-spacing: 0.04em;
        }

        .chat-close {
            width: 32px;
            height: 32px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.10);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--muted);
            transition: background 0.15s, color 0.15s;
            flex-shrink: 0;
        }

        .chat-close:hover {
            background: rgba(155, 93, 229, 0.15);
            color: var(--accent);
            border-color: rgba(155, 93, 229, 0.25);
        }

        .chat-body {
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            overscroll-behavior: contain;
            padding: 20px 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .chat-message {
            display: flex;
            gap: 12px;
            animation: fadeUp 0.25s ease both;
        }

        .chat-message.sent {
            justify-content: flex-end;
        }

        .chat-message-bubble {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 16px;
            font-size: 13px;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .chat-message.received .chat-message-bubble {
            background: rgba(155, 93, 229, 0.12);
            border: 1px solid rgba(155, 93, 229, 0.20);
            color: var(--text2);
        }

        .chat-message.sent .chat-message-bubble {
            background: linear-gradient(135deg, rgba(155, 93, 229, 0.25), rgba(232, 121, 160, 0.15));
            border: 1px solid rgba(155, 93, 229, 0.30);
            color: var(--text);
        }

        .chat-footer {
            flex-shrink: 0;
            padding: 16px 24px 20px;
            background: rgba(7, 7, 16, 0.40);
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }

        .chat-input {
            flex: 1;
            padding: 11px 14px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.10);
            border-radius: 12px;
            color: var(--text);
            font-size: 13px;
            resize: none;
            max-height: 100px;
            outline: none;
            transition: border-color 0.15s, background 0.15s;
        }

        .chat-input:focus {
            border-color: rgba(155, 93, 229, 0.45);
            background: rgba(255, 255, 255, 0.06);
        }

        .chat-input::placeholder {
            color: var(--muted);
        }

        .chat-send {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border: none;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: opacity 0.15s, transform 0.12s;
            flex-shrink: 0;
            font-weight: 700;
            font-size: 18px;
        }

        .chat-send:hover {
            opacity: 0.88;
        }

        .chat-send:active {
            transform: scale(0.97);
        }

        .chat-new-user-lock {
            background: rgba(248, 113, 113, 0.08);
            border: 1px solid rgba(248, 113, 113, 0.20);
            border-radius: var(--radius-md);
            padding: 14px 16px;
            font-size: 12px;
            color: #f87171;
            text-align: center;
            margin: 8px 0;
            line-height: 1.5;
        }

        /* ── BREADCRUMB ── */
        .breadcrumb { display:flex; align-items:center; gap:8px; margin-bottom:22px; }
        .breadcrumb-sep { color:rgba(255,255,255,0.18); font-size:11px; }
        .breadcrumb-current { font-size:11px; color:var(--text2); font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:220px; }

        /* ── SKELETON ── */
        .skel {
            border-radius:8px;
            background:linear-gradient(90deg,var(--surface2) 25%,#1c1c2e 50%,var(--surface2) 75%);
            background-size:200% 100%; animation:shimmer 1.8s infinite;
        }

        /* ── SKELETON SCREEN ── */
        #skelScreen {
            max-width:700px; margin:0 auto;
            padding:28px 16px max(100px, calc(80px + env(safe-area-inset-bottom)));
            animation:fadeUp .25s ease both;
        }
        #skelScreen.hidden { display:none; }
        .sk { border-radius:8px; background:linear-gradient(90deg,var(--surface2) 25%,#1c1c2e 50%,var(--surface2) 75%); background-size:200% 100%; animation:shimmer 1.8s infinite; }
        .sk-gallery { width:100%; aspect-ratio:16/9; border-radius:var(--radius-xl); margin-bottom:24px; }
        .sk-breadcrumb { display:flex; align-items:center; gap:8px; margin-bottom:22px; }
        .sk-title-lg { height:32px; width:72%; border-radius:10px; margin-bottom:10px; }
        .sk-title-sm { height:14px; width:38%; border-radius:6px; margin-bottom:14px; }
        .sk-tags { display:flex; gap:8px; margin-bottom:22px; }
        .sk-tag { height:22px; border-radius:6px; }
        .sk-price-block { display:flex; align-items:center; justify-content:space-between; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg); padding:18px 20px; margin-bottom:14px; }
        .sk-price-big { height:42px; width:120px; border-radius:10px; }
        .sk-btns { display:flex; gap:10px; }
        .sk-btn { height:40px; border-radius:999px; }
        .sk-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg); padding:20px; margin-bottom:14px; }
        .sk-card-label { height:11px; width:30%; border-radius:5px; margin-bottom:16px; }
        .sk-grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; }
        .sk-grid-cell { height:62px; border-radius:10px; }
        .sk-desc-line { height:13px; border-radius:5px; margin-bottom:9px; }
        .sk-seller-row { display:flex; align-items:center; gap:12px; }
        .sk-avatar { width:44px; height:44px; border-radius:999px; flex-shrink:0; }
        .sk-seller-info { flex:1; display:flex; flex-direction:column; gap:8px; }
        .sk-seller-name { height:14px; width:45%; border-radius:6px; }
        .sk-seller-sub  { height:11px; width:30%; border-radius:5px; }

        /* ── GALLERY ── */
        .gallery-wrap {
            position:relative; border-radius:var(--radius-xl); overflow:hidden;
            background:var(--surface); aspect-ratio:16/9; margin-bottom:24px;
            box-shadow:0 8px 40px rgba(0,0,0,0.5);
        }
        .gallery-img { width:100%; height:100%; object-fit:cover; display:none; animation:fadeUp .22s ease; }
        .gallery-img.active { display:block; }
        .gallery-fallback {
            width:100%; height:100%; display:flex; align-items:center; justify-content:center;
            background:linear-gradient(135deg,rgba(155,93,229,.09),rgba(56,189,248,.06));
        }
        .gallery-dots { position:absolute; bottom:12px; left:50%; transform:translateX(-50%); display:flex; gap:5px; z-index:2; }
        .gallery-dot { width:6px; height:6px; border-radius:999px; background:rgba(255,255,255,.3); cursor:pointer; transition:background .15s,transform .15s; }
        .gallery-dot.active { background:#fff; transform:scale(1.3); }
        .gallery-arrow {
            position:absolute; top:50%; transform:translateY(-50%);
            width:34px; height:34px; border-radius:999px;
            background:rgba(7,7,16,.7); backdrop-filter:blur(10px);
            border:1px solid rgba(255,255,255,.16);
            display:flex; align-items:center; justify-content:center;
            color:#fff; cursor:pointer; z-index:2; transition:background .15s; font-size:15px;
        }
        .gallery-arrow:hover { background:rgba(155,93,229,.45); }
        .gallery-arrow.prev { left:12px; } .gallery-arrow.next { right:12px; }
        .gallery-count {
            position:absolute; top:12px; right:12px;
            background:rgba(7,7,16,.72); backdrop-filter:blur(10px);
            border:1px solid rgba(255,255,255,.1); border-radius:999px; padding:3px 10px;
            font-size:10px; font-weight:600; color:rgba(255,255,255,.7);
        }
        .gallery-badge {
            position:absolute; top:12px; left:12px; z-index:2;
            display:flex; gap:6px;
        }
        .g-badge {
            backdrop-filter:blur(10px); border-radius:999px; padding:4px 10px;
            font-family:'Syne',sans-serif; font-size:9px; font-weight:700; letter-spacing:.07em; text-transform:uppercase;
        }
        .g-badge.featured { background:rgba(155,93,229,.75); border:1px solid rgba(155,93,229,.5); color:#fff; }
        .g-badge.sponsored { background:rgba(245,200,66,.75); border:1px solid rgba(245,200,66,.4); color:#111; }

        /* ── TITLE AREA ── */
        .listing-header { margin-bottom:20px; }
        .listing-title {
            font-family:'Syne',sans-serif; font-size:1.55rem; font-weight:800;
            letter-spacing:-0.045em; color:var(--text); margin-bottom:8px; line-height:1.18;
        }
        .listing-url {
            font-size:12px; color:var(--accent3); opacity:.85; margin-bottom:12px;
            display:flex; align-items:center; gap:5px;
        }
        .listing-url a { color:inherit; text-decoration:none; }
        .listing-url a:hover { text-decoration:underline; }
        .tag-row { display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
        .tag-pill {
            background:rgba(255,255,255,.04); border:1px solid var(--border);
            border-radius:6px; padding:3px 9px;
            font-size:9.5px; font-weight:600; color:var(--muted);
            letter-spacing:.05em; text-transform:uppercase; white-space:nowrap;
        }
        .tag-pill.cat { border-color:rgba(155,93,229,.3); color:var(--accent); background:rgba(155,93,229,.07); }
        .tag-pill.featured { border-color:rgba(155,93,229,.3); color:var(--accent); background:rgba(155,93,229,.07); }
        .tag-pill.sponsored { border-color:rgba(245,200,66,.3); color:var(--yellow); background:rgba(245,200,66,.07); }
        .time-pill { font-size:9.5px; color:var(--muted); display:flex; align-items:center; gap:4px; }

        /* ── PRICE + ACTION ROW ── */
        .price-action-block {
            display:flex; align-items:center; justify-content:space-between;
            gap:16px; flex-wrap:wrap; margin-bottom:24px;
            background:var(--surface); border:1px solid var(--border);
            border-radius:var(--radius-lg); padding:18px 20px;
        }
        .price-left {}
        .price-big {
            font-family:'Syne',sans-serif; font-size:2.1rem; font-weight:800;
            letter-spacing:-0.05em; color:var(--text); line-height:1;
        }
        .price-sub { font-size:11px; color:var(--muted); margin-top:4px; }
        .action-btns { display:flex; gap:9px; align-items:center; flex-wrap:wrap; }

        /* ── BUTTONS ── */
        .btn-primary {
            display:inline-flex; align-items:center; justify-content:center; gap:7px;
            padding:12px 20px; border-radius:var(--radius-md);
            background:linear-gradient(135deg,var(--accent),var(--accent2));
            border:none; color:#fff;
            font-family:'Syne',sans-serif; font-size:13px; font-weight:700;
            cursor:pointer; text-decoration:none; white-space:nowrap; letter-spacing:.01em;
            transition:opacity .15s,transform .12s;
        }
        .btn-primary:hover { opacity:.88; } .btn-primary:active { transform:scale(.97); }
        .btn-primary:disabled { opacity:.45; cursor:default; transform:none; }

        @media(max-width:480px){
            .listing-title { font-size:1.25rem; }
            .price-big { font-size:1.65rem; }
        }
    </style>
</head>
<body>

<!-- ══ HEADER ══ -->
<header>
    <a href="/" aria-label="Siterifty — home" style="display:flex;align-items:center;gap:10px;flex-shrink:0;text-decoration:none;opacity:1;transition:opacity .18s;" onmouseover="this.style.opacity='0.75'" onmouseout="this.style.opacity='1'">
        <svg width="28" height="28" viewBox="0 0 28 28" xmlns="http://www.w3.org/2000/svg" style="flex-shrink:0;">
            <rect class="blade b-1"  x="12.5" y="2" width="3" height="10" rx="1.5" fill="url(#hsg)" transform="rotate(0,14,14)"/>
            <rect class="blade b-2"  x="12.5" y="2" width="3" height="10" rx="1.5" fill="url(#hsg)" transform="rotate(36,14,14)"/>
            <rect class="blade b-3"  x="12.5" y="2" width="3" height="10" rx="1.5" fill="url(#hsg)" transform="rotate(72,14,14)"/>
            <rect class="blade b-4"  x="12.5" y="2" width="3" height="10" rx="1.5" fill="url(#hsg)" transform="rotate(108,14,14)"/>
            <rect class="blade b-5"  x="12.5" y="2" width="3" height="10" rx="1.5" fill="url(#hsg)" transform="rotate(144,14,14)"/>
            <rect class="blade b-6"  x="12.5" y="2" width="3" height="10" rx="1.5" fill="url(#hsg)" transform="rotate(180,14,14)"/>
            <rect class="blade b-7"  x="12.5" y="2" width="3" height="10" rx="1.5" fill="url(#hsg)" transform="rotate(216,14,14)"/>
            <rect class="blade b-8"  x="12.5" y="2" width="3" height="10" rx="1.5" fill="url(#hsg)" transform="rotate(252,14,14)"/>
            <rect class="blade b-9"  x="12.5" y="2" width="3" height="10" rx="1.5" fill="url(#hsg)" transform="rotate(288,14,14)"/>
            <rect class="blade b-10" x="12.5" y="2" width="3" height="10" rx="1.5" fill="url(#hsg)" transform="rotate(324,14,14)"/>
            <circle cx="14" cy="14" r="3" fill="#f472b6"/>
            <defs><linearGradient id="hsg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#a855f7"/><stop offset="100%" stop-color="#38bdf8"/></linearGradient></defs>
        </svg>
        <span class="wordmark">Siterifty<span>.com</span></span>
    </a>
    <div class="header-right">
        <a href="/browse" class="back-btn">
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M7.5 2L3.5 6l4 4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
            Browse
        </a>
        <div class="avatar" id="avatarBtn" onclick="if(window._fbAuth&&window._fbAuth.currentUser){location.href = window.location.origin + '/?account=open';}else{location.href = window.location.origin + '/?auth=signin';}">
            <svg id="avatarGuestIcon" width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="6" r="3" stroke="currentColor" stroke-width="1.5"/><path d="M2 13c0-3 2.686-5 6-5s6 2 6 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        </div>
    </div>
</header>

<!-- ══ CHAT MODAL ══ -->
<div id="chatOverlay" class="chat-overlay">
    <div class="chat-modal">
        <div class="chat-header">
            <div class="chat-header-content">
                <div class="chat-title">Seller Message</div>
                <div class="chat-subtitle" id="chatSubtitle">Send a message to the seller</div>
            </div>
            <div class="chat-close" onclick="closeChatModal()">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M3 3l10 10M13 3l-10 10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </div>
        </div>
        <div class="chat-body" id="chatBody">
            <div class="chat-message received">
                <div class="chat-message-bubble">Hi! I'm interested in your listing. Feel free to ask me anything!</div>
            </div>
        </div>
        <div class="chat-footer">
            <textarea id="chatInput" class="chat-input" placeholder="Type your message…" rows="1"></textarea>
            <button class="chat-send" onclick="sendChatMessage()" id="chatSendBtn">↑</button>
        </div>
    </div>
</div>

<!-- ══ PAGE CONTENT ══ -->
<div class="page-wrap" id="pageContent">
    <!-- Content will load here -->
</div>

<script>
// ════════════════════════════════════════════════════════
// CHAT MODAL MANAGEMENT
// ════════════════════════════════════════════════════════

let currentChatId = null;
let isNewUser = false;
let chatMessages = [];

function initChatSystem() {
    // Check URL hash for chat ID
    const hash = window.location.hash;
    const chatMatch = hash.match(/#message\/chat=([^&]+)/);
    
    if (chatMatch) {
        currentChatId = chatMatch[1];
        // Auto-open chat modal for this listing
        setTimeout(() => {
            openChatModal();
        }, 500);
    }

    // Listen for hash changes
    window.addEventListener('hashchange', () => {
        const newHash = window.location.hash;
        const newChatMatch = newHash.match(/#message\/chat=([^&]+)/);
        
        if (newChatMatch) {
            currentChatId = newChatMatch[1];
            openChatModal();
        } else if (newHash === '' || !newHash.includes('message')) {
            closeChatModal();
        }
    });
}

function openChatModal() {
    const overlay = document.getElementById('chatOverlay');
    
    // Check if user is new (example: check localStorage or API)
    isNewUser = !localStorage.getItem('siterifty_user_verified');
    
    overlay.classList.add('open');
    document.body.style.overflow = 'hidden';
    
    // Update URL hash
    if (currentChatId) {
        window.location.hash = `message/chat=${currentChatId}`;
    }
    
    // Load initial messages
    loadChatMessages();
    
    // Disable input if new user
    updateChatInputState();
}

function closeChatModal() {
    const overlay = document.getElementById('chatOverlay');
    overlay.classList.remove('open');
    document.body.style.overflow = '';
    
    // Clear hash
    if (window.location.hash.includes('message/chat')) {
        window.history.replaceState(null, '', window.location.pathname);
    }
}

function updateChatInputState() {
    const input = document.getElementById('chatInput');
    const sendBtn = document.getElementById('chatSendBtn');
    const body = document.getElementById('chatBody');
    
    if (isNewUser) {
        input.disabled = true;
        sendBtn.disabled = true;
        input.style.opacity = '0.5';
        sendBtn.style.opacity = '0.5';
        
        // Show lock message
        if (!body.querySelector('.chat-new-user-lock')) {
            const lockMsg = document.createElement('div');
            lockMsg.className = 'chat-new-user-lock';
            lockMsg.textContent = '🔒 Sign up and verify your email to message sellers';
            body.appendChild(lockMsg);
        }
    } else {
        input.disabled = false;
        sendBtn.disabled = false;
        input.style.opacity = '1';
        sendBtn.style.opacity = '1';
    }
}

function loadChatMessages() {
    // Example: Load messages from API or localStorage
    // For now, we'll use placeholder messages
    const body = document.getElementById('chatBody');
    body.innerHTML = '';
    
    // Add sample messages
    const sellerMsg = document.createElement('div');
    sellerMsg.className = 'chat-message received';
    sellerMsg.innerHTML = '<div class="chat-message-bubble">Hi! Interested in learning more about this listing? Ask me anything!</div>';
    body.appendChild(sellerMsg);
    
    chatMessages = [
        { type: 'received', text: 'Hi! Interested in learning more about this listing? Ask me anything!' }
    ];
}

function sendChatMessage() {
    const input = document.getElementById('chatInput');
    const text = input.value.trim();
    
    if (!text || isNewUser) return;
    
    // Add message to UI
    const body = document.getElementById('chatBody');
    const msgDiv = document.createElement('div');
    msgDiv.className = 'chat-message sent';
    msgDiv.innerHTML = `<div class="chat-message-bubble">${escapeHtml(text)}</div>`;
    body.appendChild(msgDiv);
    
    // Scroll to bottom
    body.scrollTop = body.scrollHeight;
    
    // Clear input
    input.value = '';
    input.style.height = 'auto';
    
    // Save message
    chatMessages.push({ type: 'sent', text });
    
    // TODO: Send to API/Firebase
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

// ════════════════════════════════════════════════════════
// AUTO-RESIZE TEXTAREA
// ════════════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', () => {
    const textarea = document.getElementById('chatInput');
    
    textarea.addEventListener('input', () => {
        textarea.style.height = 'auto';
        textarea.style.height = Math.min(textarea.scrollHeight, 100) + 'px';
    });
    
    textarea.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendChatMessage();
        }
    });
    
    // Initialize chat system
    initChatSystem();
});
</script>

</body>
</html>
