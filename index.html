<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BET SMART</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #00f2fe; --glass: rgba(255, 255, 255, 0.07); --border: rgba(255, 255, 255, 0.12); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; user-select: none; -webkit-tap-highlight-color: transparent; }
        
        body { background: #000; color: #fff; padding-top: 85px; padding-bottom: 120px; transition: 0.3s; }

        /* Sticky Glass Header */
        header {
            position: fixed; top: 0; width: 100%; height: 75px;
            background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 20px; z-index: 1000; border-bottom: 1px solid var(--border);
        }
        .logo { font-weight: 900; color: var(--accent); font-size: 1.3rem; letter-spacing: -1px; }
        .clear-btn { background: var(--glass); color: #ff4b2b; border: 1px solid rgba(255,75,43,0.3); padding: 8px 14px; border-radius: 12px; font-weight: 700; cursor: pointer; font-size: 0.7rem; }

        #fixtures-container { width: 100%; max-width: 480px; margin: 0 auto; padding: 15px; }

        /* Card Styling */
        .card {
            background: var(--glass); border: 1px solid var(--border);
            border-radius: 30px; padding: 22px; margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .league { font-size: 0.65rem; color: #888; text-transform: uppercase; font-weight: 700; margin-bottom: 12px; }
        .teams { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .team-name { font-weight: 700; font-size: 1.1rem; flex: 1; text-align: center; }
        .vs-badge { background: rgba(0,242,254,0.1); color: var(--accent); padding: 4px 10px; border-radius: 8px; font-size: 0.6rem; font-weight: 900; margin: 0 15px; }

        /* Odds Interactive */
        .odds-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 18px; }
        .odd-btn {
            background: rgba(255,255,255,0.03); border: 1px solid var(--border);
            padding: 12px; border-radius: 16px; text-align: center; cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .odd-btn:active { transform: scale(0.92); background: var(--accent); color: #000; }
        .odd-btn.selected { background: var(--accent); color: #000; border-color: var(--accent); }
        .odd-label { display: block; font-size: 0.6rem; opacity: 0.6; margin-bottom: 2px; }
        .odd-val { font-weight: 900; font-size: 1rem; }

        /* AI Analysis Box */
        .ai-box { background: rgba(0, 242, 254, 0.03); border-left: 4px solid var(--accent); padding: 14px; border-radius: 6px 18px 18px 6px; font-size: 0.85rem; line-height: 1.5; color: #ddd; }
        .ai-title { color: var(--accent); font-weight: 900; font-size: 0.65rem; display: block; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 1px; }

        /* Multiplier Slip */
        #bet-slip {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(150%);
            width: calc(100% - 40px); max-width: 440px; background: var(--accent); color: #000;
            padding: 20px; border-radius: 24px; display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 15px 40px rgba(0,242,254,0.3); transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 2000;
        }
        #bet-slip.active { transform: translateX(-50%) translateY(0); }
        .slip-info { font-weight: 900; font-size: 1.2rem; }
        .slip-count { font-size: 0.7rem; text-transform: uppercase; font-weight: 700; opacity: 0.7; }

        #loader { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); font-weight: 700; color: var(--accent); }
        .hidden { display: none; }
    </style>
</head>
<body>

    <header>
        <div class="logo">BET SMART</div>
        <button class="clear-btn" onclick="clearAll()">CLEAR STORAGE</button>
    </header>

    <div id="loader">FETCHING LIVE FIXTURES...</div>
    <div id="fixtures-container"></div>

    <div id="bet-slip">
        <div>
            <div class="slip-count"><span id="match-count">0</span> Selections</div>
            <div class="slip-info">TOTAL ODDS: <span id="total-odds">1.00</span>x</div>
        </div>
        <button onclick="resetSelections()" style="background:#000; color:#fff; border:none; padding:10px 18px; border-radius:12px; font-weight:800; font-size:0.7rem;">RESET</button>
    </div>

    <script>
        const API_KEY = 'ad7cc474657e32a32bf5d56e68e84fa8';
        const STORAGE_KEY = 'BET_SMART_V3';
        let selections = new Map();

        async function init() {
            const cached = JSON.parse(localStorage.getItem(STORAGE_KEY));
            const now = Date.now();
            if (cached && (now - cached.time < 86400000)) {
                render(cached.data);
            } else {
                fetchData();
            }
        }

        async function fetchData() {
            const leagues = ['soccer_uefa_champs_league', 'soccer_epl', 'soccer_spain_la_liga', 'soccer_germany_bundesliga', 'soccer_italy_serie_a'];
            try {
                let all = [];
                for (let l of leagues) {
                    const r = await fetch(`https://api.the-odds-api.com/v4/sports/${l}/odds/?apiKey=${API_KEY}&regions=eu&markets=h2h`);
                    const d = await r.json();
                    if(Array.isArray(d)) all.push(...d);
                }
                const today = new Date().toISOString().split('T')[0];
                const filtered = all.filter(m => m.commence_time.startsWith(today));
                localStorage.setItem(STORAGE_KEY, JSON.stringify({ time: Date.now(), data: filtered }));
                render(filtered);
            } catch (e) {
                document.getElementById('loader').innerText = "Network Error. Refresh.";
            }
        }

        function render(matches) {
            document.getElementById('loader').classList.add('hidden');
            const container = document.getElementById('fixtures-container');
            container.innerHTML = matches.length ? '' : '<p style="text-align:center; margin-top:50px; opacity:0.5;">No matches today.</p>';

            matches.forEach(m => {
                const bookie = m.bookmakers[0]?.markets[0]?.outcomes || [];
                const odds = {
                    h: bookie.find(o => o.name === m.home_team)?.price || 1.00,
                    a: bookie.find(o => o.name === m.away_team)?.price || 1.00,
                    d: bookie.find(o => o.name === 'Draw')?.price || 1.00
                };

                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="league">${m.sport_title}</div>
                    <div class="teams">
                        <span class="team-name">${m.home_team}</span>
                        <span class="vs-badge">VS</span>
                        <span class="team-name">${m.away_team}</span>
                    </div>
                    <div class="odds-grid">
                        <div class="odd-btn" onclick="toggleSelection('${m.id}', 'H', ${odds.h}, this)">
                            <span class="odd-label">1</span><span class="odd-val">${odds.h}</span>
                        </div>
                        <div class="odd-btn" onclick="toggleSelection('${m.id}', 'X', ${odds.d}, this)">
                            <span class="odd-label">X</span><span class="odd-val">${odds.d}</span>
                        </div>
                        <div class="odd-btn" onclick="toggleSelection('${m.id}', '2', ${odds.a}, this)">
                            <span class="odd-label">2</span><span class="odd-val">${odds.a}</span>
                        </div>
                    </div>
                    <div class="ai-box" id="ai-${m.id.substring(0,8)}">
                        <span class="ai-title">Groq AI Analysis</span>
                        Analyzing market trends...
                    </div>
                `;
                container.appendChild(card);
                fetchAI(m, odds);
            });
        }

        async function fetchAI(m, odds) {
            const el = document.getElementById(`ai-${m.id.substring(0,8)}`);
            try {
                const res = await fetch('/api/predict', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ home_team: m.home_team, away_team: m.away_team, odds })
                });
                if(!res.ok) throw new Error(`${res.status}`);
                const data = await res.json();
                el.innerHTML = `<span class="ai-title">Groq AI Analysis</span> ${data.prediction}`;
            } catch (e) {
                el.innerHTML = `<span class="ai-title" style="color:#ff4b2b">Error ${e.message}</span> API path not found. Check Vercel logs.`;
                el.style.borderLeft = "4px solid #ff4b2b";
            }
        }

        function toggleSelection(matchId, type, value, el) {
            // Deselect others in same match
            el.parentElement.querySelectorAll('.odd-btn').forEach(btn => {
                if(btn !== el) btn.classList.remove('selected');
            });

            if(el.classList.contains('selected')) {
                el.classList.remove('selected');
                selections.delete(matchId);
            } else {
                el.classList.add('selected');
                selections.set(matchId, value);
            }
            updateSlip();
        }

        function updateSlip() {
            const slip = document.getElementById('bet-slip');
            const totalEl = document.getElementById('total-odds');
            const countEl = document.getElementById('match-count');
            
            if(selections.size > 0) {
                let total = 1;
                selections.forEach(val => total *= val);
                totalEl.innerText = total.toFixed(2);
                countEl.innerText = selections.size;
                slip.classList.add('active');
            } else {
                slip.classList.remove('active');
            }
        }

        function resetSelections() {
            selections.clear();
            document.querySelectorAll('.odd-btn').forEach(b => b.classList.remove('selected'));
            updateSlip();
        }

        function clearAll() {
            localStorage.removeItem(STORAGE_KEY);
            location.reload();
        }

        init();
    </script>
</body>
</html>
