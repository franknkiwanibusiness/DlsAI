<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BMW Wealth AI</title>
    <style>
        :root { --bmw-blue: #0066B2; --dark-carbon: #0a0a0a; --glass: rgba(255, 255, 255, 0.05); }
        * { -webkit-tap-highlight-color: transparent; user-select: none; -webkit-user-select: none; }
        body { background-color: #000; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* 🏁 TOP DASHBOARD */
        #dashboard { background: #000; padding: 15px; border-bottom: 2px solid var(--bmw-blue); text-align: center; }
        .m-stripe { height: 4px; width: 60px; margin: 8px auto; background: linear-gradient(90deg, #0066B2 33%, #003366 33%, #003366 66%, #FF0000 66%); }
        .stats { display: flex; justify-content: space-around; font-size: 11px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
        
        #chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%); }
        .bubble { max-width: 85%; padding: 12px 18px; border-radius: 20px; font-size: 14px; animation: fadeIn 0.3s ease; line-height: 1.4; }
        .ai { background: var(--glass); border: 1px solid #333; align-self: flex-start; }
        .user { background: var(--bmw-blue); align-self: flex-end; }

        .input-area { padding: 15px; background: #000; display: flex; gap: 10px; border-top: 1px solid #222; }
        input { flex: 1; background: #111; border: 1px solid #333; color: white; padding: 12px 20px; border-radius: 25px; outline: none; user-select: text; }
        
        .odds-card { background: #1a1a1a; border-left: 3px solid #ffcc00; padding: 8px; margin-top: 5px; font-size: 12px; border-radius: 5px; }
    </style>
</head>
<body>

<div id="dashboard">
    <div class="stats">
        <div>CHASSIS: <span id="chat-id-display">---</span></div>
        <div>TARGET: <span id="target-display">R1,000,000</span></div>
    </div>
    <div class="m-stripe"></div>
</div>

<div id="chat-container"></div>

<div class="input-area">
    <input type="text" id="userInput" placeholder="Type /target.amount or ask for odds...">
    <button id="sendBtn" style="background:var(--bmw-blue); border:none; color:white; border-radius:50%; width:45px; height:45px;">➔</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-app.js";
    import { getDatabase, ref, push, onValue, set, update } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDFHskUWiyHhZke3KT9kkOtFI_gPsKfiGo",
        authDomain: "itzhoyoo-f9f7e.firebaseapp.com",
        databaseURL: "https://itzhoyoo-f9f7e-default-rtdb.firebaseio.com",
        projectId: "itzhoyoo-f9f7e",
        storageBucket: "itzhoyoo-f9f7e.filestorage.app",
        messagingSenderId: "1094792075584",
        appId: "1:1094792075584:web:d49e9c3f899d3cd31082a5"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const ODDS_API_KEY = "ad7cc474657e32a32bf5d56e68e84fa8";

    let chatID = localStorage.getItem('activeChatID') || 'BMW-' + Math.random().toString(36).substr(2, 6).toUpperCase();
    localStorage.setItem('activeChatID', chatID);
    document.getElementById('chat-id-display').innerText = chatID;

    const chatRef = ref(db, 'chats/' + chatID);
    const settingsRef = ref(db, 'settings/' + chatID);

    // 🎯 Sync Target from Firebase
    onValue(settingsRef, (snap) => {
        const val = snap.val();
        if (val && val.target) document.getElementById('target-display').innerText = val.target;
    });

    // 🧠 Load History
    onValue(chatRef, (snap) => {
        const container = document.getElementById('chat-container');
        container.innerHTML = ''; 
        if (snap.val()) {
            Object.values(snap.val()).forEach(msg => {
                const div = document.createElement('div');
                div.className = `bubble ${msg.role}`;
                div.innerHTML = msg.text;
                container.appendChild(div);
            });
            container.scrollTop = container.scrollHeight;
        }
    });

    async function fetchOdds() {
        try {
            const res = await fetch(`https://api.the-odds-api.com/v4/sports/soccer_epl/odds/?apiKey=${ODDS_API_KEY}&regions=uk&markets=h2h`);
            const data = await res.json();
            return data.slice(0, 3).map(g => `<div class="odds-card">⚽ ${g.home_team} vs ${g.away_team}<br>Odds: ${g.bookmakers[0].markets[0].outcomes.map(o => o.name + ": " + o.price).join(' | ')}</div>`).join('');
        } catch (e) { return "Unable to fetch live odds."; }
    }

    async function sendMessage() {
        const input = document.getElementById('userInput');
        const text = input.value.trim().toLowerCase();
        if (!text) return;

        // 🛠️ Command Handler
        if (text.startsWith('/target.')) {
            const newTarget = text.split('.')[1].toUpperCase();
            await update(settingsRef, { target: 'R' + newTarget });
            await push(chatRef, { role: 'ai', text: `🏁 Target recalibrated to R${newTarget}. Eyes on the prize.`, timestamp: Date.now() });
            input.value = '';
            return;
        }

        await push(chatRef, { role: 'user', text: input.value, timestamp: Date.now() });
        input.value = '';

        // 🏟️ Odds Request Logic
        let aiResponse = "Processing data...";
        if (text.includes('odds') || text.includes('fixtures') || text.includes('playing')) {
            const oddsData = await fetchOdds();
            aiResponse = `Here are the latest EPL fixtures for your strategy:<br>${oddsData}`;
        } else {
            // Call your Vercel/Groq API here
            const res = await fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ messages: [{ role: 'user', content: text }] })
            });
            const data = await res.json();
            aiResponse = data.content;
        }

        await push(chatRef, { role: 'ai', text: aiResponse, timestamp: Date.now() });
    }

    document.getElementById('sendBtn').onclick = sendMessage;
    document.getElementById('userInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') sendMessage(); });
</script>
</body>
</html>
