<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BMW Wealth AI</title>
    <style>
        :root { 
            --bmw-blue: #0066B2; 
            --dark-bg: #000000;
            --carbon: #121212;
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
        }

        /* 🚫 Mobile Restrictions */
        * { 
            -webkit-tap-highlight-color: transparent; 
            user-select: none; 
            -webkit-user-select: none; 
            box-sizing: border-box; 
        }

        body { 
            background-color: var(--dark-bg); 
            color: white; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; /* Prevents body bounce */
        }

        /* 🏁 Fixed Mobile Header */
        header { 
            padding-top: calc(var(--safe-top) + 10px);
            padding-bottom: 10px;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #222;
            text-align: center;
            z-index: 100;
        }

        .stats { display: flex; justify-content: space-around; font-size: 10px; font-weight: 900; letter-spacing: 1px; color: #888; }
        .stats span { color: var(--bmw-blue); }
        .m-stripe { height: 3px; width: 50px; margin: 8px auto; background: linear-gradient(90deg, #0066B2 33%, #003366 33%, #003366 66%, #FF0000 66%); }

        /* 💬 Scrollable Chat Area */
        #chat-container { 
            flex: 1; 
            overflow-y: auto; 
            padding: 15px; 
            padding-bottom: 100px; /* Space for the floating input */
            display: flex; 
            flex-direction: column; 
            gap: 12px;
            -webkit-overflow-scrolling: touch;
        }

        .bubble { 
            max-width: 80%; 
            padding: 12px 16px; 
            border-radius: 18px; 
            font-size: 15px; 
            line-height: 1.4;
            position: relative;
        }

        .ai { background: var(--carbon); border: 1px solid #222; align-self: flex-start; border-bottom-left-radius: 4px; }
        .user { background: var(--bmw-blue); align-self: flex-end; border-bottom-right-radius: 4px; }

        /* 🏟️ Mobile Odds Card */
        .odds-card { 
            background: #1a1a1a; 
            border-radius: 12px; 
            padding: 12px; 
            margin: 5px 0; 
            border: 1px solid #333;
            font-size: 13px;
        }

        /* ⌨️ Sticky Bottom Input */
        .input-wrapper {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 10px 15px calc(var(--safe-bottom) + 10px) 15px;
            background: linear-gradient(0deg, rgba(0,0,0,1) 70%, rgba(0,0,0,0) 100%);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        input { 
            flex: 1; 
            background: #1a1a1a; 
            border: 1px solid #333; 
            color: white; 
            padding: 14px 20px; 
            border-radius: 28px; 
            outline: none; 
            font-size: 16px; /* Prevents iOS zoom-on-focus */
            user-select: text !important;
            -webkit-user-select: text !important;
        }

        button { 
            background: var(--bmw-blue); 
            border: none; 
            color: white; 
            border-radius: 50%; 
            width: 48px; 
            height: 48px; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            box-shadow: 0 4px 12px rgba(0, 102, 178, 0.4);
        }

        /* Transitions */
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .bubble { animation: slideIn 0.2s ease-out; }
    </style>
</head>
<body>

<header>
    <div class="stats">
        <div>ID: <span id="chat-id-display">...</span></div>
        <div>GOAL: <span id="target-display">R1,000,000</span></div>
    </div>
    <div class="m-stripe"></div>
</header>

<div id="chat-container"></div>

<div class="input-wrapper">
    <input type="text" id="userInput" placeholder="Ask for odds or set /target..." autocomplete="off">
    <button id="sendBtn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
    </button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-app.js";
    import { getDatabase, ref, push, onValue, update } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDFHskUWiyHhZke3KT9kkOtFI_gPsKfiGo",
        authDomain: "itzhoyoo-f9f7e.firebaseapp.com",
        databaseURL: "https://itzhoyoo-f9f7e-default-rtdb.firebaseio.com",
        projectId: "itzhoyoo-f9f7e",
        storageBucket: "itzhoyoo-f9f7e.filestorage.app",
        messagingSenderId: "1094792075584",
        appId: "1:1094792075584:web:d49e9c3f899d3cd31082a5"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const ODDS_KEY = "ad7cc474657e32a32bf5d56e68e84fa8";

    let chatID = localStorage.getItem('activeChatID') || 'M-' + Math.random().toString(36).substr(2, 5).toUpperCase();
    localStorage.setItem('activeChatID', chatID);
    document.getElementById('chat-id-display').innerText = chatID;

    const chatRef = ref(db, 'chats/' + chatID);
    const setRef = ref(db, 'settings/' + chatID);

    onValue(setRef, (s) => { if(s.exists()) document.getElementById('target-display').innerText = s.val().target; });

    onValue(chatRef, (s) => {
        const c = document.getElementById('chat-container');
        c.innerHTML = '';
        if(s.exists()){
            Object.values(s.val()).forEach(m => {
                const d = document.createElement('div');
                d.className = `bubble ${m.role}`;
                d.innerHTML = m.text;
                c.appendChild(d);
            });
            c.scrollTo({ top: c.scrollHeight, behavior: 'smooth' });
        }
    });

    async function handleAction() {
        const i = document.getElementById('userInput');
        const val = i.value.trim();
        const cmd = val.toLowerCase().replace(/\s/g, '');
        if(!val) return;

        if(cmd.startsWith('/target.')){
            const t = 'R' + cmd.split('.')[1].toUpperCase();
            await update(setRef, { target: t });
            await push(chatRef, { role: 'ai', text: `Target locked: ${t}` });
            i.value = ''; return;
        }

        await push(chatRef, { role: 'user', text: val });
        i.value = '';

        let reply = "Syncing with Groq...";
        if(cmd.includes('odds') || cmd.includes('fixtures')){
            try {
                const r = await fetch(`https://api.the-odds-api.com/v4/sports/soccer_epl/odds/?apiKey=${ODDS_KEY}&regions=uk&markets=h2h`);
                const d = await r.json();
                reply = d.slice(0,3).map(g => `<div class="odds-card"><b>${g.home_team} vs ${g.away_team}</b><br>Prices: ${g.bookmakers[0].markets[0].outcomes.map(o => o.price).join(' | ')}</div>`).join('');
            } catch { reply = "Engine Error."; }
        } else {
            try {
                const r = await fetch('/api/chat', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({messages:[{role:'user',content:val}]}) });
                const d = await r.json(); reply = d.content;
            } catch { reply = "Vercel Offline."; }
        }
        await push(chatRef, { role: 'ai', text: reply });
    }

    document.getElementById('sendBtn').onclick = handleAction;
    document.getElementById('userInput').onkeydown = (e) => { if(e.key === 'Enter') handleAction(); };
</script>
</body>
</html>
