<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BET SMART</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #000000;
            --glass: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.15);
            --accent: #00f2fe;
            --text: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text);
            min-height: 100vh;
            padding-top: 80px; /* Space for sticky header */
        }

        /* Sticky Glassy Header */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            height: 70px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            z-index: 1000;
        }

        .logo { font-weight: 800; font-size: 1.2rem; letter-spacing: 1px; color: var(--accent); }
        
        .clear-btn {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            color: #ff4b2b;
            padding: 8px 14px;
            border-radius: 12px;
            font-size: 0.7rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }

        #fixtures-container {
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            padding: 20px;
            display: grid;
            gap: 20px;
        }

        /* iOS-style Glass Card */
        .fixture-card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 28px;
            padding: 20px;
            animation: fadeIn 0.5s ease;
        }

        .league-tag {
            font-size: 0.65rem;
            color: #888;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .teams {
            display: flex;
            justify-content: space-between;
            font-weight: 600;
            margin-bottom: 15px;
        }

        /* Odds & AI Section */
        .odds-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 15px;
        }

        .odd-box {
            background: rgba(255,255,255,0.05);
            padding: 8px;
            border-radius: 12px;
            text-align: center;
            font-size: 0.9rem;
        }

        .ai-prediction {
            background: linear-gradient(90deg, rgba(0,242,254,0.1), rgba(0,0,0,0));
            border-left: 3px solid var(--accent);
            padding: 10px;
            border-radius: 0 12px 12px 0;
            font-size: 0.85rem;
            color: #e0e0e0;
        }

        .ai-label { color: var(--accent); font-weight: 800; font-size: 0.7rem; display: block; margin-bottom: 4px; }

        /* iOS Loader */
        #loader { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); }
        .spinner { width: 30px; height: 30px; border: 3px solid rgba(255,255,255,0.1); border-top: 3px solid var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .hidden { display: none; }
    </style>
</head>
<body>

    <header>
        <div class="logo">BET SMART</div>
        <button class="clear-btn" onclick="clearStorage()">CLEAR STORAGE</button>
    </header>

    <div id="loader"><div class="spinner"></div></div>
    <div id="fixtures-container"></div>

    <script>
        const ODDS_API_KEY = 'ad7cc474657e32a32bf5d56e68e84fa8';
        const GROQ_API_KEY = 'EASYBET_API_KEY'; // Use via Vercel for security
        const CACHE_KEY = 'bet_smart_fixtures';
        const CACHE_TIME = 24 * 60 * 60 * 1000; // 24 Hours

        async function init() {
            const cached = JSON.parse(localStorage.getItem(CACHE_KEY));
            const now = Date.now();

            if (cached && (now - cached.timestamp < CACHE_TIME)) {
                renderFixtures(cached.data);
            } else {
                fetchAndSave();
            }
        }

        async function fetchAndSave() {
            try {
                // Top Leagues + UEFA
                const leagues = ['soccer_uefa_champs_league', 'soccer_epl', 'soccer_spain_la_liga', 'soccer_italy_serie_a'];
                let allData = [];

                for (const league of leagues) {
                    const res = await fetch(`https://api.the-odds-api.com/v4/sports/${league}/odds/?apiKey=${ODDS_API_KEY}&regions=eu&markets=h2h`);
                    const data = await res.json();
                    if (Array.isArray(data)) allData.push(...data);
                }

                // Filter for "Today Only" (UTC comparison)
                const today = new Date().toISOString().split('T')[0];
                const filtered = allData.filter(m => m.commence_time.startsWith(today));

                const cacheObj = { timestamp: Date.now(), data: filtered };
                localStorage.setItem(CACHE_KEY, JSON.stringify(cacheObj));
                renderFixtures(filtered);
            } catch (e) {
                console.error("Fetch failed", e);
            }
        }

        async function renderFixtures(matches) {
            const container = document.getElementById('fixtures-container');
            document.getElementById('loader').classList.add('hidden');
            container.innerHTML = '';

            for (const match of matches) {
                const bookie = match.bookmakers[0]?.markets[0]?.outcomes || [];
                const odds = {
                    h: bookie.find(o => o.name === match.home_team)?.price || '-',
                    a: bookie.find(o => o.name === match.away_team)?.price || '-',
                    d: bookie.find(o => o.name === 'Draw')?.price || '-'
                };

                const card = document.createElement('div');
                card.className = 'fixture-card';
                card.innerHTML = `
                    <div class="league-tag">${match.sport_title}</div>
                    <div class="teams">
                        <span>${match.home_team}</span>
                        <span style="color:var(--accent)">VS</span>
                        <span>${match.away_team}</span>
                    </div>
                    <div class="odds-row">
                        <div class="odd-box">${odds.h}</div>
                        <div class="odd-box">${odds.d}</div>
                        <div class="odd-box">${odds.a}</div>
                    </div>
                    <div class="ai-prediction" id="ai-${match.id}">
                        <span class="ai-label">SMART ANALYSIS</span>
                        Analyzing trends...
                    </div>
                `;
                container.appendChild(card);
                
                // Trigger AI Prediction per match
                getAIPrediction(match);
            }
        }

        // Placeholder for Groq Prediction (Needs a Vercel backend for CORS and Key protection)
        async function getAIPrediction(match) {
            const aiDiv = document.getElementById(`ai-${match.id}`);
            try {
                // In a real Vercel setup, you'd fetch your serverless function here
                // Example: const res = await fetch('/api/predict', { method: 'POST', body: JSON.stringify(match) });
                
                // Simulating Groq Insight for now
                setTimeout(() => {
                    aiDiv.innerHTML = `<span class="ai-label">SMART ANALYSIS</span> High probability of ${match.home_team} Win or Draw. Both teams scoring likely.`;
                }, 1500);
            } catch (e) {
                aiDiv.innerHTML = "Analysis unavailable.";
            }
        }

        function clearStorage() {
            localStorage.removeItem(CACHE_KEY);
            location.reload();
        }

        init();
    </script>
</body>
</html>
