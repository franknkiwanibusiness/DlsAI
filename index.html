<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DLSVALUE UCL | Live Fixtures</title>
    <style>
        :root {
            --bg: #030303; --card-bg: #0a0a0a; --border: rgba(255, 255, 255, 0.12);
            --green: #00ff88; --yellow: #ffcc00; --blue: #2196F3; --white: #ffffff;
            --color-a: #ff5e57; --color-b: #0fbcf9; --color-c: #05c46b; --color-d: #ef57ff;
        }

        body { margin: 0; background-color: var(--bg); color: var(--white); font-family: 'Inter', sans-serif; padding: 20px; }
        .ucl-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(360px, 1fr)); gap: 30px; max-width: 1500px; margin: 0 auto; }

        .group-box { position: relative; background: var(--card-bg); border-radius: 28px; overflow: hidden; border: 1px solid var(--border); margin-bottom: 20px; }
        .group-box::before { content: ""; position: absolute; top: 0; left: -150%; width: 100%; height: 100%; z-index: 2; animation: super-shine 3s infinite linear; pointer-events: none; }
        @keyframes super-shine { 0% { left: -150%; } 100% { left: 150%; } }
        
        .group-a::before { background: linear-gradient(90deg, transparent, rgba(255, 94, 87, 0.15), transparent); }
        .group-b::before { background: linear-gradient(90deg, transparent, rgba(15, 188, 249, 0.15), transparent); }
        .group-c::before { background: linear-gradient(90deg, transparent, rgba(5, 196, 107, 0.15), transparent); }
        .group-d::before { background: linear-gradient(90deg, transparent, rgba(239, 87, 255, 0.15), transparent); }

        .content { padding: 25px; position: relative; z-index: 3; }
        .group-title { font-size: 1.8rem; font-weight: 900; margin-bottom: 18px; text-shadow: 0 0 15px rgba(255,255,255,0.1); }

        table { width: 100%; border-collapse: collapse; font-size: 0.8rem; margin-bottom: 25px; }
        th { color: rgba(255,255,255,0.5); text-transform: uppercase; font-size: 0.65rem; padding-bottom: 10px; }
        td { padding: 12px 4px; border-bottom: 1px solid rgba(255,255,255,0.05); text-align: center; font-weight: 700; }
        .team-row { display: flex; align-items: center; gap: 8px; text-align: left; }
        .t-logo { width: 22px; height: 22px; border-radius: 50%; object-fit: cover; border: 1px solid var(--border); }

        .stat-pts { color: var(--green); background: rgba(0, 255, 136, 0.15); border-radius: 6px; padding: 4px; }

        .match { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 20px; border: 1px solid var(--border); margin-bottom: 10px; position: relative; }
        .match-grid { display: grid; grid-template-columns: 1fr 50px 1fr; align-items: center; text-align: center; font-size: 0.85rem; font-weight: 800; }
        .vs-box { background: #000; padding: 4px 0; border-radius: 8px; font-size: 0.65rem; color: var(--yellow); border: 1px solid #333; }
        
        .timer-tray { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; padding-top: 8px; border-top: 1px dashed rgba(255,255,255,0.1); }
        .countdown { font-family: 'Courier New', monospace; font-size: 0.7rem; color: var(--blue); font-weight: 900; letter-spacing: 1px; }
        .match-time { font-size: 0.65rem; color: rgba(255,255,255,0.4); font-weight: 600; }

        .extra-fixtures { display: none; flex-direction: column; }
        .extra-fixtures.active { display: flex; }
        .show-more-btn { width: 100%; background: rgba(255,255,255,0.08); border: 1px solid var(--border); color: #fff; padding: 12px; border-radius: 15px; margin-top: 10px; font-weight: 900; cursor: pointer; text-transform: uppercase; font-size: 0.7rem; }
    </style>
</head>
<body>

<div id="ucl-app" class="ucl-container"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDFHskUWiyHhZke3KT9kkOtFI_gPsKfiGo",
        authDomain: "itzhoyoo-f9f7e.firebaseapp.com",
        databaseURL: "https://itzhoyoo-f9f7e-default-rtdb.firebaseio.com",
        projectId: "itzhoyoo-f9f7e",
        appId: "1:1094792075584:web:d49e9c3f899d3cd31082a5"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const DEF_LOGO = "https://www.pngfind.com/pngs/m/428-4280284_legendsfc-dls-19-logo-legends-hd-png-download.png";

    setInterval(updateAllCountdowns, 1000);

    onValue(ref(db, 'DLSVALUE/TEAMS'), (teamSnap) => {
        const teamData = teamSnap.val() || {};
        const sortedTeams = Object.entries(teamData).map(([uid, data]) => ({
            uid, ...data
        })).sort((a, b) => b.points - a.points);

        const container = document.getElementById('ucl-app');
        container.innerHTML = '';

        ['A', 'B', 'C', 'D'].forEach((letter, index) => {
            const accent = `var(--color-${letter.toLowerCase()})`;
            const groupTeams = sortedTeams.slice(index * 4, (index * 4) + 4);
            
            // Standard UCL Group Round Robin Schedule (Indexes 0, 1, 2, 3)
            const pairings = [
                [0, 1], [2, 3], // Matchday 1
                [0, 2], [1, 3], // Matchday 2
                [0, 3], [1, 2]  // Matchday 3
            ];

            let html = `
            <div class="group-box group-${letter.toLowerCase()}">
                <div class="content">
                    <div class="group-title">GROUP <span style="color:${accent}">${letter}</span></div>
                    <table>
                        <thead><tr><th>#</th><th style="text-align:left">Team</th><th>P</th><th>GD</th><th>Pts</th></tr></thead>
                        <tbody>`;

            for (let i = 0; i < 4; i++) {
                const team = groupTeams[i] || { teamName: 'OPEN SLOT', logoUrl: DEF_LOGO, played: 0, gd: 0, points: 0 };
                const isWaiting = team.teamName === 'OPEN SLOT';
                html += `
                <tr style="${isWaiting ? 'opacity: 0.4' : ''}">
                    <td style="opacity:0.3">${i+1}</td>
                    <td><div class="team-row"><img src="${team.logoUrl}" class="t-logo" style="${isWaiting ? 'filter:grayscale(1)' : ''}">${team.teamName}</div></td>
                    <td>${team.played}</td><td>${team.gd}</td><td class="stat-pts">${team.points}</td>
                </tr>`;
            }

            html += `</tbody></table><div class="fixture-list">`;

            pairings.forEach((pair, j) => {
                if (j === 2) html += `<div class="extra-fixtures" id="extra-${letter}">`;
                
                const home = groupTeams[pair[0]]?.teamName || 'TBD';
                const away = groupTeams[pair[1]]?.teamName || 'TBD';

                const matchTime = new Date();
                // Spreading matches over 3 "Matchdays" (simulated by hours)
                matchTime.setHours(18 + Math.floor(j/2), (j % 2 === 0 ? 0 : 30), 0, 0);

                html += `
                <div class="match">
                    <div class="match-grid">
                        <span style="text-align:right">${home}</span>
                        <div class="vs-box">VS</div>
                        <span style="text-align:left">${away}</span>
                    </div>
                    <div class="timer-tray">
                        <span class="match-time">MD ${Math.floor(j/2) + 1} | ${matchTime.getHours()}:${matchTime.getMinutes() === 0 ? '00' : '30'}</span>
                        <span class="countdown" data-time="${matchTime.toISOString()}">...</span>
                    </div>
                </div>`;
                
                if (j === 5) html += `</div>`;
            });

            html += `</div>
                    <button class="show-more-btn" onclick="toggleFixtures('${letter}', this)">View Full Matchday</button>
                </div>
            </div>`;
            container.innerHTML += html;
        });
        updateAllCountdowns();
    });

    function updateAllCountdowns() {
        document.querySelectorAll('.countdown').forEach(el => {
            const target = new Date(el.getAttribute('data-time')).getTime();
            const now = Date.now();
            const diff = target - now;

            if (diff <= 0) {
                el.innerText = "LIVE / FINISHED";
                el.style.color = "var(--green)";
            } else {
                const h = Math.floor(diff / 3600000);
                const m = Math.floor((diff % 3600000) / 60000);
                const s = Math.floor((diff % 60000) / 1000);
                el.innerText = `${h}h ${m}m ${s}s`;
            }
        });
    }

    window.toggleFixtures = (letter, btn) => {
        const extra = document.getElementById(`extra-${letter}`);
        const isActive = extra.classList.toggle('active');
        btn.innerText = isActive ? "Hide Schedule" : "View Full Matchday";
    };
</script>
</body>
</html>
