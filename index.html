<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BMW Wealth AI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bmw-blue: #0066B2;
            --stage-1: #2ecc71; /* Green */
            --stage-2: #f1c40f; /* Yellow */
            --stage-3: #e74c3c; /* Red */
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
        }

        * { -webkit-tap-highlight-color: transparent; user-select: none; box-sizing: border-box; }
        body { background: #000; color: white; font-family: -apple-system, sans-serif; margin: 0; height: 100vh; display: flex; flex-direction: column; }

        header { padding: calc(var(--safe-top) + 10px) 20px 10px; background: #000; border-bottom: 1px solid #222; text-align: center; z-index: 10; }
        
        /* 📜 FIXED SCROLLING */
        #chat-view {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            -webkit-overflow-scrolling: touch; /* Smooth iOS scroll */
        }

        .bubble { max-width: 90%; padding: 12px 16px; border-radius: 15px; font-size: 14px; line-height: 1.4; }
        .user { background: var(--bmw-blue); align-self: flex-end; border-bottom-right-radius: 2px; }
        
        /* 🚥 STAGE STYLING */
        .stage-box { margin-top: 8px; border-radius: 10px; padding: 10px; border-left: 4px solid; background: rgba(255,255,255,0.05); }
        .s1 { border-color: var(--stage-1); color: var(--stage-1); }
        .s2 { border-color: var(--stage-2); color: var(--stage-2); }
        .s3 { border-color: var(--stage-3); color: var(--stage-3); opacity: 0.8; font-size: 12px; }
        .stage-label { font-weight: 900; font-size: 10px; text-transform: uppercase; display: block; margin-bottom: 4px; }

        .input-bar {
            padding: 10px 15px calc(var(--safe-bottom) + 10px);
            background: #000; display: flex; gap: 10px; border-top: 1px solid #222;
        }

        input { flex: 1; background: #111; border: 1px solid #333; color: white; padding: 12px 18px; border-radius: 25px; font-size: 16px; -webkit-user-select: text; }
        .send-btn { width: 45px; height: 45px; background: var(--bmw-blue); border-radius: 50%; border: none; color: white; }
    </style>
</head>
<body>

<header>
    <div style="font-weight:900; letter-spacing:1px;">M-POWERED AI</div>
    <div style="font-size:10px; color:var(--bmw-blue)" id="target-ui">R1,000,000 GOAL</div>
</header>

<div id="chat-view"></div>

<div class="input-bar">
    <input type="text" id="userInput" placeholder="Ask for odds or strategy..." autocomplete="off">
    <button class="send-btn" id="sendBtn"><i class="fa-solid fa-bolt"></i></button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-app.js";
    import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDFHskUWiyHhZke3KT9kkOtFI_gPsKfiGo",
        authDomain: "itzhoyoo-f9f7e.firebaseapp.com",
        databaseURL: "https://itzhoyoo-f9f7e-default-rtdb.firebaseio.com",
        projectId: "itzhoyoo-f9f7e",
        storageBucket: "itzhoyoo-f9f7e.filestorage.app",
        appId: "1:1094792075584:web:d49e9c3f899d3cd31082a5"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    let chatID = localStorage.getItem('activeChatID') || 'BMW-' + Math.random().toString(36).substr(2, 5).toUpperCase();
    localStorage.setItem('activeChatID', chatID);

    const chatRef = ref(db, 'chats/' + chatID);

    // 🚀 SCROLL & RENDER LOGIC
    onValue(chatRef, (s) => {
        const view = document.getElementById('chat-view');
        view.innerHTML = '';
        if(s.exists()){
            Object.values(s.val()).forEach(m => {
                const div = document.createElement('div');
                div.className = `bubble ${m.role}`;
                div.innerHTML = m.text;
                view.appendChild(div);
            });
            // Auto-scroll to bottom
            view.scrollTop = view.scrollHeight;
        }
    });

    async function handleAction() {
        const input = document.getElementById('userInput');
        const val = input.value.trim();
        if(!val) return;
        input.value = '';

        // Save User Message
        await push(chatRef, { role: 'user', text: val });

        try {
            const r = await fetch('/api/chat', { 
                method:'POST', 
                headers:{'Content-Type':'application/json'}, 
                body:JSON.stringify({messages:[{role:'user',content:val}]}) 
            });
            const d = await r.json();
            
            // 🚥 SPLIT RESPONSE INTO STAGES
            // Assuming the AI returns info separated by "---" or we split by content length
            const parts = d.content.split('\n\n'); 
            const stage1 = parts[0] || "Analyzing...";
            const stage2 = parts[1] || "Calculations in progress.";
            const stage3 = parts[2] || "Risk: High.";

            const formattedAI = `
                <div class="stage-box s1"><span class="stage-label">Stage 1: Action</span>${stage1}</div>
                <div class="stage-box s2"><span class="stage-label">Stage 2: Insight</span>${stage2}</div>
                <div class="stage-box s3"><span class="stage-label">Stage 3: Risk Factor</span>${stage3}</div>
            `;

            await push(chatRef, { role: 'ai', text: formattedAI });
        } catch {
            await push(chatRef, { role: 'ai', text: "Turbo lag. Server down." });
        }
    }

    document.getElementById('sendBtn').onclick = handleAction;
    document.getElementById('userInput').onkeydown = (e) => { if(e.key === 'Enter') handleAction(); };
</script>
</body>
</html>
