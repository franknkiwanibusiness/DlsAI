<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Mobile Private Chat</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
/* Desktop Block */
@media (min-width: 768px) {
  body::before {
    content: "Mobile Only App 📱";
    position: fixed;
    inset: 0;
    background: black;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 24px;
    z-index: 99999;
  }
}

/* Smooth scroll */
#messages {
  scroll-behavior: smooth;
}

/* iOS bubble */
.bubble {
  max-width: 75%;
  padding: 10px 14px;
  border-radius: 18px;
  font-size: 15px;
}
.me {
  background: #007aff;
  color: white;
  margin-left: auto;
  border-bottom-right-radius: 5px;
}
.other {
  background: #e5e5ea;
  color: black;
  border-bottom-left-radius: 5px;
}
</style>
</head>
<body class="bg-gray-100 h-screen flex flex-col">

<!-- AUTH SCREEN -->
<div id="authScreen" class="flex flex-col justify-center items-center h-full p-6">

  <h1 class="text-2xl font-bold mb-6">Private Chat</h1>

  <input id="email" type="email" placeholder="Email"
    class="w-full mb-3 p-3 rounded-xl border outline-none" />

  <input id="password" type="password" placeholder="Password"
    class="w-full mb-4 p-3 rounded-xl border outline-none" />

  <button id="signupBtn"
    class="w-full bg-blue-500 text-white p-3 rounded-xl mb-2">
    Sign Up
  </button>

  <button id="loginBtn"
    class="w-full bg-gray-800 text-white p-3 rounded-xl">
    Login
  </button>

</div>

<!-- CHAT SCREEN -->
<div id="chatScreen" class="hidden flex flex-col h-full">

  <div class="bg-white shadow p-4 flex justify-between items-center">
    <span class="font-semibold">Your Private Chat</span>
    <button id="logoutBtn" class="text-red-500 text-sm">Logout</button>
  </div>

  <div id="messages" class="flex-1 overflow-y-auto p-3 space-y-2"></div>

  <div class="bg-white p-3 flex gap-2">
    <input id="messageInput"
      class="flex-1 p-3 rounded-full border outline-none"
      placeholder="Type a message..." />
    <button id="sendBtn"
      class="bg-blue-500 text-white px-4 rounded-full">
      Send
    </button>
  </div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } 
from "https://www.gstatic.com/firebasejs/11.4.0/firebase-auth.js";
import { getDatabase, ref, push, onChildAdded } 
from "https://www.gstatic.com/firebasejs/11.4.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDFHskUWiyHhZke3KT9kkOtFI_gPsKfiGo",
  authDomain: "itzhoyoo-f9f7e.firebaseapp.com",
  databaseURL: "https://itzhoyoo-f9f7e-default-rtdb.firebaseio.com",
  projectId: "itzhoyoo-f9f7e",
  storageBucket: "itzhoyoo-f9f7e.filestorage.app",
  messagingSenderId: "1094792075584",
  appId: "1:1094792075584:web:d49e9c3f899d3cd31082a5"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

const authScreen = document.getElementById("authScreen");
const chatScreen = document.getElementById("chatScreen");
const messagesDiv = document.getElementById("messages");

let currentChatRef = null;

// SIGNUP
signupBtn.onclick = async () => {
  await createUserWithEmailAndPassword(auth, email.value, password.value);
};

// LOGIN
loginBtn.onclick = async () => {
  await signInWithEmailAndPassword(auth, email.value, password.value);
};

// LOGOUT
logoutBtn.onclick = async () => {
  await signOut(auth);
};

// AUTH STATE
onAuthStateChanged(auth, (user) => {
  if (user) {
    authScreen.classList.add("hidden");
    chatScreen.classList.remove("hidden");
    loadChat(user.uid);
  } else {
    chatScreen.classList.add("hidden");
    authScreen.classList.remove("hidden");
  }
});

// LOAD USER PRIVATE CHAT
function loadChat(uid) {

  messagesDiv.innerHTML = "";

  const chatId = uid; // Unique private chat per user
  currentChatRef = ref(db, "chats/" + chatId);

  onChildAdded(currentChatRef, snapshot => {
    const msg = snapshot.val();
    addMessage(msg.text, msg.uid === uid);
  });
}

// SEND MESSAGE
sendBtn.onclick = () => {
  if (!messageInput.value.trim()) return;

  push(currentChatRef, {
    text: messageInput.value,
    uid: auth.currentUser.uid,
    timestamp: Date.now()
  });

  messageInput.value = "";
};

// UI MESSAGE
function addMessage(text, isMe) {
  const div = document.createElement("div");
  div.className = "bubble " + (isMe ? "me" : "other");
  div.textContent = text;
  messagesDiv.appendChild(div);
  messagesDiv.scrollTop = messagesDiv.scrollHeight;
}

</script>
</body>
</html>
