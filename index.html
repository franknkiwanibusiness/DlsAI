<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DLS26 UCL | Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #010414; color: white; }
        .ucl-gradient { background: linear-gradient(180deg, rgba(34, 211, 238, 0.1) 0%, transparent 100%); }
        input:focus, textarea:focus { outline: none; border-color: #22d3ee !important; transition: 0.3s; }
        .btn-active:active { transform: scale(0.96); }
    </style>
</head>
<body class="p-4 pb-20">

    <header class="mb-8 pt-4 max-w-2xl mx-auto">
        <div class="flex justify-between items-end">
            <div>
                <h1 class="text-2xl font-black italic tracking-tighter text-cyan-400 uppercase leading-none">Admin Hub</h1>
                <p class="text-[9px] text-white/40 tracking-[0.4em] uppercase mt-1">UCL Season 01 Control</p>
            </div>
            <div class="text-right">
                <span id="db-status" class="text-[7px] font-bold text-emerald-500 bg-emerald-500/10 px-2 py-1 rounded uppercase">Connected</span>
            </div>
        </div>
    </header>

    <div class="grid grid-cols-1 gap-6 max-w-2xl mx-auto">
        
        <section class="bg-white/5 border border-white/10 rounded-3xl p-6 ucl-gradient">
            <h2 class="text-[10px] font-black text-cyan-400 uppercase tracking-widest mb-4">Global Broadcast</h2>
            <textarea id="broadcast-input" rows="2" placeholder="Enter marquee news here..." 
                class="w-full bg-black/40 border border-white/10 p-4 rounded-2xl text-xs uppercase tracking-widest mb-3 text-white/80"></textarea>
            <button id="btn-update-ticker" class="w-full bg-white text-black font-black py-3 rounded-xl text-[10px] uppercase tracking-widest btn-active transition-all">
                Update Ticker
            </button>
        </section>

        <section class="bg-white/5 border border-white/10 rounded-3xl p-6">
            <h2 class="text-[10px] font-black text-cyan-400 uppercase tracking-widest mb-4">Create Test Match</h2>
            <div class="space-y-3">
                <input id="fix-round" type="text" placeholder="ROUND (e.g. ROUND OF 16 / FINAL)" class="w-full bg-black/40 border border-white/10 p-4 rounded-xl text-xs uppercase tracking-widest">
                <div class="flex gap-2">
                    <input id="fix-home" type="text" placeholder="HOME TEAM" class="w-1/2 bg-black/40 border border-white/10 p-4 rounded-xl text-xs uppercase">
                    <input id="fix-away" type="text" placeholder="AWAY TEAM" class="w-1/2 bg-black/40 border border-white/10 p-4 rounded-xl text-xs uppercase">
                </div>
                <button id="btn-push-match" class="w-full bg-cyan-500 text-black font-black py-4 rounded-xl text-[10px] uppercase tracking-widest btn-active transition-all">
                    Push Match (10 Min Window)
                </button>
            </div>
        </section>

        <section id="score-control" class="bg-white/5 border border-white/10 rounded-3xl p-6 hidden">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-[10px] font-black text-pink-500 uppercase tracking-widest">Live Score Command</h2>
                <span class="text-[8px] text-white/20 uppercase font-bold" id="match-id-display">ID: ---</span>
            </div>
            <div class="flex items-center justify-between bg-black/60 p-6 rounded-2xl border border-white/5">
                <div class="text-center w-1/3">
                    <p id="ui-home-name" class="text-[9px] font-bold text-white/40 uppercase mb-2 truncate px-1">HOME</p>
                    <button id="btn-home-plus" class="w-12 h-12 bg-white/10 rounded-xl font-black text-xl hover:bg-white/20 transition-colors btn-active">+</button>
                </div>
                
                <div class="text-center w-1/3">
                    <div class="text-3xl font-black italic tracking-widest text-white">
                        <span id="ui-home-score">0</span>:<span id="ui-away-score">0</span>
                    </div>
                    <p class="text-[8px] text-cyan-400 font-bold mt-2 uppercase">Match Active</p>
                </div>

                <div class="text-center w-1/3">
                    <p id="ui-away-name" class="text-[9px] font-bold text-white/40 uppercase mb-2 truncate px-1">AWAY</p>
                    <button id="btn-away-plus" class="w-12 h-12 bg-white/10 rounded-xl font-black text-xl hover:bg-white/20 transition-colors btn-active">+</button>
                </div>
            </div>
        </section>

        <div class="flex flex-col items-center gap-4 mt-4">
            <button id="btn-clear-data" class="text-[8px] font-bold text-white/20 uppercase tracking-[0.3em] hover:text-red-500 transition-colors">
                Reset Tournament Database
            </button>
        </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-app.js";
        import { getDatabase, ref, set, push, update, onValue, remove } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-database.js";
        import { getAuth } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-auth.js";

        // Your Config
        const firebaseConfig = {
            apiKey: "AIzaSyDFHskUWiyHhZke3KT9kkOtFI_gPsKfiGo",
            authDomain: "itzhoyoo-f9f7e.firebaseapp.com",
            databaseURL: "https://itzhoyoo-f9f7e-default-rtdb.firebaseio.com",
            projectId: "itzhoyoo-f9f7e",
            storageBucket: "itzhoyoo-f9f7e.filestorage.app",
            messagingSenderId: "1094792075584",
            appId: "1:1094792075584:web:d49e9c3f899d3cd31082a5",
            measurementId: "G-LLT6F9WRKH"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);

        let activeMatchId = null;

        // --- BROADCAST ---
        document.getElementById('btn-update-ticker').addEventListener('click', () => {
            const msg = document.getElementById('broadcast-input').value;
            set(ref(db, 'tournaments/ucl_s1/config/broadcast'), msg)
                .then(() => alert("Ticker Updated!"));
        });

        // --- PUSH MATCH ---
        document.getElementById('btn-push-match').addEventListener('click', () => {
            const home = document.getElementById('fix-home').value || "Real Madrid";
            const away = document.getElementById('fix-away').value || "Man City";
            const round = document.getElementById('fix-round').value || "ROUND OF 16";
            
            // Starts in 60 seconds from now
            const startTime = Date.now() + 60000;

            const newMatchRef = push(ref(db, 'tournaments/ucl_s1/fixtures'));
            const matchId = newMatchRef.key;

            set(newMatchRef, {
                id: matchId,
                homeName: home,
                awayName: away,
                homeScore: 0,
                awayScore: 0,
                startTime: startTime,
                round: round
            }).then(() => {
                alert("Match Pushed! 60s Countdown started on Dashboard.");
                document.getElementById('fix-home').value = "";
                document.getElementById('fix-away').value = "";
            });
        });

        // --- SYNC SCORE PAD ---
        onValue(ref(db, 'tournaments/ucl_s1/fixtures'), (snapshot) => {
            const data = snapshot.val();
            if (data) {
                document.getElementById('score-control').classList.remove('hidden');
                const fixtures = Object.values(data);
                const latest = fixtures[fixtures.length - 1]; // Get the one we just made
                
                activeMatchId = latest.id;
                document.getElementById('match-id-display').innerText = `ID: ${activeMatchId.substring(0,8)}`;
                document.getElementById('ui-home-name').innerText = latest.homeName;
                document.getElementById('ui-away-name').innerText = latest.awayName;
                document.getElementById('ui-home-score').innerText = latest.homeScore;
                document.getElementById('ui-away-score').innerText = latest.awayScore;
            }
        });

        // Score Buttons
        window.changeScore = (team) => {
            if (!activeMatchId) return;
            const scoreRef = ref(db, `tournaments/ucl_s1/fixtures/${activeMatchId}`);
            const scoreKey = team === 'home' ? 'homeScore' : 'awayScore';
            const current = parseInt(document.getElementById(`ui-${team}-score`).innerText);
            
            update(scoreRef, { [scoreKey]: current + 1 });
        };

        document.getElementById('btn-home-plus').addEventListener('click', () => window.changeScore('home'));
        document.getElementById('btn-away-plus').addEventListener('click', () => window.changeScore('away'));

        // --- RESET DATA ---
        document.getElementById('btn-clear-data').addEventListener('click', () => {
            if (confirm("DELETE ALL TOURNAMENT DATA?")) {
                remove(ref(db, 'tournaments/ucl_s1/fixtures'));
                location.reload();
            }
        });
    </script>
</body>
</html>
