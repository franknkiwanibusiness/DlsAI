<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DLS26 | HQ TERMINAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; user-select: none; -webkit-tap-highlight-color: transparent; }
        
        .panel { position: fixed; bottom: -100%; left: 0; width: 100%; height: 92vh; background: #080808; border-top: 1px solid #222; z-index: 500; transition: 0.5s cubic-bezier(0.16, 1, 0.3, 1); border-radius: 2.5rem 2.5rem 0 0; display: flex; flex-direction: column; overflow: hidden; }
        .panel.active { bottom: 0; }
        
        .admin-card { background: #0a0a0a; border: 1px solid #161616; border-radius: 1.5rem; transition: 0.2s; }
        .admin-card:active { background: #111; scale: 0.98; }

        .input-hq { background: #030303; border: 1px solid #1a1a1a; padding: 1rem; border-radius: 1rem; width: 100%; color: #fff; font-weight: 700; outline: none; appearance: none; }
        .input-hq:focus { border-color: #fbbf24; }

        /* Custom Scrollbar */
        .scroller::-webkit-scrollbar { width: 4px; }
        .scroller::-webkit-scrollbar-thumb { background: #222; border-radius: 10px; }
    </style>
</head>
<body>

    <header class="p-8 flex justify-between items-center border-b border-zinc-900 sticky top-0 bg-black/90 backdrop-blur-xl z-[100]">
        <div>
            <h1 class="text-2xl font-black italic uppercase tracking-tighter">HQ <span class="text-zinc-800">CENTRAL</span></h1>
            <div class="flex items-center gap-2 mt-1">
                <div class="w-1.5 h-1.5 bg-[#00ff88] rounded-full animate-pulse"></div>
                <p id="system-status" class="text-[8px] font-black uppercase text-zinc-500 tracking-[0.2em]">System Encrypted</p>
            </div>
        </div>
        <button onclick="location.reload()" class="w-10 h-10 rounded-xl bg-zinc-900 flex items-center justify-center border border-zinc-800">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-zinc-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /></svg>
        </button>
    </header>

    <main class="p-6 space-y-4 pb-32">
        <div class="grid grid-cols-2 gap-3">
            <div class="admin-card p-5">
                <span class="text-[8px] font-black text-zinc-600 uppercase tracking-widest">Managers</span>
                <h2 id="count-mgr" class="text-3xl font-black mt-1 tracking-tighter">--</h2>
            </div>
            <div class="admin-card p-5 border-l-2 border-l-[#fbbf24]">
                <span class="text-[8px] font-black text-zinc-600 uppercase tracking-widest">Pending Match</span>
                <h2 id="count-fix" class="text-3xl font-black mt-1 tracking-tighter">--</h2>
            </div>
        </div>

        <div class="space-y-2 pt-4">
            <button onclick="openPanel('p-fixtures')" class="admin-card w-full p-6 flex items-center justify-between group">
                <div class="flex flex-col items-start">
                    <span class="font-black italic uppercase text-sm tracking-tight">Create Fixture</span>
                    <span class="text-[8px] font-bold text-zinc-700 uppercase mt-1">Push to Match Center</span>
                </div>
                <div class="w-8 h-8 rounded-lg bg-zinc-900 flex items-center justify-center text-zinc-600 group-active:text-[#fbbf24]">+</div>
            </button>

            <button onclick="openPanel('p-results')" class="admin-card w-full p-6 flex items-center justify-between group">
                <div class="flex flex-col items-start">
                    <span class="font-black italic uppercase text-sm tracking-tight">Submit Result</span>
                    <span class="text-[8px] font-bold text-zinc-700 uppercase mt-1">Auto-Calculate Points</span>
                </div>
                <div class="w-8 h-8 rounded-lg bg-zinc-900 flex items-center justify-center text-zinc-600 group-active:text-[#00ff88]">✓</div>
            </button>

            <button onclick="openPanel('p-table')" class="admin-card w-full p-6 flex items-center justify-between group">
                <div class="flex flex-col items-start">
                    <span class="font-black italic uppercase text-sm tracking-tight">Manual Table Edit</span>
                    <span class="text-[8px] font-bold text-zinc-700 uppercase mt-1">Override PTS / GD</span>
                </div>
                <div class="w-8 h-8 rounded-lg bg-zinc-900 flex items-center justify-center text-zinc-600 group-active:text-blue-500">✎</div>
            </button>
        </div>

        <div class="pt-8">
            <h3 class="text-[9px] font-black text-zinc-700 uppercase tracking-[0.3em] mb-4 flex items-center gap-2">
                Manager Directory <div class="h-[1px] flex-1 bg-zinc-900"></div>
            </h3>
            <div id="dir-list" class="space-y-2"></div>
        </div>
    </main>

    <div id="p-fixtures" class="panel">
        <div class="p-8 flex-1 scroller overflow-y-auto">
            <div class="flex justify-between items-center mb-10">
                <h2 class="text-2xl font-black italic uppercase">New <span class="text-[#fbbf24]">Fixture</span></h2>
                <button onclick="closePanels()" class="text-zinc-600 font-black text-[10px] uppercase">Exit</button>
            </div>
            <div class="space-y-4">
                <div class="space-y-1">
                    <label class="text-[8px] font-black uppercase text-zinc-500 ml-2">Home Team</label>
                    <select id="f-home" class="input-hq"></select>
                </div>
                <div class="space-y-1">
                    <label class="text-[8px] font-black uppercase text-zinc-500 ml-2">Away Team</label>
                    <select id="f-away" class="input-hq"></select>
                </div>
                <div class="space-y-1">
                    <label class="text-[8px] font-black uppercase text-zinc-500 ml-2">Kick-off Time</label>
                    <input type="datetime-local" id="f-time" class="input-hq">
                </div>
                <button onclick="saveFixture()" class="w-full bg-white text-black font-black py-5 rounded-2xl text-[11px] uppercase italic mt-6">Go Live</button>
            </div>
        </div>
    </div>

    <div id="p-results" class="panel">
        <div class="p-8 flex-1 scroller overflow-y-auto">
            <div class="flex justify-between items-center mb-10">
                <h2 class="text-2xl font-black italic uppercase">Sync <span class="text-[#00ff88]">Score</span></h2>
                <button onclick="closePanels()" class="text-zinc-600 font-black text-[10px] uppercase">Exit</button>
            </div>
            <div class="space-y-6">
                <select id="r-match" class="input-hq text-[10px]"></select>
                <div class="flex items-center gap-4">
                    <input type="number" id="r-h-score" placeholder="H" class="input-hq text-center text-3xl h-24 font-black">
                    <span class="text-zinc-800 font-black">-</span>
                    <input type="number" id="r-a-score" placeholder="A" class="input-hq text-center text-3xl h-24 font-black">
                </div>
                <button onclick="syncResult()" class="w-full bg-[#00ff88] text-black font-black py-5 rounded-2xl text-[11px] uppercase italic mt-6 shadow-xl shadow-[#00ff88]/10">Verify & Update Table</button>
            </div>
        </div>
    </div>

    <div id="p-table" class="panel">
        <div class="p-8 flex-1 scroller overflow-y-auto">
            <div class="flex justify-between items-center mb-10">
                <h2 class="text-2xl font-black italic uppercase text-blue-500">Edit Table</h2>
                <button onclick="closePanels()" class="text-zinc-600 font-black text-[10px] uppercase">Exit</button>
            </div>
            <div id="table-edit-list" class="space-y-3"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-app.js";
        import { getDatabase, ref, onValue, set, update, remove, push, get } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDFHskUWiyHhZke3KT9kkOtFI_gPsKfiGo",
            authDomain: "itzhoyoo-f9f7e.firebaseapp.com",
            databaseURL: "https://itzhoyoo-f9f7e-default-rtdb.firebaseio.com",
            projectId: "itzhoyoo-f9f7e",
            storageBucket: "itzhoyoo-f9f7e.filestorage.app",
            appId: "1:1094792075584:web:d49e9c3f899d3cd31082a5"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let globalPlayers = {};

        window.openPanel = (id) => document.getElementById(id).classList.add('active');
        window.closePanels = () => document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));

        const setStatus = (msg, color = "#555") => {
            const el = document.getElementById('system-status');
            el.innerText = msg;
            el.style.color = color;
            setTimeout(() => { el.innerText = "System Encrypted"; el.style.color = "#555"; }, 2000);
        };

        // LOAD DATA
        onValue(ref(db, 'users/players'), (snap) => {
            const players = snap.val() || {};
            globalPlayers = players;
            const dir = document.getElementById('dir-list');
            const tableEdit = document.getElementById('table-edit-list');
            const hSel = document.getElementById('f-home');
            const aSel = document.getElementById('f-away');
            
            let dirH = '', tableH = '', optH = '<option value="">SELECT MANAGER</option>';

            Object.values(players).forEach(p => {
                dirH += `
                <div class="admin-card p-4 flex justify-between items-center">
                    <div class="flex items-center gap-3">
                        <img src="${p.logo}" class="w-10 h-10 rounded-xl object-cover border border-zinc-900">
                        <div>
                            <p class="text-xs font-black uppercase tracking-tight">${p.team}</p>
                            <p class="text-[7px] font-bold text-zinc-600 uppercase tracking-widest">${p.wa}</p>
                        </div>
                    </div>
                    <button onclick="kick('${p.id}')" class="bg-red-950/20 text-red-600 text-[8px] font-black px-3 py-1.5 rounded-lg border border-red-900/30">Kick</button>
                </div>`;

                tableH += `
                <div class="p-5 border border-zinc-900 rounded-2xl space-y-3">
                    <p class="text-[9px] font-black uppercase text-zinc-500 tracking-widest">${p.team}</p>
                    <div class="grid grid-cols-3 gap-2">
                        <div class="space-y-1"><span class="text-[7px] font-black text-zinc-700 uppercase ml-1">Pts</span>
                        <input type="number" onchange="upStat('${p.id}','pts',this.value)" value="${p.pts}" class="input-hq text-center p-2 text-xs"></div>
                        <div class="space-y-1"><span class="text-[7px] font-black text-zinc-700 uppercase ml-1">Gd</span>
                        <input type="number" onchange="upStat('${p.id}','gd',this.value)" value="${p.gd}" class="input-hq text-center p-2 text-xs"></div>
                        <div class="space-y-1"><span class="text-[7px] font-black text-zinc-700 uppercase ml-1">Pld</span>
                        <input type="number" onchange="upStat('${p.id}','p',this.value)" value="${p.p}" class="input-hq text-center p-2 text-xs"></div>
                    </div>
                </div>`;

                optH += `<option value="${p.id}">${p.team.toUpperCase()}</option>`;
            });

            dir.innerHTML = dirH;
            tableEdit.innerHTML = tableH;
            hSel.innerHTML = optH; aSel.innerHTML = optH;
            document.getElementById('count-mgr').innerText = Object.keys(players).length;
        });

        onValue(ref(db, 'fixtures'), (snap) => {
            const fixes = snap.val() || {};
            const rSel = document.getElementById('r-match');
            let rH = '<option value="">SELECT MATCH</option>';
            let pendingCount = 0;

            Object.values(fixes).forEach(f => {
                if(!f.ended) {
                    pendingCount++;
                    rH += `<option value="${f.id}">${f.homeName} VS ${f.awayName}</option>`;
                }
            });
            rSel.innerHTML = rH;
            document.getElementById('count-fix').innerText = pendingCount;
        });

        // ACTIONS
        window.upStat = (id, f, v) => update(ref(db, `users/players/${id}`), { [f]: parseInt(v) });

        window.kick = (id) => {
            if(confirm("DELETE MANAGER?")) {
                remove(ref(db, `users/players/${id}`));
                remove(ref(db, `logins/${id}`));
                setStatus("MANAGER WIPED", "#ef4444");
            }
        };

        window.saveFixture = async () => {
            const hId = document.getElementById('f-home').value, aId = document.getElementById('f-away').value, time = document.getElementById('f-time').value;
            if(!hId || !aId || !time) return;
            const h = globalPlayers[hId], a = globalPlayers[aId];
            const newRef = push(ref(db, 'fixtures'));
            await set(newRef, {
                id: newRef.key, homeName: h.team.toUpperCase(), homeLogo: h.logo, homeScore: 0,
                awayName: a.team.toUpperCase(), awayLogo: a.logo, awayScore: 0, kickOffTime: time, ended: false
            });
            closePanels(); setStatus("FIXTURE LIVE", "#fbbf24");
        };

        window.syncResult = async () => {
            const mId = document.getElementById('r-match').value, hS = parseInt(document.getElementById('r-h-score').value || 0), aS = parseInt(document.getElementById('r-a-score').value || 0);
            if(!mId) return;

            const fSnap = await get(ref(db, `fixtures/${mId}`));
            const f = fSnap.val();
            const hId = Object.keys(globalPlayers).find(k => globalPlayers[k].team.toUpperCase() === f.homeName.toUpperCase());
            const aId = Object.keys(globalPlayers).find(k => globalPlayers[k].team.toUpperCase() === f.awayName.toUpperCase());

            if(hId && aId) {
                const h = globalPlayers[hId], a = globalPlayers[aId];
                const hPts = hS > aS ? 3 : (hS === aS ? 1 : 0), aPts = aS > hS ? 3 : (aS === hS ? 1 : 0);
                
                await update(ref(db, `users/players/${hId}`), { pts: (h.pts||0)+hPts, gd: (h.gd||0)+(hS-aS), p: (h.p||0)+1 });
                await update(ref(db, `users/players/${aId}`), { pts: (a.pts||0)+aPts, gd: (a.gd||0)+(aS-hS), p: (a.p||0)+1 });
                await update(ref(db, `fixtures/${mId}`), { homeScore: hS, awayScore: aS, ended: true });

                closePanels(); setStatus("TABLE UPDATED", "#00ff88");
                document.getElementById('r-h-score').value = ''; document.getElementById('r-a-score').value = '';
            }
        };
    </script>
</body>
</html>
