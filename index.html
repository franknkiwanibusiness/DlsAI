      display: flex; align-items: center; gap: 8px;
    }
    .push-optin-label {
      font-size: 0.75rem; font-weight: 700; color: var(--text);
    }
    .push-optin-note {
      font-size: 0.65rem; color: var(--text-muted); font-weight: 600;
      margin-bottom: 4px; padding: 0 2px;
      transition: color 0.3s;
    }
    .push-optin-note.push-active { color: #00e676; }

    /* Toggle slider */
    .push-toggle {
      position: relative; display: inline-block;
      width: 42px; height: 24px; flex-shrink: 0;
    }
    .push-toggle input { opacity: 0; width: 0; height: 0; position: absolute; }
    .push-slider {
      position: absolute; inset: 0;
      background: var(--bg3); border-radius: 24px;
      cursor: pointer;
      transition: background 0.3s cubic-bezier(0.34,1.56,0.64,1);
      border: 1px solid var(--border);
    }
    .push-slider::before {
      content: '';
      position: absolute; height: 18px; width: 18px;
      left: 2px; bottom: 2px;
      background: var(--text-faint); border-radius: 50%;
      transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1), background 0.3s;
    }
    .push-toggle input:checked + .push-slider {
      background: #00c853;
      border-color: #00c853;
    }
    [data-theme="light"] .push-toggle input:checked + .push-slider {
      background: #00a040;
      border-color: #00a040;
    }
    .push-toggle input:checked + .push-slider::before {
      transform: translateX(18px);
      background: #fff;
    }
    /* Blocked state */
    .push-toggle.push-blocked .push-slider { background: #2a0000; border-color: #400; }
    [data-theme="light"] .push-toggle.push-blocked .push-slider { background: #ffcccc; border-color: #cc0000; }
    .push-toggle.push-blocked .push-slider::before { background: #ff4444; }
    [data-theme="light"] .push-toggle.push-blocked .push-slider::before { background: #cc0000; }

    /* ══════════════════════════════════════
       PUSH NOTIFICATION BOTTOM SHEET
    ══════════════════════════════════════ */
    #pushSheet {
      position: fixed; bottom: 0; left: 0; right: 0;
      z-index: 88888;
      display: flex; flex-direction: column;
      background: var(--bg2);
      border-top: 1px solid var(--border);
      border-radius: 22px 22px 0 0;
      padding: 20px 24px 32px;
      
      transform: translateY(110%);
      transition: transform 0.42s cubic-bezier(0.16,1,0.3,1);
      max-width: 540px;
      margin: 0 auto;
    }
    #pushSheet.sheet-open { transform: translateY(0); }
    #pushSheet.sheet-close { transform: translateY(110%); }

    .push-sheet-handle {
      width: 36px; height: 4px; border-radius: 4px;
      background: var(--border2); margin: 0 auto 18px; flex-shrink: 0;
    }
    .push-sheet-icon {
      width: 52px; height: 52px; border-radius: 16px;
      background: rgba(0,240,255,0.12);
      border: 1px solid rgba(0,240,255,0.3);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 14px; font-size: 1.5rem;
    }
    [data-theme="light"] .push-sheet-icon {
      background: rgba(0,136,204,0.15);
      border: 1px solid rgba(0,136,204,0.35);
    }
    .push-sheet-title {
      font-family: var(--font); font-size: 1.05rem; font-weight: 900;
      color: var(--text); text-align: center; margin-bottom: 8px;
      letter-spacing: -0.02em;
    }
    .push-sheet-sub {
      font-family: var(--font); font-size: 0.78rem; font-weight: 600;
      color: var(--text-muted); text-align: center;
      line-height: 1.55; margin-bottom: 22px;
    }
    .push-sheet-sub strong { color: var(--cyan); }
    .push-sheet-perks {
      display: flex; flex-direction: column; gap: 8px;
      margin-bottom: 22px;
    }
    .push-sheet-perk {
      display: flex; align-items: center; gap: 10px;
      font-family: var(--font); font-size: 0.75rem; font-weight: 700;
      color: var(--text-dim);
    }
    .push-sheet-perk-icon {
      width: 28px; height: 28px; border-radius: 8px;
      background: var(--surface);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.85rem; flex-shrink: 0;
    }
    .push-sheet-btn-yes {
      width: 100%; padding: 15px;
      background: linear-gradient(135deg, var(--cyan), var(--accent-shadow, #0077ff));
      color: #000; border: none; border-radius: 14px;
      font-family: var(--font); font-size: 0.9rem; font-weight: 900;
      cursor: pointer; letter-spacing: 0.02em;
      margin-bottom: 10px;
      transition: opacity 0.2s, transform 0.15s cubic-bezier(0.34,1.56,0.64,1);
    }
    [data-theme="light"] .push-sheet-btn-yes {
      background: linear-gradient(135deg, #0088cc, #0066aa);
      color: #fff;
    }
    .push-sheet-btn-yes:hover  { opacity: 0.9; }
    .push-sheet-btn-yes:active { transform: scale(0.97); }
    .push-sheet-btn-no {
      width: 100%; padding: 11px;
      background: transparent; color: var(--text-muted);
      border: none; border-radius: 10px;
      font-family: var(--font); font-size: 0.75rem; font-weight: 700;
      cursor: pointer; transition: color 0.2s;
    }
    .push-sheet-btn-no:hover { color: var(--text-dim); }

    /* Scrim behind sheet */
    #pushSheetScrim {
      position: fixed; inset: 0; z-index: 88887;
      background: rgba(0,0,0,0.5);
      opacity: 0; pointer-events: none;
      transition: opacity 0.35s;
    }
    #pushSheetScrim.scrim-on { opacity: 1; pointer-events: auto; }

    /* ══════════════════════════════════════
       ENTRANCE ANIMATIONS
    ══════════════════════════════════════ */
    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeInScale {
      from { opacity: 0; transform: scale(0.94); }
      to   { opacity: 1; transform: scale(1); }
    }
    @keyframes fadeInLeft {
      from { opacity: 0; transform: translateX(-20px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    @keyframes staggerIn {
      from { opacity: 0; transform: translateY(16px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* Header entrance */
    header {
      animation: fadeInDown 0.55s cubic-bezier(0.16,1,0.3,1) both;
    }
    .announcement-bar {
      animation: fadeInDown 0.55s 0.12s cubic-bezier(0.16,1,0.3,1) both;
    }

    /* Hero product */
    .product-title h1 {
      animation: fadeInUp 0.6s 0.2s cubic-bezier(0.16,1,0.3,1) both;
    }
    .product-title p {
      animation: fadeInUp 0.6s 0.3s cubic-bezier(0.16,1,0.3,1) both;
    }
    #mainHeroViewer {
      animation: fadeInScale 0.7s 0.15s cubic-bezier(0.16,1,0.3,1) both;
    }
    .variants-row {
      animation: fadeInUp 0.55s 0.35s cubic-bezier(0.16,1,0.3,1) both;
    }
    .quick-cta {
      animation: fadeInUp 0.55s 0.42s cubic-bezier(0.16,1,0.3,1) both;
    }

    /* Bundle cards stagger */
    .bundle-card:nth-child(1) { animation: staggerIn 0.5s 0.1s cubic-bezier(0.16,1,0.3,1) both; }
    .bundle-card:nth-child(2) { animation: staggerIn 0.5s 0.18s cubic-bezier(0.16,1,0.3,1) both; }
    .bundle-card:nth-child(3) { animation: staggerIn 0.5s 0.26s cubic-bezier(0.16,1,0.3,1) both; }

    /* Add-to-cart button */
    .add-to-cart-btn {
      animation: fadeInUp 0.55s 0.5s cubic-bezier(0.16,1,0.3,1) both;
    }

    .add-to-cart-btn.clicked {
      animation: cartPulse 0.6s cubic-bezier(0.34,1.56,0.64,1);
    }

    @keyframes cartPulse {
      0% { transform: scale(1); }
      50% { transform: scale(0.95); }
      100% { transform: scale(1); }
    }

    /* Stat cards */
    .stat-card:nth-child(1) { animation: staggerIn 0.55s 0.05s cubic-bezier(0.16,1,0.3,1) both; }
    .stat-card:nth-child(2) { animation: staggerIn 0.55s 0.12s cubic-bezier(0.16,1,0.3,1) both; }
    .stat-card:nth-child(3) { animation: staggerIn 0.55s 0.19s cubic-bezier(0.16,1,0.3,1) both; }
    .stat-card:nth-child(4) { animation: staggerIn 0.55s 0.26s cubic-bezier(0.16,1,0.3,1) both; }

    /* Mode cards */
    .mode-card { animation: fadeInLeft 0.5s cubic-bezier(0.16,1,0.3,1) both; }
    .mode-card:nth-child(1) { animation-delay: 0.04s; }
    .mode-card:nth-child(2) { animation-delay: 0.1s; }
    .mode-card:nth-child(3) { animation-delay: 0.16s; }
    .mode-card:nth-child(4) { animation-delay: 0.22s; }

    /* Trust cards */
    .trust-card { transition: transform 0.2s cubic-bezier(0.34,1.56,0.64,1), border-color 0.2s; }
    .trust-card:nth-child(1) { animation: staggerIn 0.5s 0.06s cubic-bezier(0.16,1,0.3,1) both; }
    .trust-card:nth-child(2) { animation: staggerIn 0.5s 0.12s cubic-bezier(0.16,1,0.3,1) both; }
    .trust-card:nth-child(3) { animation: staggerIn 0.5s 0.18s cubic-bezier(0.16,1,0.3,1) both; }
    .trust-card:nth-child(4) { animation: staggerIn 0.5s 0.24s cubic-bezier(0.16,1,0.3,1) both; }
    .trust-card:nth-child(5) { animation: staggerIn 0.5s 0.30s cubic-bezier(0.16,1,0.3,1) both; }
    .trust-card:nth-child(6) { animation: staggerIn 0.5s 0.36s cubic-bezier(0.16,1,0.3,1) both; }

    /* How-it-works steps */
    .how-step:nth-child(1) { animation: fadeInUp 0.55s 0.08s cubic-bezier(0.16,1,0.3,1) both; }
    .how-step:nth-child(3) { animation: fadeInUp 0.55s 0.18s cubic-bezier(0.16,1,0.3,1) both; }
    .how-step:nth-child(5) { animation: fadeInUp 0.55s 0.28s cubic-bezier(0.16,1,0.3,1) both; }

    /* Cart drawer items */
    .cart-item {
      animation: fadeInUp 0.38s cubic-bezier(0.16,1,0.3,1) both;
    }

    /* Drawer/modal slide in already has slideUp — keep it */

    /* Footer */
    .footer-section {
      animation: fadeInUp 0.6s cubic-bezier(0.16,1,0.3,1) both;
    }

    /* AI chat overlay */
    .ai-drawer {
      animation: slideUp 0.4s cubic-bezier(0.16,1,0.3,1) both;
    }

    /* Email drawer */
    .email-drawer {
      animation: slideUp 0.4s cubic-bezier(0.16,1,0.3,1) both;
    }

    /* Share drawer */
    .share-drawer {
      animation: slideUp 0.4s cubic-bezier(0.16,1,0.3,1) both;
    }

    /* Affiliate drawer */
    .aff-drawer {
      animation: slideUp 0.4s cubic-bezier(0.16,1,0.3,1) both;
    }

    /* Smooth hover scale on interactive icons / buttons */
    .fan-icon svg { transition: 0.3s; }
    .fan-icon:hover svg { opacity: 0.8; }

    /* Tab buttons smooth transition */
    .tab-btn {
      transition: background 0.22s, color 0.22s, border-color 0.22s, transform 0.15s cubic-bezier(0.34,1.56,0.64,1);
    }
    .tab-btn:active { transform: scale(0.96); }

    /* Bundle card hover lift */
    .bundle-card:hover:not(.active-bundle) {
      transform: translateY(-2px);
      border-color: rgba(255,255,255,0.18);
    }

    /* Section headings — override blank opacity with proper animation */
    .section-heading {
      opacity: 0;
      animation: fadeInUp 0.55s 0.05s cubic-bezier(0.16,1,0.3,1) forwards;
    }
    .section-sub {
      opacity: 0;
      animation: fadeInUp 0.55s 0.14s cubic-bezier(0.16,1,0.3,1) forwards;
    }

    .brand-tagline { font-size: 0.54rem; } /* handled above */

    .slider-engine {
      width: calc(100% - 70px); height: 100%;
      position: relative; overflow: hidden;
    }

    .offer-item {
      position: absolute; width: 100%; height: 100%;
      display: flex; align-items: center; gap: 6px;
      font-size: 0.78rem; font-weight: 700; color: var(--text);
      white-space: nowrap; overflow: hidden;
      transform: translateY(100%); opacity: 0;
      transition: transform 0.45s cubic-bezier(0.25,1,0.5,1), opacity 0.3s ease;
    }
    .offer-item.active { transform: translateY(0); opacity: 1; }
    .offer-item.exit { transform: translateY(-100%); opacity: 0; }
    .offer-icon { width: 15px; height: 15px; display: flex; align-items: center; flex-shrink: 0; }
    .offer-icon svg { width: 100%; height: 100%; }
    .lime-highlight { color: var(--lime); }
    .green-highlight { color: #00dd55; }
    [data-theme="light"] .green-highlight { color: #00aa33; }
    .red-highlight { color: var(--red); }

    /* ── MAIN ── */
    main { 
      padding-top: 102px;
      width: 100%;
      box-sizing: border-box;
      overflow-x: hidden;
    }

    /* ── DESKTOP GRID (BASE) ── */
    .desktop-grid {
      width: 100%;
      box-sizing: border-box;
      overflow-x: hidden;
    }

    /* ── PRODUCT HERO ── */
    .product-wrapper {
      width: 100%; max-width: 100%;
      display: flex; flex-direction: column;
      padding: 0;
      box-sizing: border-box;
      overflow-x: hidden;
    }

    .product-title {
      text-align: center; margin-bottom: 14px;
    }

    .hero-below {
      padding: 16px 15px 0;
    }

    .product-title h1 {
      font-size: 1.55rem; font-weight: 700; color: var(--text);
      margin-bottom: 7px; letter-spacing: 0.5px;
    }
    .product-title p {
      font-size: 0.77rem; font-weight: 600; color: var(--text-muted);
      max-width: 95%; margin: 0 auto; line-height: 1.4;
    }

    #mainHeroViewer {
      position: relative; width: 100%; aspect-ratio: 1/1;
      border-radius: 0; overflow: hidden;
      background: var(--bg3); border: none;
    }

    .hero-slide {
      position: absolute; inset: 0; width: 100%; height: 100%;
      object-fit: cover; transition: opacity 1.2s ease; z-index: 1;
    }

    #variantStaticOverride {
      position: absolute; inset: 0; width: 100%; height: 100%;
      object-fit: cover; opacity: 0;
      transition: opacity 0.45s ease; z-index: 2; pointer-events: none;
    }

    .shimmer-loading::after {
      content: ""; position: absolute; inset: 0; z-index: 5;
      background: linear-gradient(90deg, var(--bg3) 25%, var(--input-border) 50%, var(--bg3) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite linear;
    }
    .shimmer-loaded::after { display: none !important; }

    /* Variants */
    .section-label {
      font-size: 0.72rem; font-weight: 700; color: var(--text-muted);
      text-transform: uppercase; display: block; margin-bottom: 8px;
    }

    .variants-row { display: flex; gap: 8px; width: 100%; }

    .variant-btn {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; gap: 4px; cursor: pointer;
    }
    .variant-btn .vb-img {
      width: 100%; aspect-ratio: 1/1; border-radius: 7px;
      border: 1.5px solid var(--border2);
      background-size: cover; background-position: center;
      transition: border-color 0.2s;
    }
    .variant-btn .vb-label {
      font-size: 0.63rem; font-weight: 600; color: var(--text-muted);
      transition: color 0.2s;
    }
    .variant-btn.selected .vb-img { border-color: var(--cyan); }
    .variant-btn.selected .vb-label { color: var(--text); }

    /* Quick CTA */
    .quick-cta { display: flex; gap: 4%; margin-top: 14px; margin-bottom: 14px; padding: 0 15px; }
    .quick-cta button {
      height: 48px; border: none; border-radius: 9px;
      cursor: pointer; font-family: var(--font); font-weight: 700; font-size: 0.95rem;
      transition: transform 0.1s, opacity 0.1s;
      padding: 0 14px;
    }
    .quick-cta button:active { transform: scale(0.97); }
    .btn-order { width: 60%; background: var(--bg3); color: var(--text); border: 1px solid var(--border) !important; }
    .btn-learn { width: 36%; background: var(--bg3); color: var(--cyan); border: 1px solid var(--input-border) !important; }
    [data-theme="light"] .btn-learn { color: #0088cc; }

    /* ── MARQUEE BADGES ── */
    .marquee-strip {
      width: 100%; overflow: hidden;
      border-top: 1px solid var(--border2); border-bottom: 1px solid var(--border2);
      padding: 18px 0;
    }
    .marquee-content {
      display: flex; align-items: center; gap: 38px;
      width: max-content;
      animation: scrollMarquee 20s linear infinite;
    }

    @keyframes scrollMarquee { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

    .badge-item {
      display: flex; align-items: center; gap: 10px; white-space: nowrap;
    }
    .badge-icon {
      width: 32px; height: 32px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .badge-text { font-size: 0.84rem; font-weight: 600; color: var(--text); }
    .badge-text span { color: var(--text-dim); }

    /* ── TABS ── */
    .info-tabs { padding: 20px; background: var(--bg); }
    .tab-nav {
      display: flex; gap: 7px; overflow-x: auto;
      padding-bottom: 14px; scrollbar-width: none;
    }
    .tab-nav::-webkit-scrollbar { display: none; }
    .tab-btn {
      flex: 1; min-width: 70px; padding: 10px 4px;
      border: 1px solid #222; background: var(--bg3); color: var(--text-muted);
      border-radius: 9px; font-size: 0.78rem; font-weight: 700;
      cursor: pointer; transition: all 0.25s;
      font-family: var(--font);
    }
    .tab-btn.active { background: var(--text); color: var(--bg); border-color: var(--text); }

    .tab-panel { display: none; animation: fadeUp 0.35s ease forwards; }
    .tab-panel.active { display: block; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    /* ── SCROLL REVEAL ── */
    .reveal {
      opacity: 0;
      transform: translateY(22px);
      transition: opacity 0.55s cubic-bezier(0.16,1,0.3,1), transform 0.55s cubic-bezier(0.16,1,0.3,1);
    }
    .reveal.visible {
      opacity: 1;
      transform: translateY(0);
    }
    .reveal-delay-1 { transition-delay: 0.08s; }
    .reveal-delay-2 { transition-delay: 0.16s; }
    .reveal-delay-3 { transition-delay: 0.24s; }

    /* ── CART ICON BOUNCE ── */
    @keyframes cartBounce {
      0%   { transform: scale(1) rotate(0deg); }
      25%  { transform: scale(1.3) rotate(-8deg); }
      50%  { transform: scale(0.9) rotate(5deg); }
      75%  { transform: scale(1.1) rotate(-3deg); }
      100% { transform: scale(1) rotate(0deg); }
    }
    .cart-wrapper.bouncing { animation: cartBounce 0.45s cubic-bezier(0.36,0.07,0.19,0.97); }

    /* ── VARIANT BUTTON ANIMATION ── */
    .variant-btn .vb-img {
      transition: border-color 0.2s, transform 0.18s cubic-bezier(0.34,1.56,0.64,1);
    }
    .variant-btn:active .vb-img { transform: scale(0.9); }
    .variant-btn.selected .vb-img { transform: scale(1.05); }

    /* ── BUNDLE CARD MICRO-ANIMATION ── */
    .bundle-card {
      transition: border-color 0.22s, background 0.22s, transform 0.18s cubic-bezier(0.34,1.56,0.64,1);
    }
    .bundle-card.active-bundle { transform: scale(1.01); }

    /* ── SECTION HEADING ANIMATION ── */
    .section-heading, .section-sub {
      opacity: 0;
      animation: fadeUp 0.5s ease forwards;
    }

    /* ── STAT CARD HOVER ── */
    .stat-card {
      transition: transform 0.2s cubic-bezier(0.34,1.56,0.64,1), border-color 0.2s;
    }
    .stat-card:hover { transform: translateY(-3px);  }

    /* ── TRUST CARD HOVER ── */
    .trust-card {
      transition: transform 0.2s cubic-bezier(0.34,1.56,0.64,1), border-color 0.2s;
    }
    .trust-card:hover { transform: translateY(-3px); border-color: rgba(255,255,255,0.2); }

    .feature-item {
      display: flex; gap: 14px;
      background: var(--bg2); padding: 14px; border-radius: 12px;
      margin-bottom: 9px; border: 1px solid var(--border2);
    }
    .feature-icon-wrap { color: var(--cyan); flex-shrink: 0; margin-top: 2px; }
    .feature-text h4 { color: var(--text); font-size: 0.88rem; margin-bottom: 3px; }
    .feature-text p { color: var(--text-dim); font-size: 0.74rem; line-height: 1.4; }

    .specs-table { background: var(--bg2); border-radius: 12px; border: 1px solid var(--border2); overflow: hidden; }
    .spec-row { display: flex; justify-content: space-between; padding: 12px 14px; border-bottom: 1px solid var(--border2); }
    .spec-row:last-child { border-bottom: none; }
    .spec-key { color: var(--text-muted); font-size: 0.78rem; font-weight: 600; }
    .spec-val { color: var(--text); font-size: 0.78rem; font-weight: 600; text-align: right; }

    /* ── STAT CARDS ── */
    .stat-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 14px; max-width: 500px; margin: 0 auto;
      padding: 20px;
    }
    .stat-card {
      background: var(--card-bg); border: 2px solid rgba(255,255,255,0.2);
      border-radius: 20px; padding: 20px;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      aspect-ratio: 1/1;
      backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
      overflow: hidden; position: relative;
    }
    .stat-card.wide { grid-column: span 1; aspect-ratio: unset; padding: 15px; justify-content: flex-start; }
    .stat-label { font-size: 0.68rem; font-weight: 700; letter-spacing: 1px; margin-bottom: 9px; color: inherit; }
    .stat-num { font-size: 2.7rem; font-weight: 700; color: var(--text); line-height: 1; }
    .stat-unit { font-size: 1.15rem; font-weight: 700; }

    /* ── FAN MODES ── */
    .mode-list { display: flex; flex-direction: column; gap: 10px; max-width: 500px; margin: 0 auto; padding: 20px; }
    .mode-card {
      background: var(--card-bg); border: 1px solid var(--border2);
      border-radius: 16px; padding: 14px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .mode-left { display: flex; align-items: center; gap: 14px; }
    .mode-info .mode-name { font-size: 1rem; font-weight: 700; color: var(--text); }
    .mode-info .mode-sub { font-size: 0.68rem; color: var(--text-muted); font-weight: 700; text-transform: uppercase; }

    /* ── COMPARE TABLE ── */
    .compare-wrap { padding: 20px; }
    .compare-table-inner {
      background: var(--card-bg); border: 1px solid var(--border2);
      border-radius: 20px; overflow: hidden;
      backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    }
    table { width: 100%; border-collapse: collapse; text-align: center; }
    thead tr { background: rgba(255,255,255,0.05); }
    th { padding: 14px 10px; font-size: 0.72rem; color: var(--text-muted); text-transform: uppercase; font-family: var(--font); font-weight: 700; }
    th.highlight { color: var(--cyan); font-size: 0.8rem; }
    td { padding: 13px 10px; font-size: 0.82rem; font-weight: 600; color: var(--text); border-bottom: 1px solid rgba(255,255,255,0.05); }
    tbody tr:last-child td { border-bottom: none; }
    td.td-key { color: var(--text-muted); font-size: 0.74rem; text-align: left; }

    /* ── REVIEWS ── */
    .reviews-section {
      padding: 30px 0;
      overflow: hidden;
      width: 100vw;
      position: relative;
      left: 50%;
      right: 50%;
      margin-left: -50vw;
      margin-right: -50vw;
      background: var(--bg);
      /* Hard clip — no soft edges, no fade masks, no glow */
      clip-path: none;
      border-top: 1px solid rgba(255,255,255,0.1);
    }
    .reviews-header { text-align: center; margin-bottom: 22px; padding: 0 20px; }
    .review-rating-num { font-size: 2.1rem; font-weight: 700; color: var(--text); }
    .review-stars { color: #ffbb00; font-size: 1.15rem; }
    [data-theme="light"] .review-stars { color: #cc8800; }
    .live-info { color: var(--cyan); font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; margin: 4px 0 2px; }
    [data-theme="light"] .live-info { color: #0088cc; }
    .review-count { color: var(--text-muted); font-size: 0.73rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }

    #reviewTrack {
      display: flex; gap: 14px;
      width: max-content; padding: 8px 20px;
      animation: marqueeScroll 40s linear infinite;
      pointer-events: none;
      user-select: none;
      -webkit-user-select: none;
    }

    @keyframes marqueeScroll { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

    .review-card {
      min-width: 268px;
      background: var(--card-bg);
      border: 1px solid var(--border2);
      border-radius: 20px;
      padding: 14px;
    }
    .review-card .rc-img {
      width: 100%; aspect-ratio: 1/1; border-radius: 12px;
      background-size: cover; background-position: center; margin-bottom: 11px;
    }
    .rc-buyer { color: var(--text); font-size: 0.78rem; font-weight: 700; margin-bottom: 4px; }
    .rc-text { color: var(--text-dim); font-size: 0.73rem; line-height: 1.4; }

    .reveal-btn {
      background: var(--surface); border: 1px solid var(--border2);
      color: var(--text-muted); padding: 11px 24px; border-radius: 12px;
      font-size: 0.78rem; font-weight: 700; cursor: pointer;
      font-family: var(--font);
      transition: all 0.25s;
    }
    .reveal-btn:hover { background: rgba(0,0,0,0.08); color: var(--text-dim); }
    [data-theme="light"] .reveal-btn:hover { background: rgba(0,0,0,0.12); }

    /* ── MODAL ── */
    .modal-overlay {
      display: none; position: fixed; inset: 0; z-index: 10000;
      justify-content: center; align-items: flex-end;
      padding: 0;
    }
    .modal-overlay.open { display: flex; }

    .modal-backdrop {
      position: absolute; inset: 0;
      background: rgba(0,0,0,0.82);
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    }

    .modal-box {
      position: relative; width: 100%; max-width: 400px;
      background: var(--bg2); border: 1px solid var(--border2);
      border-radius: 24px 24px 0 0; padding: 28px 24px 36px;
      text-align: center;
      animation: slideUp 0.38s cubic-bezier(0.16,1,0.3,1);
      margin: 0 auto;
    }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

    /* ── BUY SECTION ── */
    .buy-section { padding: 36px 20px; }
    @media (min-width: 900px) { .desktop-right .buy-section { padding: 0; } }
    .buy-inner { max-width: 500px; margin: 0 auto; }

    .buy-hero-img {
      position: relative; background: var(--surface);
      border: 1px solid var(--border); border-radius: 22px;
      overflow: hidden; margin-bottom: 22px;
    }
    .buy-hero-img img { width: 100%; display: block; border-radius: 18px; transition: opacity 0.3s; }
    .offer-badge {
      position: absolute; top: 14px; left: 14px;
      background: var(--red); color: #fff;
      padding: 4px 11px; border-radius: 8px;
      font-size: 0.72rem; font-weight: 800; letter-spacing: 1px;
    }
    [data-theme="light"] .offer-badge { color: #fff; }

    .buy-title { font-size: 1.75rem; margin: 0 0 7px 0; color: var(--text); }
    .stock-pill { display: flex; align-items: center; gap: 7px; margin-bottom: 20px; }
    .stock-dot { width: 8px; height: 8px; background: var(--red); border-radius: 50%; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
    .stock-text { color: var(--red); font-size: 0.83rem; font-weight: 700; }

    /* ══════════════════════════════════════
       BUNDLE CARDS — iOS GLASSY REDESIGN
    ══════════════════════════════════════ */
    .bundle-cards-wrap { display: flex; flex-direction: column; gap: 9px; margin-bottom: 4px; }

    /* Each card has its own accent via data-bundle-id */
    .bundle-card {
      background: rgba(255,255,255,0.04);
      backdrop-filter: blur(18px) saturate(1.6);
      -webkit-backdrop-filter: blur(18px) saturate(1.6);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 18px;
      padding: 12px 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: border-color 0.22s, background 0.22s, transform 0.16s, box-shadow 0.22s;
      position: relative;
      overflow: hidden;
      min-height: 0;
    }
    /* Subtle gradient sheen per card (identity) */
    .bundle-card[data-bid="0"]::before {
      content:''; position:absolute; inset:0; border-radius:18px; pointer-events:none;
      background: linear-gradient(120deg, rgba(0,212,255,0.06) 0%, transparent 60%);
    }
    .bundle-card[data-bid="1"]::before {
      content:''; position:absolute; inset:0; border-radius:18px; pointer-events:none;
      background: linear-gradient(120deg, rgba(255,140,26,0.07) 0%, transparent 60%);
    }
    .bundle-card[data-bid="2"]::before {
      content:''; position:absolute; inset:0; border-radius:18px; pointer-events:none;
      background: linear-gradient(120deg, rgba(127,255,0,0.07) 0%, transparent 60%);
    }

    .bundle-card:hover:not(.active-bundle) {
      background: rgba(255,255,255,0.07);
      border-color: rgba(255,255,255,0.18);
      transform: translateY(-1px);
      box-shadow: 0 8px 28px rgba(0,0,0,0.28);
    }
    [data-theme="light"] .bundle-card {
      background: rgba(255,255,255,0.7);
      border-color: rgba(0,0,0,0.08);
    }
    [data-theme="light"] .bundle-card:hover:not(.active-bundle) {
      background: rgba(255,255,255,0.88);
      border-color: rgba(0,0,0,0.14);
      box-shadow: 0 6px 20px rgba(0,0,0,0.1);
    }
    .bundle-card:active { transform: scale(0.985) !important; }

    /* ── Active state: each bundle accent color ── */
    .bundle-card[data-bid="0"].active-bundle {
      border-color: rgba(0,212,255,0.7) !important;
      background: rgba(0,212,255,0.07) !important;
      box-shadow: 0 0 0 1px rgba(0,212,255,0.2), 0 8px 28px rgba(0,212,255,0.12) !important;
    }
    .bundle-card[data-bid="1"].active-bundle {
      border-color: rgba(255,140,26,0.7) !important;
      background: rgba(255,140,26,0.07) !important;
      box-shadow: 0 0 0 1px rgba(255,140,26,0.2), 0 8px 28px rgba(255,140,26,0.12) !important;
    }
    .bundle-card[data-bid="2"].active-bundle {
      border-color: rgba(127,255,0,0.6) !important;
      background: rgba(127,255,0,0.06) !important;
      box-shadow: 0 0 0 1px rgba(127,255,0,0.15), 0 8px 28px rgba(127,255,0,0.1) !important;
    }
    [data-theme="light"] .bundle-card.active-bundle {
      background: rgba(255,255,255,0.92) !important;
    }
    .bundle-card.active-bundle .bundle-name-label-theme { color: var(--text); }

    /* ── Radio dot ── */
    .bundle-check {
      width: 17px; height: 17px; border-radius: 50%;
      border: 1.5px solid rgba(255,255,255,0.2);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: all 0.18s;
      background: transparent;
    }
    .bundle-check::after {
      content: '';
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--cyan);
      transform: scale(0);
      transition: transform 0.22s cubic-bezier(0.34,1.56,0.64,1);
    }
    .bundle-card[data-bid="0"] .bundle-check::after { background: #00d4ff; }
    .bundle-card[data-bid="1"] .bundle-check::after { background: #ff8c1a; }
    .bundle-card[data-bid="2"] .bundle-check::after { background: #7fff00; }
    [data-theme="light"] .bundle-check::after { background: #0088cc; }
    .bundle-card[data-bid="0"].active-bundle .bundle-check { border-color: #00d4ff; }
    .bundle-card[data-bid="1"].active-bundle .bundle-check { border-color: #ff8c1a; }
    .bundle-card[data-bid="2"].active-bundle .bundle-check { border-color: #7fff00; }
    [data-theme="light"] .bundle-card.active-bundle .bundle-check { border-color: #0088cc; }
    .bundle-card.active-bundle .bundle-check::after { transform: scale(1); }

    /* ── Images row: horizontal, slim, inside card ── */
    .bundle-images-row {
      display: flex;
      flex-direction: row;
      gap: 4px;
      margin-top: 5px;
      flex-wrap: nowrap;
      overflow: hidden;
    }
    .bundle-product-img {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.1);
      background-size: cover;
      background-position: center;
      background-color: var(--bg3);
      flex-shrink: 0;
      transition: transform 0.15s;
    }
    [data-theme="light"] .bundle-product-img { border-color: rgba(0,0,0,0.08); }

    /* ── Qty badge — accent per bundle ── */
    .bundle-qty-badge {
      display: inline-flex; align-items: center; justify-content: center;
      min-width: 22px; height: 20px; padding: 0 5px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 6px;
      font-size: 0.72rem; font-weight: 900;
      color: var(--text-muted);
      flex-shrink: 0;
      transition: background 0.2s, border-color 0.2s, color 0.2s;
    }
    .bundle-card[data-bid="0"].active-bundle .bundle-qty-badge { background: rgba(0,212,255,0.15); border-color: rgba(0,212,255,0.45); color: #00d4ff; }
    .bundle-card[data-bid="1"].active-bundle .bundle-qty-badge { background: rgba(255,140,26,0.15); border-color: rgba(255,140,26,0.45); color: #ff8c1a; }
    .bundle-card[data-bid="2"].active-bundle .bundle-qty-badge { background: rgba(127,255,0,0.12); border-color: rgba(127,255,0,0.4); color: #7fff00; }
    [data-theme="light"] .bundle-card.active-bundle .bundle-qty-badge { background: rgba(0,136,204,0.1); border-color: rgba(0,136,204,0.35); color: #0066aa; }

    /* ── Popular / Best badges ── */
    .bundle-popular-badge {
      display: inline-flex; align-items: center;
      background: rgba(255,140,26,0.18); color: #ff8c1a;
      border: 1px solid rgba(255,140,26,0.4);
      font-size: 0.48rem; font-weight: 900; letter-spacing: 0.8px;
      text-transform: uppercase; padding: 2px 5px; border-radius: 5px;
      flex-shrink: 0;
    }
    [data-theme="light"] .bundle-popular-badge { background: rgba(255,140,26,0.1); color: #c06000; border-color: rgba(255,140,26,0.3); }
    .bundle-best-badge {
      display: inline-flex; align-items: center;
      background: rgba(127,255,0,0.12); color: #7fff00;
      border: 1px solid rgba(127,255,0,0.35);
      font-size: 0.48rem; font-weight: 900; letter-spacing: 0.8px;
      text-transform: uppercase; padding: 2px 5px; border-radius: 5px;
      flex-shrink: 0;
    }
    [data-theme="light"] .bundle-best-badge { background: rgba(60,140,0,0.08); color: #3a8a00; border-color: rgba(60,140,0,0.25); }

    /* ── Layout ── */
    .bundle-left { display: flex; flex-direction: column; gap: 2px; min-width: 0; flex: 1; }
    .bundle-name {
      font-weight: 800; font-size: 0.83rem; color: var(--text);
      display: flex; align-items: center; flex-wrap: nowrap; gap: 5px;
      line-height: 1.2; white-space: nowrap;
    }
    .bundle-name-label { color: var(--text); }
    .bundle-name-label-theme { color: var(--text); }

    .bundle-ship { font-size: 0.62rem; font-weight: 700; color: var(--lime); display: flex; align-items: center; gap: 3px; }
    .bundle-ship.std { color: var(--text-muted); }
    .ship-price-chip {
      display: inline-flex; align-items: center;
      background: rgba(255,235,59,0.1); border: 1px solid rgba(255,235,59,0.25);
      color: var(--yellow); font-size: 0.6rem; font-weight: 800;
      padding: 1px 4px; border-radius: 4px;
    }
    [data-theme="light"] .ship-price-chip { background: rgba(180,130,0,0.08); border-color: rgba(180,130,0,0.2); color: #9a6f00; }

    .bundle-right {
      text-align: right; display: flex; flex-direction: column;
      align-items: flex-end; justify-content: center; gap: 4px; flex-shrink: 0;
    }
    .bundle-price-row { display: flex; align-items: baseline; gap: 4px; justify-content: flex-end; }
    .bundle-price { font-weight: 900; font-size: 1.1rem; color: var(--text); white-space: nowrap; }
    .bundle-orig-price {
      font-size: 0.68rem; font-weight: 700; color: var(--text-faint);
      text-decoration: line-through; white-space: nowrap;
    }
    .bundle-save {
      display: inline-flex; align-items: center;
      background: rgba(255,59,48,0.12); border: 1px solid rgba(255,59,48,0.28);
      color: #ff5040; font-size: 0.58rem; font-weight: 800;
      padding: 2px 6px; border-radius: 5px;
      letter-spacing: 0.2px; white-space: nowrap;
    }
    [data-theme="light"] .bundle-save { background: rgba(255,59,48,0.08); border-color: rgba(255,59,48,0.22); color: #d63a27; }

    /* ── Color pickers (shown when active) ── */
    .bundle-color-row {
      display: flex; gap: 5px; flex-wrap: wrap;
      margin-top: 0;
      max-height: 0; overflow: hidden;
      opacity: 0;
      transition: max-height 0.35s ease, opacity 0.25s ease;
    }
    .bundle-card.active-bundle .bundle-color-row { max-height: 200px; opacity: 1; }
    .bundle-color-slot { display: flex; flex-direction: column; align-items: center; gap: 3px; }
    .bundle-color-slot .slot-label { font-size: 0.52rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
    .bundle-color-swatches { display: flex; gap: 4px; }
    .bcs {
      width: 19px; height: 19px; border-radius: 50%;
      border: 2px solid transparent; cursor: pointer;
      background-size: cover; background-position: center;
      transition: border-color 0.18s, transform 0.12s; flex-shrink: 0;
    }
    .bcs:active { transform: scale(0.88); }
    .bcs.picked { border-color: var(--cyan); }
    [data-theme="light"] .bcs.picked { border-color: #0088cc; }

    /* ── BUNDLE IMAGE PREVIEW STRIP (top hero) ── */
    .bundle-preview-strip {
      display: flex; gap: 0;
      margin-bottom: 16px;
      transition: all 0.35s cubic-bezier(0.16,1,0.3,1);
      max-width: 100%; width: 100%;
      aspect-ratio: 1/1;
      border-radius: 16px;
      overflow: hidden;
      background: var(--bg3);
      border: 1px solid var(--border2);
    }
    .bundle-preview-img {
      flex: 1; width: 100%; height: 100%;
      border-radius: 0; border: none;
      background-size: cover; background-position: center;
      background-color: var(--bg3);
      transition: opacity 0.4s ease;
    }
    .bundle-preview-img.primary { border-color: transparent; }
    [data-theme="light"] .bundle-preview-img.primary { border-color: transparent; }

    /* ── BUY SECTION CARTOON TITLE ── */
    .buy-title {
      font-size: 1.5rem !important;
      font-weight: 900 !important;
      letter-spacing: -0.01em;
      color: var(--text);
      margin-bottom: 6px !important;
    }

    /* Arrival */
    .arrival-bar {
      background: #06060f;
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 12px;
      margin-bottom: 18px;
      padding: 12px 14px 10px;
      overflow: hidden;
      position: relative;
    }
    .arrival-truck-track {
      position: relative;
      height: 34px;
      margin-bottom: 10px;
      overflow: hidden;
    }
    .arrival-road-line {
      position: absolute;
      bottom: 3px; left: 0; right: 0;
      height: 1px;
      background: repeating-linear-gradient(90deg, #2a2a48 0px, #2a2a48 12px, transparent 12px, transparent 22px);
    }
    .arrival-boxes {
      position: absolute;
      right: 6px;
      bottom: 6px;
      display: flex;
      gap: 5px;
      align-items: flex-end;
    }
    .arrival-box {
      width: 10px; height: 10px;
      background: #1a1a30;
      border: 1px solid #2a2a48;
      border-radius: 2px;
    }
    .arrival-box:nth-child(2) { height: 13px; }
    .arrival-box:nth-child(3) { height: 9px; }
    /* Two trucks for seamless endless loop — no reversing */
    .arrival-truck {
      position: absolute;
      bottom: 4px;
      left: 0;
      will-change: transform;
    }
    .arrival-truck-a {
      animation: truckLoop 3.4s linear infinite;
    }
    .arrival-truck-b {
      animation: truckLoop 3.4s linear infinite;
      animation-delay: -1.7s;
    }
    @keyframes truckLoop {
      0%   { transform: translateX(-60px); }
      100% { transform: translateX(600px); }
    }
    .arrival-text-row {
      display: flex;
      align-items: baseline;
      gap: 6px;
    }
    .arrival-label {
      font-family: var(--font-body);
      font-size: 0.6rem;
      font-weight: 800;
      color: #4a4a70;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      flex-shrink: 0;
    }
    .arrival-date-val {
      font-family: var(--font-body);
      font-size: 0.82rem;
      font-weight: 800;
      color: #e0e0ff;
      letter-spacing: 0.01em;
      line-height: 1;
    }
    .arrival-date-val .arr-range { color: var(--cyan); font-weight: 900; }
    .arrival-date-val .arr-sep   { color: #3a3a5a; margin: 0 4px; font-weight: 400; font-size: 0.7rem; }
    .arrival-date-val .arr-time  { color: #7070a0; font-size: 0.72rem; font-weight: 700; }
    [data-theme="light"] .arrival-bar {
      background: #f0f0f8;
      border-color: rgba(0,0,0,0.08);
    }
    [data-theme="light"] .arrival-date-val { color: #111; }
    [data-theme="light"] .arrival-label { color: #999; }

    /* Order summary — clean */
    .order-summary {
      background: var(--bg3); border-radius: 14px;
      padding: 15px 16px; border: 1.5px solid var(--border2);
      box-shadow: 2px 2px 0 rgba(0,0,0,0.3);
    }
    [data-theme="light"] .order-summary { box-shadow: 2px 2px 0 rgba(0,0,0,0.08); }
    .summary-row {
      display: flex; justify-content: space-between;
      font-size: 0.8rem; margin-bottom: 6px;
    }
    .summary-row .label { color: var(--text-dim); font-weight: 600; }
    .summary-row .discount-val { color: var(--red); font-weight: 800; }
    .summary-row .shipping-val { color: var(--yellow); font-weight: 800; }
    .summary-total { color: var(--text);
      display: flex; justify-content: space-between;
      font-size: 1.2rem; font-weight: 900;
      border-top: 1.5px solid var(--border2); padding-top: 12px; margin-top: 10px;
    }

    .add-to-cart-btn {
      width: 100%; background: var(--text); color: var(--bg); border: none;
      padding: 18px; border-radius: 15px; font-weight: 900;
      font-size: 1.05rem; margin-top: 18px; cursor: pointer;
      letter-spacing: 0.04em; font-family: var(--font);
      transition: transform 0.15s cubic-bezier(0.34,1.56,0.64,1), opacity 0.15s, background 0.3s, color 0.3s;
      position: relative; overflow: hidden;
    }
    .add-to-cart-btn:active { transform: scale(0.96); }
    .add-to-cart-btn.cart-adding {
      animation: cartBtnPop 0.42s cubic-bezier(0.34,1.56,0.64,1);
    }
    @keyframes cartBtnPop {
      0%   { transform: scale(1); }
      30%  { transform: scale(0.94); }
      65%  { transform: scale(1.04); }
      100% { transform: scale(1); }
    }
    /* Ripple effect */
    .btn-ripple {
      position: absolute; border-radius: 50%;
      background: rgba(255,255,255,0.25);
      transform: scale(0); animation: rippleOut 0.55s linear;
      pointer-events: none;
    }
    @keyframes rippleOut {
      to { transform: scale(4); opacity: 0; }
    }

    /* ══════════════════════════════════════
       CART DRAWER — CARTONIC REDESIGN
    ══════════════════════════════════════ */
    .drawer-overlay {
      display: none; position: fixed; inset: 0; z-index: 5000;
    }
    .drawer-overlay.open { display: block; }

    .drawer-backdrop {
      position: absolute; inset: 0;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    }

    .cart-drawer {
      position: absolute; bottom: 0; left: 0; right: 0;
      max-width: 500px; margin: 0 auto;
      background: var(--bg2);
      border: 1.5px solid var(--border2);
      border-bottom: none;
      border-radius: 28px 28px 0 0;
      padding: 0 0 calc(env(safe-area-inset-bottom) + 28px);
      animation: slideUp 0.38s cubic-bezier(0.16,1,0.3,1);
      max-height: 90vh; overflow-y: auto;
      -ms-overflow-style: none; scrollbar-width: none;
      overscroll-behavior: contain;
      box-shadow: 0 -12px 48px rgba(0,0,0,0.45);
    }
    [data-theme="light"] .cart-drawer { background: #ffffff; border-color: #e5e5e5; box-shadow: 0 -12px 48px rgba(0,0,0,0.12); }
    .cart-drawer::-webkit-scrollbar { display: none; }

    /* Drag handle */
    .drawer-handle {
      width: 44px; height: 4px;
      background: var(--border2);
      border-radius: 4px;
      margin: 14px auto 0;
      flex-shrink: 0;
    }
    [data-theme="light"] .drawer-handle { background: #ddd; }

    /* Header row */
    .drawer-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 20px 16px;
      border-bottom: 1.5px solid var(--border2);
    }
    [data-theme="light"] .drawer-header { border-bottom-color: #ebebeb; }

    .drawer-header-left { display: flex; align-items: center; gap: 10px; }

    /* Mini logo tile in header */
    .drawer-logo-tile {
      width: 32px; height: 32px;
      background: var(--bg3);
      border: 1.5px solid var(--border2);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    [data-theme="light"] .drawer-logo-tile { background: #f2f2f2; border-color: #ddd; }
    .drawer-logo-tile svg { width: 18px; height: 18px; animation: spin 5s linear infinite; }

    .drawer-title {
      font-size: 1rem; font-weight: 800; color: var(--text);
      letter-spacing: 0.1px;
    }

    .drawer-close-btn {
      width: 34px; height: 34px;
      background: var(--bg3);
      border: 1.5px solid var(--border2);
      border-radius: 10px;
      color: var(--text-muted); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.85rem; font-weight: 700; font-family: var(--font);
      transition: background 0.15s, color 0.15s, transform 0.12s;
    }
    .drawer-close-btn:hover { background: var(--border2); color: var(--text); }
    .drawer-close-btn:active { transform: scale(0.92); }
    [data-theme="light"] .drawer-close-btn { background: #f2f2f2; border-color: #ddd; }
    [data-theme="light"] .drawer-close-btn:hover { background: #e5e5e5; }

    .drawer-body { padding: 16px 20px; }

    /* ── EMPTY STATE ── */
    .empty-cart {
      display: flex; flex-direction: column; align-items: center;
      padding: 36px 20px 28px; text-align: center;
    }
    .empty-cart-face {
      width: 88px; height: 88px;
      background: var(--bg3);
      border: 2px solid var(--border2);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 18px;
      animation: sadBob 3s ease-in-out infinite;
    }
    [data-theme="light"] .empty-cart-face { background: #f5f5f5; border-color: #e0e0e0; }
    @keyframes sadBob {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }
    /* Tear drop drip */
    .empty-cart-face::after {
      content: '';
      position: absolute;
      width: 5px; height: 9px;
      background: var(--cyan);
      border-radius: 0 0 6px 6px;
      transform: translateX(14px) translateY(22px);
      opacity: 0;
      animation: tearDrop 3s ease-in-out infinite;
    }
    @keyframes tearDrop {
      0%, 55%  { opacity: 0; transform: translateX(14px) translateY(16px); }
      70%      { opacity: 0.7; }
      100%     { opacity: 0; transform: translateX(14px) translateY(34px); }
    }
    .empty-cart-title {
      font-size: 1rem; font-weight: 800; color: var(--text);
      margin-bottom: 6px;
    }
    .empty-cart-sub {
      font-size: 0.75rem; font-weight: 600; color: var(--text-muted);
      margin-bottom: 22px; line-height: 1.5; max-width: 200px;
    }
    .empty-cart-shop-btn {
      display: inline-flex; align-items: center; gap: 8px;
      background: var(--text); color: var(--bg);
      border: none; border-radius: 14px;
      padding: 13px 24px;
      font-family: var(--font); font-size: 0.88rem; font-weight: 800;
      cursor: pointer; letter-spacing: 0.3px;
      transition: transform 0.15s cubic-bezier(0.34,1.56,0.64,1), opacity 0.15s;
    }
    .empty-cart-shop-btn:hover { opacity: 0.88; }
    .empty-cart-shop-btn:active { transform: scale(0.96); }

    /* ── CART ITEMS ── */
    .cart-item {
      display: flex; gap: 12px; align-items: center;
      padding: 12px 0;
      border-bottom: 1.5px solid var(--border2);
    }
    .cart-item:last-child { border-bottom: none; }
    [data-theme="light"] .cart-item { border-bottom-color: #ebebeb; }

    .cart-item-img {
      width: 66px; height: 66px; border-radius: 14px;
      background-size: cover; background-position: center;
      flex-shrink: 0;
      border: 1.5px solid var(--border2);
    }
    [data-theme="light"] .cart-item-img { border-color: #e5e5e5; }

    .cart-item-info { flex: 1; min-width: 0; }

    .cart-item-name {
      font-size: 0.87rem; font-weight: 700; color: var(--text);
      margin-bottom: 3px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .cart-item-variant {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 0.68rem; font-weight: 700; color: var(--text-muted);
      background: var(--bg3);
      border: 1px solid var(--border2);
      border-radius: 6px; padding: 2px 7px;
      margin-top: 4px;
    }
    [data-theme="light"] .cart-item-variant { background: #f2f2f2; border-color: #ddd; }

    .cart-item-bottom {
      display: flex; align-items: center; justify-content: space-between;
      margin-top: 8px;
    }
    .cart-item-price {
      font-size: 0.95rem; font-weight: 900; color: var(--text);
    }

    /* Qty stepper */
    .cart-item-qty {
      display: flex; align-items: center; gap: 0;
      background: var(--bg3);
      border: 1.5px solid var(--border2);
      border-radius: 10px; overflow: hidden;
    }
    [data-theme="light"] .cart-item-qty { background: #f5f5f5; border-color: #ddd; }
    .qty-btn {
      width: 30px; height: 28px;
      background: none; border: none;
      color: var(--text-muted); cursor: pointer;
      font-size: 1rem; font-weight: 700; font-family: var(--font);
      display: flex; align-items: center; justify-content: center;
      transition: background 0.12s, color 0.12s;
    }
    .qty-btn:hover { background: var(--border2); color: var(--text); }
    .qty-btn:active { transform: scale(0.88); }
    .qty-num {
      font-size: 0.8rem; font-weight: 800; color: var(--text);
      min-width: 22px; text-align: center;
      border-left: 1.5px solid var(--border2);
      border-right: 1.5px solid var(--border2);
      height: 28px; display: flex; align-items: center; justify-content: center;
    }
    [data-theme="light"] .qty-num { border-color: #ddd; }

    .cart-remove-btn {
      width: 30px; height: 30px;
      background: none; border: none;
      border-radius: 8px;
      color: var(--text-faint); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, color 0.15s;
    }
    .cart-remove-btn:hover { color: var(--red); background: rgba(255,59,48,0.1); }

    /* ── DISCOUNT CODE ROW ── */
    .cart-discount-row {
      margin-top: 14px;
    }
    .cart-discount-label {
      font-size: 0.65rem; font-weight: 800; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 8px;
    }
    .cart-discount-input-row {
      display: flex; gap: 8px;
    }
    .cart-discount-input {
      flex: 1;
      background: var(--bg3);
      border: 1.5px solid var(--border2);
      border-radius: 12px;
      padding: 10px 14px;
      color: var(--text); font-family: var(--font); font-size: 0.82rem; font-weight: 600;
    }
    [data-theme="light"] .cart-discount-input { background: #f5f5f5; border-color: #ddd; }
    .cart-discount-apply {
      background: var(--text); color: var(--bg);
      border: none; border-radius: 12px;
      padding: 10px 16px;
      font-family: var(--font); font-weight: 800; font-size: 0.78rem;
      cursor: pointer; flex-shrink: 0;
      transition: transform 0.1s, opacity 0.12s;
    }
    .cart-discount-apply:hover { opacity: 0.88; }
    .cart-discount-apply:active { transform: scale(0.95); }

    /* ── ORDER SUMMARY ── */
    .drawer-summary {
      background: var(--bg3);
      border: 1.5px solid var(--border2);
      border-radius: 18px;
      padding: 16px 18px;
      margin-top: 14px;
    }
    [data-theme="light"] .drawer-summary { background: #f7f7f7; border-color: #e5e5e5; }

    .summary-row {
      display: flex; justify-content: space-between; align-items: center;
      font-size: 0.82rem; font-weight: 600;
      color: var(--text-muted);
      padding: 5px 0;
    }
    .summary-row + .summary-row { border-top: 1px solid var(--border2); }
    [data-theme="light"] .summary-row + .summary-row { border-top-color: #ebebeb; }
    .summary-row .label { color: var(--text-dim); }
    .summary-row .discount-val { color: var(--red); font-weight: 700; }
    .summary-row .shipping-val { color: var(--lime); font-weight: 700; }
    [data-theme="light"] .summary-row .shipping-val { color: #3a8a00; }

    .summary-total {
      display: flex; justify-content: space-between; align-items: center;
      font-size: 1.15rem; font-weight: 900; color: var(--text);
      border-top: 2px solid var(--border2);
      padding-top: 12px; margin-top: 8px;
    }
    [data-theme="light"] .summary-total { border-top-color: #ddd; }

    /* ── CHECKOUT BUTTON ── */
    .checkout-btn {
      width: 100%;
      background: var(--text); color: var(--bg);
      border: none; border-radius: 16px;
      padding: 17px 20px;
      font-family: var(--font); font-weight: 900;
      font-size: 0.95rem; cursor: pointer;
      margin-top: 14px; letter-spacing: 0.4px;
      transition: transform 0.15s cubic-bezier(0.34,1.56,0.64,1), opacity 0.15s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .checkout-btn:hover { opacity: 0.9; }
    .checkout-btn:active { transform: scale(0.97); }

    /* ── UPSELL BLOCK ── */
    .cart-upsell-block {
      margin: 14px 0 0;
      padding: 13px 15px;
      background: rgba(163,255,18,0.06);
      border: 1.5px solid rgba(163,255,18,0.2);
      border-radius: 16px;
    }
    [data-theme="light"] .cart-upsell-block { background: rgba(60,140,0,0.05); border-color: rgba(60,140,0,0.16); }
    .cart-upsell-inner { display: flex; align-items: flex-start; gap: 10px; }
    .cart-upsell-icon { flex-shrink: 0; margin-top: 1px; color: var(--lime); }
    [data-theme="light"] .cart-upsell-icon { color: #3a8a00; }
    .cart-upsell-text { flex: 1; }
    .cart-upsell-title { font-size: 0.8rem; font-weight: 800; color: var(--text); margin-bottom: 2px; }
    .cart-upsell-sub { font-size: 0.7rem; color: var(--text-muted); font-weight: 600; margin-bottom: 10px; line-height: 1.4; }
    .cart-upsell-btn {
      width: 100%; background: var(--lime); color: #000;
      border: none; border-radius: 11px; padding: 10px 16px;
      font-family: var(--font); font-weight: 800; font-size: 0.76rem;
      cursor: pointer; letter-spacing: 0.3px;
      transition: transform 0.12s;
    }
    [data-theme="light"] .cart-upsell-btn { background: #000; color: #fff; }
    .cart-upsell-btn:active { transform: scale(0.97); }

    /* ── CURRENCY BADGE ── */
    #currencyBadge {
      display: inline-flex; align-items: center; gap: 4px;
      background: var(--surface); border: 1px solid var(--border2);
      border-radius: 6px; padding: 2px 7px;
      font-size: 0.65rem; font-weight: 700; color: var(--text-muted);
      margin-left: 6px;
    }

    /* ── NO SCROLL ── */
    .no-scroll { overflow: hidden !important; position: fixed !important; width: 100% !important; }

    @keyframes spinFan { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

    @media (max-width: 360px) {
      .offer-item { font-size: 0.7rem; }
      .stat-num { font-size: 2.2rem; }
    }

    /* ── TABLET ── */
    @media (min-width: 600px) and (max-width: 1023px) {
      .cart-drawer { left: 50%; transform: translateX(-50%); right: unset; width: 500px; }
      .desktop-grid { grid-template-columns: 1fr; padding: 24px; }
      .desktop-right { position: static; max-height: none; overflow: visible; }
      .trust-grid { grid-template-columns: repeat(3, 1fr); }
      .faq-grid { grid-template-columns: 1fr 1fr; gap: 12px 28px; }
      .how-grid { grid-template-columns: repeat(3, 1fr); }
    }

    /* ── DESKTOP ── */
    @media (min-width: 1024px) {
      /* Header full-width centered content */
      header {
        padding: 0 clamp(40px, 6vw, 100px);
      }
      .announcement-bar {
        padding: 0 clamp(40px, 6vw, 100px);
      }

      main { padding-top: 102px; }

      /* ═══ TWO-COLUMN PRODUCT GRID ═══ */
      .desktop-grid {
        display: grid;
        grid-template-columns: 1fr 480px;
        gap: 64px;
        align-items: start;
        max-width: 1380px;
        margin: 0 auto;
        padding: 48px clamp(40px, 6vw, 100px) 80px;
        box-sizing: border-box;
      }

      .desktop-left { min-width: 0; }

      /* Sticky buy panel */
      .desktop-right {
        position: sticky;
        top: 110px;
        max-height: calc(100vh - 130px);
        overflow-y: auto;
        overflow-x: hidden;
        scrollbar-width: none;
        -ms-overflow-style: none;
        padding-bottom: 24px;
        border-radius: 20px;
      }
      .desktop-right::-webkit-scrollbar { display: none; }

      /* Clean up inner wrappers */
      .product-wrapper { max-width: 100%; padding: 0; }
      .buy-inner { max-width: 100%; }
      .buy-section { padding: 0; }

      /* Hero viewer sharper */
      #mainHeroViewer { border-radius: 0; border: none; }
      .hero-below { padding: 0; }

      /* Tabs slightly bigger */
      .tab-btn { font-size: 0.86rem; padding: 11px 10px; }

      /* ═══ SECTION CONTAINERS ═══ */
      /* All left-column sections get consistent horizontal padding */
      .info-tabs,
      .stat-grid-wrap,
      .mode-list-wrap,
      .compare-wrap {
        max-width: 1380px;
        margin-left: auto;
        margin-right: auto;
        padding-left: clamp(40px, 6vw, 100px);
        padding-right: clamp(40px, 6vw, 100px);
        box-sizing: border-box;
      }

      /* Stat cards — 4 per row */
      .stat-grid {
        grid-template-columns: repeat(4, 1fr);
        gap: 18px;
        padding: 0;
      }
      .stat-card { aspect-ratio: unset; min-height: 170px; padding: 24px; }
      .stat-card.wide { grid-column: span 1; }
      .stat-num { font-size: 2.4rem; }

      /* Fan modes — 3 per row */
      .mode-list {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 18px;
        padding: 0;
        max-width: 1380px;
        margin: 0 auto;
      }
      .mode-card {
        flex-direction: column;
        align-items: flex-start;
        gap: 20px;
        padding: 24px;
      }
      .mode-left { flex-direction: row; }

      /* ═══ FULL-BLEED BELOW-GRID SECTIONS ═══ */
      /* Reviews stays 100vw — already handled */

      /* How it works */
      .how-section { padding: 80px clamp(40px, 6vw, 100px); }
      .how-inner { max-width: 1380px; margin: 0 auto; }
      .how-grid { grid-template-columns: repeat(5, 1fr); gap: 0; }
      .how-connector { display: flex; }

      /* Trust bar — 5 per row */
      .trust-section { padding: 64px clamp(40px, 6vw, 100px); }
      .trust-inner { max-width: 1380px; margin: 0 auto; padding: 0; }
      .trust-grid { grid-template-columns: repeat(3, 1fr); gap: 18px; }

      /* FAQ — 2 columns */
      .faq-section { padding: 80px clamp(40px, 6vw, 100px); }
      .faq-inner { max-width: 1380px; margin: 0 auto; padding: 0; }
      .faq-grid { grid-template-columns: 1fr 1fr; gap: 12px 48px; }

      /* Reviews section */
      .reviews-section { padding: 80px 0; }
      .reviews-header { padding: 0 clamp(40px, 6vw, 100px); }

      /* Marquee strip */
      .marquee-strip { overflow: hidden; }

      /* Cart drawer centred */
      .cart-drawer {
        left: 50%;
        transform: translateX(-50%);
        right: unset;
        width: 560px;
        border-radius: 24px 24px 0 0;
      }

      /* Sticky ORDER NOW — outside the grid on the left */
      #stickyOrder {
        left: max(24px, calc(50% - 730px));
        bottom: 40px;
      }
    }

    /* ── LARGE DESKTOP 1600px+ ── */
    @media (min-width: 1600px) {
      .desktop-grid {
        max-width: 1560px;
        grid-template-columns: 1fr 520px;
        gap: 80px;
      }
      .info-tabs, .stat-grid-wrap, .mode-list-wrap, .compare-wrap {
        max-width: 1560px;
      }
      .how-section { padding: 100px clamp(60px, 7vw, 120px); }
      .how-inner   { max-width: 1560px; }
      .trust-section { padding: 80px clamp(60px, 7vw, 120px); }
      .trust-inner   { max-width: 1560px; }
      .trust-grid    { grid-template-columns: repeat(6, 1fr); gap: 16px; }
      .faq-section   { padding: 100px clamp(60px, 7vw, 120px); }
      .faq-inner     { max-width: 1560px; }
      .reviews-header { padding: 0 clamp(60px, 7vw, 120px); }
      #stickyOrder   { left: max(24px, calc(50% - 820px)); }
    }

    /* ══════════════════════════════════════
       HOW IT WORKS SECTION
    ══════════════════════════════════════ */
    .how-section {
      background: var(--bg);
      padding: 60px 20px;
      border-top: 1px solid rgba(255,255,255,0.1);
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .how-inner { max-width: 860px; margin: 0 auto; }

    .how-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
      align-items: center;
    }

    @media (min-width: 600px) {
      .how-grid { grid-template-columns: repeat(3, 1fr); gap: 0; }
      .how-connector { display: flex; }
    }

    .how-step {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 16px;
      padding: 0 16px;
    }

    .how-num {
      width: 56px; height: 56px;
      border-radius: 50%;
      border: 2px solid var(--border2);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem; font-weight: 700; color: var(--text);
      background: var(--bg2);
      position: relative;
      flex-shrink: 0;
    }
    .how-num::after {
      content: '';
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.06);
    }

    .how-icon-wrap {
      width: 72px; height: 72px;
      border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
    }

    .how-step h4 { font-size: 0.92rem; font-weight: 700; color: var(--text); margin: 0; }
    .how-step p  { font-size: 0.75rem; color: var(--text-muted); font-weight: 600; margin: 0; line-height: 1.5; }

    .how-connector {
      display: none;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .how-connector svg { opacity: 0.2; }

    /* ══════════════════════════════════════
       FOOTER SECTION
    ══════════════════════════════════════ */
    .footer-section {
      background: var(--footer-bg);
      border-top: 1px solid #111;
      padding: 40px 20px;
    }
    .footer-inner {
      max-width: 860px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      text-align: center;
    }
    .footer-brand {
      display: flex; align-items: center; gap: 8px;
    }
    .footer-brand .brand-name { font-size: 1.1rem; }
    .footer-links {
      display: flex; flex-wrap: wrap;
      gap: 8px 20px; justify-content: center;
    }
    .footer-links a {
      font-size: 0.73rem; font-weight: 600; color: var(--footer-text);
      text-decoration: none; transition: color 0.2s;
    }
    .footer-links a:hover { color: var(--footer-title); }
    .footer-copy {
      font-size: 0.68rem; color: var(--footer-copy); font-weight: 600;
    }

    @media (min-width: 1024px) {
      .footer-section { padding: 56px clamp(40px, 6vw, 100px); }
      .footer-inner {
        max-width: 1380px;
        flex-direction: row;
        justify-content: space-between;
        text-align: left;
      }
      .footer-links { justify-content: flex-start; }
    }

    /* ══════════════════════════════════════
       FAQ SECTION
    ══════════════════════════════════════ */
    .faq-section {
      background: var(--bg);
      padding: 60px 20px;
      border-top: 1px solid rgba(255,255,255,0.1);
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .faq-inner { max-width: 860px; margin: 0 auto; }

    .section-heading {
      font-size: 1.5rem; font-weight: 700; color: var(--text);
      text-align: center; margin-bottom: 6px; letter-spacing: -0.3px;
    }
    .section-sub {
      font-size: 0.8rem; color: var(--text-muted); font-weight: 600;
      text-align: center; margin-bottom: 36px;
      text-transform: uppercase; letter-spacing: 1.5px;
    }

    .faq-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }

    .faq-item {
      background: var(--card-bg);
      border: 2.5px solid #000;
      border-radius: 10px;
      overflow: hidden;
      transition: border-color 0.2s;
      box-shadow: 2px 2px 0 rgba(0,0,0,0.2);
    }
    .faq-item.open { border-color: var(--text-faint); }

    .faq-q {
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 20px; cursor: pointer; gap: 16px;
      -webkit-user-select: none; user-select: none;
    }
    .faq-q-text {
      font-size: 0.9rem; font-weight: 700; color: var(--text); line-height: 1.35;
      flex: 1;
    }
    .faq-icon {
      width: 28px; height: 28px; border-radius: 50%;
      background: var(--bg3); border: 1px solid var(--input-border);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: transform 0.3s ease, background 0.2s;
    }
    .faq-item.open .faq-icon {
      transform: rotate(45deg);
      background: var(--text);
    }
    .faq-item.open .faq-icon svg { stroke: var(--bg); }
    .faq-icon svg { transition: stroke 0.2s; stroke: var(--text-dim); }

    .faq-a {
      max-height: 0; overflow: hidden;
      transition: max-height 0.4s cubic-bezier(0.16,1,0.3,1),
                  padding 0.3s ease;
      padding: 0 20px;
    }
    .faq-item.open .faq-a {
      max-height: 300px;
      padding: 0 20px 18px;
    }
    .faq-a p {
      font-size: 0.82rem; color: var(--text-dim); line-height: 1.65; font-weight: 600;
      border-top: 1px solid var(--border2); padding-top: 14px;
    }
    .faq-a span.highlight-ans { color: var(--cyan); font-weight: 700; }

    /* ══════════════════════════════════════
       TRUST / GUARANTEE SECTION
    ══════════════════════════════════════ */
    .trust-section {
      background: var(--bg);
      border-top: 1px solid rgba(255,255,255,0.1);
      border-bottom: 1px solid rgba(255,255,255,0.1);
      padding: 48px 20px;
    }
    .trust-inner { max-width: 860px; margin: 0 auto; }

    .trust-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }

    @media (min-width: 600px) {
      .trust-grid { grid-template-columns: repeat(3, 1fr); }
    }

    .trust-card {
      display: flex; flex-direction: column;
      align-items: center; text-align: center;
      gap: 12px; padding: 24px 16px;
      background: var(--card-bg); border: 2.5px solid #000;
      border-radius: 12px;
      box-shadow: 3px 3px 0 rgba(0,0,0,0.3);
    }
    .trust-icon-wrap {
      width: 48px; height: 48px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
    }
    .trust-card h4 { font-size: 0.85rem; font-weight: 700; color: var(--text); margin: 0; }
    .trust-card p  { font-size: 0.73rem; color: var(--text-dim); font-weight: 600; margin: 0; line-height: 1.4; }


    /* ══════════════════════════════════════
       AI CHAT PANEL
    ══════════════════════════════════════ */
    .ai-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 8000;
    }
    .ai-overlay.open { display: flex; align-items: flex-end; justify-content: center; }

    .ai-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.80);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    .ai-drawer {
      position: relative;
      width: 100%;
      max-width: 560px;
      height: 88dvh;
      background: var(--bg2);
      border: 1px solid var(--border2);
      border-radius: 24px 24px 0 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      animation: slideUp 0.38s cubic-bezier(0.16,1,0.3,1);
    }

    .ai-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 20px 14px;
      border-bottom: 1px solid var(--border2);
      flex-shrink: 0;
    }

    .ai-avatar {
      width: 34px; height: 34px;
      border-radius: 50%;
      background: linear-gradient(135deg, #00f0ff22, #a3ff1222);
      border: 1px solid rgba(0,240,255,0.25);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    .ai-tabs {
      display: flex;
      gap: 6px;
      padding: 12px 20px 0;
      flex-shrink: 0;
    }
    .ai-tab {
      flex: 1;
      padding: 8px 4px;
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      border-radius: 8px;
      color: var(--text-muted);
      font-family: var(--font);
      font-size: 0.75rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
    }
    .ai-tab.active { background: var(--cyan); color: #000; border-color: var(--cyan); }
    [data-theme="light"] .ai-tab.active { background: #0088cc; color: #fff; border-color: #0088cc; }

    .ai-tab-panel { display: none; flex: 1; overflow: hidden; flex-direction: column; }
    .ai-tab-panel.active { display: flex; }

    /* Chat messages */
    .ai-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scrollbar-width: none;
      -ms-overflow-style: none;
      overscroll-behavior: contain;
    }
    .ai-messages::-webkit-scrollbar { display: none; }

    .ai-msg {
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }
    .ai-msg.user { flex-direction: row-reverse; }

    .ai-bubble {
      max-width: 78%;
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 0.82rem;
      font-weight: 600;
      line-height: 1.5;
    }
    .ai-msg.bot  .ai-bubble { background: var(--bg3); color: var(--text-dim); border-radius: 4px 16px 16px 16px; border: 1px solid var(--border2); }
    .ai-msg.user .ai-bubble { background: var(--text); color: var(--bg); border-radius: 16px 4px 16px 16px; }

    .ai-link { color: var(--cyan); text-decoration: underline; word-break: break-all; }
    .ai-order-chip { display: inline-flex; align-items: center; gap: 5px; background: rgba(0,240,255,0.08); border: 1.5px solid rgba(0,240,255,0.25); border-radius: 8px; padding: 2px 6px 2px 8px; margin: 1px 2px; vertical-align: middle; }
    .ai-order-id-text { font-size: 0.72rem; font-weight: 700; color: var(--cyan); font-family: monospace; }
    .ai-track-chip-btn { background: var(--cyan); color: #000; border: none; border-radius: 6px; padding: 3px 8px; font-size: 0.68rem; font-weight: 800; cursor: pointer; font-family: var(--font); transition: opacity 0.15s; white-space: nowrap; }
    .ai-track-chip-btn:hover { opacity: 0.85; }

    .ai-typing .ai-bubble { background: var(--bg3); border: 1px solid var(--border2); }
    .ai-typing .dot {
      display: inline-block;
      width: 6px; height: 6px;
      background: var(--text-faint);
      border-radius: 50%;
      animation: dotBounce 1.2s infinite;
      margin: 0 2px;
    }
    .ai-typing .dot:nth-child(2) { animation-delay: 0.2s; }
    .ai-typing .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes dotBounce {
      0%,80%,100% { transform: translateY(0); }
      40%          { transform: translateY(-5px); }
    }

    .ai-input-row {
      display: flex;
      gap: 8px;
      padding: 12px 20px 20px;
      flex-shrink: 0;
      border-top: 1px solid var(--border2);
    }
    .ai-input {
      flex: 1;
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      border-radius: 12px;
      padding: 11px 14px;
      color: var(--text);
      font-family: var(--font);
      font-size: 0.85rem;
      font-weight: 600;
      resize: none;
      max-height: 100px;
      overscroll-behavior: contain;
    }
    .ai-input:focus { border-color: var(--cyan); }
    [data-theme="light"] .ai-input:focus { border-color: #0088cc; }
    .ai-input::placeholder { color: var(--text-faint); }

    .ai-send-btn {
      width: 44px; height: 44px;
      background: var(--cyan);
      border: none;
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      align-self: flex-end;
      transition: transform 0.1s;
      color: #000;
    }
    [data-theme="light"] .ai-send-btn { background: #0088cc; color: #fff; }
    .ai-send-btn:active { transform: scale(0.93); }

    /* Order tracker panel */
    .order-track-panel {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      scrollbar-width: none;
    }
    .order-track-panel::-webkit-scrollbar { display: none; }

    .order-id-input {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      border-radius: 12px;
      padding: 13px 16px;
      color: var(--text);
      font-family: var(--font);
      font-size: 0.88rem;
      font-weight: 600;
      margin-bottom: 10px;
      box-sizing: border-box;
    }
    .order-id-input:focus { border-color: var(--cyan); }
    [data-theme="light"] .order-id-input:focus { border-color: #0088cc; }
    .order-id-input::placeholder { color: var(--text-faint); }

    .order-track-btn {
      width: 100%;
      background: var(--cyan);
      color: #000;
      border: none;
      border-radius: 12px;
      padding: 13px;
      font-family: var(--font);
      font-weight: 700;
      font-size: 0.9rem;
      cursor: pointer;
      transition: transform 0.1s;
    }
    [data-theme="light"] .order-track-btn { background: #0088cc; color: #fff; }
    .order-track-btn:active { transform: scale(0.97); }

    .order-result {
      margin-top: 18px;
      padding: 18px;
      background: var(--card-bg);
      border: 1px solid var(--border2);
      border-radius: 16px;
    }
    .order-result-row {
      display: flex;
      justify-content: space-between;
      font-size: 0.8rem;
      font-weight: 600;
      padding: 8px 0;
      border-bottom: 1px solid var(--border2);
    }
    .order-result-row:last-child { border-bottom: none; }
    .or-key { color: var(--text-muted); }
    .or-val { color: var(--text); text-align: right; max-width: 60%; word-break: break-word; }

    /* Quick prompts chips */
    .ai-chips {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      padding: 0 20px 10px;
      flex-shrink: 0;
    }
    .ai-chip {
      background: var(--bg3);
      border: 1px solid var(--border2);
      border-radius: 20px;
      padding: 6px 12px;
      font-size: 0.7rem;
      font-weight: 700;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .ai-chip:hover, .ai-chip:active { background: var(--bg2); color: var(--text-dim); border-color: var(--border); }

    @media (min-width: 1024px) {
      .ai-drawer {
        height: 80dvh;
        max-width: 480px;
        border-radius: 24px 24px 0 0;
      }
    }

    /* ══════════════════════════════════════
       BELOW-GRID ROW LAYOUT (side by side on desktop)
    ══════════════════════════════════════ */
    .below-row {
      display: flex;
      flex-direction: column;
      width: 100%;
    }

    .below-col-left,
    .below-col-right {
      width: 100%;
    }

    /* Hide desktop order CTA on mobile — buy section above handles it */
    .desktop-order-cta { display: none; }

      font-weight: 700;
      padding: 4px 10px;
      border-radius: 20px;
      margin-bottom: 14px;

    }

      .below-col-right .how-icon-wrap { flex-shrink: 0; }
