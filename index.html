    *, *::before, *::after {

    /* ── HEADER ── */
    header {
      position: fixed; top: 0; left: 0; width: 100%; height: 64px;
      background: var(--bg2);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 16px; z-index: 1000;
      border-bottom: 1.5px solid var(--border2);
      box-sizing: border-box;
      overflow: hidden;
    }
    [data-theme="light"] header { background: rgba(255,255,255,0.95); border-bottom-color: #e5e5e5; }

    .header-left { display: flex; align-items: center; gap: 10px; }

    /* Fan logo pill */
    .fan-icon {
      width: 38px; height: 38px;
      background: var(--bg3);
      border: 1.5px solid var(--border2);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      overflow: hidden;
    }
    [data-theme="light"] .fan-icon { background: #f0f0f0; border-color: #ddd; }
    .fan-icon svg { width: 22px; height: 22px; animation: spin 5s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Brand text */
    .brand-block { display: flex; flex-direction: column; gap: 0px; line-height: 1; }
    .brand-name { font-weight: 900; font-size: 1.2rem; color: var(--text); letter-spacing: 0.3px; display: inline; }

    .brand-tagline { font-size: 0.54rem; font-weight: 700; color: var(--text-muted); letter-spacing: 1.8px; text-transform: uppercase; margin-top: 3px; }

    /* Header right icon buttons */
    .header-icon-btn {
      width: 40px; height: 40px;
      background: var(--bg3);
      border: 1.5px solid var(--border2);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; flex-shrink: 0;
      transition: background 0.15s, border-color 0.15s, transform 0.15s;
    }
    .header-icon-btn:hover { background: var(--border2); transform: scale(1.05); }

    [data-theme="light"] .header-icon-btn { background: #f0f0f0; border-color: #ddd; }
    [data-theme="light"] .header-icon-btn:hover { background: #e5e5e5; }

    /* ── Settings Dropdown ── */
    #settingsBtn { position: relative; }

      border: 1px solid #222;
      border-radius: 18px;
      padding: 6px;

      transform: translateY(-8px) scale(0.96);
      transform-origin: top right;
      transition: opacity 0.16s ease, transform 0.16s ease;
    }
    .settings-dropdown.open {
      opacity: 1; pointer-events: all;
      transform: translateY(0) scale(1);
    }
    .settings-section-label {
      font-size: 0.58rem; font-weight: 800; letter-spacing: 0.12em;

    .settings-themes {

      display: flex; align-items: center; gap: 10px;
      width: 100%; padding: 9px 12px;
      background: transparent; border: none;
      border-radius: 12px; cursor: pointer;

      font-size: 0.8rem; font-weight: 600;

    .settings-theme-swatch:hover { background: #1a1a1a; color: #ccc; }

    .swatch-dot {

    .settings-divider { height: 1px; background: #1c1c1c; margin: 4px 6px; }

    /* ══════════════════════════════════════
       TOAST NOTIFICATION SYSTEM
    ══════════════════════════════════════ */
    #toastContainer {
      position: fixed; bottom: 28px; left: 20px; right: 20px;
      z-index: 99999;
      display: flex; flex-direction: column-reverse; align-items: center;
      gap: 10px; pointer-events: none;
    }

    .toast {
      display: flex; align-items: flex-start; gap: 10px;
      padding: 12px 16px; border-radius: 14px;
      font-family: var(--font); font-size: 0.82rem; font-weight: 700;
      color: var(--text); pointer-events: auto;
      backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--border);
      animation: toastIn 0.42s cubic-bezier(0.16,1,0.3,1) forwards;
      white-space: normal;
      word-break: break-word;
      width: 100%;
      max-width: 380px;
      box-sizing: border-box;
      line-height: 1.45;
    }
    .toast.toast-exit {
      animation: toastOut 0.35s ease forwards;
    }
    .toast.toast-success {
      background: rgba(0, 200, 83, 0.18);
      border: 1px solid rgba(0, 200, 83, 0.45);
      color: #00e676;
    }
    .toast.toast-error {
      background: rgba(255, 59, 48, 0.18);
      border: 1px solid rgba(255, 59, 48, 0.45);
      color: #ff6b6b;
    }
    .toast.toast-info {
      background: rgba(0, 240, 255, 0.12);
      border: 1px solid rgba(0, 240, 255, 0.3);
      color: var(--cyan);
    }
    .toast-icon { font-size: 1rem; flex-shrink: 0; }
    @keyframes toastIn {
      from { opacity: 0; transform: translateY(20px) scale(0.92); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes toastOut {
      from { opacity: 1; transform: translateY(0) scale(1); }
      to   { opacity: 0; transform: translateY(12px) scale(0.92); }
    }
