<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DADDYHOYOO | R11M INTEL</title>
    <style>
        :root { --gold: #f3d01a; --neon: #00ff41; --bg: #050505; --card: #111; }
        body { background: var(--bg); color: #fff; font-family: 'Courier New', monospace; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        
        .header { background: var(--card); padding: 20px; border-bottom: 2px solid var(--gold); display: flex; justify-content: space-between; align-items: center; }
        .logo { color: var(--gold); font-size: 1.8rem; font-weight: 900; letter-spacing: -2px; }
        .limit-chip { background: #222; padding: 5px 15px; border-radius: 20px; border: 1px solid var(--gold); font-size: 0.8rem; color: var(--gold); }

        #feed { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 20px; }
        .msg { max-width: 85%; padding: 15px; border-radius: 4px; line-height: 1.5; position: relative; }
        .ai { background: #0d0d0d; border-left: 4px solid var(--gold); align-self: flex-start; color: #ddd; }
        .user { background: #1a1a1a; border-right: 4px solid var(--neon); align-self: flex-end; color: var(--neon); text-align: right; }
        
        .input-container { background: var(--card); padding: 20px; border-top: 1px solid #333; display: flex; gap: 10px; }
        input { flex: 1; background: #000; border: 1px solid #444; color: #fff; padding: 15px; border-radius: 5px; outline: none; }
        input:focus { border-color: var(--gold); }
        button { background: var(--gold); color: #000; border: none; padding: 0 30px; font-weight: bold; border-radius: 5px; cursor: pointer; text-transform: uppercase; }
        
        .loading-dots:after { content: ' .'; animation: dots 1s steps(5, end) infinite; }
        @keyframes dots { 0%, 20% { color: rgba(0,0,0,0); text-shadow: .5em 0 0 rgba(0,0,0,0), 1em 0 0 rgba(0,0,0,0); } 40% { color: var(--gold); text-shadow: .5em 0 0 rgba(0,0,0,0), 1em 0 0 rgba(0,0,0,0); } 60% { text-shadow: .5em 0 0 var(--gold), 1em 0 0 rgba(0,0,0,0); } 80%, 100% { text-shadow: .5em 0 0 var(--gold), 1em 0 0 var(--gold); } }
    </style>
</head>
<body>

<div class="header">
    <div class="logo">DADDYHOYOO</div>
    <div class="limit-chip">BETXCHANGE MAX: R11,000,000</div>
</div>

<div id="feed">
    <div class="msg ai">SYSTEM INITIALIZED. MARCH 2026 LIVE DATA CONNECTED. <br>Ask me to "Analyze the Champions League" or "Find high odds in the EPL".</div>
</div>

<div class="input-container">
    <input type="text" id="userInput" placeholder="Type command (e.g. 'Show me Europa League value')...">
    <button onclick="askDaddy()">Analyze</button>
</div>

<script>
    async function askDaddy() {
        const input = document.getElementById('userInput');
        const feed = document.getElementById('feed');
        const text = input.value.trim();
        if (!text) return;

        // Add User Message
        feed.innerHTML += `<div class="msg user">${text}</div>`;
        input.value = '';

        // Add Placeholder AI Message
        const aiMsgDiv = document.createElement('div');
        aiMsgDiv.className = 'msg ai';
        aiMsgDiv.innerHTML = '<span class="loading-dots">DADDYHOYOO IS SCANNING FIXTURES</span>';
        feed.appendChild(aiMsgDiv);
        feed.scrollTop = feed.scrollHeight;

        try {
            const response = await fetch('/api/ai', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ messages: [{ role: 'user', content: text }] })
            });

            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            aiMsgDiv.innerHTML = ''; // Clear loading state

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                // Clean the Vercel AI stream formatting
                const chunk = decoder.decode(value).replace(/[0-9]:"|"/g, '').replace(/\\n/g, '<br>');
                aiMsgDiv.innerHTML += chunk;
                feed.scrollTop = feed.scrollHeight;
            }
        } catch (err) {
            aiMsgDiv.innerHTML = "CONNECTION ERROR. CHECK VERCEL LOGS.";
        }
    }
</script>

</body>
</html>
