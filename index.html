<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CPA Offers</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #0a0a0a;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .header {
            margin: 40px 0 20px;
            text-align: center;
        }

        .header h1 {
            font-size: 1.5rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #e0e0e0;
            font-weight: 900;
        }

        .container {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .glass-card:active {
            transform: scale(0.97);
            background: rgba(255, 255, 255, 0.08);
        }

        .info {
            display: flex;
            flex-direction: column;
        }

        .label {
            font-size: 0.7rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }

        .name {
            font-size: 1.1rem;
            font-weight: 700;
            color: #fff;
        }

        .arrow {
            width: 32px;
            height: 32px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #fff;
        }

        /* Sponsored Section */
        .sponsored-container {
            margin-top: 40px;
            width: 100%;
            max-width: 400px;
        }

        .sponsored-label {
            font-size: 0.65rem;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
            text-align: center;
            display: block;
        }

        .ad-box {
            display: block;
            background: rgba(255, 255, 255, 0.02);
            border: 1px dashed rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.3s ease;
        }

        .ad-box:hover {
            border-color: rgba(255, 255, 255, 0.3);
        }

        .ad-box img {
            width: 100%;
            height: auto;
            display: block;
            filter: grayscale(20%);
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Exclusive Access</h1>
    </div>

    <div class="container">
        <a href="https://clicknlook.site/a/yQ5AiyRYsQ0E3" class="glass-card" target="_blank">
            <div class="info">
                <span class="label">Priority Offer</span>
                <span class="name">CPA LINK 1</span>
            </div>
            <div class="arrow">→</div>
        </a>

        <a href="https://clicknlook.site/a/NQjKiV45Hj98v" class="glass-card" target="_blank">
            <div class="info">
                <span class="label">Verified</span>
                <span class="name">CPA LINK 2</span>
            </div>
            <div class="arrow">→</div>
        </a>

        <a href="https://clicknlook.site/a/qw5pc7gkOIQlwD" class="glass-card" target="_blank">
            <div class="info">
                <span class="label">Secure</span>
                <span class="name">CPA LINK 3</span>
            </div>
            <div class="arrow">→</div>
        </a>

        <a href="https://clicknlook.site/a/7NzyFEAGfWvRn" class="glass-card" target="_blank">
            <div class="info">
                <span class="label">Instant</span>
                <span class="name">CPA LINK 4</span>
            </div>
            <div class="arrow">→</div>
        </a>
    </div>

    <div class="sponsored-container">
        <span class="sponsored-label">Sponsored</span>
        <a href="https://temp-mail.org/en/" class="ad-box" target="_blank">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcS74mus_oyyGUAyVKzKwwyK8LPwSQ0F-bXOf_gqom6sIy9TisJBW0gDuHOS&s=10" alt="Sponsored Ad">
        </a>
    </div>

</body>
</html>
