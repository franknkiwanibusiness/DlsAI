<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DLS26 LEAGUE 1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background-color: #000; margin: 0; font-family: 'Inter', sans-serif; min-height: 100vh; color: #fff; overflow-x: hidden; }
        
        /* Stop Background Scroll when Modal is Open */
        body.modal-open { overflow: hidden; }

        .glass-header { background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255, 255, 255, 0.1); }
        
        .glow-wrap { position: relative; padding: 2px; border-radius: 9999px; overflow: hidden; display: inline-flex; cursor: pointer; }
        .glow-wrap::before { content: ''; position: absolute; width: 200%; height: 200%; background: conic-gradient(#3b82f6, #00ff88, #fbbf24, #3b82f6); animation: spin 4s linear infinite; z-index: 1; top: -50%; left: -50%; }
        .glow-inner { position: relative; background: #000; color: #fff; z-index: 10; border-radius: 9999px; pointer-events: none; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .table-wrapper { overflow-x: auto; scroll-behavior: smooth; -webkit-overflow-scrolling: touch; }
        .sticky-pts { position: sticky; right: 0; background: #050505; z-index: 20; border-left: 1px solid #111; }
        
        /* Zones */
        .zone-ucl { border-left: 4px solid #00ff88 !important; }
        .zone-safe { border-left: 4px solid #fbbf24 !important; }
        .zone-relegation { border-left: 4px solid #ff4d4d !important; }

        /* Self Highlight */
        .my-team-row { background: rgba(6, 182, 212, 0.1) !important; border: 1px solid #06b6d4 !important; }

        .nether-input { background: #0a0a0a; border: 1px solid #222; padding: 1rem; border-radius: 14px; width: 100%; color: #00ff88; font-weight: 700; outline: none; }
        
        #toast { position: fixed; top: 20px; right: 20px; padding: 1rem 1.5rem; border-radius: 12px; font-weight: 900; font-size: 11px; text-transform: uppercase; z-index: 2000; transform: translateX(150%); transition: 0.4s; background: #00ff88; color: #000; }
        #toast.show { transform: translateX(0); }
    </style>
</head>
<body>

    <div id="toast">SYSTEM NOTIFICATION</div>

    <header class="glass-header sticky top-0 w-full h-20 z-50 flex items-center justify-between px-6">
        <div>
            <h1 class="text-white font-black tracking-tighter text-2xl italic uppercase">DLS26 <span class="text-zinc-700">LEAGUE 1</span></h1>
            <p id="timer" class="text-[10px] font-mono text-red-600 font-bold uppercase mt-1">00:00:00</p>
        </div>
        <div id="btn-main-action" class="glow-wrap">
            <button id="nav-btn-text" class="glow-inner px-6 py-2 text-[10px] font-black uppercase tracking-widest">Join League</button>
        </div>
    </header>

    <main class="p-4 md:p-10">
        <div class="max-w-4xl mx-auto mb-6 flex items-center justify-between bg-zinc-950 border border-zinc-900 p-5 rounded-2xl">
            <span id="slot-counter" class="text-xl font-black italic text-white uppercase tracking-tighter">Syncing Database...</span>
        </div>

        <div id="table-scroll-container" class="max-w-4xl mx-auto bg-[#050505] rounded-[2rem] border border-zinc-900 shadow-2xl table-wrapper">
            <table class="w-full text-left border-collapse min-w-[550px]">
                <thead class="bg-black text-zinc-600 text-[10px] font-black uppercase border-b border-zinc-900">
                    <tr>
                        <th class="p-5 w-16">POS</th>
                        <th class="p-5">MANAGER / TEAM</th>
                        <th class="p-5 text-center w-24">PLAYED</th>
                        <th class="p-5 text-center w-20">GD</th>
                        <th class="p-5 text-center w-24 sticky-pts bg-black text-white">PTS</th>
                    </tr>
                </thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>
    </main>

    <div id="modal-reg" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-4 bg-black/95 backdrop-blur-xl">
        <div class="w-full max-w-md bg-[#080808] border border-zinc-800 rounded-[3rem] p-10 space-y-6">
            <div class="text-center">
                <h2 id="modal-title" class="text-xl font-black italic uppercase">Register Team</h2>
            </div>
            <div class="flex flex-col items-center" onclick="document.getElementById('upload').click()">
                <div class="relative cursor-pointer">
                    <img id="preview" src="https://dls26.net/wp-content/uploads/2024/12/DLS-26-Hack-768x432.jpg" class="w-24 h-24 rounded-2xl border-2 border-zinc-900 object-cover">
                    <input type="file" id="upload" class="hidden" accept="image/*">
                </div>
            </div>
            <div class="space-y-3">
                <input type="text" id="reg-team" placeholder="TEAM NAME" class="nether-input">
                <input type="tel" id="reg-wa" placeholder="WHATSAPP (+27...)" class="nether-input">
                <input type="email" id="reg-email" placeholder="EMAIL" class="nether-input">
            </div>
            <button id="btn-submit" class="w-full bg-[#00ff88] text-black font-black py-4 rounded-xl text-[10px] uppercase">Confirm Details</button>
            <button id="close-reg" class="w-full text-zinc-600 text-[10px] font-bold uppercase">Cancel</button>
        </div>
    </div>

    <div id="modal-profile" class="fixed inset-0 z-[150] hidden flex items-center justify-center p-4 bg-black/95 backdrop-blur-2xl">
        <div class="w-full max-w-sm bg-[#080808] border border-zinc-800 rounded-[3rem] overflow-hidden p-8 text-center space-y-5">
            <img id="prof-img" src="" class="w-28 h-28 mx-auto rounded-[2rem] border-4 border-zinc-900 shadow-2xl object-cover">
            <h2 id="prof-name" class="text-2xl font-black italic uppercase text-white">---</h2>
            <div class="grid grid-cols-3 gap-2 py-4 border-y border-zinc-900">
                <div><p class="text-[8px] text-zinc-600 font-black uppercase">P</p><p id="prof-p" class="text-white font-bold">0</p></div>
                <div><p class="text-[8px] text-zinc-600 font-black uppercase">GD</p><p id="prof-gd" class="text-white font-bold">0</p></div>
                <div><p class="text-[8px] text-[#00ff88] font-black uppercase">PTS</p><p id="prof-pts" class="text-[#00ff88] font-black text-xl">0</p></div>
            </div>
            <a id="prof-wa-link" href="#" target="_blank" class="block w-full bg-[#25D366] text-black font-black py-4 rounded-2xl text-[10px] uppercase">Chat on WhatsApp</a>
            <button id="close-prof" class="w-full text-zinc-600 text-[10px] font-bold uppercase">Back to Table</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-app.js";
        import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDFHskUWiyHhZke3KT9kkOtFI_gPsKfiGo",
            authDomain: "itzhoyoo-f9f7e.firebaseapp.com",
            databaseURL: "https://itzhoyoo-f9f7e-default-rtdb.firebaseio.com",
            projectId: "itzhoyoo-f9f7e",
            storageBucket: "itzhoyoo-f9f7e.filestorage.app",
            appId: "1:1094792075584:web:d49e9c3f899d3cd31082a5"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const toggleScroll = (lock) => document.body.classList.toggle('modal-open', lock);
        const notify = (msg) => {
            const t = document.getElementById('toast');
            t.innerText = msg; t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        };

        // --- BUTTON LOGIC ---
        document.getElementById('btn-main-action').onclick = () => {
            const saved = localStorage.getItem('dls_my_team');
            if(saved) {
                const u = JSON.parse(saved);
                document.getElementById('reg-team').value = u.team;
                document.getElementById('reg-wa').value = u.wa;
                document.getElementById('reg-email').value = u.email;
                document.getElementById('preview').src = u.logo;
                document.getElementById('modal-title').innerText = "Edit My Team";
            }
            document.getElementById('modal-reg').classList.remove('hidden');
            toggleScroll(true);
        };

        document.getElementById('close-reg').onclick = () => {
            document.getElementById('modal-reg').classList.add('hidden');
            toggleScroll(false);
        };

        document.getElementById('close-prof').onclick = () => {
            document.getElementById('modal-profile').classList.add('hidden');
            toggleScroll(false);
        };

        // --- SUBMIT ---
        document.getElementById('btn-submit').onclick = async () => {
            const team = document.getElementById('reg-team').value.trim();
            let wa = document.getElementById('reg-wa').value.trim();
            const email = document.getElementById('reg-email').value.trim();
            const logo = document.getElementById('preview').src;

            if(!team || !wa) return alert("Fill Name & WhatsApp");
            if(!wa.startsWith('+')) wa = '+' + wa;

            const saved = localStorage.getItem('dls_my_team');
            const uid = saved ? JSON.parse(saved).id : `u_${Date.now()}`;
            const userData = { id: uid, team, wa, email, logo, pts: 0, p: 0, gd: 0 };

            await set(ref(db, `users/players/${uid}`), userData);
            localStorage.setItem('dls_my_team', JSON.stringify(userData));
            document.getElementById('modal-reg').classList.add('hidden');
            toggleScroll(false);
            notify("Profile Saved!");
            location.reload();
        };

        // --- LIVE DATA & HORIZONTAL SCROLL ---
        onValue(ref(db, 'users/players'), (snap) => {
            const data = snap.val() || {};
            const sorted = Object.entries(data).sort(([,a], [,b]) => (b.pts - a.pts) || (b.gd - a.gd));
            const myId = localStorage.getItem('dls_my_team') ? JSON.parse(localStorage.getItem('dls_my_team')).id : null;
            
            let html = '';
            for(let i=0; i<24; i++) {
                const pos = i + 1;
                const p = sorted[i]?.[1];
                let zone = pos <= 16 ? 'zone-ucl' : (pos <= 21 ? 'zone-safe' : 'zone-relegation');
                let isMe = p && p.id === myId;

                if(p) {
                    html += `<tr class="${zone} border-b border-zinc-900/40 ${isMe ? 'my-team-row' : ''} cursor-pointer active:bg-white/5" 
                             onclick="openProfile('${p.team}', '${p.logo}', '${p.wa}', '${p.pts}', '${p.p}', '${p.gd}')">
                        <td class="p-5 font-black text-zinc-800 italic">${pos}</td>
                        <td class="p-5 flex items-center gap-3 font-bold text-xs uppercase text-white">
                            <img src="${p.logo}" class="w-7 h-7 rounded-lg object-cover"> 
                            ${p.team} ${isMe ? '<span class="text-cyan-400 font-black ml-2">&lt;YOU&gt;</span>' : ''}
                        </td>
                        <td class="p-5 text-center text-zinc-500 font-bold">${p.p || 0}</td>
                        <td class="p-5 text-center text-zinc-400 font-bold">${p.gd || 0}</td>
                        <td class="p-5 text-center font-black text-[#00ff88] text-lg sticky-pts">${p.pts}</td>
                    </tr>`;
                } else {
                    html += `<tr class="${zone} border-b border-zinc-900/20">
                        <td class="p-5 font-black text-zinc-900">${pos}</td>
                        <td class="p-5 text-[9px] text-yellow-500/60 font-black uppercase italic tracking-widest">Available Slot</td>
                        <td class="p-5 text-center text-zinc-900">-</td>
                        <td class="p-5 text-center text-zinc-900">-</td>
                        <td class="p-5 text-center text-zinc-900 sticky-pts">-</td>
                    </tr>`;
                }
            }
            document.getElementById('table-body').innerHTML = html;
            document.getElementById('slot-counter').innerText = `MANAGERS: ${sorted.length}/24`;

            // Horizontal Scroll Tease
            const scroller = document.getElementById('table-scroll-container');
            setTimeout(() => {
                scroller.scrollTo({ left: 80, behavior: 'smooth' });
                setTimeout(() => scroller.scrollTo({ left: 0, behavior: 'smooth' }), 600);
            }, 1200);
        });

        // Profile Logic
        window.openProfile = (team, logo, wa, pts, p, gd) => {
            document.getElementById('prof-name').innerText = team;
            document.getElementById('prof-img').src = logo;
            document.getElementById('prof-pts').innerText = pts;
            document.getElementById('prof-p').innerText = p;
            document.getElementById('prof-gd').innerText = gd;
            document.getElementById('prof-wa-link').href = `https://wa.me/${wa.replace(/\+/g, '')}`;
            document.getElementById('modal-profile').classList.remove('hidden');
            toggleScroll(true);
        };

        // Timer
        setInterval(() => {
            const diff = new Date("April 8, 2026 00:00:00").getTime() - Date.now();
            const h = Math.floor(diff / 3600000);
            const m = Math.floor((diff % 3600000) / 60000);
            const s = Math.floor((diff % 60000) / 1000);
            document.getElementById('timer').innerText = `RESET: ${h}H ${m}M ${s}S`;
        }, 1000);

        if(localStorage.getItem('dls_my_team')) document.getElementById('nav-btn-text').innerText = "Edit My Team";
    </script>
</body>
</html>
