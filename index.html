<header style="
    position: sticky;
    top: 15px;
    z-index: 2000;
    width: 92%;
    height: 65px;
    margin: 0 auto;
    background: #ffffff;
    
    /* 3D GRADIENT BORDER LOGIC */
    border: 4px solid transparent;
    background-image: linear-gradient(#fff, #fff), linear-gradient(90deg, #ff00ff, #00bfff, #ffdd00, #ff00ff);
    background-origin: border-box;
    background-clip: content-box, border-box;
    background-size: 200% auto;
    animation: borderShift 3s linear infinite;
    
    border-radius: 50px;
    box-shadow: 0 6px 0 #000000;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 25px;
    box-sizing: border-box;
">
    <div style="display: flex; align-items: center; gap: 12px; height: 100%;">
        <div style="display: flex; align-items: center; justify-content: center;">
            <img src="https://i.imgur.com/iAd3Oqz.png" alt="Logo" style="
                height: 40px; 
                width: auto; 
                display: block;
                filter: drop-shadow(2px 2px 0px #000) drop-shadow(-2px -2px 0px #000);
                transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
                cursor: pointer;
            " onmouseover="this.style.transform='rotate(-8deg) scale(1.1)'" onmouseout="this.style.transform='rotate(0deg) scale(1)'">
        </div>
        
        <span style="
            font-family: 'Luckiest Guy', cursive; 
            font-size: 1.8rem; 
            line-height: 1;
            display: inline-block;
            padding-top: 8px; 
            letter-spacing: 0.5px;
            text-transform: uppercase;
            /* GRADIENT MIXED WITH BLACK STROKE */
            background: linear-gradient(90deg, #ff00ff, #00bfff, #ffdd00); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(1.5px 1.5px 0px #000) drop-shadow(-1px -1px 0px #000) drop-shadow(1px -1px 0px #000) drop-shadow(-1px 1px 0px #000);
        ">MINIMISTY</span>
    </div>

    <div onclick="toggleSidebar()" style="
        position: relative; 
        cursor: pointer; 
        display: flex; 
        align-items: center; 
        justify-content: center;
        height: 100%;
        transition: transform 0.2s ease;
    " onmousedown="this.style.transform='scale(0.9)'" onmouseup="this.style.transform='scale(1)'">
        
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M9 7c0-1.657 1.343-3 3-3s3 1.343 3 3" stroke="black" stroke-width="2.5" stroke-linecap="round"/>
            <path d="M5 8h14l1 12H4L5 8z" fill="white" stroke="black" stroke-width="2.5" stroke-linejoin="round"/>
        </svg>
        
        <div id="badgeCount" style="
            position: absolute;
            top: 14px;
            right: -2px;
            background: #000;
            color: #fff;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            font-family: Arial, sans-serif;
            font-weight: bold;
            font-size: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #fff;
        ">0</div>
    </div>
</header>

<style>
    /* ANIMATION FOR THE 3D GRADIENT BORDER */
    @keyframes borderShift {
        0% { background-position: 0% 50%; }
        100% { background-position: 200% 50%; }
    }
</style>
