<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Splitter & Downloader</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.6;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background-color: #f4f7f6;
            color: #333;
        }
        h1 {
            color: #2c3e50;
            text-align: center;
        }
        .container {
            background: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        label {
            font-weight: bold;
            display: block;
            margin-bottom: 5px;
        }
        input[type="text"], textarea {
            width: 100%;
            padding: 10px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            font-family: monospace;
        }
        textarea {
            height: 300px;
            resize: vertical;
        }
        .btn-group {
            display: flex;
            gap: 15px;
        }
        button {
            flex: 1;
            padding: 12px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s;
        }
        button.primary {
            background-color: #3498db;
            color: white;
        }
        button.primary:hover {
            background-color: #2980b9;
        }
        button.success {
            background-color: #2ecc71;
            color: white;
        }
        button.success:hover {
            background-color: #27ae60;
        }
        button:disabled {
            background-color: #bdc3c7;
            cursor: not-allowed;
        }
        #status {
            margin-top: 15px;
            font-weight: bold;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>HTML Splitter & Downloader</h1>
    
    <label for="delimiter">Split Delimiter (The text that separates your HTML blocks):</label>
    <input type="text" id="delimiter" value="---SPLIT---" placeholder="e.g., ---SPLIT--- or </html>">
    
    <label for="htmlInput">Paste your combined HTML blocks here:</label>
    <textarea id="htmlInput" placeholder="Paste code here...&#10;Example:&#10;<!DOCTYPE html><html><body>Block 1</body></html>&#10;---SPLIT---&#10;<!DOCTYPE html><html><body>Block 2</body></html>"></textarea>
    
    <div class="btn-group">
        <button type="button" class="primary" onclick="processHTML()">1. Process & Preview</button>
        <button type="button" class="success" id="downloadBtn" onclick="downloadAll()" disabled>2. Download All (.zip)</button>
    </div>
    
    <div id="status"></div>
</div>

<script>
    let extractedFiles = [];

    function processHTML() {
        const input = document.getElementById('htmlInput').value;
        let delimiter = document.getElementById('delimiter').value;
        const statusDiv = document.getElementById('status');
        const downloadBtn = document.getElementById('downloadBtn');
        
        extractedFiles = []; // Reset
        
        if (!input.trim()) {
            statusDiv.style.color = 'red';
            statusDiv.innerText = 'Please paste some HTML code first.';
            downloadBtn.disabled = true;
            return;
        }

        // Split the text based on the delimiter
        let blocks = input.split(delimiter);
        
        // Clean up blocks and filter out empty strings
        blocks = blocks.map(b => b.trim()).filter(b => b.length > 0);

        // Special handling: If they used </html> as the delimiter, the split removes it. 
        // We need to add it back to the end of each file.
        if (delimiter.toLowerCase() === '</html>') {
            blocks = blocks.map(b => b + '\n</html>');
        }

        if (blocks.length === 0) {
            statusDiv.style.color = 'red';
            statusDiv.innerText = 'No HTML blocks found with the current delimiter.';
            downloadBtn.disabled = true;
            return;
        }

        // Store files in memory
        blocks.forEach((content, index) => {
            extractedFiles.push({
                name: `file_${index + 1}.html`,
                content: content
            });
        });

        statusDiv.style.color = 'green';
        statusDiv.innerText = `Successfully found and processed ${extractedFiles.length} file(s)!`;
        downloadBtn.disabled = false;
    }

    function downloadAll() {
        if (extractedFiles.length === 0) return;
        
        const zip = new JSZip();
        const statusDiv = document.getElementById('status');
        
        statusDiv.style.color = '#3498db';
        statusDiv.innerText = 'Generating ZIP file...';

        // Add each file to the zip structure
        extractedFiles.forEach(file => {
            zip.file(file.name, file.content);
        });

        // Generate the zip file and trigger download
        zip.generateAsync({ type: 'blob' }).then(function(content) {
            const element = document.createElement('a');
            element.href = URL.createObjectURL(content);
            element.download = "extracted_html_files.zip";
            document.body.appendChild(element);
            element.click();
            document.body.removeChild(element);
            
            statusDiv.style.color = 'green';
            statusDiv.innerText = 'Download completed successfully!';
        }).catch(err => {
            statusDiv.style.color = 'red';
            statusDiv.innerText = 'Error generating ZIP file.';
            console.error(err);
        });
    }
</script>

</body>
</html>
