<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Splitter & Direct Downloader</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            line-height: 1.6;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background-color: #f4f7f6;
            color: #333;
        }
        .container {
            background: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        label {
            font-weight: bold;
            display: block;
            margin-bottom: 5px;
        }
        input[type="text"], textarea {
            width: 100%;
            padding: 10px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            font-family: monospace;
        }
        textarea {
            height: 300px;
            resize: vertical;
        }
        button {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            background-color: #2ecc71;
            color: white;
            transition: background 0.2s;
        }
        button:hover {
            background-color: #27ae60;
        }
        #status {
            margin-top: 15px;
            font-weight: bold;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>HTML Splitter & Direct Downloader</h1>
    
    <label for="delimiter">Split Delimiter:</label>
    <input type="text" id="delimiter" value="---SPLIT---">
    
    <label for="htmlInput">Paste your combined HTML blocks here:</label>
    <textarea id="htmlInput" placeholder="Paste code here..."></textarea>
    
    <button type="button" onclick="downloadAllHTML()">Split & Download All (.html)</button>
    
    <div id="status"></div>
</div>

<script>
    function downloadAllHTML() {
        const input = document.getElementById('htmlInput').value;
        const delimiter = document.getElementById('delimiter').value;
        const statusDiv = document.getElementById('status');
        
        if (!input.trim()) {
            statusDiv.style.color = 'red';
            statusDiv.innerText = 'Please paste some HTML code first.';
            return;
        }

        // Split blocks and filter out empty items
        let blocks = input.split(delimiter).map(b => b.trim()).filter(b => b.length > 0);

        // Put back the </html> tag if it was used as the delimiter
        if (delimiter.toLowerCase() === '</html>') {
            blocks = blocks.map(b => b + '\n</html>');
        }

        if (blocks.length === 0) {
            statusDiv.style.color = 'red';
            statusDiv.innerText = 'No HTML blocks found.';
            return;
        }

        statusDiv.style.color = '#3498db';
        statusDiv.innerText = `Starting download of ${blocks.length} files...`;

        // Loop through each block and trigger download with a slight delay
        blocks.forEach((content, index) => {
            setTimeout(() => {
                const blob = new Blob([content], { type: 'text/html' });
                const element = document.createElement('a');
                element.href = URL.createObjectURL(blob);
                element.download = `file_${index + 1}.html`;
                
                document.body.appendChild(element);
                element.click();
                document.body.removeChild(element);

                // Update status on the last file
                if (index === blocks.length - 1) {
                    statusDiv.style.color = 'green';
                    statusDiv.innerText = `Successfully downloaded ${blocks.length} .html files!`;
                }
            }, index * 100); // 100ms gap between downloads to prevent browser blocking
        });
    }
</script>

</body>
</html>
