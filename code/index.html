<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini Workspace Assistant</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg: #0b0c10;
            --panel: #12131a;
            --panel-nested: #1a1b23;
            --primary: #635bff;
            --primary-hover: #4e45e5;
            --text: #ffffff;
            --text-muted: #8a8f9f;
            --accent-green: #00ca72;
            --border: #222531;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: var(--bg);
            font-family: 'Inter', sans-serif;
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
        }

        .workspace-card {
            background-color: var(--panel);
            border: 1px solid var(--border);
            border-radius: 24px;
            width: 100%;
            max-width: 900px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
            overflow: hidden;
        }

        /* App Banner Area */
        .workspace-header {
            background: linear-gradient(135deg, #181335 0%, #0d0e15 100%);
            padding: 32px;
            border-bottom: 1px solid var(--border);
            position: relative;
        }
        .app-badge {
            background: rgba(99, 91, 255, 0.15);
            color: #8c82ff;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 16px;
            border: 1px solid rgba(99, 91, 255, 0.3);
        }
        .header-title { font-size: 1.75rem; font-weight: 700; margin-bottom: 8px; }
        .header-title span { color: #8c82ff; }
        .header-subtitle { font-size: 0.85rem; color: var(--text-muted); max-width: 500px; }

        /* Workspace Grid Layout */
        .workspace-body { padding: 32px; display: flex; flex-direction: column; gap: 24px; }

        /* Drag and Drop Zone */
        .drop-zone {
            border: 2px dashed var(--border);
            background-color: var(--panel-nested);
            border-radius: 16px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }
        .drop-zone:hover, .drop-zone.hover {
            border-color: var(--primary);
            background-color: rgba(99, 91, 255, 0.04);
        }
        .drop-icon {
            font-size: 2rem;
            color: var(--primary);
            background: rgba(99, 91, 255, 0.1);
            width: 56px;
            height: 56px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .drop-text { font-size: 0.95rem; font-weight: 500; }
        .drop-subtext { font-size: 0.75rem; color: var(--text-muted); }

        #file-status {
            display: none;
            align-items: center;
            justify-content: space-between;
            background: #121d1a;
            border: 1px solid rgba(0, 202, 114, 0.2);
            padding: 14px 20px;
            border-radius: 12px;
            font-size: 0.85rem;
        }
        .file-info-left { display: flex; align-items: center; gap: 10px; color: var(--accent-green); font-weight: 500; }

        /* Prompt Input area */
        .input-group { display: flex; flex-direction: column; gap: 8px; }
        .input-label { font-size: 0.8rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }
        .prompt-textarea {
            width: 100%;
            height: 120px;
            background-color: var(--panel-nested);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 16px;
            color: var(--text);
            font-family: inherit;
            font-size: 0.95rem;
            resize: vertical;
            outline: none;
            transition: border-color 0.2s;
        }
        .prompt-textarea:focus { border-color: var(--primary); }

        /* Action Buttons */
        .btn-submit {
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 16px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: background 0.2s;
        }
        .btn-submit:hover { background-color: var(--primary-hover); }
        .btn-submit:disabled { background-color: var(--border); color: var(--text-muted); cursor: not-allowed; }

        /* AI Output Panel */
        .output-container {
            display: none;
            margin-top: 12px;
            border-top: 1px solid var(--border);
            padding-top: 24px;
        }
        .output-title { font-size: 1rem; font-weight: 600; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
        .output-box {
            background-color: var(--panel-nested);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 20px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            line-height: 1.6;
            white-space: pre-wrap;
            overflow-x: auto;
            color: #e2e8f0;
        }
    </style>
</head>
<body>

    <div class="workspace-card">
        <div class="workspace-header">
            <div class="app-badge"><i class="fa-solid fa-microchip"></i> Gemini Engine Active</div>
            <h1 class="header-title">Code context <span>Processor</span></h1>
            <p class="header-subtitle">Upload complete 20k+ line files seamlessly using Gemini's massive structural context window.</p>
        </div>

        <div class="workspace-body">
            <div class="drop-zone" id="drop-zone">
                <div class="drop-icon"><i class="fa-solid fa-cloud-arrow-up"></i></div>
                <div class="drop-text">Drag and drop source file here</div>
                <div class="drop-subtext">Supports large standard text format codebases (.js, .py, .txt, etc.)</div>
            </div>
            <input type="file" id="file-input" style="display: none;">

            <div id="file-status">
                <div class="file-info-left">
                    <i class="fa-solid fa-circle-check"></i>
                    <span id="file-details">No file loaded</span>
                </div>
                <span style="color: var(--text-muted); cursor: pointer;" onclick="clearFile()"><i class="fa-solid fa-xmark"></i></span>
            </div>

            <div class="input-group">
                <label class="input-label">Instructions / Modification Command</label>
                <textarea id="command-input" class="prompt-textarea" placeholder="Tell the model what to search, build, refactor, or track inside your file..."></textarea>
            </div>

            <button id="submit-btn" class="btn-submit" onclick="executeProcess()">
                <i class="fa-solid fa-wand-magic-sparkles"></i> Process Context File
            </button>

            <div class="output-container" id="output-wrapper">
                <div class="output-title"><i class="fa-solid fa-code" style="color: var(--primary);"></i> Engine Output</div>
                <pre class="output-box" id="output-box"></pre>
            </div>
        </div>
    </div>

    <script>
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const fileStatus = document.getElementById('file-status');
        const fileDetails = document.getElementById('file-details');
        const outputWrapper = document.getElementById('output-wrapper');
        const outputBox = document.getElementById('output-box');
        const submitBtn = document.getElementById('submit-btn');

        let fileData = "";
        let fileName = "";

        dropZone.addEventListener('click', () => fileInput.click());
        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('hover'); });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('hover'));
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('hover');
            processUploadedFiles(e.dataTransfer.files);
        });
        fileInput.addEventListener('change', (e) => processUploadedFiles(e.target.files));

        function processUploadedFiles(files) {
            if (!files.length) return;
            const targetFile = files[0];
            fileName = targetFile.name;

            const reader = new FileReader();
            reader.onload = function(e) {
                fileData = e.target.result;
                const totalLines = fileData.split('\n').length;
                
                dropZone.style.display = 'none';
                fileStatus.style.display = 'flex';
                fileDetails.innerText = `${fileName} (${totalLines.toLocaleString()} lines parsed)`;
            };
            reader.readAsText(targetFile);
        }

        function clearFile() {
            fileData = "";
            fileName = "";
            fileInput.value = "";
            dropZone.style.display = 'flex';
            fileStatus.style.display = 'none';
        }

        async function executeProcess() {
            const command = document.getElementById('command-input').value.trim();
            if (!fileData) return alert("Upload a source file before parsing context.");
            if (!command) return alert("Please clarify your targeted output commands.");

            submitBtn.disabled = true;
            submitBtn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> Analyzing context window values...`;
            outputWrapper.style.display = 'none';

            try {
                const apiResponse = await fetch('/api/code', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ command, fileContent: fileData, fileName })
                });

                const rawData = await apiResponse.json();
                outputWrapper.style.display = 'block';

                if (apiResponse.ok) {
                    outputBox.innerText = rawData.response;
                } else {
                    outputBox.innerText = `Error Flag: ${rawData.error}`;
                }
            } catch (err) {
                outputWrapper.style.display = 'block';
                outputBox.innerText = `Runtime Fail: ${err.message}`;
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = `<i class="fa-solid fa-wand-magic-sparkles"></i> Process Context File`;
            }
        }
    </script>
</body>
</html>
