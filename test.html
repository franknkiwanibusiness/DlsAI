<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MINIMISTY | Live Bridge Tester</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --border: 3px solid #000; --shadow: 5px 5px 0px #000; --accent: #5856d6; }
        body { font-family: 'Fredoka', sans-serif; background: #f4f4f4; padding: 20px; display: flex; justify-content: center; }
        .card { background: white; border: var(--border); box-shadow: var(--shadow); border-radius: 20px; padding: 25px; width: 100%; max-width: 450px; }
        input, select { width: 100%; padding: 12px; border: var(--border); border-radius: 10px; margin-bottom: 15px; box-sizing: border-box; font-family: inherit; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .option { border: var(--border); padding: 10px; border-radius: 10px; text-align: center; cursor: pointer; font-weight: 700; transition: 0.2s; }
        .option.active { background: var(--accent); color: white; transform: translateY(-2px); }
        .btn-run { width: 100%; padding: 18px; background: #32d74b; border: var(--border); border-radius: 15px; font-weight: 700; cursor: pointer; box-shadow: 4px 4px 0px #000; text-transform: uppercase; }
        .btn-run:active { transform: translate(2px, 2px); box-shadow: 2px 2px 0px #000; }
        #console { margin-top: 20px; background: #000; color: #00ff00; padding: 15px; border-radius: 10px; font-family: monospace; font-size: 11px; min-height: 100px; overflow-wrap: break-word; }
    </style>
</head>
<body>

    <div class="card">
        <h2 style="margin-top:0">🚀 Bridge Sandbox</h2>
        
        <label>Vercel Endpoint</label>
        <input type="text" id="api-url" value="https://dlsvalue-git-main-franks-projects-9ab45af3.vercel.app/api/dropship">

        <label>Bundle Size</label>
        <div class="grid">
            <div class="option active" onclick="setQty(1, this)">1 Unit</div>
            <div class="option" onclick="setQty(2, this)">2 Units</div>
        </div>

        <label>Variant (CJ SKU Map)</label>
        <div class="grid">
            <div class="option active" onclick="setColor('Dark Gray 4000mAh', this)">GRAY</div>
            <div class="option" onclick="setColor('Blue 4000mAh', this)">BLUE</div>
            <div class="option" onclick="setColor('Pink 4000mAh', this)">PINK</div>
            <div class="option" onclick="setColor('White 4000mAh', this)">WHITE</div>
        </div>

        <label>Shipping Destination</label>
        <div class="grid">
            <input type="text" id="city" value="Johannesburg">
            <input type="text" id="zip" value="2000">
        </div>
        <select id="country">
            <option value="ZA">South Africa</option>
            <option value="US">United States</option>
        </select>

        <button class="btn-run" onclick="executeTest()">Create CJ Order</button>
        
        <div id="console">System Ready. Awaiting trigger...</div>
    </div>

<script>
    let currentQty = 1;
    let currentColor = 'Dark Gray 4000mAh';

    function setQty(n, el) { currentQty = n; toggle(el); }
    function setColor(c, el) { currentColor = c; toggle(el); }
    function toggle(el) {
        el.parentElement.querySelectorAll('.option').forEach(o => o.classList.remove('active'));
        el.classList.add('active');
    }

    async function executeTest() {
        const url = document.getElementById('api-url').value;
        const consoleLog = document.getElementById('console');
        consoleLog.innerText = "📡 Contacting Vercel Bridge...";

        // Build the colors object for the SKU_MAP
        const bundleColors = {};
        for(let i=1; i<=currentQty; i++) { bundleColors[i] = currentColor; }

        const payload = {
            paypalOrderId: "TEST-SANDBOX-" + Date.now(),
            bundleColors: bundleColors,
            shipping: {
                cjShipping: {
                    consignee: "Sandbox Tester",
                    address: "123 Test Street",
                    city: document.getElementById('city').value,
                    province: "GP",
                    zip: document.getElementById('zip').value,
                    countryCode: document.getElementById('country').value,
                    phone: "0123456789",
                    email: "test@minimisty.com"
                }
            }
        };

        try {
            const response = await fetch(`${url}/fulfill`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            const data = await response.json();
            
            if (response.ok) {
                consoleLog.innerText = "✅ SUCCESS:\n" + JSON.stringify(data, null, 2);
                console.log("CJ Result:", data);
            } else {
                consoleLog.innerText = "❌ ERROR:\n" + (data.error || JSON.stringify(data));
            }
        } catch (err) {
            consoleLog.innerText = "🚨 FAILED TO FETCH:\n" + err.message + "\n\nTip: Ensure your Vercel code handles OPTIONS/CORS.";
        }
    }
</script>
</body>
</html>
