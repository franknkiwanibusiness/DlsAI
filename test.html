<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MINIMISTY Live Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .brand-border { border: 2.5px solid #000000; }
        .brand-shadow { box-shadow: 4px 4px 0px #000000; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen font-sans p-4">

    <!-- FLOATING CHAT WIDGET -->
    <div class="fixed bottom-6 right-6 z-50 flex flex-col items-end">
        
        <!-- Chat Window (Hidden by default) -->
        <div id="chat-window" class="hidden w-80 sm:w-96 h-[450px] bg-white brand-border brand-shadow rounded-2xl flex flex-col overflow-hidden mb-4">
            
            <!-- Header -->
            <div class="bg-black text-white p-4 flex justify-between items-center border-b-2 border-black">
                <div class="flex items-center space-x-2">
                    <div class="w-2.5 h-2.5 bg-green-400 rounded-full animate-pulse"></div>
                    <span class="font-bold text-sm">MINIMISTY Support AI</span>
                </div>
                <button onclick="toggleChat()" class="text-gray-400 hover:text-white font-black text-lg">&times;</button>
            </div>

            <!-- Messages Box -->
            <div id="chat-messages" class="flex-1 p-4 overflow-y-auto space-y-3 bg-gray-50 text-sm">
                <div class="flex flex-col items-start">
                    <div class="bg-white border-2 border-black text-black px-3 py-2 rounded-lg max-w-[85%] font-medium">
                        Hey! Ask me anything about your FrostBlade Pro order, shipping status, or stock availability!
                    </div>
                </div>
            </div>

            <!-- Loading State -->
            <div id="chat-loading" class="hidden px-4 py-2 bg-gray-50 border-t border-gray-100 text-xs text-gray-500 italic">
                AI is checking Firebase...
            </div>

            <!-- Input Bar -->
            <form id="chat-form" onsubmit="sendMessage(event)" class="p-3 bg-white border-t-2 border-black flex items-center space-x-2">
                <input type="text" id="chat-input" placeholder="Ask about your order..." class="flex-1 px-3 py-2 bg-gray-100 border border-gray-300 rounded-lg text-sm focus:outline-none focus:border-black" required autocomplete="off">
                <button type="submit" class="bg-black text-white px-4 py-2 rounded-lg font-bold text-sm border border-black hover:bg-gray-800">Send</button>
            </form>
        </div>

        <!-- Floating Action Button -->
        <button onclick="toggleChat()" class="bg-black text-white p-4 rounded-full font-black shadow-lg border-2 border-black hover:bg-gray-900 active:scale-95 transition-transform flex items-center space-x-2">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" /></svg>
            <span class="text-xs uppercase font-extrabold tracking-widest hidden sm:inline">Chat With AI</span>
        </button>
    </div>

    <script>
        const chatWindow = document.getElementById('chat-window');
        const chatMessages = document.getElementById('chat-messages');
        const chatInput = document.getElementById('chat-input');
        const chatLoading = document.getElementById('chat-loading');
        let conversations = [];

        function toggleChat() {
            chatWindow.classList.toggle('hidden');
            if (!chatWindow.classList.contains('hidden')) chatInput.focus();
        }

        async function sendMessage(e) {
            e.preventDefault();
            const messageText = chatInput.value.trim();
            if (!messageText) return;

            appendMessage(messageText, 'user');
            chatInput.value = '';
            chatLoading.classList.remove('hidden');
            chatMessages.scrollTop = chatMessages.scrollHeight;

            conversations.push({ role: 'user', parts: [{ text: messageText }] });

            try {
                // Hits your secure Vercel bridge file directly
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ messageHistory: conversations })
                });
                
                const data = await response.json();
                chatLoading.classList.add('hidden');
                
                if (data.reply) {
                    appendMessage(data.reply, 'ai');
                    conversations.push({ role: 'model', parts: [{ text: data.reply }] });
                } else {
                    appendMessage("Sorry, I had trouble processing that request.", 'ai');
                }
            } catch (error) {
                chatLoading.classList.add('hidden');
                appendMessage("Could not connect to the support server right now.", 'ai');
            }
        }

        function appendMessage(text, sender) {
            const wrapper = document.createElement('div');
            wrapper.className = `flex flex-col ${sender === 'user' ? 'items-end' : 'items-start'}`;
            const bubble = document.createElement('div');
            bubble.className = sender === 'user' ? 'bg-black text-white px-3 py-2 rounded-lg max-w-[85%] font-medium' : 'bg-white border-2 border-black text-black px-3 py-2 rounded-lg max-w-[85%] font-medium';
            bubble.textContent = text;
            wrapper.appendChild(bubble);
            chatMessages.appendChild(wrapper);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }
    </script>
</body>
</html>
