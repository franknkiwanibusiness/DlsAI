<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firebase Push App</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white flex items-center justify-center min-h-screen">

    <div class="bg-gray-800 p-8 rounded-2xl shadow-2xl w-full max-w-md text-center border border-gray-700">
        <h1 class="text-2xl font-bold mb-4">Cloud Notifications</h1>
        <p id="status" class="text-gray-400 mb-6">Click below to allow browser alerts.</p>
        
        <button id="btn-permission" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-lg transition-all w-full">
            Enable Notifications
        </button>

        <div id="token-box" class="hidden mt-6 p-4 bg-gray-950 rounded border border-gray-700">
            <p class="text-xs text-green-400 mb-2">Device Token Registered:</p>
            <p id="token-display" class="text-[10px] break-all text-gray-500 font-mono"></p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-app.js";
        import { getMessaging, getToken, onMessage } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-messaging.js";
        import { getDatabase, ref, push, set } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDFHskUWiyHhZke3KT9kkOtFI_gPsKfiGo",
            authDomain: "itzhoyoo-f9f7e.firebaseapp.com",
            databaseURL: "https://itzhoyoo-f9f7e-default-rtdb.firebaseio.com",
            projectId: "itzhoyoo-f9f7e",
            storageBucket: "itzhoyoo-f9f7e.filestorage.app",
            messagingSenderId: "1094792075584",
            appId: "1:1094792075584:web:d49e9c3f899d3cd31082a5"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const messaging = getMessaging(app);
        const db = getDatabase(app);

        const btn = document.getElementById('btn-permission');
        const status = document.getElementById('status');
        const tokenBox = document.getElementById('token-box');
        const tokenDisplay = document.getElementById('token-display');

        const VAPID_KEY = "BMTBoZaETNkmPu3gl42TbHyU9CH6tRTS9_TBGB2-oor3nSvt5WhJyk1PcmOiOLIt5z5xRterBfR2xlY2Ubyq1Do";

        btn.addEventListener('click', async () => {
            try {
                const permission = await Notification.requestPermission();
                
                if (permission === 'granted') {
                    status.innerText = "Requesting token...";
                    
                    const token = await getToken(messaging, { vapidKey: VAPID_KEY });
                    
                    if (token) {
                        // Save token to Realtime Database
                        const tokenRef = ref(db, 'fcm_tokens/');
                        const newTokenRef = push(tokenRef);
                        await set(newTokenRef, {
                            token: token,
                            timestamp: Date.now(),
                            userAgent: navigator.userAgent
                        });

                        status.innerText = "Notifications Active!";
                        tokenBox.classList.remove('hidden');
                        tokenDisplay.innerText = token;
                        btn.classList.add('hidden');
                    }
                } else {
                    status.innerText = "Permission denied. Reset browser settings to try again.";
                }
            } catch (error) {
                console.error("Error:", error);
                status.innerText = "Setup failed. Check console.";
            }
        });

        // Handle messages when tab is active
        onMessage(messaging, (payload) => {
            console.log('Foreground message:', payload);
            new Notification(payload.notification.title, {
                body: payload.notification.body,
                icon: payload.notification.icon || 'https://via.placeholder.com/128'
            });
        });
    </script>
</body>
</html>
