<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DLS26 UCL | Notification Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
        }
        @keyframes zoom-in {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
        .animate-zoom { animation: zoom-in 0.4s ease-out forwards; }
    </style>
</head>
<body class="bg-[#020617] text-white font-sans min-h-screen flex items-center justify-center p-6">

    <div class="glass p-8 w-full max-w-md text-center border-blue-500/20">
        <h1 class="text-3xl font-black italic uppercase tracking-tighter mb-2 text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-indigo-500">
            DLS26 UCL HUB
        </h1>
        <p class="text-[10px] uppercase tracking-[3px] opacity-40 mb-8 font-bold">Tournament Control Center</p>
        
        <div class="space-y-4">
            <div class="p-4 bg-white/5 rounded-2xl border border-white/10 text-left">
                <p class="text-[9px] uppercase opacity-50 font-bold mb-1">Status</p>
                <p class="text-xs font-bold uppercase">Awaiting Match Updates...</p>
            </div>
            <p class="text-[9px] opacity-30 uppercase">The notification prompt will appear in <span id="timer">10</span>s</p>
        </div>
    </div>

    <div id="notif-popup" class="fixed inset-0 hidden bg-black/95 backdrop-blur-xl flex items-center justify-center p-6" style="z-index: 100000;">
        <div class="glass border-blue-500/50 border-2 p-10 w-full max-w-sm text-center shadow-[0_0_100px_rgba(37,99,235,0.4)] animate-zoom">
            
            <div class="relative w-24 h-24 mx-auto mb-8">
                <div class="absolute inset-0 bg-blue-600/30 rounded-full animate-ping"></div>
                <div class="relative w-24 h-24 bg-blue-600/40 rounded-full flex items-center justify-center border border-blue-400/50">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 0 1-3.46 0"/></svg>
                </div>
            </div>
            
            <h2 class="text-3xl font-black italic uppercase tracking-tighter text-white mb-3 leading-none">Don't Miss<br>A Goal</h2>
            <p class="text-[11px] opacity-60 font-black uppercase tracking-[2px] mb-10 leading-relaxed">
                Get push alerts for <br> 
                <span class="text-blue-400">Kick-offs</span> & <span class="text-emerald-400">Winning Payouts</span>
            </p>

            <div class="flex flex-col gap-4">
                <button onclick="handleNotifActivation()" class="w-full bg-blue-600 hover:bg-blue-500 text-white py-5 rounded-2xl font-black text-xs uppercase tracking-[4px] active:scale-95 transition-all shadow-xl shadow-blue-600/40">
                    OK, ENABLE
                </button>
                <button onclick="closeNotifPopup()" class="text-[10px] font-black uppercase tracking-[3px] opacity-40 hover:opacity-100 transition-all text-white py-2">
                    Maybe Later
                </button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-app.js";
        import { getMessaging, getToken } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-messaging.js";
        import { getDatabase, ref, update } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-database.js";
        import { getAuth } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-auth.js";

        // Your Exact Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyDFHskUWiyHhZke3KT9kkOtFI_gPsKfiGo",
            authDomain: "itzhoyoo-f9f7e.firebaseapp.com",
            databaseURL: "https://itzhoyoo-f9f7e-default-rtdb.firebaseio.com",
            projectId: "itzhoyoo-f9f7e",
            storageBucket: "itzhoyoo-f9f7e.firebasestorage.app",
            messagingSenderId: "1055745142104",
            appId: "1:1055745142104:web:8651c6b16e108871408db0"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);
        const messaging = getMessaging(app);

        // --- 1. POPUP TIMER LOGIC ---
        let timeLeft = 10;
        const timerElement = document.getElementById('timer');

        const countdown = setInterval(() => {
            timeLeft--;
            if(timerElement) timerElement.innerText = timeLeft;
            if(timeLeft <= 0) clearInterval(countdown);
        }, 1000);

        setTimeout(() => {
            const popup = document.getElementById('notif-popup');
            if (popup) popup.style.display = 'flex';
        }, 10000);

        // --- 2. NOTIFICATION ACTIVATION ---
        window.handleNotifActivation = async () => {
            try {
                const permission = await Notification.requestPermission();
                
                if (permission === 'granted') {
                    const token = await getToken(messaging, { 
                        vapidKey: 'BMTBoZaETNkmPu3gl42TbHyU9CH6tRTS9_TBGB2-oor3nSvt5WhJyk1PcmOiOLIt5z5xRterBfR2xlY2Ubyq1Do' 
                    });

                    if (token && auth.currentUser) {
                        await update(ref(db, `users/${auth.currentUser.uid}`), {
                            fcmToken: token,
                            notificationsEnabled: true
                        });
                        console.log("Success: Token saved to Player Profile.");
                    } else if (!auth.currentUser) {
                        alert("Please login to your account first!");
                    }
                }
            } catch (err) {
                console.error("Push Error:", err);
            } finally {
                window.closeNotifPopup();
            }
        };

        // --- 3. UI CONTROLS ---
        window.closeNotifPopup = () => {
            const popup = document.getElementById('notif-popup');
            if (popup) popup.style.display = 'none';
        };
    </script>
</body>
</html>
