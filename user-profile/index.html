<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#070710">
    <link rel="icon" type="image/jpeg" href="https://i.imgur.com/8EEl86u.jpeg">
    <title>Seller Profile — Siterifty</title>
    <link rel="dns-prefetch" href="//fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #070710;
            --surface: #0e0e1c;
            --surface2: #141426;
            --surface3: #1a1a30;
            --border: rgba(255,255,255,0.06);
            --border-hover: rgba(255,255,255,0.14);
            --accent: #9b5de5;
            --accent2: #e879a0;
            --accent3: #38bdf8;
            --green: #2dd4a0;
            --red: #f87171;
            --text: #ede9ff;
            --text2: #b8b3d8;
            --muted: #6b6890;
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 18px;
            --radius-xl: 24px;
        }

        *, *::before, *::after {
            font-family: 'DM Sans', sans-serif;
            box-sizing: border-box;
            margin: 0; padding: 0;
            -webkit-tap-highlight-color: transparent;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        * { scrollbar-width: none; -ms-overflow-style: none; }
        *::-webkit-scrollbar { display: none; }
        img { display: block; max-width: 100%; }
        button { border: none; background: none; cursor: pointer; }
        button:focus-visible, a:focus-visible { outline: 2px solid rgba(155,93,229,.5); outline-offset: 2px; }

        html { background: var(--bg); overflow-x: hidden; }
        body {
            background: var(--bg);
            min-height: 100svh;
            overflow-x: hidden;
            padding-top: 64px;
            -webkit-overflow-scrolling: touch;
        }

        body::before {
            content: '';
            position: fixed; inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
            pointer-events: none; z-index: 0;
        }

        /* ── Logo animation ── */
        @keyframes blade-chase {
            0%   { opacity: .12 } 5%   { opacity: 1 }
            25%  { opacity: .18 } 100% { opacity: .12 }
        }
        .blade { animation: blade-chase 1.4s linear infinite; }
        .b-1  { animation-delay: -1.40s } .b-2  { animation-delay: -1.26s }
        .b-3  { animation-delay: -1.12s } .b-4  { animation-delay: -0.98s }
        .b-5  { animation-delay: -0.84s } .b-6  { animation-delay: -0.70s }
        .b-7  { animation-delay: -0.56s } .b-8  { animation-delay: -0.42s }
        .b-9  { animation-delay: -0.28s } .b-10 { animation-delay: -0.14s }

        /* ── Header ── */
        @keyframes line-slide {
            0%   { transform: translateX(-100%) }
            100% { transform: translateX(500%) }
        }
        header {
            position: fixed; top: 0; left: 0; right: 0; z-index: 100;
            height: 64px;
            padding: 0 max(20px, env(safe-area-inset-left));
            padding-right: max(20px, env(safe-area-inset-right));
            display: flex; align-items: center; justify-content: space-between; gap: 12px;
            background: rgba(7,7,16,0.85);
            backdrop-filter: blur(32px) saturate(180%);
            -webkit-backdrop-filter: blur(32px) saturate(180%);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 1px 0 rgba(255,255,255,0.04) inset;
        }
        header::after {
            content: '';
            position: absolute; bottom: -1px; left: 0;
            width: 22%; height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent), var(--accent2), transparent);
            animation: line-slide 4s ease-in-out infinite;
        }
        .wordmark {
            font-family: 'Syne', sans-serif; font-weight: 800;
            font-size: 1.05rem; letter-spacing: -0.05em; color: var(--text); white-space: nowrap;
        }
        .wordmark span {
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
            font-weight: 500;
        }
        .credit-pill {
            background: var(--surface2); border: 1px solid var(--border); border-radius: 999px;
            padding: 6px 13px; display: flex; align-items: center; gap: 7px; cursor: pointer;
            transition: border-color .2s, background .2s;
        }
        .credit-pill:hover { border-color: rgba(155,93,229,.35); background: rgba(155,93,229,.06); }
        .credit-label {
            font-size: 9.5px; font-weight: 600; letter-spacing: .1em; text-transform: uppercase;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .credit-divider { width: 1px; height: 11px; background: var(--border); }
        .credit-amount {
            font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 700;
            color: var(--text); letter-spacing: -0.02em;
        }
        .avatar {
            width: 34px; height: 34px; border-radius: 999px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border: 1.5px solid rgba(255,255,255,0.1);
            display: flex; align-items: center; justify-content: center;
            font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700;
            color: #fff; flex-shrink: 0; cursor: pointer;
            transition: opacity .15s, transform .15s;
        }
        .avatar:hover { opacity: .85; transform: scale(1.05); }
        @media (max-width: 480px) {
            .credit-label, .credit-divider { display: none; }
            .credit-pill { padding: 6px 10px; gap: 5px; }
        }
        @media (max-width: 360px) { .credit-pill { display: none; } }

        /* ── Profile banner ── */
        .profile-banner {
            width: 100%;
            height: 220px;
            background: linear-gradient(135deg, rgba(155,93,229,0.35), rgba(232,121,160,0.35)), var(--surface2);
            background-size: cover;
            background-position: center;
            position: relative;
        }
        @media (max-width: 600px) { .profile-banner { height: 140px; } }

        /* ── Profile section ── */
        .profile-section {
            max-width: 760px;
            margin: 0 auto;
            padding: 0 20px 40px;
            position: relative;
            z-index: 1;
        }
        .profile-pic-wrap {
            display: flex;
            justify-content: center;
            margin-top: -60px;
        }
        .profile-pic {
            width: 112px; height: 112px;
            border-radius: 999px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border: 4px solid var(--bg);
            display: flex; align-items: center; justify-content: center;
            font-family: 'Syne', sans-serif; font-size: 38px; font-weight: 800;
            color: #fff;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
            overflow: hidden;
            flex-shrink: 0;
        }
        .profile-pic img { width: 100%; height: 100%; object-fit: cover; }

        .profile-username {
            text-align: center;
            margin-top: 14px;
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 1.15rem;
            color: var(--text);
        }
        .profile-username span {
            color: var(--muted);
            font-weight: 500;
        }

        .profile-actions {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-top: 22px;
        }
        .btn {
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 14px;
            border-radius: var(--radius-md);
            padding: 11px 22px;
            cursor: pointer;
            transition: transform .15s, opacity .15s, background .15s, border-color .15s;
            display: inline-flex; align-items: center; gap: 8px;
            border: 1px solid transparent;
        }
        .btn:active { transform: scale(0.97); }

        .btn-message {
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: #fff;
        }
        .btn-message:hover { opacity: .9; }

        .btn-report {
            background: rgba(248,113,113,0.1);
            border-color: rgba(248,113,113,0.3);
            color: var(--red);
        }
        .btn-report:hover { background: rgba(248,113,113,0.18); border-color: rgba(248,113,113,0.5); }

        .profile-body {
            margin-top: 32px;
            color: var(--text2);
            font-size: 14px;
            line-height: 1.6;
        }
    </style>
</head>
<body>

<!-- HEADER -->
<header>
    <a href="/" aria-label="Siterifty — home" style="display:flex;align-items:center;gap:10px;flex-shrink:0;text-decoration:none;opacity:1;transition:opacity .18s;" onmouseover="this.style.opacity='.75'" onmouseout="this.style.opacity='1'">
        <svg width="28" height="28" viewBox="0 0 28 28" xmlns="http://www.w3.org/2000/svg" style="flex-shrink:0;">
            <rect class="blade b-1"  x="12.5" y="2" width="3" height="10" rx="1.5" fill="url(#sg)" transform="rotate(0,14,14)"/>
            <rect class="blade b-2"  x="12.5" y="2" width="3" height="10" rx="1.5" fill="url(#sg)" transform="rotate(36,14,14)"/>
            <rect class="blade b-3"  x="12.5" y="2" width="3" height="10" rx="1.5" fill="url(#sg)" transform="rotate(72,14,14)"/>
            <rect class="blade b-4"  x="12.5" y="2" width="3" height="10" rx="1.5" fill="url(#sg)" transform="rotate(108,14,14)"/>
            <rect class="blade b-5"  x="12.5" y="2" width="3" height="10" rx="1.5" fill="url(#sg)" transform="rotate(144,14,14)"/>
            <rect class="blade b-6"  x="12.5" y="2" width="3" height="10" rx="1.5" fill="url(#sg)" transform="rotate(180,14,14)"/>
            <rect class="blade b-7"  x="12.5" y="2" width="3" height="10" rx="1.5" fill="url(#sg)" transform="rotate(216,14,14)"/>
            <rect class="blade b-8"  x="12.5" y="2" width="3" height="10" rx="1.5" fill="url(#sg)" transform="rotate(252,14,14)"/>
            <rect class="blade b-9"  x="12.5" y="2" width="3" height="10" rx="1.5" fill="url(#sg)" transform="rotate(288,14,14)"/>
            <rect class="blade b-10" x="12.5" y="2" width="3" height="10" rx="1.5" fill="url(#sg)" transform="rotate(324,14,14)"/>
            <circle cx="14" cy="14" r="3" fill="#e879a0"/>
            <defs><linearGradient id="sg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#9b5de5"/><stop offset="100%" stop-color="#38bdf8"/></linearGradient></defs>
        </svg>
        <span class="wordmark">Siterifty<span>.com</span></span>
    </a>
    <div style="display:flex;align-items:center;gap:10px;flex-shrink:0;">
        <div class="credit-pill" id="walletPill" onclick="location.href=window.location.origin+'/#topup'">
            <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><circle cx="6.5" cy="6.5" r="5.75" stroke="#9b5de5" stroke-width="1.2"/><text x="6.5" y="9.5" text-anchor="middle" font-size="7" font-family="Syne,sans-serif" font-weight="700" fill="#9b5de5">$</text></svg>
            <span class="credit-label">Wallet</span>
            <div class="credit-divider"></div>
            <span class="credit-amount" id="walletPillAmount">—</span>
        </div>
        <a href="/" title="Back to home" style="display:flex;align-items:center;justify-content:center;width:34px;height:34px;border-radius:999px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);color:var(--muted);transition:background .15s,color .15s,border-color .15s;text-decoration:none;" onmouseover="this.style.background='rgba(155,93,229,0.1)';this.style.borderColor='rgba(155,93,229,0.28)';this.style.color='var(--accent)'" onmouseout="this.style.background='rgba(255,255,255,0.04)';this.style.borderColor='rgba(255,255,255,0.08)';this.style.color='var(--muted)'">
            <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><path d="M1.5 7.5L7.5 2l6 5.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/><rect x="4" y="7.5" width="7" height="6" rx="1" stroke="currentColor" stroke-width="1.4"/></svg>
        </a>
        <div class="avatar" id="avatarBtn" style="display:none;" onclick="location.href=window.location.origin+'/#account'" title="Account">
            <svg width="17" height="17" viewBox="0 0 17 17" fill="none" id="avatarGuestIcon"><circle cx="8.5" cy="5.5" r="3" stroke="rgba(255,255,255,0.7)" stroke-width="1.4"/><path d="M2 15c0-3.314 2.91-6 6.5-6s6.5 2.686 6.5 6" stroke="rgba(255,255,255,0.7)" stroke-width="1.4" stroke-linecap="round"/></svg>
        </div>
    </div>
</header>

<!-- PROFILE BANNER -->
<div class="profile-banner" id="profileBanner"></div>

<!-- PROFILE SECTION -->
<div class="profile-section">
    <div class="profile-pic-wrap">
        <div class="profile-pic" id="profilePic">SR</div>
    </div>

    <div class="profile-username" id="profileUsername">Seller Name</div>

    <div class="profile-actions">
        <button class="btn btn-message" id="messageBtn" onclick="if(window.openContactModal) openContactModal('Seller Name', null, '', '', '')">
            <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><path d="M1.5 2.5h12v8h-5l-3.5 3v-3h-3.5v-8Z" stroke="white" stroke-width="1.4" stroke-linejoin="round"/></svg>
            Message
        </button>
        <button class="btn btn-report" id="reportBtn">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 1v12M2 1.5h8l-1.5 2.25L10 6H2" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/></svg>
            Report
        </button>
    </div>

    <div class="profile-body" id="profileBody">
        <!-- More seller info goes here -->
    </div>
</div>

</body>
</html>
