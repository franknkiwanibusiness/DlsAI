<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#070710">
    <link rel="icon" type="image/jpeg" href="https://i.imgur.com/8EEl86u.jpeg">
    <link rel="shortcut icon" type="image/jpeg" href="https://i.imgur.com/8EEl86u.jpeg">
    <link rel="apple-touch-icon" href="https://i.imgur.com/8EEl86u.jpeg">
    <title>Messages — Siterifty</title>
    <link rel="dns-prefetch" href="//fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #070710;
            --surface: #0e0e1c;
            --surface2: #141426;
            --surface3: #1a1a30;
            --border: rgba(255,255,255,0.06);
            --border-hover: rgba(255,255,255,0.14);
            --accent: #9b5de5;
            --accent2: #e879a0;
            --accent3: #38bdf8;
            --accent-glow: rgba(155,93,229,0.15);
            --green: #2dd4a0;
            --yellow: #f5c842;
            --red: #f87171;
            --text: #ede9ff;
            --text2: #b8b3d8;
            --muted: #6b6890;
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 18px;
            --radius-xl: 24px;
        }

        *, *::before, *::after {
            font-family: 'DM Sans', sans-serif;
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        * { scrollbar-width: none; -ms-overflow-style: none; }
        *::-webkit-scrollbar { display: none; }

        html { background: var(--bg); width: 100%; overflow-x: hidden; }
        /* ── LAYOUT TOKENS ── */
        :root {
            --header-h: 64px;
            --ann-h: 34px;
            --chrome-h: calc(var(--header-h) + var(--ann-h)); /* 98px total fixed chrome */
        }

        body {
            background: var(--bg);
            min-height: 100svh;
            width: 100%;
            overflow-x: hidden;
            padding-top: var(--chrome-h);
            -webkit-overflow-scrolling: touch;
        }

        /* Grain overlay */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 0;
        }

        /* ── LOGO ANIMATION ── */
        @keyframes blade-chase {
            0%   { opacity: .12 }
            5%   { opacity: 1 }
            25%  { opacity: .18 }
            100% { opacity: .12 }
        }
        .blade { animation: blade-chase 1.4s linear infinite; }
        .b-1  { animation-delay: -1.40s } .b-2  { animation-delay: -1.26s }
        .b-3  { animation-delay: -1.12s } .b-4  { animation-delay: -0.98s }
        .b-5  { animation-delay: -0.84s } .b-6  { animation-delay: -0.70s }
        .b-7  { animation-delay: -0.56s } .b-8  { animation-delay: -0.42s }
        .b-9  { animation-delay: -0.28s } .b-10 { animation-delay: -0.14s }

        /* ── HEADER ── */
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes line-slide {
            0%   { transform: translateX(-100%) }
            100% { transform: translateX(500%) }
        }
        header {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 100;
            height: 64px;
            padding: 0 20px;
            padding-left: max(20px, env(safe-area-inset-left));
            padding-right: max(20px, env(safe-area-inset-right));
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            background: rgba(7,7,16,0.85);
            backdrop-filter: blur(32px) saturate(180%);
            -webkit-backdrop-filter: blur(32px) saturate(180%);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 1px 0 rgba(255,255,255,0.04) inset;
        }
        header::after {
            content: '';
            position: absolute;
            bottom: -1px; left: 0;
            width: 22%;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent), var(--accent2), transparent);
            animation: line-slide 4s ease-in-out infinite;
        }

        .wordmark {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 1.05rem;
            letter-spacing: -0.05em;
            color: var(--text);
            white-space: nowrap;
        }
        .wordmark span {
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 500;
        }

        .credit-pill {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 999px;
            padding: 6px 13px;
            display: flex;
            align-items: center;
            gap: 7px;
            cursor: pointer;
            transition: border-color .2s, background .2s;
        }
        .credit-pill:hover { border-color: rgba(155,93,229,0.35); background: rgba(155,93,229,0.06); }
        .credit-label {
            font-size: 9.5px;
            font-weight: 600;
            letter-spacing: .1em;
            text-transform: uppercase;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .credit-divider { width: 1px; height: 11px; background: var(--border); }
        .credit-amount {
            font-family: 'Syne', sans-serif;
            font-size: 12px;
            font-weight: 700;
            color: var(--text);
            letter-spacing: -0.02em;
        }
        .avatar {
            width: 34px; height: 34px;
            border-radius: 999px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border: 1.5px solid rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Syne', sans-serif;
            font-size: 13px;
            font-weight: 700;
            color: #fff;
            flex-shrink: 0;
            cursor: pointer;
            transition: opacity .15s, transform .15s;
        }
        .avatar:hover { opacity: .85; transform: scale(1.05); }

        @media (max-width: 480px) {
            .credit-label, .credit-divider { display: none; }
            .credit-pill { padding: 6px 10px; gap: 5px; }
            .credit-amount { font-size: 11px; }
            .wordmark { font-size: .95rem; }
        }
        @media (max-width: 360px) { .credit-pill { display: none; } }

        /* ── ANNOUNCEMENT BAR ── */
        #billingBanner {
            display: block;
            position: fixed;
            top: 64px; left: 0; right: 0;
            z-index: 90;
            width: 100%;
        }
        .ann-inner {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            padding: 6px 20px;
            background: rgba(7,7,16,0.97);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .ann-left { display: flex; align-items: center; gap: 8px; min-width: 0; }
        .ann-username {
            font-family: 'Syne', sans-serif;
            font-size: 11px;
            font-weight: 700;
            color: var(--text);
            letter-spacing: -0.01em;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 140px;
        }
        .ann-username.not-logged { color: var(--muted); font-weight: 400; letter-spacing: .04em; font-size: 10px; text-transform: uppercase; }
        .ann-plan-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            border-radius: 999px;
            padding: 3px 9px;
            font-size: 9px;
            font-weight: 700;
            letter-spacing: .08em;
            text-transform: uppercase;
            white-space: nowrap;
            flex-shrink: 0;
            border: 1px solid transparent;
        }
        .plan-free    { background: rgba(120,80,40,.14); border-color: rgba(160,100,50,.3) !important; color: #b87840; }
        .ann-right { flex-shrink: 0; }
        .ann-upgrade-btn {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 5px 13px;
            border-radius: 999px;
            font-family: 'Syne', sans-serif;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: .04em;
            text-decoration: none;
            transition: opacity .15s, background .15s;
            border: 1px solid;
            white-space: nowrap;
            background: rgba(155,93,229,.08); border-color: rgba(155,93,229,.22); color: var(--accent);
        }
        .ann-upgrade-btn:hover { background: rgba(155,93,229,.16); }

        /* ── PAGE LAYOUT ── */
        .page-wrap {
            position: relative;
            z-index: 1;
            max-width: 860px;
            margin: 0 auto;
            padding: 28px 16px 60px;
        }
        /* When chat is open: stretch page-wrap to fill remaining screen, no scroll */
        .page-wrap.chat-active {
            padding: 0;
            height: calc(100svh - var(--chrome-h));
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* ── BREADCRUMB ── */
        .breadcrumb-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 22px;
        }
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 999px;
            padding: 6px 13px;
            font-family: 'Syne', sans-serif;
            font-size: 11px;
            font-weight: 600;
            color: var(--muted);
            cursor: pointer;
            transition: background .15s, color .15s, border-color .15s;
            white-space: nowrap;
        }
        .back-btn:hover { background: var(--surface3); color: var(--text); border-color: var(--border-hover); }
        .breadcrumb-sep { color: rgba(255,255,255,0.2); font-size: 11px; }
        .breadcrumb-current { font-size: 11px; color: var(--text2); font-weight: 500; }

        /* ── PAGE TITLE ── */
        .page-title-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 20px;
        }
        .page-title {
            font-family: 'Syne', sans-serif;
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -0.05em;
            color: var(--text);
        }
        .unread-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 20px;
            height: 20px;
            border-radius: 999px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            font-family: 'Syne', sans-serif;
            font-size: 10px;
            font-weight: 700;
            color: #fff;
            padding: 0 6px;
        }

        /* ── TABS ── */
        .tabs-row {
            display: flex;
            gap: 4px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 4px;
            margin-bottom: 16px;
        }
        .tab-btn {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 8px 12px;
            border-radius: var(--radius-sm);
            font-family: 'Syne', sans-serif;
            font-size: 11.5px;
            font-weight: 600;
            letter-spacing: .01em;
            color: var(--muted);
            cursor: pointer;
            transition: background .18s, color .18s;
            border: none;
            background: none;
            white-space: nowrap;
        }
        .tab-btn:hover { color: var(--text2); background: rgba(255,255,255,0.04); }
        .tab-btn.active {
            background: var(--surface3);
            color: var(--text);
            border: 1px solid rgba(255,255,255,0.08);
        }
        .tab-dot {
            width: 6px; height: 6px;
            border-radius: 999px;
            background: var(--accent2);
            flex-shrink: 0;
        }

        /* ── SEARCH BAR ── */
        .msg-search-wrap {
            position: relative;
            margin-bottom: 14px;
        }
        .msg-search-icon {
            position: absolute;
            left: 14px; top: 50%;
            transform: translateY(-50%);
            color: var(--muted);
            display: flex;
            align-items: center;
            pointer-events: none;
        }
        #msgSearch {
            width: 100%;
            background: var(--surface);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: var(--radius-md);
            padding: 10px 14px 10px 40px;
            font-size: 13px;
            color: var(--text);
            outline: none;
            transition: border-color .2s, box-shadow .2s;
        }
        #msgSearch::placeholder { color: var(--muted); font-size: 12.5px; }
        #msgSearch:focus {
            border-color: rgba(155,93,229,0.4);
            box-shadow: 0 0 0 3px rgba(155,93,229,0.07);
        }

        /* ── CONVERSATION LIST ── */
        .conv-list { display: flex; flex-direction: column; gap: 2px; }

        .conv-item {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 14px 16px;
            border-radius: var(--radius-md);
            background: var(--surface);
            border: 1px solid var(--border);
            cursor: pointer;
            transition: background .18s, border-color .18s;
            position: relative;
            text-decoration: none;
            color: inherit;
        }
        .conv-item:hover {
            background: var(--surface2);
            border-color: var(--border-hover);
        }
        .conv-item.unread {
            border-color: rgba(155,93,229,0.2);
            background: rgba(155,93,229,0.04);
        }
        .conv-item.unread:hover {
            border-color: rgba(155,93,229,0.35);
            background: rgba(155,93,229,0.08);
        }

        /* Unread indicator stripe */
        .conv-item.unread::before {
            content: '';
            position: absolute;
            left: 0; top: 14px; bottom: 14px;
            width: 3px;
            border-radius: 0 3px 3px 0;
            background: linear-gradient(180deg, var(--accent), var(--accent2));
        }

        .conv-avatar {
            width: 42px; height: 42px;
            border-radius: 999px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Syne', sans-serif;
            font-size: 15px;
            font-weight: 800;
            color: #fff;
            position: relative;
        }
        .conv-avatar .online-dot {
            position: absolute;
            bottom: 1px; right: 1px;
            width: 10px; height: 10px;
            border-radius: 999px;
            background: var(--green);
            border: 2px solid var(--bg);
        }

        .conv-body { flex: 1; min-width: 0; }
        .conv-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            margin-bottom: 4px;
        }
        .conv-name {
            font-family: 'Syne', sans-serif;
            font-size: 13px;
            font-weight: 700;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .conv-item.unread .conv-name { color: #fff; }
        .conv-time {
            font-size: 10.5px;
            color: var(--muted);
            flex-shrink: 0;
            letter-spacing: .01em;
        }
        .conv-preview {
            font-size: 12.5px;
            color: var(--muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            line-height: 1.45;
        }
        .conv-item.unread .conv-preview {
            color: var(--text2);
            font-weight: 500;
        }
        .conv-listing-pill {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            margin-top: 6px;
            background: rgba(155,93,229,.07);
            border: 1px solid rgba(155,93,229,.18);
            border-radius: 6px;
            padding: 2px 8px;
            font-size: 10px;
            color: rgba(155,93,229,.85);
            font-weight: 600;
            max-width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .conv-unread-count {
            flex-shrink: 0;
            min-width: 18px; height: 18px;
            border-radius: 999px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Syne', sans-serif;
            font-size: 9px;
            font-weight: 700;
            color: #fff;
            padding: 0 5px;
        }

        /* ── SECTION LABEL ── */
        .conv-section-label {
            font-family: 'Syne', sans-serif;
            font-size: 9.5px;
            font-weight: 700;
            letter-spacing: .1em;
            text-transform: uppercase;
            color: var(--muted);
            padding: 14px 4px 6px;
        }

        /* ── EMPTY STATE ── */
        .empty-state {
            text-align: center;
            padding: 64px 24px;
        }
        .empty-icon {
            width: 56px; height: 56px;
            border-radius: var(--radius-lg);
            background: rgba(155,93,229,0.07);
            border: 1px solid rgba(155,93,229,0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
        }
        .empty-title {
            font-family: 'Syne', sans-serif;
            font-size: 15px;
            font-weight: 700;
            color: var(--text2);
            margin-bottom: 6px;
        }
        .empty-sub {
            font-size: 13px;
            color: var(--muted);
            max-width: 260px;
            margin: 0 auto 20px;
            line-height: 1.55;
        }

        /* ── DIVIDER ── */
        .section-divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(155,93,229,.18), rgba(232,121,160,.1), transparent);
            margin: 8px 0;
        }

        /* ── CHAT VIEW ── */
        .chat-view {
            display: none;
            flex-direction: column;
            flex: 1;
            min-height: 0;
            overflow: hidden;
            padding: 0 16px;
        }
        .chat-view.active { display: flex; }

        .chat-topbar {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 0 14px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 0;
            flex-shrink: 0;
        }
        .chat-back-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 34px; height: 34px;
            border-radius: 999px;
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--muted);
            cursor: pointer;
            flex-shrink: 0;
            transition: background .15s, color .15s;
        }
        .chat-back-btn:hover { background: var(--surface3); color: var(--text); }
        .chat-topbar-avatar {
            width: 36px; height: 36px;
            border-radius: 999px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Syne', sans-serif;
            font-size: 13px;
            font-weight: 800;
            color: #fff;
        }
        .chat-topbar-info { flex: 1; min-width: 0; }
        .chat-topbar-name {
            font-family: 'Syne', sans-serif;
            font-size: 14px;
            font-weight: 700;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .chat-topbar-meta {
            font-size: 11px;
            color: var(--muted);
            margin-top: 1px;
        }
        .chat-topbar-actions { display: flex; gap: 6px; flex-shrink: 0; }
        .chat-action-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 32px; height: 32px;
            border-radius: var(--radius-sm);
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--muted);
            cursor: pointer;
            transition: background .15s, color .15s, border-color .15s;
        }
        .chat-action-btn:hover { background: var(--surface3); color: var(--text); border-color: var(--border-hover); }

        /* Context banner */
        .chat-context-banner {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            background: rgba(155,93,229,0.05);
            border: 1px solid rgba(155,93,229,0.15);
            border-radius: var(--radius-md);
            margin: 12px 0;
            flex-shrink: 0;
        }
        .chat-context-thumb {
            width: 36px; height: 36px;
            border-radius: var(--radius-sm);
            background: var(--surface3);
            flex-shrink: 0;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .chat-context-info { flex: 1; min-width: 0; }
        .chat-context-label {
            font-size: 9.5px;
            font-weight: 600;
            letter-spacing: .08em;
            text-transform: uppercase;
            color: rgba(155,93,229,.7);
            margin-bottom: 2px;
        }
        .chat-context-title {
            font-family: 'Syne', sans-serif;
            font-size: 12px;
            font-weight: 700;
            color: var(--text2);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .chat-context-price {
            font-family: 'Syne', sans-serif;
            font-size: 12px;
            font-weight: 700;
            color: var(--green);
            flex-shrink: 0;
        }

        /* Messages area */
        .chat-messages {
            flex: 1;
            min-height: 0;
            overflow-y: auto;
            padding: 8px 0 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .msg-day-divider {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 4px 0;
        }
        .msg-day-divider::before,
        .msg-day-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }
        .msg-day-label {
            font-size: 10px;
            color: var(--muted);
            font-weight: 500;
            white-space: nowrap;
            letter-spacing: .03em;
        }

        .msg-row {
            display: flex;
            align-items: flex-end;
            gap: 8px;
        }
        .msg-row.own { flex-direction: row-reverse; }

        .msg-avatar-sm {
            width: 26px; height: 26px;
            border-radius: 999px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Syne', sans-serif;
            font-size: 9px;
            font-weight: 800;
            color: #fff;
            margin-bottom: 2px;
        }

        .msg-bubble {
            max-width: 72%;
            padding: 10px 14px;
            border-radius: var(--radius-lg);
            font-size: 13.5px;
            line-height: 1.5;
            color: var(--text);
            position: relative;
            word-break: break-word;
        }
        .msg-bubble.them {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-bottom-left-radius: 5px;
            color: var(--text2);
        }
        .msg-bubble.own {
            background: linear-gradient(135deg, rgba(155,93,229,0.25), rgba(232,121,160,0.18));
            border: 1px solid rgba(155,93,229,0.25);
            border-bottom-right-radius: 5px;
            color: var(--text);
        }
        .msg-bubble .msg-time {
            display: block;
            font-size: 9.5px;
            color: var(--muted);
            margin-top: 4px;
            text-align: right;
        }
        .msg-bubble.them .msg-time { text-align: left; }

        /* System message */
        .msg-system {
            text-align: center;
            font-size: 11px;
            color: var(--muted);
            padding: 4px 16px;
            background: rgba(255,255,255,0.03);
            border-radius: 999px;
            align-self: center;
        }

        /* Offer card inside chat */
        .msg-offer-card {
            background: var(--surface2);
            border: 1px solid rgba(45,212,160,0.2);
            border-radius: var(--radius-md);
            padding: 12px 14px;
            max-width: 280px;
        }
        .msg-offer-label {
            font-size: 9.5px;
            font-weight: 700;
            letter-spacing: .08em;
            text-transform: uppercase;
            color: var(--green);
            margin-bottom: 6px;
        }
        .msg-offer-amount {
            font-family: 'Syne', sans-serif;
            font-size: 20px;
            font-weight: 800;
            color: var(--text);
            letter-spacing: -0.04em;
            margin-bottom: 8px;
        }
        .msg-offer-actions { display: flex; gap: 6px; }
        .msg-offer-accept {
            flex: 1;
            padding: 7px 0;
            border-radius: var(--radius-sm);
            background: rgba(45,212,160,0.1);
            border: 1px solid rgba(45,212,160,0.3);
            color: var(--green);
            font-family: 'Syne', sans-serif;
            font-size: 11px;
            font-weight: 700;
            cursor: pointer;
            transition: background .15s;
        }
        .msg-offer-accept:hover { background: rgba(45,212,160,0.2); }
        .msg-offer-decline {
            flex: 1;
            padding: 7px 0;
            border-radius: var(--radius-sm);
            background: rgba(248,113,113,0.07);
            border: 1px solid rgba(248,113,113,0.18);
            color: var(--red);
            font-family: 'Syne', sans-serif;
            font-size: 11px;
            font-weight: 700;
            cursor: pointer;
            transition: background .15s;
        }
        .msg-offer-decline:hover { background: rgba(248,113,113,0.15); }

        /* ── COMPOSE BAR ── */
        .chat-compose {
            display: flex;
            align-items: flex-end;
            gap: 8px;
            padding: 12px 0;
            padding-bottom: max(12px, env(safe-area-inset-bottom));
            border-top: 1px solid var(--border);
            flex-shrink: 0;
        }
        .compose-input-wrap {
            flex: 1;
            background: var(--surface);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: var(--radius-lg);
            display: flex;
            align-items: flex-end;
            gap: 0;
            transition: border-color .2s, box-shadow .2s;
        }
        .compose-input-wrap:focus-within {
            border-color: rgba(155,93,229,0.4);
            box-shadow: 0 0 0 3px rgba(155,93,229,0.07);
        }
        #composeInput {
            flex: 1;
            background: none;
            border: none;
            outline: none;
            padding: 11px 14px;
            font-size: 13.5px;
            color: var(--text);
            resize: none;
            max-height: 120px;
            min-height: 44px;
            line-height: 1.5;
        }
        #composeInput::placeholder { color: var(--muted); font-size: 13px; }
        .compose-attach-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 36px; height: 36px;
            border-radius: 999px;
            background: none;
            border: none;
            color: var(--muted);
            cursor: pointer;
            flex-shrink: 0;
            margin: 4px 4px 4px 0;
            transition: color .15s, background .15s;
        }
        .compose-attach-btn:hover { color: var(--text2); background: rgba(255,255,255,0.05); }
        .compose-send-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 44px; height: 44px;
            border-radius: 999px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border: none;
            color: #fff;
            cursor: pointer;
            flex-shrink: 0;
            transition: opacity .15s, transform .12s;
        }
        .compose-send-btn:hover { opacity: .88; }
        .compose-send-btn:active { transform: scale(.93); }

        /* ── FOOTER ── */
        footer {
            padding: 32px 20px 48px;
            border-top: 1px solid rgba(255,255,255,0.04);
            text-align: center;
            position: relative;
            z-index: 1;
        }
        .footer-links {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            gap: 6px 14px;
            font-size: 11.5px;
            color: rgba(180,176,220,0.7);
        }
        .footer-links a {
            color: rgba(155,93,229,.65);
            text-decoration: none;
            transition: color .15s;
        }
        .footer-links a:hover { color: var(--accent); }
        .footer-sep { opacity: .3; }

        button { cursor: pointer; }
        button:focus, a:focus { outline: none; }
        button:focus-visible { outline: 2px solid rgba(155,93,229,.5); outline-offset: 2px; }

        /* ── RESPONSIVE ── */
        @media (min-width: 640px) {
            .page-wrap:not(.chat-active) { padding: 32px 24px 60px; }
        }

        /* ── ANIMATIONS ── */
        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .conv-item { animation: fadeSlideUp .28s ease both; }
        .conv-item:nth-child(1)  { animation-delay: .02s }
        .conv-item:nth-child(2)  { animation-delay: .05s }
        .conv-item:nth-child(3)  { animation-delay: .08s }
        .conv-item:nth-child(4)  { animation-delay: .11s }
        .conv-item:nth-child(5)  { animation-delay: .14s }
        .conv-item:nth-child(6)  { animation-delay: .17s }
    </style>
</head>
<body>

<!-- ══ HEADER ══ -->
<header>
    <a href="/" aria-label="Siterifty — home" style="display:flex;align-items:center;gap:10px;flex-shrink:0;text-decoration:none;opacity:1;transition:opacity .18s;" onmouseover="this.style.opacity='.75'" onmouseout="this.style.opacity='1'">
        <svg width="28" height="28" viewBox="0 0 28 28" xmlns="http://www.w3.org/2000/svg" style="flex-shrink:0;">

        <span class="wordmark">Siterifty<span>.com</span></span>

    <div style="display:flex;align-items:center;gap:10px;flex-shrink:0;">

            <span class="credit-label">Wallet</span>
            <div class="credit-divider"></div>
            <span class="credit-amount" id="walletPillAmount">—</span>
        </div>
        <a href="/" title="Back to home" style="display:flex;align-items:center;justify-content:center;width:34px;height:34px;border-radius:999px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);color:var(--muted);transition:background .15s,color .15s,border-color .15s;text-decoration:none;" onmouseover="this.style.background='rgba(155,93,229,0.1)';this.style.borderColor='rgba(155,93,229,0.28)';this.style.color='var(--accent)'" onmouseout="this.style.background='rgba(255,255,255,0.04)';this.style.borderColor='rgba(255,255,255,0.08)';this.style.color='var(--muted)'">
            <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><path d="M1.5 7.5L7.5 2l6 5.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/><rect x="4" y="7.5" width="7" height="6" rx="1" stroke="currentColor" stroke-width="1.4"/></svg>

        <div class="avatar" id="avatarBtn" onclick="location.href='/#account'" title="Account">M</div>

</header>

<!-- ══ ANNOUNCEMENT BAR ══ -->
<div id="billingBanner">
    <div class="ann-inner">
        <div class="ann-left">
            <span class="ann-username not-logged" id="annUsername">Not signed in</span>
            <span class="ann-plan-badge plan-free" id="annPlanBadge" style="display:none;">Free</span>

                Upgrade
            </a>
        </div>
    </div>
</div>

<!-- ══ PAGE ══ -->
<div class="page-wrap" id="pageWrap">

    <!-- ══ LIST VIEW ══ -->
    <div id="listView">

        <div class="breadcrumb-row">
            <button class="back-btn" onclick="history.back()">
                <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M8 2L4 6l4 4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
                Back
            </button>
            <span class="breadcrumb-sep">›</span>
            <a href="/" style="font-size:11px;color:var(--muted);text-decoration:none;transition:color .15s;" onmouseover="this.style.color='var(--text2)'" onmouseout="this.style.color='var(--muted)'">Home</a>
            <span class="breadcrumb-sep">›</span>
            <span class="breadcrumb-current">Messages</span>
        </div>

        <div class="page-title-row">
            <div style="display:flex;align-items:center;gap:10px;">
                <div class="page-title">Messages</div>
                <div class="unread-badge" id="unreadBadge" style="display:none;"></div>
            </div>
            <button onclick="showCompose()" style="display:inline-flex;align-items:center;gap:6px;background:var(--surface2);border:1px solid var(--border);border-radius:999px;padding:7px 14px;font-family:'Syne',sans-serif;font-size:11px;font-weight:700;color:var(--text2);transition:background .15s,border-color .15s,color .15s;" onmouseover="this.style.borderColor='rgba(155,93,229,.35)';this.style.color='var(--accent)'" onmouseout="this.style.borderColor='var(--border)';this.style.color='var(--text2)'">
                <svg width="11" height="11" viewBox="0 0 12 12" fill="none"><path d="M6 1v10M1 6h10" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
                New
            </button>
        </div>

        <!-- Tabs -->
        <div class="tabs-row">
            <button class="tab-btn active" data-tab="all" onclick="switchTab('all', this)">
                All
            </button>
            <button class="tab-btn" data-tab="buying" onclick="switchTab('buying', this)">
                <div class="tab-dot"></div>
                Buying
            </button>
            <button class="tab-btn" data-tab="selling" onclick="switchTab('selling', this)">
                <div class="tab-dot"></div>
                Selling
            </button>
            <button class="tab-btn" data-tab="archived" onclick="switchTab('archived', this)">
                Archived
            </button>
        </div>

        <!-- Search -->
        <div class="msg-search-wrap">
            <div class="msg-search-icon">
                <svg width="14" height="14" viewBox="0 0 20 20" fill="none"><circle cx="9" cy="9" r="6.5" stroke="currentColor" stroke-width="1.8"/><path d="M14 14L18 18" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
            </div>
            <input type="text" id="msgSearch" placeholder="Search conversations…" autocomplete="off">
        </div>

        <!-- Conversation list — populated by Firebase -->
        <div class="conv-list" id="convList">
            <div id="convLoading" style="padding:48px 0;display:flex;flex-direction:column;align-items:center;gap:10px;color:var(--muted);font-size:13px;">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" style="opacity:.4;animation:spin 1s linear infinite;"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2" stroke-dasharray="40" stroke-dashoffset="10" stroke-linecap="round"/></svg>
                Loading…
            </div>
        </div><!-- /conv-list -->

    </div><!-- /listView -->

    <!-- ══ USER SEARCH OVERLAY ══ -->
    <div id="userSearchOverlay" style="display:none;position:fixed;inset:0;z-index:200;background:rgba(7,7,16,0.72);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);padding-top:var(--chrome-h, 98px);box-sizing:border-box;">
        <div style="position:absolute;inset:0;" onclick="closeUserSearch()"></div>
        <div style="position:relative;max-width:420px;margin:12px auto 0;background:var(--surface);border:1px solid var(--border-hover);border-radius:var(--radius-xl);overflow:hidden;box-shadow:0 24px 64px rgba(0,0,0,.55);max-height:calc(100svh - var(--chrome-h, 98px) - 24px);display:flex;flex-direction:column;">
            <!-- Search input -->
            <div style="display:flex;align-items:center;gap:10px;padding:14px 16px;border-bottom:1px solid var(--border);flex-shrink:0;">
                <svg width="15" height="15" viewBox="0 0 20 20" fill="none" style="flex-shrink:0;color:var(--muted);"><circle cx="9" cy="9" r="6.5" stroke="currentColor" stroke-width="1.8"/><path d="M14 14L18 18" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
                <input id="userSearchInput" type="text" placeholder="Search by username…" autocomplete="off" autocorrect="off" spellcheck="false"
                    style="flex:1;background:none;border:none;outline:none;font-size:14px;color:var(--text);font-family:'DM Sans',sans-serif;"
                    oninput="onUserSearchInput(this.value)">
                <button onclick="closeUserSearch()" style="background:var(--surface2);border:1px solid var(--border);border-radius:999px;width:26px;height:26px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--muted);flex-shrink:0;">
                    <svg width="9" height="9" viewBox="0 0 10 10" fill="none"><path d="M1 1l8 8M9 1l-8 8" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
                </button>
            </div>
            <!-- Results -->
            <div id="userSearchResults" style="overflow-y:auto;padding:8px 0;flex:1;">
                <div id="userSearchHint" style="padding:24px 16px;text-align:center;font-size:12px;color:var(--muted);">Type a username to start searching</div>
            </div>
        </div>
    </div>

    <!-- ══ CHAT VIEW ══ -->
    <div class="chat-view" id="chatView">

        <!-- Topbar -->
        <div class="chat-topbar">
            <button class="chat-back-btn" onclick="closeChat()">
                <svg width="13" height="13" viewBox="0 0 12 12" fill="none"><path d="M8 2L4 6l4 4" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
            <div class="chat-topbar-avatar" id="chatAvatar" style="background:linear-gradient(135deg,#9b5de5,#38bdf8);"></div>
            <div class="chat-topbar-info">
                <div class="chat-topbar-name" id="chatName"></div>
                <div class="chat-topbar-meta" id="chatMeta"></div>
            </div>
            <div class="chat-topbar-actions">
                <button class="chat-action-btn" title="View listing" id="chatListingBtn">
                    <svg width="13" height="13" viewBox="0 0 14 14" fill="none"><rect x="1.5" y="1.5" width="11" height="11" rx="2" stroke="currentColor" stroke-width="1.3"/><path d="M4.5 7h5M4.5 9h3" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
                </button>
                <button class="chat-action-btn" title="More options" id="chatMoreBtn">
                    <svg width="13" height="13" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="3" r="1" fill="currentColor"/><circle cx="7" cy="7" r="1" fill="currentColor"/><circle cx="7" cy="11" r="1" fill="currentColor"/></svg>
                </button>
            </div>
        </div>

        <!-- Context banner -->
        <div class="chat-context-banner">
            <div class="chat-context-thumb">
                <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><rect x="2" y="2" width="14" height="14" rx="3" stroke="rgba(155,93,229,.5)" stroke-width="1.3"/><path d="M5.5 9h7M5.5 11.5h4.5" stroke="rgba(155,93,229,.5)" stroke-width="1.2" stroke-linecap="round"/></svg>
            </div>
            <div class="chat-context-info">
                <div class="chat-context-label">Listing</div>
                <div class="chat-context-title" id="chatListingTitle"></div>
            </div>
            <div class="chat-context-price" id="chatListingPrice"></div>
        </div>

        <!-- Messages — populated by Firebase -->
        <div class="chat-messages" id="chatMessages">
            <div id="offerResponse"></div>
        </div><!-- /chat-messages -->

        <!-- Compose -->
        <div class="chat-compose">
            <div class="compose-input-wrap">
                <textarea id="composeInput" placeholder="Type a message…" rows="1" onkeydown="handleCompose(event)"></textarea>
                <button class="compose-attach-btn" title="Attach file" id="attachBtn">
                    <svg width="15" height="15" viewBox="0 0 16 16" fill="none"><path d="M13.5 7.5L7.5 13.5a4 4 0 0 1-5.657-5.657l6-6a2.5 2.5 0 1 1 3.536 3.536L5.4 11.4a1 1 0 0 1-1.414-1.414L9.5 4.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </button>
            </div>
            <button class="compose-send-btn" onclick="sendMessage()" title="Send">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M14 2L2 7l5 2 2 5 5-12z" fill="white"/></svg>
            </button>
        </div>

    </div><!-- /chatView -->

</div><!-- /page-wrap -->

<!-- Footer — only shown in list view -->
<footer id="siteFooter">
    <div class="footer-links">
        <span>© <span id="footerYear"></span> Siterifty</span>
        <span class="footer-sep">·</span>
        <a href="https://siterifty.com/terms" target="_blank" rel="noopener">Terms</a>
        <span class="footer-sep">·</span>
        <a href="https://siterifty.com/privacy" target="_blank" rel="noopener">Privacy</a>
        <span class="footer-sep">·</span>
        <a href="mailto:support@siterifty.com">Contact</a>
        <span class="footer-sep">·</span>
        <a href="/sell-my-site">Sell My Site</a>
    </div>
</footer>

<script>
document.getElementById('footerYear').textContent = new Date().getFullYear();

// ── TAB SWITCHING ──
function switchTab(tab, el) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    window._activeTab = tab;
    const convs = document.querySelectorAll('.conv-item');
    convs.forEach(c => {
        if (tab === 'archived') {
            c.style.display = c.dataset.tab === 'archived' ? 'flex' : 'none';
        } else if (tab === 'buying') {
            c.style.display = (c.dataset.tab === 'archived' || c.dataset.tab === 'selling') ? 'none' : 'flex';
        } else if (tab === 'selling') {
            c.style.display = (c.dataset.tab === 'archived') ? 'none' : (c.dataset.tab === 'selling' ? 'flex' : 'none');
        } else {
            c.style.display = (c.dataset.tab === 'archived') ? 'none' : 'flex';
        }
    });
    // Show/hide section labels based on visible items
    document.querySelectorAll('.conv-section-label').forEach(label => {
        let sibling = label.nextElementSibling;
        let hasVisible = false;
        while (sibling && !sibling.classList.contains('conv-section-label')) {
            if (sibling.classList.contains('conv-item') && sibling.style.display !== 'none') {
                hasVisible = true; break;
            }
            sibling = sibling.nextElementSibling;
        }
        label.style.display = hasVisible ? 'block' : 'none';
    });
    // Show empty state if no visible conversations
    const list = document.getElementById('convList');
    const anyVisible = [...document.querySelectorAll('.conv-item')].some(c => c.style.display !== 'none');
    const existingEmpty = list.querySelector('.tab-empty');
    if (existingEmpty) existingEmpty.remove();
    if (!anyVisible) {
        const empty = document.createElement('div');
        empty.className = 'empty-state tab-empty';
        empty.innerHTML = `<div class="empty-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M20 13V6a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v7m16 0-2 6H6l-2-6m16 0H4" stroke="rgba(155,93,229,.5)" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg></div><div class="empty-title">No ${tab} conversations</div><div class="empty-sub">Nothing here yet.</div>`;
        list.appendChild(empty);
    }
}

// ── SEARCH ──
document.getElementById('msgSearch').addEventListener('input', function() {
    const q = this.value.toLowerCase().trim();
    document.querySelectorAll('.conv-item').forEach(item => {
        const text = item.textContent.toLowerCase();
        item.style.display = (!q || text.includes(q)) ? 'flex' : 'none';
    });
    // Show/hide section labels based on visible items
    document.querySelectorAll('.conv-section-label').forEach(label => {
        const next = label.nextElementSibling;
        label.style.display = (next && next.style.display !== 'none') ? 'block' : 'none';
    });
});

// ── OPEN / CLOSE CHAT — driven by Firebase module ──
function closeChat() {
    document.getElementById('chatView').classList.remove('active');
    document.getElementById('listView').style.display = '';
    document.getElementById('siteFooter').style.display = '';
    document.getElementById('pageWrap').classList.remove('chat-active');
}

// ── OFFER ACTIONS ──
function acceptOffer() {
    const el = document.getElementById('offerResponse');
    el.innerHTML = `
        <div class="msg-system" style="background:rgba(45,212,160,0.08);border:1px solid rgba(45,212,160,0.2);border-radius:999px;color:var(--green);font-family:'Syne',sans-serif;font-size:11px;font-weight:700;">
            ✓ Offer accepted — $4,200
        </div>`;
    el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}
function declineOffer() {
    const el = document.getElementById('offerResponse');
    el.innerHTML = `<div class="msg-system">Offer declined.</div>`;
    el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

// ── SEND MESSAGE ──
function sendMessage() {
    const input = document.getElementById('composeInput');
    const text = input.value.trim();
    if (!text) return;

    const msgs = document.getElementById('chatMessages');
    const bubble = document.createElement('div');
    bubble.className = 'msg-row own';
    bubble.style.cssText = 'opacity:0;transform:translateY(6px);transition:opacity .22s,transform .22s;';
    bubble.innerHTML = `<div class="msg-bubble own">${escapeHtml(text)}<span class="msg-time">Just now</span></div>`;
    msgs.appendChild(bubble);
    input.value = '';
    input.style.height = 'auto';

    requestAnimationFrame(() => {
        bubble.style.opacity = '1';
        bubble.style.transform = 'none';
    });
    msgs.scrollTop = msgs.scrollHeight;
}

function handleCompose(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
    }
}

function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// Auto-resize textarea
document.getElementById('composeInput').addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});

// ── NEW COMPOSE — user search overlay ──
function showCompose() {
    const overlay = document.getElementById('userSearchOverlay');
    const input   = document.getElementById('userSearchInput');
    if (!overlay) return;
    overlay.style.display = 'block';
    setTimeout(() => input && input.focus(), 80);
}

function closeUserSearch() {
    const overlay = document.getElementById('userSearchOverlay');
    const input   = document.getElementById('userSearchInput');
    if (overlay) overlay.style.display = 'none';
    if (input)   { input.value = ''; }
    _setUserSearchResults('<div id="userSearchHint" style="padding:24px 16px;text-align:center;font-size:12px;color:var(--muted);">Type a username to start searching</div>');
}

function _setUserSearchResults(html) {
    const el = document.getElementById('userSearchResults');
    if (el) el.innerHTML = html;
}

let _userSearchTimer = null;
function onUserSearchInput(val) {
    clearTimeout(_userSearchTimer);
    const q = val.trim().toLowerCase().replace(/^@/, '');
    if (!q) {
        _setUserSearchResults('<div style="padding:24px 16px;text-align:center;font-size:12px;color:var(--muted);">Type a username to start searching</div>');
        return;
    }
    _setUserSearchResults('<div style="padding:20px 16px;display:flex;align-items:center;justify-content:center;gap:8px;font-size:12px;color:var(--muted);"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" style="animation:spin 1s linear infinite;"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2" stroke-dasharray="40" stroke-dashoffset="10" stroke-linecap="round"/></svg>Searching…</div>');
    _userSearchTimer = setTimeout(() => _doUserSearch(q), 350);
}

// Actual implementation is set by the Firebase module below
window._doUserSearch = null;
function _doUserSearch(q) {
    if (window._doUserSearch) window._doUserSearch(q);
    else setTimeout(() => window._doUserSearch && window._doUserSearch(q), 500);
}
</script>

<!-- ══ FIREBASE ══ -->
<script type="module">
import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-app.js";
import { getDatabase, ref, onValue, push, set, serverTimestamp, get, query, orderByKey, startAt, endAt, limitToFirst } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-database.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-auth.js";

const firebaseConfig = {
    apiKey: "AIzaSyDFHskUWiyHhZke3KT9kkOtFI_gPsKfiGo",
    authDomain: "itzhoyoo-f9f7e.firebaseapp.com",
    databaseURL: "https://itzhoyoo-f9f7e-default-rtdb.firebaseio.com",
    projectId: "itzhoyoo-f9f7e",
    storageBucket: "itzhoyoo-f9f7e.filestorage.app",
    messagingSenderId: "1094792075584",
    appId: "1:1094792075584:web:d49e9c3f899d3cd31082a5"
};

const app  = getApps().length ? getApps()[0] : initializeApp(firebaseConfig);
const db   = getDatabase(app);
const auth = getAuth(app);

window._fbDb   = db;
window._fbAuth = auth;

// ── AVATAR GRADIENT (same logic as all other pages) ──
const AVATAR_GRADIENTS = [
    ['#9b5de5','#e879a0'], ['#38bdf8','#818cf8'], ['#2dd4a0','#38bdf8'],
    ['#f5c842','#f97316'], ['#e879a0','#fb7185'], ['#818cf8','#9b5de5'],
    ['#2dd4a0','#9b5de5'], ['#38bdf8','#2dd4a0'], ['#fb923c','#e879a0'],
    ['#a3e635','#38bdf8'], ['#e879f9','#818cf8'], ['#2dd4bf','#38bdf8'],
];
function avatarGradient(uid) {
    if (!uid) return AVATAR_GRADIENTS[0];
    let h = 0;
    for (let i = 0; i < uid.length; i++) h = (h * 31 + uid.charCodeAt(i)) >>> 0;
    return AVATAR_GRADIENTS[h % AVATAR_GRADIENTS.length];
}
function avatarGradientCSS(uid) {
    const [c1, c2] = avatarGradient(uid);
    return `linear-gradient(135deg,${c1},${c2})`;
}
window._avatarGradientCSS = avatarGradientCSS;

// ── AUTH STATE ──
onAuthStateChanged(auth, user => {
    if (user) {
        window._currentUser = user;

        // Header avatar
        const av = document.getElementById('avatarBtn');
        if (av) {
            av.style.display = 'flex';
            const [ac1, ac2] = avatarGradient(user.uid);
            av.style.background = `linear-gradient(135deg,${ac1},${ac2})`;
            av.textContent = (user.displayName || user.email || '?').charAt(0).toUpperCase();
            // Try to load photo from RTDB
            get(ref(db, 'users/' + user.uid + '/photoURL')).then(snap => {
                const url = snap && snap.val();
                if (url && av) {
                    av.textContent = '';
                    av.style.background = 'none';
                    const img = document.createElement('img');
                    img.src = url;
                    img.alt = '';
                    img.style.cssText = 'width:100%;height:100%;object-fit:cover;border-radius:999px;display:block;';
                    img.onerror = () => {
                        av.style.background = `linear-gradient(135deg,${ac1},${ac2})`;
                        av.textContent = (user.displayName || user.email || '?').charAt(0).toUpperCase();
                    };
                    av.appendChild(img);
                }
            }).catch(() => {});
        }

        // Announcement bar + wallet
        onValue(ref(db, 'users/' + user.uid), snap => {
            const data = snap.val() || {};
            const name = data.username || user.email?.split('@')[0] || '';
            const plan = (data.plan || 'Free').toLowerCase();
            const bal  = parseFloat(data.balance || 0);

            const pillAmt = document.getElementById('walletPillAmount');
            if (pillAmt) pillAmt.textContent = '$' + bal.toFixed(2);

            const annUser  = document.getElementById('annUsername');
            const annBadge = document.getElementById('annPlanBadge');
            if (annUser) {
                annUser.classList.remove('not-logged');
                const isPaid = plan !== 'free';
                const verifiedSvg = isPaid
                    ? `<span title="Verified member"><svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M6.5 1L7.9 3.1l2.4-.5-.5 2.4 2.1 1.5-2.1 1.4.5 2.4-2.4-.5L6.5 12 5.1 9.9l-2.4.5.5-2.4L1.1 6.5l2.1-1.5-.5-2.4 2.4.5Z" fill="#3b82f6" stroke="#3b82f6" stroke-width=".3"/><path d="M4.5 6.5l1.5 1.5 3-3" stroke="white" stroke-width="1.1" stroke-linecap="round" stroke-linejoin="round"/></svg></span>`
                    : '';
                annUser.innerHTML = (name ? '@' + name : '') + verifiedSvg;
            }
            if (annBadge) {
                annBadge.textContent = data.plan || 'Free';
                annBadge.className = 'ann-plan-badge plan-' + plan;
                annBadge.style.display = 'inline-flex';
            }
            const upBtn = document.getElementById('annUpgradeBtn');
            if (upBtn && plan !== 'free') upBtn.style.display = 'none';

            // Store username for composing messages
            window._currentUsername = name;
        }, { onlyOnce: false });

        // Load real conversations from RTDB
        loadConversations(user.uid);

        // ── AUTO-OPEN FROM URL PARAMS ──
        // Triggered when arriving from details page: ?with=UID&name=username&ref=listingId&rtitle=title
        const _urlParams = new URLSearchParams(location.search);
        const _withUid   = _urlParams.get('with');
        if (_withUid && _withUid !== user.uid) {
            // Clean URL immediately so refresh doesn't re-trigger
            history.replaceState(null, '', location.pathname);

            const _withName   = _urlParams.get('name')  || '';
            const _refListing = _urlParams.get('ref')   || '';
            const _refTitle   = _urlParams.get('rtitle')? decodeURIComponent(_urlParams.get('rtitle')) : '';

            // Find or create thread, then open it
            // Wait a tick so loadConversations has had a chance to start populating
            setTimeout(async () => {
                try {
                    // Check if a thread already exists between these two users
                    const snap = await get(ref(db, 'messages'));
                    let existingId = null;
                    if (snap.exists()) {
                        for (const [tid, t] of Object.entries(snap.val())) {
                            if (t.participants && t.participants[user.uid] && t.participants[_withUid]) {
                                existingId = tid;
                                break;
                            }
                        }
                    }

                    // Resolve display name — use passed name, or fetch from DB
                    let displayName = _withName;
                    if (!displayName) {
                        const uSnap = await get(ref(db, 'users/' + _withUid + '/username'));
                        displayName = uSnap.val() || _withUid;
                    }

                    const grad    = avatarGradientCSS(_withUid);
                    const initial = displayName.charAt(0).toUpperCase();

                    if (existingId) {
                        // Reopen existing thread
                        openFirebaseChat(existingId, _withUid, displayName, grad, initial, {
                            otherUsername: displayName,
                            listingTitle: _refTitle,
                            listingId: _refListing,
                        });
                    } else {
                        // Create new thread with listing context
                        const threadRef = push(ref(db, 'messages'));
                        const threadId  = threadRef.key;
                        await set(threadRef, {
                            participants:  { [user.uid]: true, [_withUid]: true },
                            otherUsername: displayName,
                            listingId:     _refListing,
                            listingTitle:  _refTitle,
                            lastMessage:   '',
                            lastTs:        serverTimestamp(),
                            createdAt:     serverTimestamp(),
                        });
                        openFirebaseChat(threadId, _withUid, displayName, grad, initial, {
                            otherUsername: displayName,
                            listingTitle: _refTitle,
                            listingId: _refListing,
                        });
                    }
                } catch (err) {
                    console.warn('[autoOpen]', err);
                }
            }, 300);
        }

    } else {
        window._currentUser = null;
        window._currentUsername = null;
        // Not logged in — redirect to home
        const av = document.getElementById('avatarBtn');
        if (av) { av.style.display = 'none'; av.style.background = ''; }
        // Show not-logged state in ann bar
        const annUser = document.getElementById('annUsername');
        if (annUser) { annUser.className = 'ann-username not-logged'; annUser.textContent = 'Not signed in'; }
    }
});

// ── LOAD CONVERSATIONS ──
// RTDB structure: messages/{threadId} = { participants: {uid1:true, uid2:true}, lastMessage, lastTs, listingId, listingTitle, listingPrice, messages: {...} }
function loadConversations(uid) {
    onValue(ref(db, 'messages'), snap => {
        const all = snap.val();
        if (!all) { renderConvList([]); return; }

        // Filter threads where current user is a participant
        const threads = Object.entries(all)
            .filter(([, t]) => t.participants && t.participants[uid])
            .map(([id, t]) => ({ id, ...t }))
            .sort((a, b) => (b.lastTs || 0) - (a.lastTs || 0));

        renderConvList(threads, uid);
    }, err => {
        console.warn('[messages] Firebase read error', err);
        // Fall back to static demo UI already in HTML
    });
}

function timeAgo(ts) {
    if (!ts) return '';
    const sec = Math.floor((Date.now() - ts) / 1000);
    if (sec < 60)          return 'just now';
    if (sec < 3600)        return Math.floor(sec / 60) + 'm ago';
    if (sec < 86400)       return Math.floor(sec / 3600) + 'h ago';
    if (sec < 86400 * 7)   return Math.floor(sec / 86400) + 'd ago';
    if (sec < 86400 * 30)  return Math.floor(sec / (86400 * 7)) + 'w ago';
    return Math.floor(sec / (86400 * 30)) + 'mo ago';
}

function renderConvList(threads, uid) {
    const list = document.getElementById('convList');
    if (!list) return;

    // Remove loading spinner
    const loading = document.getElementById('convLoading');
    if (loading) loading.remove();

    if (!threads.length) {
        list.innerHTML = `<div class="empty-state"><div class="empty-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M20 13V6a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v7m16 0-2 6H6l-2-6m16 0H4" stroke="rgba(155,93,229,.5)" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg></div><div class="empty-title">No conversations yet</div><div class="empty-sub">Start a new message to connect with a buyer or seller.</div></div>`;
        return;
    }

    list.innerHTML = '';

    const archived = threads.filter(t => t.archived);
    const active   = threads.filter(t => !t.archived);
    const unread   = active.filter(t => t.unreadCount && t.unreadCount[uid] > 0);
    const read     = active.filter(t => !t.unreadCount || !t.unreadCount[uid]);

    // Total unread badge
    const totalUnread = unread.reduce((sum, t) => sum + (t.unreadCount?.[uid] || 0), 0);
    const badge = document.getElementById('unreadBadge');
    if (badge) { badge.textContent = totalUnread || ''; badge.style.display = totalUnread ? 'inline-flex' : 'none'; }

    function renderSection(label, items, tabValue) {
        if (!items.length) return;
        const lbl = document.createElement('div');
        lbl.className = 'conv-section-label';
        lbl.textContent = label;
        list.appendChild(lbl);

        items.forEach((t, i) => {
            // Identify the other participant
            const otherUid = Object.keys(t.participants || {}).find(k => k !== uid) || '';
            const otherName = t.otherUsername || otherUid.slice(0, 8);
            const initial = (otherName || '?').charAt(0).toUpperCase();
            const gradient = avatarGradientCSS(otherUid);
            const unreadCnt = t.unreadCount?.[uid] || 0;
            const isUnread = unreadCnt > 0;

            const item = document.createElement('div');
            item.className = 'conv-item' + (isUnread ? ' unread' : '');
            item.style.animationDelay = (i * 0.03) + 's';
            item.dataset.threadId = t.id;
            item.dataset.otherUid = otherUid;
            item.dataset.tab = tabValue || (t.archived ? 'archived' : (t.role === 'selling' ? 'selling' : 'buying'));
            item.innerHTML = `
                <div class="conv-avatar" style="background:${gradient};">${initial}</div>
                <div class="conv-body">
                    <div class="conv-top">
                        <div class="conv-name">@${escapeHtml(otherName)}</div>
                        <div class="conv-time">${timeAgo(t.lastTs)}</div>
                    </div>
                    <div class="conv-preview">${escapeHtml(t.lastMessage || '…')}</div>
                    ${t.listingTitle ? `<div class="conv-listing-pill">
                        <svg width="9" height="9" viewBox="0 0 12 12" fill="none"><rect x="1" y="1" width="10" height="10" rx="2" stroke="currentColor" stroke-width="1.3"/><path d="M4 6h4M4 8h2" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
                        ${escapeHtml(t.listingTitle)}${t.listingPrice ? ' — $' + t.listingPrice : ''}
                    </div>` : ''}
                </div>
                ${isUnread ? `<div class="conv-unread-count">${unreadCnt}</div>` : ''}
            `;
            item.addEventListener('click', () => openFirebaseChat(t.id, otherUid, otherName, gradient, initial, t));
            list.appendChild(item);
        });
    }

    renderSection('Unread', unread);
    if (unread.length && read.length) {
        const div = document.createElement('div');
        div.className = 'section-divider';
        div.style.margin = '10px 0 4px';
        list.appendChild(div);
    }
    renderSection('Earlier', read);
    if (archived.length) {
        const div = document.createElement('div');
        div.className = 'section-divider';
        div.style.margin = '10px 0 4px';
        list.appendChild(div);
        renderSection('Archived', archived, 'archived');
    }

    // Apply active tab filter
    const activeTab = window._activeTab || 'all';
    if (activeTab !== 'all') {
        const activeBtn = document.querySelector(`.tab-btn[data-tab="${activeTab}"]`);
        if (activeBtn) switchTab(activeTab, activeBtn);
    } else {
        // Hide archived by default
        document.querySelectorAll('.conv-item[data-tab="archived"]').forEach(c => c.style.display = 'none');
        document.querySelectorAll('.conv-section-label').forEach(label => {
            if (label.textContent === 'Archived') label.style.display = 'none';
        });
    }
}

// ── OPEN REAL CHAT ──
let _activeChatUnsub = null;
let _activeChatId    = null;

function openFirebaseChat(threadId, otherUid, otherName, gradient, initial, threadData) {
    _activeChatId = threadId;

    document.getElementById('chatAvatar').textContent = initial;
    document.getElementById('chatAvatar').style.background = gradient;
    document.getElementById('chatName').textContent = '@' + otherName;
    document.getElementById('chatMeta').textContent = 'Loading…';
    document.getElementById('chatListingTitle').textContent = threadData.listingTitle || '';
    document.getElementById('chatListingPrice').textContent = threadData.listingPrice ? '$' + threadData.listingPrice : '';

    document.getElementById('listView').style.display = 'none';
    document.getElementById('siteFooter').style.display = 'none';
    document.getElementById('chatView').classList.add('active');
    document.getElementById('pageWrap').classList.add('chat-active');
    document.getElementById('offerResponse').innerHTML = '';

    // Load other user's profile
    get(ref(db, 'users/' + otherUid)).then(snap => {
        const d = snap.val() || {};
        const txCount = d.transactions || d.deals || 0;
        document.getElementById('chatMeta').textContent = txCount ? txCount + ' transactions' : 'Siterifty member';
        // Update avatar with photo if available
        if (d.photoURL) {
            const av = document.getElementById('chatAvatar');
            av.textContent = '';
            av.style.background = 'none';
            const img = document.createElement('img');
            img.src = d.photoURL;
            img.alt = '';
            img.style.cssText = 'width:100%;height:100%;object-fit:cover;border-radius:999px;display:block;';
            img.onerror = () => { av.style.background = gradient; av.textContent = initial; };
            av.appendChild(img);
        }
    }).catch(() => {});

    // Listen for messages in real-time
    const msgsEl = document.getElementById('chatMessages');
    msgsEl.innerHTML = '';

    if (_activeChatUnsub) _activeChatUnsub();
    _activeChatUnsub = onValue(ref(db, 'messages/' + threadId + '/messages'), snap => {
        const raw = snap.val();
        if (!raw) return;
        const msgs = Object.values(raw).sort((a, b) => (a.ts || 0) - (b.ts || 0));
        renderMessages(msgs, window._currentUser?.uid);
        setTimeout(() => { msgsEl.scrollTop = msgsEl.scrollHeight; }, 60);

        // Mark as read
        const uid = window._currentUser?.uid;
        if (uid) set(ref(db, 'messages/' + threadId + '/unreadCount/' + uid), 0).catch(() => {});
    });

    // Patch sendMessage to write to Firebase
    window._sendToFirebase = (text) => {
        if (!window._currentUser) return;
        const uid = window._currentUser.uid;
        const msgRef = push(ref(db, 'messages/' + threadId + '/messages'));
        const msgData = { text, senderUid: uid, ts: serverTimestamp() };
        set(msgRef, msgData).catch(err => console.warn('Send error', err));
        // Update thread metadata
        set(ref(db, 'messages/' + threadId + '/lastMessage'), text).catch(() => {});
        set(ref(db, 'messages/' + threadId + '/lastTs'), serverTimestamp()).catch(() => {});
        // Increment unread for the other participant
        get(ref(db, 'messages/' + threadId + '/participants')).then(snap => {
            const parts = snap.val() || {};
            Object.keys(parts).forEach(k => {
                if (k !== uid) {
                    get(ref(db, 'messages/' + threadId + '/unreadCount/' + k)).then(s => {
                        set(ref(db, 'messages/' + threadId + '/unreadCount/' + k), (s.val() || 0) + 1).catch(() => {});
                    });
                }
            });
        }).catch(() => {});
    };
}

function renderMessages(msgs, myUid) {
    const msgsEl = document.getElementById('chatMessages');
    msgsEl.innerHTML = '';

    let lastDay = '';
    msgs.forEach(m => {
        const ts = m.ts || 0;
        const date = ts ? new Date(ts).toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) : '';
        if (date && date !== lastDay) {
            lastDay = date;
            const divider = document.createElement('div');
            divider.className = 'msg-day-divider';
            divider.innerHTML = `<span class="msg-day-label">${date === new Date().toLocaleDateString('en-US',{month:'short',day:'numeric'}) ? 'Today' : date}</span>`;
            msgsEl.appendChild(divider);
        }

        const isOwn = m.senderUid === myUid;
        const row = document.createElement('div');
        row.className = 'msg-row' + (isOwn ? ' own' : '');

        const timeStr = ts ? new Date(ts).toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' }) : '';
        const bubbleClass = isOwn ? 'own' : 'them';

        if (!isOwn) {
            const chatAv = document.getElementById('chatAvatar');
            const avStyle = chatAv ? chatAv.style.background : '#555';
            const avInitial = (document.getElementById('chatName')?.textContent || '?').replace('@','').charAt(0).toUpperCase();
            row.innerHTML = `
                <div class="msg-avatar-sm" style="background:${avStyle};">${avInitial}</div>
                <div class="msg-bubble ${bubbleClass}">${escapeHtml(m.text || '')}<span class="msg-time">${timeStr}</span></div>`;
        } else {
            row.innerHTML = `<div class="msg-bubble ${bubbleClass}">${escapeHtml(m.text || '')}<span class="msg-time">${timeStr}</span></div>`;
        }

        msgsEl.appendChild(row);
    });
}

// Patch the existing sendMessage to also write to Firebase when in a real thread
const _origSend = window.sendMessage;
window.sendMessage = function() {
    const input = document.getElementById('composeInput');
    const text = input.value.trim();
    if (!text) return;

    if (window._sendToFirebase && _activeChatId) {
        // Real Firebase thread — write to DB (onValue will re-render)
        window._sendToFirebase(text);
        input.value = '';
        input.style.height = 'auto';
    } else {
        // Demo / static thread — use original function
        _origSend();
    }
};

// Patch closeChat to unsubscribe
const _origClose = window.closeChat;
window.closeChat = function() {
    if (_activeChatUnsub) { _activeChatUnsub(); _activeChatUnsub = null; }
    _activeChatId = null;
    window._sendToFirebase = null;
    _origClose();
};

window._db = db;
window._ref = ref;
window._push = push;
window._set = set;
window._serverTimestamp = serverTimestamp;

// ── USER SEARCH ──
// Searches usernames/{prefix} → fetches user profile → shows results
const AVATAR_GRADIENTS_S = [
    ['#9b5de5','#e879a0'], ['#38bdf8','#818cf8'], ['#2dd4a0','#38bdf8'],
    ['#f5c842','#f97316'], ['#e879a0','#fb7185'], ['#818cf8','#9b5de5'],
    ['#2dd4a0','#9b5de5'], ['#38bdf8','#2dd4a0'], ['#fb923c','#e879a0'],
];
function _searchGrad(uid) {
    let h = 0; for (let i = 0; i < uid.length; i++) h = (h * 31 + uid.charCodeAt(i)) >>> 0;
    const [c1, c2] = AVATAR_GRADIENTS_S[h % AVATAR_GRADIENTS_S.length];
    return `linear-gradient(135deg,${c1},${c2})`;
}
function _esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

window._doUserSearch = async function(q) {
    const resultsEl = document.getElementById('userSearchResults');
    if (!resultsEl) return;

    // Block searching yourself
    const myUid = window._currentUser?.uid;
    const myUsername = (window._currentUsername || '').toLowerCase();

    try {
        // Query usernames/ — keys are lowercase usernames, values are UIDs
        // Use prefix range: q → q + '\uf8ff' to match all starting with q
        const q2 = q + '\uf8ff';
        const snap = await get(query(
            ref(db, 'usernames'),
            orderByKey(),
            startAt(q),
            endAt(q2),
            limitToFirst(8)
        ));

        if (!snap.exists()) {
            resultsEl.innerHTML = `<div style="padding:24px 16px;text-align:center;font-size:12px;color:var(--muted);">No users found for "<strong style="color:var(--text2);">@${_esc(q)}</strong>"</div>`;
            return;
        }

        const entries = Object.entries(snap.val())
            .filter(([uname, uid]) => uid && uname !== myUsername && uid !== myUid);

        if (!entries.length) {
            resultsEl.innerHTML = `<div style="padding:24px 16px;text-align:center;font-size:12px;color:var(--muted);">No other users found matching "<strong style="color:var(--text2);">@${_esc(q)}</strong>"</div>`;
            return;
        }

        // Fetch profiles for results (parallel, limited to 8)
        const profiles = await Promise.all(entries.map(async ([uname, uid]) => {
            try {
                const ps = await get(ref(db, 'users/' + uid));
                return { uname, uid, data: ps.val() || {} };
            } catch { return { uname, uid, data: {} }; }
        }));

        resultsEl.innerHTML = '';
        profiles.forEach(({ uname, uid, data }) => {
            const grad = _searchGrad(uid);
            const initial = uname.charAt(0).toUpperCase();
            const plan = data.plan || 'Free';
            const deals = data.transactions || data.deals || 0;
            const photoURL = data.photoURL || '';

            const row = document.createElement('div');
            row.style.cssText = 'display:flex;align-items:center;gap:12px;padding:10px 16px;cursor:pointer;transition:background .12s;';
            row.onmouseover = () => row.style.background = 'rgba(255,255,255,0.04)';
            row.onmouseout  = () => row.style.background = '';

            const avHtml = photoURL
                ? `<img src="${_esc(photoURL)}" style="width:100%;height:100%;object-fit:cover;border-radius:999px;" onerror="this.style.display='none'">`
                : initial;

            row.innerHTML = `
                <div style="width:38px;height:38px;border-radius:999px;background:${grad};display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:15px;font-weight:800;color:#fff;flex-shrink:0;overflow:hidden;">${avHtml}</div>
                <div style="flex:1;min-width:0;">
                    <div style="font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:var(--text);">@${_esc(uname)}</div>
                    <div style="font-size:11px;color:var(--muted);margin-top:1px;">${_esc(plan)} plan${deals ? ` · ${deals} deals` : ''}</div>
                </div>
                <svg width="14" height="14" viewBox="0 0 20 20" fill="none" style="flex-shrink:0;color:var(--muted);"><path d="M4 10h12M10 4l6 6-6 6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>`;

            row.addEventListener('click', () => startNewThread(uid, uname));
            resultsEl.appendChild(row);
        });

    } catch (err) {
        console.warn('[userSearch]', err);
        resultsEl.innerHTML = `<div style="padding:20px 16px;text-align:center;font-size:12px;color:var(--red);">Search failed — check your connection.</div>`;
    }
};

// ── START / RESUME THREAD ──
// Finds an existing thread with this user or creates a new one, then opens it
async function startNewThread(otherUid, otherName) {
    const myUid = window._currentUser?.uid;
    if (!myUid) return;

    closeUserSearch();

    // Check if thread already exists in loaded conversations
    const existingThreadId = _findExistingThread(myUid, otherUid);
    if (existingThreadId) {
        // Re-open the existing thread
        const grad = _searchGrad(otherUid);
        const initial = (otherName || '?').charAt(0).toUpperCase();
        openFirebaseChat(existingThreadId, otherUid, otherName, grad, initial, { otherUsername: otherName });
        return;
    }

    // Create a new thread
    const threadRef = push(ref(db, 'messages'));
    const threadId  = threadRef.key;
    await set(threadRef, {
        participants: { [myUid]: true, [otherUid]: true },
        otherUsername: otherName,
        lastMessage: '',
        lastTs: serverTimestamp(),
        createdAt: serverTimestamp(),
    });

    const grad    = _searchGrad(otherUid);
    const initial = (otherName || '?').charAt(0).toUpperCase();
    openFirebaseChat(threadId, otherUid, otherName, grad, initial, { otherUsername: otherName });
}

function _findExistingThread(myUid, otherUid) {
    // Scan the currently rendered conv items — the thread id is stored on the element
    const items = document.querySelectorAll('[data-thread-id]');
    for (const item of items) {
        if (item.dataset.otherUid === otherUid) return item.dataset.threadId;
    }
    return null;
}
