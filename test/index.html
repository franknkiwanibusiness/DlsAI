<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile Detector</title>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; }
        .card { border: 1px solid #ddd; padding: 20px; border-radius: 8px; max-width: 400px; }
        .data { font-weight: bold; color: #2c3e50; }
        h2 { color: #2980b9; }
    </style>
</head>
<body>

    <div class="card">
        <h2>User Identity Profile</h2>
        <p>Country: <span id="country" class="data">Loading...</span></p>
        <p>Currency: <span id="currency" class="data">Loading...</span></p>
        <p>Default Language: <span id="language" class="data">Detecting...</span></p>
        <p>System Theme: <span id="theme" class="data">Detecting...</span></p>
    </div>

    <script>
        // 1. Detect Browser Language
        const userLang = navigator.language || navigator.userLanguage; 
        document.getElementById('language').innerText = userLang;

        // 2. Detect System Theme (Dark/Light)
        const isDarkMode = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        document.getElementById('theme').innerText = isDarkMode ? "Dark Mode 🌙" : "Light Mode ☀️";

        // 3. Fetch IP Data (Country & Currency)
        // Note: Using a public IP for testing, or it will use your own IP automatically
        fetch('http://ip-api.com/json/?fields=status,country,currency')
            .then(response => response.json())
            .then(data => {
                if(data.status === 'success') {
                    document.getElementById('country').innerText = data.country;
                    document.getElementById('currency').innerText = data.currency;
                }
            })
            .catch(err => {
                document.getElementById('country').innerText = "Error loading IP data";
            });
    </script>
</body>
</html>
