<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced User Profiler</title>
    <style>
        :root {
            --bg: #ffffff;
            --text: #333333;
            --card-bg: #f4f4f4;
        }
        /* Automatically switch styles based on system theme */
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #1a1a1a;
                --text: #f0f0f0;
                --card-bg: #2d2d2d;
            }
        }
        body { 
            background-color: var(--bg); 
            color: var(--text); 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card { 
            background-color: var(--card-bg);
            padding: 30px; 
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            width: 350px;
        }
        .label { font-size: 0.8rem; color: #888; text-transform: uppercase; margin-bottom: 2px; }
        .data { font-size: 1.1rem; font-weight: 600; margin-bottom: 15px; }
        hr { border: 0; border-top: 1px solid #444; margin: 15px 0; opacity: 0.2; }
    </style>
</head>
<body>

    <div class="card">
        <h2 style="margin-top:0">User Context</h2>
        
        <div class="label">Location</div>
        <div id="location" class="data">Loading...</div>

        <div class="label">Currency</div>
        <div id="currency" class="data">Loading...</div>

        <hr>

        <div class="label">Browser Language</div>
        <div id="language" class="data">Detecting...</div>

        <div class="label">System Theme</div>
        <div id="theme" class="data">Detecting...</div>
    </div>

    <script>
        // 1. Detect System Theme
        const themeCheck = window.matchMedia('(prefers-color-scheme: dark)');
        document.getElementById('theme').innerText = themeCheck.matches ? "Dark Mode 🌙" : "Light Mode ☀️";

        // 2. Detect Browser Language
        document.getElementById('language').innerText = navigator.language || "Unknown";

        // 3. Fetch IP Data from ipapi.co
        // This API automatically detects the visitor's IP if none is provided
        fetch('https://ipapi.co/json/')
            .then(response => response.json())
            .then(data => {
                if (!data.error) {
                    document.getElementById('location').innerText = `${data.country_name} (${data.city})`;
                    document.getElementById('currency').innerText = `${data.currency_name} (${data.currency})`;
                } else {
                    document.getElementById('location').innerText = "Limit Reached/Error";
                }
            })
            .catch(error => {
                console.error('Error:', error);
                document.getElementById('location').innerText = "Connection Failed";
            });
    </script>
</body>
</html>
