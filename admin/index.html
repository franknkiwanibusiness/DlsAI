<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DLS26 | Pro Scheduler</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #050505; color: #fff; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(10, 10, 10, 0.8); backdrop-filter: blur(20px); border: 1px solid #1a1a1a; }
        .btn-green { background: #00ff88; color: #000; font-weight: 900; transition: 0.3s; }
        .btn-green:hover { transform: scale(1.02); box-shadow: 0 0 20px rgba(0,255,136,0.4); }
    </style>
</head>
<body class="p-6">

    <div class="max-w-xl mx-auto glass p-10 rounded-[3rem] border-t border-white/5 text-center">
        <h1 class="text-3xl font-black italic uppercase tracking-tighter mb-2">PRO <span class="text-[#00ff88]">SCHEDULER</span></h1>
        <p class="text-[10px] text-zinc-500 font-bold uppercase tracking-[0.3em] mb-10">Manual Logic • Zero AI Errors</p>

        <div class="space-y-6">
            <div class="bg-black p-6 rounded-2xl border border-zinc-900 text-left">
                <label class="text-[10px] font-black uppercase text-zinc-600 mb-2 block">Starting Kickoff Time</label>
                <input type="time" id="start-time" value="18:00" class="w-full bg-zinc-900 border border-zinc-800 p-4 rounded-xl text-[#00ff88] font-bold outline-none">
            </div>

            <button id="auto-gen" class="btn-green w-full py-6 rounded-3xl text-xs uppercase italic">Generate & Sync Matchday</button>
            
            <button id="clear-all" class="w-full py-3 text-[9px] text-zinc-600 uppercase font-black hover:text-red-500 transition-colors">Wipe All Fixtures</button>
        </div>

        <div id="status" class="mt-8 p-4 bg-zinc-950 rounded-2xl font-mono text-[10px] text-zinc-500 min-h-[60px] flex items-center justify-center">
            System Ready.
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-app.js";
        import { getDatabase, ref, get, push, remove } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDFHskUWiyHhZke3KT9kkOtFI_gPsKfiGo",
            databaseURL: "https://itzhoyoo-f9f7e-default-rtdb.firebaseio.com",
            projectId: "itzhoyoo-f9f7e",
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        document.getElementById('auto-gen').onclick = async () => {
            const status = document.getElementById('status');
            status.innerText = "Fetching teams...";

            try {
                // 1. Get Teams
                const snap = await get(ref(db, 'users/players'));
                const players = snap.val();
                if (!players) throw new Error("Add teams to 'users/players' first!");

                const teamList = Object.values(players);
                
                // Shuffle teams for randomness
                teamList.sort(() => Math.random() - 0.5);

                // 2. Setup Timing
                const startTimeStr = document.getElementById('start-time').value;
                const [hours, minutes] = startTimeStr.split(':');
                let kickoff = new Date();
                kickoff.setHours(hours, minutes, 0, 0);

                status.innerText = "Pairing teams...";
                const fixturesRef = ref(db, 'fixtures');

                // 3. Pair them (Step 2 means i vs i+1)
                for (let i = 0; i < teamList.length; i += 2) {
                    if (teamList[i+1]) { // Ensure there's a pair
                        const home = teamList[i];
                        const away = teamList[i+1];

                        const matchTime = kickoff.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

                        await push(fixturesRef, {
                            homeName: home.team,
                            homeLogo: home.logo || "",
                            homeScore: 0,
                            awayName: away.team,
                            awayLogo: away.logo || "",
                            awayScore: 0,
                            date: new Date().toLocaleDateString(),
                            time: matchTime,
                            ended: false
                        });

                        // Add 15 minutes for the next match
                        kickoff.setMinutes(kickoff.getMinutes() + 15);
                    }
                }

                status.innerText = "SUCCESS: Matchday Sync Complete!";
                status.classList.add('text-[#00ff88]');

            } catch (err) {
                status.innerText = "ERROR: " + err.message;
                status.classList.add('text-red-500');
            }
        };

        document.getElementById('clear-all').onclick = async () => {
            if (confirm("Delete all fixtures?")) {
                await remove(ref(db, 'fixtures'));
                document.getElementById('status').innerText = "Database Wiped.";
            }
        };
    </script>
</body>
</html>
