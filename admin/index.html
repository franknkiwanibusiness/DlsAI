<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DLS26 | Full AI Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(10, 10, 10, 0.8); backdrop-filter: blur(20px); border: 1px solid #1a1a1a; }
        .btn-primary { background: #00ff88; color: #000; font-weight: 900; transition: all 0.2s; }
        .btn-primary:hover { transform: scale(1.02); box-shadow: 0 0 20px rgba(0, 255, 136, 0.3); }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body class="p-4 lg:p-10">

    <div class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8">
        
        <div class="lg:col-span-4 space-y-6">
            <div class="glass p-8 rounded-[2.5rem]">
                <h1 class="text-2xl font-black italic uppercase tracking-tighter mb-6">AI <span class="text-[#00ff88]">COMMAND</span></h1>
                
                <textarea id="ai-prompt" placeholder="Command AI: 'Generate 12 matches' or 'End Match 1 with 2-0'" 
                    class="w-full bg-black border border-zinc-800 p-5 rounded-2xl text-sm text-[#00ff88] h-32 mb-4 focus:outline-none focus:border-[#00ff88] resize-none"></textarea>
                
                <button id="run-ai" class="btn-primary w-full py-5 rounded-2xl text-[11px] uppercase italic mb-3">Execute AI Command</button>
                <button id="clear-fixtures" class="w-full border border-red-900/30 text-red-500 py-3 rounded-xl text-[9px] font-black uppercase hover:bg-red-900/10">Clear All Fixtures</button>
            </div>

            <div class="glass p-6 rounded-[2rem] h-64 flex flex-col">
                <h3 class="text-[10px] font-black text-zinc-600 uppercase mb-4 tracking-widest">System Logs</h3>
                <div id="log-box" class="flex-1 overflow-y-auto font-mono text-[10px] text-zinc-500 space-y-1">
                    <div>> System Ready.</div>
                </div>
            </div>
        </div>

        <div class="lg:col-span-8 space-y-8">
            <div class="glass rounded-[3rem] p-8">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-sm font-black italic uppercase tracking-wider">Active Fixtures</h2>
                    <span id="fix-count" class="text-[10px] text-zinc-500 uppercase font-bold">0 Matches</span>
                </div>
                <div id="fixtures-list" class="grid grid-cols-1 md:grid-cols-2 gap-4 max-h-[400px] overflow-y-auto pr-2">
                    </div>
            </div>

            <div class="glass rounded-[3rem] overflow-hidden">
                <div class="p-8 border-b border-zinc-900 flex justify-between items-center">
                    <h2 class="text-sm font-black italic uppercase tracking-wider">League Standings</h2>
                </div>
                <table class="w-full text-left border-collapse">
                    <thead class="bg-black text-[10px] text-zinc-600 uppercase font-black">
                        <tr>
                            <th class="p-5">Pos</th>
                            <th class="p-5">Team</th>
                            <th class="p-5 text-center">P</th>
                            <th class="p-5 text-center">GD</th>
                            <th class="p-5 text-center">PTS</th>
                        </tr>
                    </thead>
                    <tbody id="table-body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-app.js";
        import { getDatabase, ref, onValue, set, get, push, remove } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDFHskUWiyHhZke3KT9kkOtFI_gPsKfiGo",
            authDomain: "itzhoyoo-f9f7e.firebaseapp.com",
            databaseURL: "https://itzhoyoo-f9f7e-default-rtdb.firebaseio.com",
            projectId: "itzhoyoo-f9f7e",
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const log = (msg, color = "text-zinc-500") => {
            const box = document.getElementById('log-box');
            box.innerHTML += `<div class="${color}">> ${msg}</div>`;
            box.scrollTop = box.scrollHeight;
        };

        // --- 1. DATA LISTENERS ---
        onValue(ref(db, 'users/players'), (snap) => {
            const players = snap.val() || {};
            const sorted = Object.values(players).sort((a,b) => b.pts - a.pts || b.gd - a.gd);
            document.getElementById('table-body').innerHTML = sorted.map((p, i) => `
                <tr class="border-b border-zinc-900/50 hover:bg-zinc-900/20">
                    <td class="p-5 font-black italic text-zinc-700">#${i+1}</td>
                    <td class="p-5 flex items-center gap-3"><img src="${p.logo}" class="w-6 h-6 rounded-md"> <span class="text-xs font-bold uppercase">${p.team}</span></td>
                    <td class="p-5 text-center text-zinc-500 font-bold">${p.p || 0}</td>
                    <td class="p-5 text-center text-zinc-500 font-bold">${p.gd || 0}</td>
                    <td class="p-5 text-center text-[#00ff88] font-black">${p.pts || 0}</td>
                </tr>
            `).join('');
        });

        onValue(ref(db, 'fixtures'), (snap) => {
            const data = snap.val() || {};
            const list = document.getElementById('fixtures-list');
            document.getElementById('fix-count').innerText = `${Object.keys(data).length} Matches`;
            
            list.innerHTML = Object.entries(data).map(([id, f]) => `
                <div class="bg-zinc-950 p-4 rounded-2xl border border-zinc-900 flex justify-between items-center group">
                    <div class="text-[9px] font-black text-zinc-400 uppercase w-16 truncate">${f.homeName}</div>
                    <div class="flex items-center gap-2">
                        <input type="number" value="${f.homeScore}" class="w-8 bg-zinc-900 text-center rounded font-bold text-xs" onchange="updateScore('${id}', 'homeScore', this.value)">
                        <span class="text-zinc-800 text-[10px]">-</span>
                        <input type="number" value="${f.awayScore}" class="w-8 bg-zinc-900 text-center rounded font-bold text-xs" onchange="updateScore('${id}', 'awayScore', this.value)">
                    </div>
                    <div class="text-[9px] font-black text-zinc-400 uppercase w-16 truncate text-right">${f.awayName}</div>
                </div>
            `).join('');
        });

        // --- 2. UPDATE LOGIC ---
        window.updateScore = (id, field, val) => {
            set(ref(db, `fixtures/${id}/${field}`), parseInt(val));
            log(`Updated score for match ${id}`, "text-blue-400");
        };

        // --- 3. AI EXECUTION ---
        document.getElementById('run-ai').onclick = async () => {
            log("Fetching Vercel Proxy Key...", "text-yellow-500");
            try {
                const keyRes = await fetch('/api/get-key');
                const { apiKey } = await keyRes.json();

                const snap = await get(ref(db, 'users/players'));
                const players = snap.val();
                const teamList = Object.keys(players).map(id => ({ id, name: players[id].team }));

                log("AI Pairing 24 teams...", "text-purple-400");
                const groqRes = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${apiKey}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        model: "llama3-70b-8192",
                        messages: [{ role: "system", content: "Pair teams into 12 unique matches. JSON output: { 'fixtures': [{ 'h': 'id', 'a': 'id' }] }" },
                                   { role: "user", content: `Teams: ${JSON.stringify(teamList)}` }],
                        response_format: { type: "json_object" }
                    })
                });

                const aiData = await groqRes.json();
                const pairings = JSON.parse(aiData.choices[0].message.content).fixtures;

                for (const m of pairings) {
                    await push(ref(db, 'fixtures'), {
                        homeName: players[m.h].team, homeLogo: players[m.h].logo, homeScore: 0,
                        awayName: players[m.a].team, awayLogo: players[m.a].logo, awayScore: 0,
                        kickOffTime: new Date().toISOString(), ended: false
                    });
                }
                log("12 Matches Generated!", "text-green-500");
            } catch (err) { log("AI Error: " + err.message, "text-red-500"); }
        };

        document.getElementById('clear-fixtures').onclick = () => {
            if(confirm("Wipe all fixtures?")) remove(ref(db, 'fixtures'));
        };

    </script>
</body>
</html>
