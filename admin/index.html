<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DLS26 | Season 24 Controller</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #050505; color: #fff; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(10, 10, 10, 0.8); backdrop-filter: blur(20px); border: 1px solid #1a1a1a; }
        .btn-ready { background: #00ff88; color: #000; font-weight: 900; }
        .btn-locked { background: #111; color: #333; cursor: not-allowed; }
    </style>
</head>
<body class="p-6">

    <div class="max-w-2xl mx-auto glass p-10 rounded-[3rem] border-t border-white/5 text-center">
        <h1 class="text-3xl font-black italic uppercase tracking-tighter mb-2">SEASON <span class="text-[#00ff88]">24</span></h1>
        <div id="registration-status" class="inline-block px-4 py-1 bg-zinc-900 rounded-full text-[10px] font-bold uppercase tracking-widest mb-10 text-zinc-500">
            Checking Spots...
        </div>

        <div class="space-y-4">
            <div id="launch-zone">
                </div>
            
            <button id="clear-season" class="w-full py-3 text-[9px] text-zinc-700 uppercase font-black hover:text-red-500 transition-colors">Emergency Reset</button>
        </div>

        <div id="log" class="mt-8 p-6 bg-black rounded-2xl font-mono text-[10px] text-zinc-500 text-left h-40 overflow-y-auto border border-zinc-900">
            > System Standby.
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-app.js";
        import { getDatabase, ref, onValue, get, push, remove, set } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDFHskUWiyHhZke3KT9kkOtFI_gPsKfiGo",
            databaseURL: "https://itzhoyoo-f9f7e-default-rtdb.firebaseio.com",
            projectId: "itzhoyoo-f9f7e",
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const log = (msg) => {
            const el = document.getElementById('log');
            el.innerHTML += `<div>> ${msg}</div>`;
            el.scrollTop = el.scrollHeight;
        };

        // 1. MONITOR REGISTRATION
        onValue(ref(db, 'users/players'), (snap) => {
            const players = snap.val() || {};
            const count = Object.keys(players).length;
            const statusEl = document.getElementById('registration-status');
            const zone = document.getElementById('launch-zone');

            if (count < 24) {
                statusEl.innerHTML = `<span class="text-yellow-500">${count}/24 SPOTS FILLED</span>`;
                zone.innerHTML = `<button class="btn-locked w-full py-6 rounded-3xl text-xs uppercase italic font-black">Season Locked (Need ${24-count} more)</button>`;
            } else {
                statusEl.innerHTML = `<span class="text-[#00ff88]">24/24 SPOTS FULL - READY TO START</span>`;
                zone.innerHTML = `<button id="start-season" class="btn-ready w-full py-6 rounded-3xl text-xs uppercase italic font-black animate-pulse">START 7-DAY SEASON</button>`;
                
                document.getElementById('start-season').onclick = () => generateSeason(players);
            }
        });

        async function generateSeason(players) {
            log("Initializing Season Algorithm...");
            const teamIds = Object.keys(players);
            const fixturesRef = ref(db, 'fixtures');
            
            // Wipe old season
            await remove(fixturesRef);

            // Setup Calendar
            let startDate = new Date();
            // Move to next Sunday
            startDate.setDate(startDate.getDate() + (7 - startDate.getDay()) % 7);
            startDate.setHours(18, 0, 0, 0);

            // Every team plays 6 matches. 
            // We use a simple rotation for 6 rounds.
            for (let round = 0; round < 6; round++) {
                let matchDay = new Date(startDate);
                matchDay.setDate(startDate.getDate() + round); // One round per day

                log(`Scheduling Round ${round + 1}: ${matchDay.toLocaleDateString()}`);

                // Simple pairing: Team i plays Team (i + round + 1) % 24
                // To avoid double counting, we use a set
                let pairedToday = new Set();

                for (let i = 0; i < 24; i++) {
                    if (pairedToday.has(i)) continue;

                    let homeIdx = i;
                    let awayIdx = (i + round + 1) % 24;

                    if (pairedToday.has(awayIdx)) {
                        // Finding next available if collision
                        awayIdx = (awayIdx + 1) % 24;
                        while(pairedToday.has(awayIdx) || awayIdx === homeIdx) {
                            awayIdx = (awayIdx + 1) % 24;
                        }
                    }

                    const home = players[teamIds[homeIdx]];
                    const away = players[teamIds[awayIdx]];

                    await push(fixturesRef, {
                        homeName: home.team,
                        homeLogo: home.logo || "",
                        awayName: away.team,
                        awayLogo: away.logo || "",
                        homeScore: 0,
                        awayScore: 0,
                        kickOff: matchDay.toISOString(),
                        dayLabel: matchDay.toLocaleDateString('en-US', {weekday: 'long'}),
                        ended: false,
                        round: round + 1
                    });

                    pairedToday.add(homeIdx);
                    pairedToday.add(awayIdx);
                }
            }

            // Schedule Winner Announcement
            let winDate = new Date(startDate);
            winDate.setDate(startDate.getDate() + 7); // The Monday
            log(`Winner Announcement Scheduled: ${winDate.toLocaleDateString()}`);
            
            await set(ref(db, 'season_meta'), {
                status: "ACTIVE",
                startDate: startDate.toISOString(),
                endDate: winDate.toISOString()
            });

            log("SEASON LIVE: 72 matches generated (6 per team).");
        }

        document.getElementById('clear-season').onclick = () => {
            if(confirm("Wipe everything?")) remove(ref(db, 'fixtures'));
        };
    </script>
</body>
</html>
