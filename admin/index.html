<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DLSVALUE | Groq Admin</title>
    <style>
        :root {
            --bg: #030303; --card: #0d0d0d; --border: rgba(255,255,255,0.08);
            --green: #00ff88; --blue: #2196F3; --yellow: #ffcc00; --purple: #a55eea;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; margin: 0; padding: 15px; padding-bottom: 50px; }
        
        .header { text-align: center; padding: 15px 0; border-bottom: 1px solid var(--border); margin-bottom: 15px; }
        .header h1 { font-size: 1rem; text-transform: uppercase; letter-spacing: 2px; color: var(--blue); margin: 0; }

        /* Tabs */
        .tab-bar { display: flex; gap: 8px; margin-bottom: 20px; position: sticky; top: 10px; z-index: 100; background: rgba(3,3,3,0.9); backdrop-filter: blur(10px); padding: 5px; border-radius: 15px; border: 1px solid var(--border); }
        .tab { flex: 1; padding: 12px; border: none; border-radius: 12px; background: transparent; color: #555; font-weight: 800; font-size: 0.65rem; text-transform: uppercase; }
        .tab.active { background: var(--blue); color: #fff; }

        .section { display: none; }
        .section.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Cards */
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 22px; padding: 20px; margin-bottom: 15px; position: relative; overflow: hidden; }
        .ai-card { border: 1px solid var(--purple); background: linear-gradient(145deg, #0d0d0d, #1a0b2e); }
        
        .team-header { display: flex; align-items: center; gap: 12px; margin-bottom: 15px; }
        .t-logo { width: 40px; height: 40px; border-radius: 50%; border: 1px solid var(--border); }
        .t-name { font-weight: 900; font-size: 0.95rem; flex: 1; }

        .input-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 15px; }
        .input-box { background: #161616; padding: 10px; border-radius: 12px; text-align: center; }
        .input-box label { display: block; font-size: 0.5rem; color: #555; text-transform: uppercase; margin-bottom: 4px; }
        .input-box input { width: 100%; background: none; border: none; color: #fff; text-align: center; font-size: 1rem; font-weight: 800; outline: none; }

        .btn { width: 100%; padding: 15px; border: none; border-radius: 14px; font-weight: 900; font-size: 0.75rem; text-transform: uppercase; transition: 0.2s; }
        .btn:active { transform: scale(0.96); }
        .btn-green { background: var(--green); color: #000; }
        .btn-purple { background: var(--purple); color: #fff; box-shadow: 0 4px 15px rgba(165, 94, 234, 0.3); }

        #toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); padding: 12px 25px; border-radius: 30px; background: var(--green); color: #000; font-weight: 800; font-size: 0.75rem; display: none; z-index: 1000; }
    </style>
</head>
<body>

    <div id="toast">SAVED!</div>

    <div class="header"><h1>DLSVALUE COMMAND</h1></div>

    <div class="tab-bar">
        <button class="tab active" onclick="show('tab-teams', this)">Standings</button>
        <button class="tab" onclick="show('tab-ai', this)">AI Fixtures</button>
    </div>

    <div id="tab-teams" class="section active">
        <div id="team-cards-container">
            <p style="text-align:center; color:#444;">Syncing Firebase...</p>
        </div>
    </div>

    <div id="tab-ai" class="section">
        <div class="card ai-card">
            <h2 style="margin:0 0 10px 0; font-size: 1rem; color: var(--purple);">GROQ ENGINE</h2>
            <p style="font-size: 0.65rem; color: #888; margin-bottom: 20px;">Select a group to auto-generate 6 balanced matches using Llama-3.</p>
            
            <select id="ai-group" style="width:100%; padding:15px; border-radius:12px; background:#000; border:1px solid var(--purple); color:#fff; font-weight:800; margin-bottom:15px;">
                <option value="A">Group A</option>
                <option value="B">Group B</option>
                <option value="C">Group C</option>
                <option value="D">Group D</option>
            </select>

            <button id="groqBtn" class="btn btn-purple" onclick="runGroqAI()">Run AI Scheduler</button>
        </div>
        <div id="active-fixtures-preview" style="opacity: 0.5; font-size: 0.7rem; padding: 10px;">
            </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-app.js";
    import { getDatabase, ref, onValue, update, get } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDFHskUWiyHhZke3KT9kkOtFI_gPsKfiGo",
        authDomain: "itzhoyoo-f9f7e.firebaseapp.com",
        databaseURL: "https://itzhoyoo-f9f7e-default-rtdb.firebaseio.com",
        projectId: "itzhoyoo-f9f7e",
        appId: "1:1094792075584:web:d49e9c3f899d3cd31082a5"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // Notification System
    function toast(msg, color = 'var(--green)') {
        const el = document.getElementById('toast');
        el.innerText = msg; el.style.background = color;
        el.style.display = 'block';
        setTimeout(() => el.style.display = 'none', 2000);
    }

    // Tab Switcher
    window.show = (id, btn) => {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
    };

    // Load Teams for Standings
    onValue(ref(db, 'DLSVALUE/TEAMS'), (snap) => {
        const teams = snap.val() || {};
        const container = document.getElementById('team-cards-container');
        container.innerHTML = '';

        Object.entries(teams).forEach(([uid, data]) => {
            const card = document.createElement('div');
            card.className = "card";
            card.innerHTML = `
                <div class="team-header">
                    <img src="${data.logoUrl}" class="t-logo">
                    <div class="t-name">${data.teamName}</div>
                </div>
                <div class="input-row">
                    <div class="input-box"><label>P</label><input type="number" id="p-${uid}" value="${data.played}"></div>
                    <div class="input-box"><label>GD</label><input type="number" id="gd-${uid}" value="${data.gd || 0}"></div>
                    <div class="input-box"><label>Pts</label><input type="number" id="pts-${uid}" value="${data.points}"></div>
                </div>
                <button class="btn btn-green" onclick="saveData('${uid}')">Update Stats</button>
            `;
            container.appendChild(card);
        });
    });

    window.saveData = (uid) => {
        const p = document.getElementById(`p-${uid}`).value;
        const gd = document.getElementById(`gd-${uid}`).value;
        const pts = document.getElementById(`pts-${uid}`).value;
        update(ref(db, `DLSVALUE/TEAMS/${uid}`), {
            played: parseInt(p), gd: parseInt(gd), points: parseInt(pts)
        }).then(() => toast("SAVED!"));
    };

    // GROQ AI LOGIC
    window.runGroqAI = async () => {
        const group = document.getElementById('ai-group').value;
        const btn = document.getElementById('groqBtn');
        const preview = document.getElementById('active-fixtures-preview');
        
        btn.disabled = true;
        btn.innerText = "GROQ THINKING...";
        preview.innerText = "Fetching current teams from Firebase...";

        try {
            // 1. Get all teams
            const snap = await get(ref(db, 'DLSVALUE/TEAMS'));
            const allTeams = Object.entries(snap.val()).map(([uid, data]) => ({uid, teamName: data.teamName}));
            
            // 2. Filter for group (4 teams)
            const index = (group.charCodeAt(0) - 65) * 4;
            const groupTeams = allTeams.slice(index, index + 4);

            if(groupTeams.length < 2) throw new Error("Need more teams registered first.");

            // 3. Send to Vercel (Groq Llama 3)
            preview.innerText = "Llama-3 generating match rotations...";
            const response = await fetch('/api/generateFixtures', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ teams: groupTeams, groupLetter: group })
            });

            if(!response.ok) throw new Error("AI Server Error");

            toast(`GROUP ${group} READY!`, 'var(--purple)');
            preview.innerText = `Success: 6 fixtures created for Group ${group}.`;

        } catch (err) {
            toast(err.message, 'var(--red)');
            preview.innerText = "Error: " + err.message;
        } finally {
            btn.disabled = false;
            btn.innerText = "Run AI Scheduler";
        }
    };
</script>
</body>
</html>
