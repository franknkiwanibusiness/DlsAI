<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DLS26 | Frontend AI Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#050505] text-white p-6 font-sans">

    <div class="max-w-2xl mx-auto glass p-10 border border-zinc-900 rounded-[3rem]">
        <h1 class="text-2xl font-black italic uppercase mb-2 tracking-tighter text-[#fbbf24]">AI Match Commissioner</h1>
        <p class="text-[10px] text-zinc-600 font-bold uppercase tracking-widest mb-8">Direct Browser-to-Firebase Logic</p>
        
        <div class="space-y-6">
            <div class="bg-zinc-950 p-6 rounded-2xl border border-zinc-900">
                <h3 class="text-[10px] font-black text-zinc-500 uppercase mb-4">Command Terminal</h3>
                <textarea id="ai-prompt" placeholder="e.g. 'Generate 12 matches for tonight at 8pm'" 
                    class="w-full bg-black border border-zinc-800 p-4 rounded-xl text-sm text-[#fbbf24] focus:outline-none focus:border-[#fbbf24] h-24"></textarea>
            </div>

            <button id="run-ai" class="w-full bg-[#fbbf24] text-black font-black py-5 rounded-2xl text-[11px] uppercase italic hover:scale-[1.01] transition-transform">
                Generate & Sync to Firebase
            </button>

            <div id="status-log" class="mt-6 p-4 bg-black rounded-xl border border-zinc-900 h-40 overflow-y-auto font-mono text-[10px] text-zinc-500 space-y-1">
                <div>> System Ready. Awaiting Command...</div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-app.js";
        import { getDatabase, ref, get, set, push } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-database.js";

        // CONFIG: DLSVALUE
        const firebaseConfig = {
            apiKey: "AIzaSyCkOQf5wYsXEGQOYu6WtBNaDlgzLkaVh-E",
            databaseURL: "https://dlsvalue-default-rtdb.firebaseio.com",
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const GROQ_API_KEY = "YOUR_GROQ_API_KEY_HERE"; // PASTE YOUR KEY HERE

        const log = (msg, color = "text-zinc-500") => {
            const el = document.getElementById('status-log');
            el.innerHTML += `<div class="${color}">> ${msg}</div>`;
            el.scrollTop = el.scrollHeight;
        };

        document.getElementById('run-ai').onclick = async () => {
            log("Fetching teams from Firebase...", "text-blue-400");
            
            try {
                // 1. Get Teams
                const snap = await get(ref(db, 'users/players'));
                const players = snap.val();
                if (!players) throw new Error("No teams found at users/players!");

                const teamList = Object.values(players).map(p => ({ id: p.id, name: p.team, logo: p.logo }));
                log(`Found ${teamList.length} teams. Calling Groq AI...`, "text-yellow-500");

                // 2. Call Groq
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${GROQ_API_KEY}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: "llama3-8b-8192",
                        messages: [
                            { role: "system", content: "You are a football scheduler. Pair teams into unique matches. Return ONLY JSON: { \"fixtures\": [ { \"h\": \"id\", \"a\": \"id\" } ] }" },
                            { role: "user", content: `Pair these teams: ${JSON.stringify(teamList)}` }
                        ],
                        response_format: { type: "json_object" }
                    })
                });

                const aiData = await response.json();
                const pairings = JSON.parse(aiData.choices[0].message.content).fixtures;
                log(`AI paired ${pairings.length} matches. Saving to Firebase...`, "text-green-400");

                // 3. Save to Firebase (UCL_DATA)
                const kickoff = new Date();
                kickoff.setHours(20, 0, 0, 0); // Default 8 PM

                for (const match of pairings) {
                    const home = players[match.h];
                    const away = players[match.a];
                    
                    await push(ref(db, 'UCL_DATA'), {
                        homeName: home.team,
                        homeLogo: home.logo,
                        awayName: away.team,
                        awayLogo: away.logo,
                        homeScore: 0,
                        awayScore: 0,
                        kickOffTime: kickoff.toISOString(),
                        ended: false
                    });
                }

                log("SUCCESS: All fixtures uploaded to dlsvalue!", "text-green-500 font-bold");

            } catch (err) {
                log(`ERROR: ${err.message}`, "text-red-500");
                console.error(err);
            }
        };
    </script>
</body>
</html>
