<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DLS26 | AI Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(10, 10, 10, 0.8); backdrop-filter: blur(20px); border: 1px solid #1a1a1a; }
        .cmd-input { background: #050505; border: 1px solid #333; color: #00ff88; font-family: 'Courier New', monospace; }
        .cmd-input:focus { border-color: #00ff88; box-shadow: 0 0 15px rgba(0, 255, 136, 0.2); outline: none; }
        @keyframes pulse-dot { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        .live-dot { width: 8px; height: 8px; background: #00ff88; border-radius: 50%; animation: pulse-dot 2s infinite; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-5xl mx-auto">
        <header class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-2xl font-black italic uppercase tracking-tighter">AI <span class="text-[#00ff88]">COMMAND</span> CENTER</h1>
                <div class="flex items-center gap-2 text-[10px] text-zinc-500 font-bold uppercase tracking-widest mt-1">
                    <div class="live-dot"></div> System Online • Connected to Groq
                </div>
            </div>
            <button onclick="location.reload()" class="bg-zinc-900 p-3 rounded-xl hover:bg-zinc-800 transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /></svg>
            </button>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            
            <div class="lg:col-span-1 space-y-6">
                <div class="glass p-6 rounded-[2rem]">
                    <h2 class="text-[11px] font-black uppercase text-zinc-500 mb-4 tracking-widest">Execute Command</h2>
                    <textarea id="ai-cmd" placeholder="e.g. 'End match between Chiefs and Pirates. Score 2-0. Update table.'" 
                        class="cmd-input w-full h-32 p-4 rounded-xl text-sm mb-4 resize-none"></textarea>
                    
                    <button id="btn-exec" class="w-full bg-[#00ff88] text-black font-black py-4 rounded-xl text-[11px] uppercase italic flex items-center justify-center gap-2">
                        <span>Execute Script</span>
                    </button>
                    
                    <div id="ai-status" class="mt-4 text-[10px] font-mono text-zinc-600 uppercase text-center">Ready for input...</div>
                </div>

                <div class="glass p-6 rounded-[2rem]">
                    <h2 class="text-[11px] font-black uppercase text-zinc-500 mb-4 tracking-widest">Quick Actions</h2>
                    <button id="btn-gen-auto" class="w-full border border-zinc-800 text-zinc-400 py-3 rounded-xl text-[10px] font-black uppercase mb-2 hover:bg-zinc-900">Generate 12 Fixtures</button>
                    <button id="btn-clear" class="w-full border border-red-900/30 text-red-500 py-3 rounded-xl text-[10px] font-black uppercase hover:bg-red-950/10">Wipe Fixtures</button>
                </div>
            </div>

            <div class="lg:col-span-2 space-y-6">
                <div class="glass rounded-[2.5rem] overflow-hidden">
                    <div class="p-6 border-b border-zinc-900 flex justify-between items-center">
                        <h2 class="text-sm font-black italic uppercase tracking-wider">Live Table Overview</h2>
                        <span id="player-count" class="text-[10px] text-zinc-500">0/24 MANAGERS</span>
                    </div>
                    <div class="max-h-[500px] overflow-y-auto">
                        <table class="w-full text-left">
                            <thead class="text-[10px] text-zinc-600 uppercase font-black bg-black/50">
                                <tr>
                                    <th class="p-4">Pos</th>
                                    <th class="p-4">Team</th>
                                    <th class="p-4 text-center">P</th>
                                    <th class="p-4 text-center">PTS</th>
                                </tr>
                            </thead>
                            <tbody id="admin-table"></tbody>
                        </table>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-app.js";
        import { getDatabase, ref, onValue, remove } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDFHskUWiyHhZke3KT9kkOtFI_gPsKfiGo",
            databaseURL: "https://itzhoyoo-f9f7e-default-rtdb.firebaseio.com",
            projectId: "itzhoyoo-f9f7e",
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // LIVE TABLE LISTENER
        onValue(ref(db, 'users/players'), (snap) => {
            const data = snap.val() || {};
            const sorted = Object.values(data).sort((a,b) => b.pts - a.pts);
            document.getElementById('player-count').innerText = `${sorted.length}/24 MANAGERS`;
            
            document.getElementById('admin-table').innerHTML = sorted.map((p, i) => `
                <tr class="border-b border-zinc-900/50 text-[11px] font-bold">
                    <td class="p-4 text-zinc-700">#${i+1}</td>
                    <td class="p-4 flex items-center gap-3"><img src="${p.logo}" class="w-6 h-6 rounded-md object-cover"> ${p.team}</td>
                    <td class="p-4 text-center text-zinc-500">${p.p || 0}</td>
                    <td class="p-4 text-center text-[#00ff88]">${p.pts || 0}</td>
                </tr>
            `).join('');
        });

        // EXECUTE AI COMMAND
        document.getElementById('btn-exec').onclick = async () => {
            const prompt = document.getElementById('ai-cmd').value;
            const status = document.getElementById('ai-status');
            if(!prompt) return;

            status.innerText = "Processing with AI...";
            status.style.color = "#fbbf24";

            try {
                const res = await fetch('/api/generate-fixtures', { // Your same endpoint handle multiple logic types
                    method: 'POST',
                    body: JSON.stringify({ action: 'command', prompt: prompt })
                });
                const data = await res.json();
                status.innerText = data.message || "Command Success";
                status.style.color = "#00ff88";
                document.getElementById('ai-cmd').value = "";
            } catch (err) {
                status.innerText = "Error executing command.";
                status.style.color = "#ef4444";
            }
        };

        // AUTO FIXTURES
        document.getElementById('btn-gen-auto').onclick = async () => {
             const res = await fetch('/api/generate-fixtures', { method: 'POST', body: JSON.stringify({ action: 'generate' }) });
             alert("AI Generated 12 Fixtures");
        };

        // CLEAR
        document.getElementById('btn-clear').onclick = () => {
            if(confirm("WIPE ALL FIXTURES?")) remove(ref(db, 'fixtures'));
        };
    </script>
</body>
</html>
