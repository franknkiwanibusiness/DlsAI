<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UCL ADMIN | ADMIN PANEL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --bg: #050505; --card: #0f0f0f; --accent: #3b82f6; --border: rgba(255,255,255,0.1); }
        body { background: var(--bg); color: white; font-family: sans-serif; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        .glass { background: var(--card); border: 1px solid var(--border); border-radius: 24px; }
        .admin-input { background: #161616; border: 1px solid var(--border); color: white; padding: 12px; border-radius: 14px; width: 100%; font-size: 12px; outline: none; font-weight: 600; }
        
        /* Status Glows */
        .glow-entered { border: 2px solid #10b981 !important; }
        .glow-pending { border: 2px solid #f59e0b !important; }
        .glow-none { border: 2px solid #ef4444 !important; }

        .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(10,10,10,0.9); backdrop-filter: blur(20px); border-top: 1px solid var(--border); display: flex; justify-content: space-around; padding: 15px; z-index: 1000; }
        .nav-item { opacity: 0.3; transition: 0.3s; display: flex; flex-direction: column; align-items: center; gap: 4px; font-size: 8px; font-weight: 900; text-transform: uppercase; }
        .nav-item.active { opacity: 1; color: var(--accent); }
        
        .round-btn { transition: 0.3s; border: 1px solid var(--border); }
        .round-btn.active { border-color: var(--accent); color: var(--accent); opacity: 1 !important; background: rgba(59, 130, 246, 0.1); }

        .btn-move { background: #34c759; color: black; font-weight: 900; }
        .btn-move:disabled { opacity: 0.1; filter: grayscale(1); pointer-events: none; }

        .hidden { display: none; }
        #sec-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 9999; align-items: center; justify-content: center; padding: 20px; }
        #sec-modal.active { display: flex; }
   /* Disable Text Selection */
* {
    -webkit-user-select: none;  /* Safari */
    -ms-user-select: none;      /* IE 10 and 11 */
    user-select: none;          /* Standard syntax */
    -webkit-touch-callout: none; /* Disable long-press menu on iOS */
}

/* Re-enable selection for Inputs and Textareas so you can still type */
input, textarea, select {
    -webkit-user-select: text;
    -ms-user-select: text;
    user-select: text;
}
/* Hide content when locked */
body:has(#auth-screen[style*="display: flex"]) {
    overflow: hidden;
}

#auth-screen {
    background: radial-gradient(circle at center, #111, #050505);
}

/* User Selection Prevention from previous step */
* {
    -webkit-user-select: none;
    user-select: none;
    -webkit-touch-callout: none;
}

input, textarea {
    -webkit-user-select: text;
    user-select: text;
}

    </style>
</head>
<div id="auth-screen" class="fixed inset-0 bg-[#050505] z-[10001] flex items-center justify-center p-6">
    <div class="glass p-8 w-full max-w-sm text-center border-t-4 border-blue-600">
        <div class="text-6xl mb-6">🔑</div>
        <h1 class="text-2xl font-black italic uppercase tracking-tighter mb-2">Access Denied</h1>
        <p class="text-[10px] opacity-40 font-bold uppercase tracking-[4px] mb-8">Enter Master Key</p>
        
        <div class="space-y-4">
            <input type="password" id="master-pass" placeholder="••••••••••••" 
                   class="admin-input text-center tracking-[10px] text-lg">
            
            <label class="flex items-center justify-center gap-2 opacity-60">
                <input type="checkbox" id="remember-me" class="w-4 h-4 accent-blue-600">
                <span class="text-[10px] font-black uppercase">Don't ask again</span>
            </label>

            <button onclick="checkAuth()" class="w-full bg-blue-600 py-4 rounded-2xl font-black text-xs uppercase tracking-widest active:scale-95 transition-all">
                Unlock Command ⚡
            </button>
        </div>
    </div>
</div>

<body class="p-4 pb-32">

    <div id="sec-modal">
        <div class="glass p-8 w-full max-w-sm text-center">
            <div id="modal-icon" class="text-5xl mb-4">🛡️</div>
            <h2 id="modal-title" class="text-xl font-black italic uppercase mb-2">Confirm</h2>
            <p id="modal-desc" class="text-[10px] opacity-40 mb-8 uppercase tracking-widest"></p>
            <div class="flex gap-3">
                <button onclick="closeModal()" class="flex-1 py-4 bg-white/5 rounded-xl font-black text-[10px] uppercase">Back</button>
                <button id="modal-confirm-btn" class="flex-1 py-4 bg-blue-600 rounded-xl font-black text-[10px] uppercase">Proceed</button>
            </div>
        </div>
    </div>

    <div id="page-users">
        <header class="mb-6">
            <h1 class="text-3xl font-black italic uppercase tracking-tighter">Command</h1>
            <p class="text-[10px] opacity-40 font-bold uppercase tracking-[4px] text-blue-500">Player Management</p>
        </header>

        <section class="glass p-5 mb-6 border-l-4 border-blue-600">
            <h2 class="text-[10px] font-black uppercase mb-4 opacity-50">Season Timer Config</h2>
            <div class="space-y-3">
                <input type="datetime-local" id="timer-date" class="admin-input">
                <select id="timer-mode" class="admin-input">
                    <option value="start">Countdown to Start</option>
                    <option value="end">Countdown to End</option>
                </select>
                <button onclick="setSeasonTimer()" class="w-full bg-blue-600 py-3 rounded-xl font-black text-[10px] uppercase tracking-widest">Update Clock</button>
            </div>
        </section>

        <div id="user-list" class="space-y-4"></div>
    </div>

    <div id="page-bracket" class="hidden">
        <header class="mb-6 flex justify-between items-end">
            <div>
                <h1 class="text-3xl font-black italic uppercase text-blue-500 tracking-tighter">Tournament</h1>
                <p class="text-[10px] opacity-40 font-bold uppercase tracking-[4px]">Live Brackets</p>
            </div>
            <div class="flex gap-2">
                <button onclick="triggerAutoDraw()" class="bg-blue-600 px-5 py-2.5 rounded-full font-black text-[9px] uppercase">Draw 🎲</button>
                <button onclick="nuclearWipe()" class="bg-red-600/20 text-red-500 px-3 py-2.5 rounded-full border border-red-500/20">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"></path></svg>
                </button>
            </div>
        </header>

        <div class="grid grid-cols-4 gap-2 mb-6">
            <button onclick="switchRound('r16', this)" class="round-btn active glass py-3 text-[9px] font-black uppercase">R16</button>
            <button onclick="switchRound('quarters', this)" class="round-btn glass py-3 text-[9px] font-black uppercase opacity-20">QRT</button>
            <button onclick="switchRound('semis', this)" class="round-btn glass py-3 text-[9px] font-black uppercase opacity-20">SEM</button>
            <button onclick="switchRound('final', this)" class="round-btn glass py-3 text-[9px] font-black uppercase opacity-20">FIN</button>
        </div>

        <div id="fixtures-list" class="space-y-6"></div>
    </div>

    <div id="page-proofs" class="hidden">
        <header class="mb-6">
            <h1 class="text-3xl font-black italic uppercase text-emerald-500">Vault</h1>
            <p class="text-[10px] opacity-40 font-bold uppercase tracking-[4px]">Payment Verifications</p>
        </header>
        <div id="proof-grid" class="grid grid-cols-2 gap-3"></div>
    </div>

    <div id="page-broadcast" class="hidden">
        <header class="mb-6">
            <h1 class="text-3xl font-black italic uppercase text-purple-500">Live</h1>
            <p class="text-[10px] opacity-40 font-bold uppercase tracking-[4px]">Announcements</p>
        </header>
        <div class="glass p-5 space-y-4">
            <input type="text" id="target-user" placeholder="SEARCH USERNAME (OPTIONAL)..." class="admin-input italic uppercase">
            <textarea id="broadcast-msg" placeholder="MESSAGE CONTENT..." class="admin-input h-32 resize-none"></textarea>
            <button onclick="sendBroadcast()" class="w-full bg-purple-600 py-4 rounded-2xl font-black text-[11px] uppercase">Blast 🚀</button>
        </div>
    </div>

    <nav class="nav-bar">
        <button onclick="nav('users', this)" class="nav-item active">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"></path><circle cx="9" cy="7" r="4"></circle></svg>
            <span>Users</span>
        </button>
        <button onclick="nav('bracket', this)" class="nav-item">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"></path></svg>
            <span>Bracket</span>
        </button>
        <button onclick="nav('proofs', this)" class="nav-item">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
            <span>Vault</span>
        </button>
        <button onclick="nav('broadcast', this)" class="nav-item">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
            <span>Live</span>
        </button>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-app.js";
        import { getDatabase, ref, onValue, update, set, push, remove, get } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-database.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyDFHskUWiyHhZke3KT9kkOtFI_gPsKfiGo", 
            databaseURL: "https://itzhoyoo-f9f7e-default-rtdb.firebaseio.com", 
            projectId: "itzhoyoo-f9f7e" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let currentRound = 'r16';

        // --- NAVIGATION & MODALS ---
        window.nav = (id, el) => {
            document.querySelectorAll('[id^="page-"]').forEach(p => p.classList.add('hidden'));
            document.getElementById(`page-${id}`).classList.remove('hidden');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
            if(id === 'bracket') loadFixtures();
        };

        window.openModal = (t, d, i, a) => {
            document.getElementById('modal-title').innerText = t;
            document.getElementById('modal-desc').innerText = d;
            document.getElementById('modal-icon').innerText = i;
            document.getElementById('sec-modal').classList.add('active');
            document.getElementById('modal-confirm-btn').onclick = a;
        };
        window.closeModal = () => document.getElementById('sec-modal').classList.remove('active');

        // --- BRACKET LOGIC (OLD ENGINE RESTORED) ---
        window.switchRound = (r, btn) => {
            currentRound = r;
            document.querySelectorAll('.round-btn').forEach(b => b.classList.add('opacity-20'));
            btn.classList.remove('opacity-20');
            loadFixtures();
        };

        function loadFixtures() {
            const list = document.getElementById('fixtures-list');
            onValue(ref(db, `fixtures/${currentRound}`), (snap) => {
                list.innerHTML = "";
                const data = snap.val();
                if(!data) {
                    list.innerHTML = `<div class="py-20 text-center opacity-20 text-[10px] uppercase font-black">Empty Round</div>`;
                    return;
                }

                Object.entries(data).forEach(([id, m]) => {
                    const isDecider = (m.leg === "Leg 2" || m.leg === "Final");
                    const canA = Number(m.aggA) > Number(m.aggB) && isDecider;
                    const canB = Number(m.aggB) > Number(m.aggA) && isDecider;

                    const card = document.createElement('div');
                    card.className = `glass p-5 border-l-4 ${m.status==='done'?'border-emerald-500':'border-blue-600'}`;
                    card.innerHTML = `
                        <div class="flex justify-between items-center mb-6">
                            <span class="text-[9px] font-black uppercase text-blue-500 tracking-widest">${m.leg}</span>
                            <div class="flex items-center gap-2">
                                <span class="text-[8px] opacity-30 font-black uppercase">Lock Result</span>
                                <input type="checkbox" ${m.status==='done'?'checked':''} onchange="upData('${id}','status',this.checked?'done':'live')" class="w-5 h-5 accent-emerald-500">
                            </div>
                        </div>
                        <div class="grid grid-cols-3 gap-2">
                            <div class="text-center space-y-3">
                                <img src="${m.photoA}" class="w-12 h-12 rounded-full mx-auto border border-white/10">
                                <p class="text-[9px] font-black uppercase truncate">${m.teamA}</p>
                                <select onchange="upData('${id}','aggA',this.value)" class="admin-input text-center text-blue-400 p-2">${gen(m.aggA)}</select>
                                <button onclick='moveTeam("${id}","A",${JSON.stringify(m)})' ${!canA?'disabled':''} class="btn-move w-full py-2 rounded-xl text-[8px] uppercase">Advance</button>
                            </div>
                            <div class="space-y-3">
                                <div class="flex gap-1">
                                    <select onchange="upScore('${id}',0,this.value)" class="admin-input p-2 text-center">${gen(m.score.split(':')[0])}</select>
                                    <select onchange="upScore('${id}',1,this.value)" class="admin-input p-2 text-center">${gen(m.score.split(':')[1])}</select>
                                </div>
                                <select onchange="upData('${id}','leg',this.value)" class="admin-input text-[8px] uppercase font-black">${legOpts(m.leg)}</select>
                                <input type="time" value="${m.time||''}" onchange="upData('${id}','time',this.value)" class="admin-input p-2 text-[8px]">
                            </div>
                            <div class="text-center space-y-3">
                                <img src="${m.photoB}" class="w-12 h-12 rounded-full mx-auto border border-white/10">
                                <p class="text-[9px] font-black uppercase truncate">${m.teamB}</p>
                                <select onchange="upData('${id}','aggB',this.value)" class="admin-input text-center text-blue-400 p-2">${gen(m.aggB)}</select>
                                <button onclick='moveTeam("${id}","B",${JSON.stringify(m)})' ${!canB?'disabled':''} class="btn-move w-full py-2 rounded-xl text-[8px] uppercase">Advance</button>
                            </div>
                        </div>`;
                    list.appendChild(card);
                });
            });
        }

        // --- BRACKET UTILITIES ---
        const gen = (c) => Array.from({length:21},(_,i)=>`<option value="${i}" ${i==c?'selected':''}>${i}</option>`).join('');
        const legOpts = (c) => ["Leg 1","Leg 2","Final"].map(l => `<option ${l===c?'selected':''}>${l}</option>`).join('');
        
        window.upScore = (id, i, v) => get(ref(db, `fixtures/${currentRound}/${id}/score`)).then(snap => {
            let p = (snap.val()||"0:0").split(':'); p[i]=v; 
            update(ref(db, `fixtures/${currentRound}/${id}`), {score:p.join(':')});
        });

        window.upData = (id, f, v) => update(ref(db, `fixtures/${currentRound}/${id}`), {[f]:v});

        window.moveTeam = async (fixId, side, m) => {
            const rounds = ['r16', 'quarters', 'semis', 'final'];
            const nextRound = rounds[rounds.indexOf(currentRound) + 1];
            if(!nextRound) return;
            const winner = { name: m[`team${side}`], uid: m[`uid${side}`], photo: m[`photo${side}`] };

            openModal("PROMOTE PLAYER", `Advance ${winner.name} to ${nextRound.toUpperCase()}?`, "🏆", async () => {
                const nextRef = ref(db, `fixtures/${nextRound}`);
                const snap = await get(nextRef);
                const existing = snap.val() || {};
                let paired = false;

                for (let [id, match] of Object.entries(existing)) {
                    if (match.teamB === "TBA" && match.uidA !== winner.uid) {
                        await update(ref(db, `fixtures/${nextRound}/${id}`), { 
                            teamB: winner.name, uidB: winner.uid, photoB: winner.photo 
                        });
                        paired = true; break;
                    }
                }
                if(!paired) await push(nextRef, {
                    teamA: winner.name, uidA: winner.uid, photoA: winner.photo,
                    teamB: "TBA", uidB: "TBA_UID", photoB: "https://api.dicebear.com/7.x/shapes/svg?seed=TBA",
                    score: "0:0", aggA: "0", aggB: "0", leg: "Leg 1", status: "live"
                });
                await remove(ref(db, `fixtures/${currentRound}/${fixId}`));
                closeModal();
            });
        };

        window.triggerAutoDraw = async () => {
            const snap = await get(ref(db, 'users'));
            const p = Object.values(snap.val() || {}).filter(u => u.status === 'entered').sort(() => Math.random() - 0.5).slice(0, 16);
            if(p.length < 2) return alert("Need more players!");

            openModal("GENERATE DRAW", `Start ${p.length}-player bracket?`, "🎲", async () => {
                await set(ref(db, 'fixtures'), null);
                for(let i=0; i<p.length; i+=2) {
                    if(p[i+1]) await push(ref(db, 'fixtures/r16'), {
                        teamA: p[i].username, teamB: p[i+1].username, uidA: p[i].uid, uidB: p[i+1].uid,
                        photoA: p[i].photo, photoB: p[i+1].photo, score: "0:0", aggA: "0", aggB: "0", leg: "Leg 1", status: "live"
                    });
                }
                closeModal();
            });
        };

        window.nuclearWipe = () => openModal("WIPE ALL", "Erase all matches?", "☢️", () => { set(ref(db, 'fixtures'), null); closeModal(); });

// --- UPDATED DYNAMIC USER MGMT ---
onValue(ref(db, 'users'), (snap) => {
    const list = document.getElementById('user-list');
    list.innerHTML = "";
    const users = snap.val();
    if(!users) return;

    Object.entries(users).forEach(([id, u]) => {
        const status = (u.status || 'pending').toLowerCase();
        const isBanned = status === 'banned';
        const isEntered = status === 'entered';
        
        // Status Colors/Styles
        let glow = 'glow-none';
        if(isEntered) glow = 'glow-entered';
        if(status === 'pending') glow = 'glow-pending';
        if(isBanned) glow = 'border-2 border-dashed border-red-900 opacity-50';

        list.innerHTML += `
            <div class="glass p-5 ${glow} transition-all">
                <div class="flex items-center justify-between mb-4">
                    <div class="flex items-center gap-3">
                        <img src="${u.photo}" class="w-10 h-10 rounded-full border border-white/10 ${isBanned ? 'grayscale' : ''}">
                        <div>
                            <h3 class="font-black uppercase text-xs ${isBanned ? 'line-through opacity-50' : ''}">${u.username}</h3>
                            <p class="text-[8px] font-bold uppercase ${isBanned ? 'text-red-500' : 'text-blue-500'}">${status}</p>
                        </div>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="window.toggleBan('${id}', '${u.username}', ${isBanned})" 
                                class="p-2 rounded-lg text-xs ${isBanned ? 'bg-emerald-500/20 text-emerald-500' : 'bg-yellow-500/10 text-yellow-500'}">
                            ${isBanned ? '🔓' : '🚫'}
                        </button>
                        <button onclick="window.delUser('${id}', '${u.username}')" class="text-red-500 bg-red-500/10 p-2 rounded-lg text-xs">💀</button>
                    </div>
                </div>
                
                <div class="grid grid-cols-2 gap-2">
                    <button onclick="window.upStat('${id}', '${isEntered ? 'not entered' : 'entered'}')" 
                            class="py-3 rounded-xl font-black text-[9px] uppercase transition-all ${isEntered ? 'bg-red-600/10 text-red-500' : 'bg-emerald-600/10 text-emerald-500'}">
                        ${isEntered ? 'Revoke Entry' : 'Approve Player'}
                    </button>
                    
                    <button onclick="window.openFullView('${u.photo}', '${u.username}')" class="bg-white/5 text-white/40 py-3 rounded-xl font-black text-[9px] uppercase">Profile</button>
                </div>
            </div>`;
    });
});

// --- DYNAMIC ACTIONS ---

window.toggleBan = (uid, name, currentlyBanned) => {
    const nextStatus = currentlyBanned ? "not entered" : "banned";
    const msg = currentlyBanned ? `Unban ${name}?` : `Ban ${name} from UCL?`;
    
    openModal(currentlyBanned ? "UNBAN" : "BAN", msg, currentlyBanned ? "🔓" : "🚫", () => {
        update(ref(db, `users/${uid}`), { status: nextStatus });
        closeModal();
    });
};

window.upStat = (uid, s) => update(ref(db, `users/${uid}`), { status: s });

window.delUser = (uid, name) => openModal("ELIMINATE", `Permanently delete ${name}?`, "💀", () => {
    remove(ref(db, `users/${uid}`));
    closeModal();
});


        window.setSeasonTimer = () => {
            const date = document.getElementById('timer-date').value;
            const mode = document.getElementById('timer-mode').value;
            if(!date) return alert("Select Date!");
            update(ref(db, 'season'), { isStarted: mode === 'end', [mode === 'end' ? 'endTime' : 'startTime']: date });
            alert("Clock Updated!");
        };

        // --- FIXED PROOF VAULT ---
onValue(ref(db, 'payment_proofs'), (snap) => {
    const grid = document.getElementById('proof-grid');
    grid.innerHTML = "";
    const proofs = snap.val();
    if(!proofs) {
        grid.innerHTML = "<p class='col-span-2 text-center opacity-20 py-10 uppercase text-[9px] font-black'>No proofs in vault</p>";
        return;
    }

    Object.entries(proofs).forEach(([id, p]) => {
        grid.innerHTML += `
            <div class="glass p-2">
                <img src="${p.imageUrl}" class="w-full h-32 object-cover rounded-xl mb-2" onclick="window.open('${p.imageUrl}')">
                <p class="text-[8px] font-black uppercase mb-2 truncate px-1">${p.username}</p>
                <div class="flex gap-1">
                    <button onclick="window.verifyProof('${id}', '${p.uid}')" 
                            class="flex-1 bg-emerald-600 py-2.5 rounded-lg text-[7px] font-black uppercase">Verify</button>
                    <button onclick="window.rejectProof('${id}')" 
                            class="bg-red-600/20 text-red-500 p-2 rounded-lg text-xs">🗑️</button>
                </div>
            </div>`;
    });
});

// --- PROOF ACTIONS (Attach to window so they work) ---
window.verifyProof = (proofId, userUid) => {
    // 1. Update user status to entered
    update(ref(db, `users/${userUid}`), { status: 'entered' })
    .then(() => {
        // 2. Remove the proof from the vault
        return remove(ref(db, `payment_proofs/${proofId}`));
    })
    .then(() => {
        alert("Player Verified! ✅");
    })
    .catch((err) => alert("Error: " + err.message));
};

window.rejectProof = (proofId) => {
    openModal("REJECT PROOF", "Delete this image from the vault?", "🗑️", () => {
        remove(ref(db, `payment_proofs/${proofId}`));
        closeModal();
    });
};


        window.sendBroadcast = async () => {
            const target = document.getElementById('target-user').value.trim().toUpperCase();
            const msg = document.getElementById('broadcast-msg').value.trim();
            if(!msg) return;
