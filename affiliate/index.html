<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Affiliate Pro | DLS UCL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        /* Block scroll when loading */
        body.loading { overflow: hidden; }
        
        body { 
            -webkit-user-select: none; user-select: none;
            background: #050505; font-family: 'Inter', sans-serif; overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* --- PRO ELITE LOADING SCREEN --- */
        #master-loader {
            position: fixed; inset: 0; z-index: 9999; background: #000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .loader-logo { 
            font-size: 2.5rem; font-weight: 900; letter-spacing: -2px; 
            text-transform: uppercase; color: white; margin-bottom: 15px; font-style: italic;
        }
        .loader-accent { color: #22d3ee; text-shadow: 0 0 15px rgba(34, 211, 238, 0.5); }
        .loader-bar-bg { width: 200px; height: 2px; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; position: relative; }
        .loader-bar-fill { 
            position: absolute; width: 0%; height: 100%; background: #22d3ee; 
            box-shadow: 0 0 15px #22d3ee; transition: width 0.4s ease; 
        }

        .neon-border { border: 1px solid rgba(34, 211, 238, 0.2); box-shadow: 0 0 30px rgba(34, 211, 238, 0.03); }
        .shimmer {
            background: linear-gradient(90deg, transparent, rgba(34, 211, 238, 0.05), transparent);
            background-size: 200% 100%; animation: shimmer 3s infinite;
        }
        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }

        #toast-container { position: fixed; top: 20px; right: 20px; z-index: 10000; pointer-events: none; }
        .toast {
            background: rgba(10, 10, 10, 0.95); border: 1px solid rgba(34, 211, 238, 0.2);
            backdrop-filter: blur(10px); color: white; padding: 14px 24px; border-radius: 14px;
            margin-bottom: 10px; font-size: 11px; font-weight: 900; text-transform: uppercase;
            letter-spacing: 1px; display: flex; align-items: center; gap: 12px;
            transform: translateX(120%); transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .toast.show { transform: translateX(0); }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="text-white min-h-screen loading">

    <div id="master-loader">
        <h1 class="loader-logo">DLS <span class="loader-accent">VALUE</span></h1>
        <div class="loader-bar-bg"><div id="loader-progress" class="loader-bar-fill"></div></div>
        <p class="text-[8px] font-black uppercase tracking-[0.5em] text-zinc-700 mt-6 animate-pulse">Establishing Secure Connection</p>
    </div>

    <div id="toast-container"></div>

    <div id="authOverlay" class="hidden fixed inset-0 z-[100] bg-black flex flex-col items-center justify-center p-8 text-center">
        <h1 class="text-4xl font-black italic tracking-tighter mb-1 uppercase">DLS <span class="text-cyan-400">Affiliate</span></h1>
        <p class="text-[10px] text-zinc-500 font-bold uppercase tracking-[0.3em] mb-10">Elite Tournament Network</p>
        
        <div class="w-full max-w-sm space-y-3">
            <input id="email" type="email" placeholder="EMAIL ADDRESS" class="w-full bg-zinc-900/50 border border-white/10 p-4 rounded-xl text-[10px] font-black focus:border-cyan-500 outline-none transition-all">
            <input id="password" type="password" placeholder="PASSWORD" class="w-full bg-zinc-900/50 border border-white/10 p-4 rounded-xl text-[10px] font-black focus:border-cyan-500 outline-none transition-all">
            <button onclick="handleAuth()" id="authBtn" class="w-full bg-cyan-500 text-black font-black p-4 rounded-xl uppercase italic hover:bg-cyan-400 transition-all">Access Dashboard</button>
        </div>
    </div>

    <main id="dashboard" class="hidden p-5 max-w-lg mx-auto pt-10 opacity-0 transition-opacity duration-700">
        <div class="flex justify-between items-start mb-8">
            <div class="flex items-center gap-4">
                <img id="displayPhoto" src="" class="w-12 h-12 rounded-full border-2 border-cyan-400/30 object-cover bg-zinc-900">
                <div>
                    <h2 id="displayName" class="text-xl font-black italic uppercase leading-none">---</h2>
                    <p id="displayID" class="text-[9px] font-mono text-zinc-500 uppercase mt-1">ID: ----</p>
                </div>
            </div>
            <button onclick="signOutUser()" class="p-2 rounded-full bg-white/5 border border-white/10">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
        </div>

        <div class="relative overflow-hidden bg-gradient-to-br from-zinc-900 to-black p-8 rounded-[2rem] neon-border shimmer mb-6">
            <p class="text-[9px] font-black text-zinc-500 uppercase tracking-[0.2em]">Total Earnings</p>
            <div class="flex items-baseline gap-2 mt-1">
                <h1 id="balanceUSD" class="text-5xl font-black italic tracking-tighter">$0.000</h1>
                <span class="text-xs font-bold text-zinc-600 uppercase">USD</span>
            </div>
            <div id="balanceLocal" class="inline-block mt-4 px-3 py-1 bg-cyan-500/10 border border-cyan-500/20 rounded-full text-[10px] font-black text-cyan-400 uppercase">
                Syncing Rates...
            </div>
        </div>

        <button onclick="openWithdraw()" class="w-full mb-8 bg-white text-black font-black p-4 rounded-2xl uppercase italic active:scale-95 transition-all">
            Withdraw to MiniPay
        </button>

        <div class="bg-white/5 border border-white/5 p-5 rounded-2xl mb-8">
            <h3 class="text-[9px] font-black uppercase text-zinc-400 mb-3 tracking-widest">Your Partner Link</h3>
            <div class="flex gap-2">
                <input id="refLink" readonly type="text" class="flex-1 bg-black/40 border border-white/5 p-3 rounded-xl text-[10px] font-mono text-zinc-500 outline-none">
                <button onclick="copyLink()" class="bg-white text-black font-black px-5 py-3 rounded-xl text-[10px] uppercase active:scale-90 transition-all">Copy</button>
            </div>
        </div>

        <h3 class="text-[9px] font-black uppercase text-zinc-400 mb-3 tracking-widest ml-1">Network Activity</h3>
        <div id="logTable" class="space-y-2 mb-20"></div>
    </main>

    <div id="withdrawModal" class="fixed inset-0 z-[110] bg-black/90 backdrop-blur-md hidden flex flex-col items-center justify-end">
        <div id="withdrawSheet" class="w-full max-w-lg bg-zinc-900 border-t border-white/10 rounded-t-[3rem] p-8 pb-12 translate-y-full transition-transform duration-500">
            <div class="w-12 h-1 bg-white/10 rounded-full mx-auto mb-8"></div>
            <h2 class="text-2xl font-black italic uppercase mb-2">MiniPay <span class="text-cyan-400">Payout</span></h2>
            <p class="text-[10px] text-zinc-500 font-bold uppercase tracking-widest mb-6">Minimum: $5.00</p>
            <input id="payoutAddress" type="text" placeholder="PHONE OR CELO ADDRESS" class="w-full bg-black border border-white/5 p-4 rounded-2xl text-xs font-bold mb-4 outline-none focus:border-cyan-500">
            <button onclick="processWithdrawal()" class="w-full bg-cyan-500 text-black font-black p-5 rounded-2xl uppercase italic">Confirm Request</button>
            <button onclick="closeWithdraw()" class="w-full mt-3 text-[10px] font-black text-zinc-500 uppercase py-2">Cancel</button>
        </div>
    </div>

<script type="module">
    // --- FIREBASE INIT (Your Specific Config) ---
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-app.js";
    import { getDatabase, ref, onValue, query, orderByChild, equalTo, set, runTransaction } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-database.js";
    import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDFHskUWiyHhZke3KT9kkOtFI_gPsKfiGo",
        authDomain: "itzhoyoo-f9f7e.firebaseapp.com",
        databaseURL: "https://itzhoyoo-f9f7e-default-rtdb.firebaseio.com",
        projectId: "itzhoyoo-f9f7e",
        storageBucket: "itzhoyoo-f9f7e.filestorage.app",
        messagingSenderId: "1094792075584",
        appId: "1:1094792075584:web:d49e9c3f899d3cd31082a5",
        measurementId: "G-LLT6F9WRKH"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);

    let currentBalance = 0;

    // --- LOADING SYSTEM ---
    function updateProgress(val) {
        document.getElementById('loader-progress').style.width = val + '%';
        if (val >= 100) {
            setTimeout(() => {
                document.body.classList.remove('loading');
                document.getElementById('master-loader').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('master-loader').style.display = 'none';
                    const dash = document.getElementById('dashboard');
                    dash.classList.remove('hidden');
                    setTimeout(() => dash.style.opacity = '1', 50);
                }, 600);
            }, 400);
        }
    }

    window.notify = (msg, type = 'info') => {
        const container = document.getElementById('toast-container');
        const toast = document.createElement('div');
        toast.className = `toast`;
        toast.style.borderColor = type === 'error' ? 'rgba(239,68,68,0.4)' : 'rgba(34,211,238,0.4)';
        toast.innerHTML = `<div class="w-2 h-2 rounded-full ${type === 'error' ? 'bg-red-500' : 'bg-cyan-400'} animate-pulse"></div><span>${msg}</span>`;
        container.appendChild(toast);
        setTimeout(() => toast.classList.add('show'), 100);
        setTimeout(() => { toast.classList.remove('show'); setTimeout(() => toast.remove(), 500); }, 4000);
    };

    // --- DATA HANDLING ---
    function loadUserData(uid) {
        updateProgress(40);
        document.getElementById('refLink').value = `https://dlsvalue.site/index.html?ref=${uid}`;
        document.getElementById('displayID').innerText = `PARTNER ID: ${uid.substring(0,8)}`;

        onValue(ref(db, `managers/${uid}`), async (snap) => {
            if(!snap.exists()) { updateProgress(100); return; }
            const d = snap.val();
            currentBalance = parseFloat(d.balance || 0);
            document.getElementById('displayName').innerText = d.name || "Elite Manager";
            document.getElementById('displayPhoto').src = d.photo || "https://via.placeholder.com/100";
            document.getElementById('balanceUSD').innerText = `$${currentBalance.toFixed(3)}`;
            
            // Currency conversion
            try {
                const res = await fetch('https://open.er-api.com/v6/latest/USD');
                const fx = await res.json();
                const rate = fx.rates.NGN || 1; // Defaulting to NGN for example or use a geo-fetch
                document.getElementById('balanceLocal').innerText = `≈ ${(currentBalance * rate).toLocaleString()} NGN`;
            } catch(e) { 
                document.getElementById('balanceLocal').innerText = `Currency Sync Offline`;
            }
            updateProgress(100);
        });

        // Activity Log
        const q = query(ref(db, 'managers'), orderByChild('referredBy'), equalTo(uid));
        onValue(q, (snap) => {
            const list = [];
            snap.forEach(c => list.push(c.val()));
            const container = document.getElementById('logTable');
            if(!list.length) {
                container.innerHTML = `<div class="p-8 text-center text-[10px] text-zinc-700 font-black uppercase tracking-widest border border-dashed border-white/5 rounded-2xl">No Network Data</div>`;
                return;
            }
            container.innerHTML = list.reverse().map(l => `
                <div class="p-4 bg-white/5 border border-white/5 rounded-2xl flex justify-between items-center">
                    <div class="flex items-center gap-3">
                        <img src="${l.photo}" class="w-8 h-8 rounded-full border border-white/10">
                        <div>
                            <p class="text-[10px] font-black uppercase text-white">${l.name}</p>
                            <p class="text-[7px] font-bold text-zinc-500 uppercase tracking-widest">${l.hasPaid ? 'PAID ENTRY' : 'REGISTERED'}</p>
                        </div>
                    </div>
                    <p class="text-[10px] font-black text-cyan-400">+$${l.hasPaid ? '0.50' : '0.05'}</p>
                </div>
            `).join('');
        });
    }

    // --- GLOBALS FOR BUTTONS ---
    window.handleAuth = async () => {
        const e = document.getElementById('email').value;
        const p = document.getElementById('password').value;
        if(!e || !p) return notify("Missing Credentials", "error");
        try {
            await signInWithEmailAndPassword(auth, e, p);
        } catch(err) { notify("Invalid Login", "error"); }
    };

    window.signOutUser = () => signOut(auth).then(() => location.reload());
    
    window.copyLink = () => {
        navigator.clipboard.writeText(document.getElementById('refLink').value);
        notify("Partner Link Copied");
    };

    window.openWithdraw = () => {
        if(currentBalance < 5) return notify("Min $5.00 needed", "error");
        document.getElementById('withdrawModal').classList.remove('hidden');
        setTimeout(() => document.getElementById('withdrawSheet').classList.remove('translate-y-full'), 10);
    };

    window.closeWithdraw = () => {
        document.getElementById('withdrawSheet').classList.add('translate-y-full');
        setTimeout(() => document.getElementById('withdrawModal').classList.add('hidden'), 500);
    };

    window.processWithdrawal = async () => {
        const addr = document.getElementById('payoutAddress').value;
        if(!addr) return notify("Enter Payout Address", "error");
        
        const balRef = ref(db, `managers/${auth.currentUser.uid}/balance`);
        const result = await runTransaction(balRef, (val) => {
            const cur = parseFloat(val || 0);
            return cur >= 5 ? (cur - 5).toFixed(4) : undefined;
        });

        if(result.committed) {
            await set(ref(db, `payouts/${auth.currentUser.uid}_${Date.now()}`), {
                uid: auth.currentUser.uid, amount: 5, address: addr, status: 'PENDING', time: Date.now()
            });
            notify("Payout Requested");
            closeWithdraw();
        }
    };

    // --- AUTH OBSERVER ---
    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById('authOverlay').classList.add('hidden');
            loadUserData(user.uid);
        } else {
            document.getElementById('authOverlay').classList.remove('hidden');
            updateProgress(100);
        }
    });
</script>
</body>
</html>
