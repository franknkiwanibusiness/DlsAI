<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Affiliate Pro | DLS Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none; user-select: none;
            background: #050505; font-family: 'Inter', sans-serif; overflow-x: hidden;
        }
        .neon-border { border: 1px solid rgba(34, 211, 238, 0.2); box-shadow: 0 0 20px rgba(34, 211, 238, 0.05); }
        .shimmer {
            background: linear-gradient(90deg, transparent, rgba(34, 211, 238, 0.05), transparent);
            background-size: 200% 100%; animation: shimmer 3s infinite;
        }
        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
        
        #master-loader {
            position: fixed; inset: 0; z-index: 9999; background: #000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.5s ease, visibility 0.5s;
        }
        .loader-bar { width: 100px; h: 2px; background: rgba(34, 211, 238, 0.1); overflow: hidden; position: relative; margin-top: 20px; }
        .loader-progress { position: absolute; width: 40%; height: 100%; background: #22d3ee; animation: load 1.5s infinite ease-in-out; }
        @keyframes load { 0% { left: -40%; } 100% { left: 100%; } }

        #toast-container { position: fixed; top: 20px; right: 20px; z-index: 1000; pointer-events: none; }
        .toast {
            background: rgba(15, 15, 15, 0.9); border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px); color: white; padding: 12px 20px; border-radius: 12px;
            margin-bottom: 10px; font-size: 11px; font-weight: 800; text-transform: uppercase;
            letter-spacing: 1px; display: flex; align-items: center; gap: 10px;
            transform: translateX(120%); transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .toast.show { transform: translateX(0); }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="text-white min-h-screen">

    <div id="master-loader">
        <h1 class="text-2xl font-black italic tracking-tighter uppercase">DLS <span class="text-cyan-400">VALUE</span></h1>
        <div class="loader-bar"><div class="loader-progress"></div></div>
    </div>

    <div id="toast-container"></div>

    <div id="authOverlay" class="hidden fixed inset-0 z-[100] bg-black flex flex-col items-center justify-center p-8 text-center">
        <h1 class="text-4xl font-black italic tracking-tighter mb-1 uppercase">DLS <span class="text-cyan-400">Affiliate</span></h1>
        <p class="text-[10px] text-zinc-500 font-bold uppercase tracking-[0.3em] mb-10">Elite Tournament Network</p>
        
        <div id="loginForm" class="w-full max-w-sm space-y-3">
            <input id="email" type="email" placeholder="EMAIL ADDRESS" class="w-full bg-zinc-900/50 border border-white/10 p-4 rounded-xl text-[10px] font-black focus:border-cyan-500 outline-none transition-all">
            <input id="password" type="password" placeholder="PASSWORD" class="w-full bg-zinc-900/50 border border-white/10 p-4 rounded-xl text-[10px] font-black focus:border-cyan-500 outline-none transition-all">
            <button onclick="handleAuth('login')" class="w-full bg-cyan-500 text-black font-black p-4 rounded-xl uppercase italic hover:bg-cyan-400 transition-all">Enter Dashboard</button>
            <button onclick="handleAuth('register')" class="w-full border border-white/10 text-white font-black p-4 rounded-xl uppercase italic hover:bg-white/5 transition-all">Create Account</button>
            <div class="h-[1px] bg-zinc-800 w-full my-4"></div>
            <button onclick="handleGoogleLogin()" class="w-full bg-white text-black font-black p-4 rounded-xl uppercase italic flex items-center justify-center gap-2">Continue with Google</button>
        </div>
    </div>

    <main id="dashboard" class="hidden p-5 max-w-lg mx-auto pt-10">
        <div class="flex justify-between items-start mb-8">
            <div>
                <h2 id="displayTeam" class="text-2xl font-black italic uppercase leading-none text-white">---</h2>
                <div class="flex items-center gap-2 mt-1">
                    <span id="displayCountry" class="text-[9px] font-bold text-cyan-400 uppercase tracking-widest">Global</span>
                    <span class="w-1 h-1 rounded-full bg-zinc-700"></span>
                    <span id="displayID" class="text-[9px] font-mono text-zinc-500 uppercase">ID: ----</span>
                </div>
            </div>
            <button onclick="signOutUser()" class="p-2 rounded-full bg-white/5 border border-white/10 hover:bg-white/10 transition-all">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
        </div>

        <div class="relative overflow-hidden bg-gradient-to-br from-zinc-900 to-black p-8 rounded-[2rem] neon-border shimmer mb-6">
            <p class="text-[9px] font-black text-zinc-500 uppercase tracking-[0.2em]">Total Earnings</p>
            <div class="flex items-baseline gap-2 mt-1">
                <h1 id="balanceUSD" class="text-5xl font-black italic tracking-tighter">$0.000</h1>
                <span class="text-xs font-bold text-zinc-600 uppercase">USD</span>
            </div>
            <div id="balanceLocal" class="inline-block mt-4 px-3 py-1 bg-cyan-500/10 border border-cyan-500/20 rounded-full text-[10px] font-black text-cyan-400 uppercase">
                Detecting Local Currency...
            </div>
        </div>

        <button onclick="openWithdraw()" class="w-full mb-8 bg-white text-black font-black p-4 rounded-2xl uppercase italic flex items-center justify-center gap-3 active:scale-95 transition-all">
            Withdraw to MiniPay
        </button>

        <div class="mb-8">
            <h3 class="text-[10px] font-black uppercase tracking-widest text-zinc-500 mb-3 ml-1">Live Payout Rates</h3>
            <div class="bg-white/5 border border-white/5 rounded-2xl overflow-hidden font-bold text-[10px]">
                <div class="flex justify-between p-4 border-b border-white/5">
                    <span class="uppercase">Link Click</span>
                    <span class="text-cyan-400" id="rateClick">$0.001</span>
                </div>
                <div class="flex justify-between p-4 border-b border-white/5">
                    <span class="uppercase">New Registration</span>
                    <span class="text-cyan-400" id="rateReferral">$0.05</span>
                </div>
                <div class="flex justify-between p-4">
                    <span class="uppercase">Paid Tournament User</span>
                    <span class="text-cyan-400" id="ratePaid">$0.50</span>
                </div>
            </div>
        </div>

        <div class="bg-white/5 border border-white/5 p-5 rounded-2xl mb-8">
            <h3 class="text-[9px] font-black uppercase text-zinc-400 mb-3 tracking-widest">Your Partner Link</h3>
            <div class="flex gap-2">
                <input id="refLink" readonly type="text" class="flex-1 bg-black/40 border border-white/5 p-3 rounded-xl text-[10px] font-mono text-zinc-500 outline-none">
                <button onclick="copyLink()" class="bg-white text-black font-black px-5 py-3 rounded-xl text-[10px] uppercase active:scale-90 transition-all">Copy</button>
            </div>
        </div>

        <h3 class="text-[9px] font-black uppercase text-zinc-400 mb-3 tracking-widest ml-1">Referral Log</h3>
        <div id="logTable" class="space-y-2 mb-20"></div>
    </main>

    <div id="withdrawModal" class="fixed inset-0 z-[110] bg-black/90 backdrop-blur-md hidden flex flex-col items-center justify-end">
        <div id="withdrawSheet" class="w-full max-w-lg bg-zinc-900 border-t border-white/10 rounded-t-[3rem] p-8 pb-12 translate-y-full transition-transform duration-500">
            <div class="w-12 h-1 bg-white/10 rounded-full mx-auto mb-8"></div>
            <h2 class="text-2xl font-black italic uppercase text-white mb-2">MiniPay <span class="text-cyan-400">Withdraw</span></h2>
            <p class="text-[10px] text-zinc-500 font-bold uppercase tracking-widest mb-6">Min. Payout: <span id="minText">$5.00</span></p>

            <div class="space-y-4 mb-8">
                <input id="payoutAddress" type="text" placeholder="PHONE (+234...) OR CELO ADDRESS" class="w-full bg-black border border-white/5 p-4 rounded-2xl text-xs font-bold text-white focus:border-cyan-500 outline-none">
                <select id="withdrawAmount" class="w-full bg-black border border-white/5 p-4 rounded-2xl text-xs font-black text-white focus:border-cyan-500 outline-none appearance-none">
                    <option value="5">$5.00 USD</option>
                    <option value="10">$10.00 USD</option>
                    <option value="20">$20.00 USD</option>
                </select>
            </div>

            <button onclick="processWithdrawal()" class="w-full bg-cyan-500 text-black font-black p-5 rounded-2xl uppercase italic active:scale-95 transition-all">Confirm Payout</button>
            <button onclick="closeWithdraw()" class="w-full mt-3 text-[10px] font-black text-zinc-500 uppercase py-2">Go Back</button>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-app.js";
    import { getDatabase, ref, onValue, query, orderByChild, equalTo, set, runTransaction, update } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-database.js";
    import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, GoogleAuthProvider, signInWithPopup, signOut } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDFHskUWiyHhZke3KT9kkOtFI_gPsKfiGo",
        authDomain: "itzhoyoo-f9f7e.firebaseapp.com",
        databaseURL: "https://itzhoyoo-f9f7e-default-rtdb.firebaseio.com",
        projectId: "itzhoyoo-f9f7e",
        storageBucket: "itzhoyoo-f9f7e.filestorage.app",
        messagingSenderId: "1094792075584",
        appId: "1:1094792075584:web:d49e9c3f899d3cd31082a5",
        measurementId: "G-LLT6F9WRKH"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);

    let currentBalance = 0;
    let localCurrency = 'USD';

    function hideMasterLoader() {
        const loader = document.getElementById('master-loader');
        if (!loader) return;
        loader.style.opacity = '0';
        setTimeout(() => {
            loader.style.visibility = 'hidden';
            document.getElementById('dashboard').classList.remove('hidden');
        }, 500);
    }

    async function detectUserCountry(uid) {
        try {
            const res = await fetch('https://ipapi.co/json/');
            const data = await res.json();
            if(!data.error) {
                localCurrency = data.currency || 'USD';
                await update(ref(db, `users/${uid}`), {
                    country: data.country_name,
                    currency: localCurrency
                });
                updateRates(localCurrency);
            } else {
                throw new Error("Provider Limit");
            }
        } catch (e) { 
            updateRates('USD'); 
        }
    }

    async function updateRates(currency) {
        try {
            const res = await fetch(`https://api.exchangerate-api.com/v4/latest/USD`);
            const data = await res.json();
            const rate = data.rates[currency] || 1;
            
            // Support 3-decimal precision for clicks ($0.001)
            const localVal = (currentBalance * rate);
            document.getElementById('balanceLocal').innerText = `≈ ${localVal.toLocaleString(undefined, {
                style: 'currency', 
                currency: currency,
                minimumFractionDigits: 3,
                maximumFractionDigits: 3
            })}`;
            
            document.getElementById('rateClick').innerText = `${(0.001 * rate).toFixed(3)} ${currency}`;
            document.getElementById('rateReferral').innerText = `${(0.05 * rate).toFixed(2)} ${currency}`;
            document.getElementById('ratePaid').innerText = `${(0.50 * rate).toFixed(2)} ${currency}`;
            document.getElementById('minText').innerText = `${(5.00 * rate).toFixed(2)} ${currency} ($5.00 USD)`;
            
            hideMasterLoader();
        } catch (e) { 
            hideMasterLoader(); 
        }
    }

    window.notify = (msg, type = 'info') => {
        const container = document.getElementById('toast-container');
        const toast = document.createElement('div');
        toast.className = `toast border-${type === 'error' ? 'red' : 'cyan'}-500/50`;
        toast.innerHTML = `<div class="w-2 h-2 rounded-full ${type === 'error' ? 'bg-red-500' : 'bg-cyan-400'} animate-pulse"></div><span>${msg}</span>`;
        container.appendChild(toast);
        setTimeout(() => toast.classList.add('show'), 100);
        setTimeout(() => { toast.classList.remove('show'); setTimeout(() => toast.remove(), 500); }, 4000);
    };

    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById('authOverlay').classList.add('hidden');
            loadData(user.uid);
            detectUserCountry(user.uid);
        } else {
            document.getElementById('authOverlay').classList.remove('hidden');
            document.getElementById('dashboard').classList.add('hidden');
            hideMasterLoader();
        }
    });

    window.handleAuth = async (type) => {
        const e = document.getElementById('email').value;
        const p = document.getElementById('password').value;
        if(!e || !p) return notify("Missing Info", "error");
        try {
            if(type === 'login') await signInWithEmailAndPassword(auth, e, p);
            else await createUserWithEmailAndPassword(auth, e, p);
        } catch (err) { notify(err.code, "error"); }
    };

    window.handleGoogleLogin = () => signInWithPopup(auth, new GoogleAuthProvider());
    window.signOutUser = () => signOut(auth);

    function loadData(uid) {
        document.getElementById('refLink').value = `${window.location.origin}/index.html?ref=${uid}`;
        document.getElementById('displayID').innerText = `ID: ${uid.substring(0,8)}`;

        onValue(ref(db, `users/${uid}`), (snap) => {
            const d = snap.val() || {};
            currentBalance = d.wallet || 0;
            document.getElementById('displayTeam').innerText = d.team || "ELITE PLAYER";
            document.getElementById('displayCountry').innerText = d.country || "DETECTING...";
            
            // Set main USD balance to 3-decimal precision
            document.getElementById('balanceUSD').innerText = `$${currentBalance.toFixed(3)}`;
            
            if(d.currency) updateRates(d.currency);
        });

        const q = query(ref(db, 'users'), orderByChild('referredBy'), equalTo(uid));
        onValue(q, (snap) => {
            const logs = [];
            snap.forEach(c => logs.push(c.val()));
            renderLogs(logs);
        });
    }

    function renderLogs(logs) {
        const container = document.getElementById('logTable');
        if (!logs.length) {
            container.innerHTML = `<div class="p-8 bg-white/5 border border-dashed border-white/10 rounded-2xl text-center text-[10px] font-black uppercase text-zinc-600">No Network Activity</div>`;
            return;
        }
        container.innerHTML = logs.reverse().map(l => `
            <div class="p-4 bg-white/5 border border-white/5 rounded-2xl flex justify-between items-center">
                <div>
                    <p class="text-[10px] font-black uppercase text-white">${l.team || 'Anonymous'}</p>
                    <p class="text-[8px] font-bold text-zinc-500 uppercase tracking-widest mt-1">
                        ${l.isPaid ? 'PAID ENTRY' : (l.type === 'click' ? 'LINK CLICK' : 'REGISTRATION')}
                    </p>
                </div>
                <p class="text-[10px] font-black text-cyan-400">
                    +$${l.isPaid ? '0.50' : (l.type === 'click' ? '0.001' : '0.05')}
                </p>
            </div>
        `).join('');
    }

    window.copyLink = () => {
        navigator.clipboard.writeText(document.getElementById('refLink').value);
        notify("Partner Link Copied!");
    };

    window.openWithdraw = () => {
        document.getElementById('withdrawModal').classList.remove('hidden');
        setTimeout(() => document.getElementById('withdrawSheet').classList.remove('translate-y-full'), 10);
    };
    
    window.closeWithdraw = () => {
        document.getElementById('withdrawSheet').classList.add('translate-y-full');
        setTimeout(() => document.getElementById('withdrawModal').classList.add('hidden'), 500);
    };

    window.processWithdrawal = async () => {
        const amount = parseFloat(document.getElementById('withdrawAmount').value);
        const address = document.getElementById('payoutAddress').value.trim();
        if (!address) return notify("Enter Address", "error");
        if (currentBalance < amount) return notify("Insufficient Funds", "error");

        const walletRef = ref(db, `users/${auth.currentUser.uid}/wallet`);
        const result = await runTransaction(walletRef, (val) => (val >= amount ? val - amount : undefined));
        
        if (result.committed) {
            await set(ref(db, `payouts/${auth.currentUser.uid}_${Date.now()}`), { 
                uid: auth.currentUser.uid, 
                amount, 
                address, 
                status: 'PENDING', 
                time: Date.now() 
            });
            notify("MiniPay Payout Requested!");
            closeWithdraw();
        }
    };
</script>
</body>
</html>
