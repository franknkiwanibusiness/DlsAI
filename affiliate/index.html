<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DLS VALUE | AFFILIATE PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;700;900&display=swap');

        :root {
            --neon-cyan: #00f2ff;
            --neon-purple: #bc13fe;
        }

        body {
            background-color: #050505;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            overflow: hidden; /* App-like no-scroll */
            height: 100dvh;
        }

        .impact-text { font-family: 'Archivo Black', sans-serif; text-transform: uppercase; }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(0, 242, 255, 0.15);
            backdrop-filter: blur(12px);
        }

        /* Shimmering Banding Effect */
        .shimmer-btn {
            background: linear-gradient(90deg, #00f2ff 0%, #7000ff 50%, #00f2ff 100%);
            background-size: 200% auto;
            animation: move-gradient 3s linear infinite;
        }

        @keyframes move-gradient {
            to { background-position: 200% center; }
        }

        .log-container::-webkit-scrollbar { width: 3px; }
        .log-container::-webkit-scrollbar-thumb { background: var(--neon-cyan); border-radius: 10px; }

        #app-loader {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body class="flex flex-col p-5">

    <div id="app-loader">
        <div class="w-12 h-12 border-4 border-cyan-500 border-t-transparent rounded-full animate-spin mb-4"></div>
        <p class="impact-text text-[10px] tracking-[0.2em] text-cyan-500">Connecting to Firebase...</p>
    </div>

    <div id="auth-section" class="hidden flex-1 flex flex-col justify-center items-center">
        <div class="text-center mb-8">
            <h1 class="impact-text text-4xl italic text-white leading-none">DLS<span class="text-cyan-500 italic">VALUE</span></h1>
            <p class="text-[10px] tracking-[0.3em] opacity-40 uppercase">Affiliate Network</p>
        </div>
        
        <div class="glass-card w-full p-6 rounded-3xl border-white/5 space-y-4">
            <button id="google-login" class="w-full py-4 bg-white text-black rounded-xl font-black flex items-center justify-center gap-3 active:scale-95 transition-transform">
                <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" class="w-5">
                CONTINUE WITH GOOGLE
            </button>
            
            <div class="flex items-center gap-2 opacity-20 py-2">
                <hr class="flex-1 border-white/20">
                <span class="text-[10px] font-bold">OR</span>
                <hr class="flex-1 border-white/20">
            </div>

            <input id="email" type="email" placeholder="EMAIL ADDRESS" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl text-xs focus:border-cyan-500 outline-none">
            <input id="password" type="password" placeholder="PASSWORD" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl text-xs focus:border-cyan-500 outline-none">
            <button id="email-login" class="w-full py-4 bg-cyan-600 rounded-xl impact-text text-sm">Sign In / Register</button>
        </div>
    </div>

    <div id="main-dashboard" class="hidden flex-1 flex flex-col h-full overflow-hidden">
        <header class="flex justify-between items-center mb-6">
            <div>
                <h2 class="impact-text text-lg text-cyan-400">Promoter Hub</h2>
                <p id="user-display" class="text-[10px] opacity-40 uppercase">--</p>
            </div>
            <button id="logout-btn" class="text-[10px] border border-white/10 px-3 py-1 rounded-full opacity-50">LOGOUT</button>
        </header>

        <div class="glass-card p-4 rounded-2xl mb-4 border-dashed border-cyan-500/40">
            <p class="impact-text text-[9px] text-cyan-500 mb-2">Unique Tracking Link</p>
            <div class="flex gap-2">
                <input id="ref-link-input" type="text" readonly class="bg-black/40 border border-white/5 flex-1 p-2 rounded-lg text-[10px] text-cyan-200">
                <button onclick="copyRefLink()" class="bg-white text-black px-4 rounded-lg font-black text-[10px]">COPY</button>
            </div>
        </div>

        <div class="glass-card rounded-2xl p-6 mb-4 text-center border-t-2 border-t-cyan-500">
            <p class="impact-text text-[10px] opacity-40 mb-1">Current Earnings</p>
            <div class="flex items-center justify-center gap-1 mb-4">
                <span class="text-xs opacity-50 font-bold">KSH</span>
                <h3 id="balance-val" class="text-4xl font-black tracking-tighter">0.00</h3>
            </div>
            <button id="withdraw-action" class="shimmer-btn w-full py-3 rounded-xl impact-text text-xs text-black font-black">
                Withdraw (Min $5)
            </button>
        </div>

        <div class="grid grid-cols-3 gap-2 mb-6">
            <div class="glass-card p-3 rounded-xl text-center">
                <p class="text-[8px] opacity-40 mb-1">CLICKS</p>
                <p id="stat-clicks" class="text-sm font-bold">0</p>
            </div>
            <div class="glass-card p-3 rounded-xl text-center">
                <p class="text-[8px] opacity-40 mb-1">REGS</p>
                <p id="stat-regs" class="text-sm font-bold text-purple-400">0</p>
            </div>
            <div class="glass-card p-3 rounded-xl text-center">
                <p class="text-[8px] opacity-40 mb-1">PAID</p>
                <p id="stat-paid" class="text-sm font-bold text-cyan-400">0</p>
            </div>
        </div>

        <p class="impact-text text-[9px] opacity-30 mb-2 px-1">Live Transaction Stream</p>
        <div id="log-list" class="log-container flex-1 overflow-y-auto space-y-2 pb-4">
            </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-app.js";
        import { getDatabase, ref, onValue, get, set } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-database.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDFHskUWiyHhZke3KT9kkOtFI_gPsKfiGo",
            authDomain: "itzhoyoo-f9f7e.firebaseapp.com",
            databaseURL: "https://itzhoyoo-f9f7e-default-rtdb.firebaseio.com",
            projectId: "itzhoyoo-f9f7e",
            storageBucket: "itzhoyoo-f9f7e.filestorage.app",
            messagingSenderId: "1094792075584",
            appId: "1:1094792075584:web:d49e9c3f899d3cd31082a5"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);
        const googleProvider = new GoogleAuthProvider();

        // UI Handlers
        const loader = document.getElementById('app-loader');
        const authSection = document.getElementById('auth-section');
        const dashSection = document.getElementById('main-dashboard');

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                await syncUserData(user);
                authSection.classList.add('hidden');
                dashSection.classList.remove('hidden');
                document.getElementById('user-display').innerText = user.email;
            } else {
                dashSection.classList.add('hidden');
                authSection.classList.remove('hidden');
            }
            loader.classList.add('hidden');
        });

        async function syncUserData(user) {
            const userRef = ref(db, `promoters/${user.uid}`);
            const snapshot = await get(userRef);
            
            let referralId;
            if (!snapshot.exists()) {
                referralId = user.uid.substring(0, 8);
                await set(userRef, {
                    email: user.email,
                    referralId: referralId,
                    balance: 0,
                    stats: { clicks: 0, regs: 0, paid: 0 }
                });
            } else {
                referralId = snapshot.val().referralId;
            }

            document.getElementById('ref-link-input').value = `https://dlsvalue.site/?ref=${referralId}`;

            // Real-time Balance/Stats Update
            onValue(userRef, (snap) => {
                const data = snap.val();
                if (data) {
                    document.getElementById('balance-val').innerText = (data.balance || 0).toFixed(2);
                    document.getElementById('stat-clicks').innerText = data.stats?.clicks || 0;
                    document.getElementById('stat-regs').innerText = data.stats?.regs || 0;
                    document.getElementById('stat-paid').innerText = data.stats?.paid || 0;
                }
            });
        }

        // Action Listeners
        document.getElementById('google-login').onclick = () => signInWithPopup(auth, googleProvider);
        
        document.getElementById('email-login').onclick = async () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            if(!email || !pass) return alert("Enter details");
            try {
                await signInWithEmailAndPassword(auth, email, pass);
            } catch (e) {
                await createUserWithEmailAndPassword(auth, email, pass);
            }
        };

        document.getElementById('logout-btn').onclick = () => signOut(auth);

        window.copyRefLink = () => {
            const input = document.getElementById('ref-link-input');
            input.select();
            document.execCommand('copy');
            alert("Link Copied!");
        };

        // MiniPay Logic Placeholder
        document.getElementById('withdraw-action').onclick = () => {
            alert("Checking MiniPay wallet connection...");
        };
    </script>
</body>
</html>
