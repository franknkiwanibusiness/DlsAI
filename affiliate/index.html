<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DLS VALUE | AFFILIATE PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        
        body { 
            background: #0a0a0a; color: #e5e5e5; font-family: 'Inter', sans-serif; 
            overflow: hidden; height: 100vh; 
        }

        /* Clean Glass UI (No Neon) */
        .slate-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
        }

        .btn-primary {
            background: #ffffff; color: #000;
            font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;
        }

        /* Fixed Scroll Area */
        #log-container::-webkit-scrollbar { width: 2px; }
        #log-container::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); }

        .hidden { display: none !important; }
        
        /* Loading Overlay */
        #api-loader {
            position: fixed; inset: 0; background: #0a0a0a; z-index: 100;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
    </style>
</head>
<body class="flex flex-col p-5">

    <div id="api-loader">
        <div class="w-8 h-8 border-2 border-white/20 border-t-white rounded-full animate-spin"></div>
    </div>

    <div id="auth-modal" class="hidden fixed inset-0 bg-black/90 backdrop-blur-md z-50 flex items-center justify-center p-6">
        <div class="slate-card w-full max-w-sm p-8 text-center">
            <h2 class="text-2xl font-800 mb-1">Affiliate Access</h2>
            <p class="text-[10px] opacity-40 uppercase tracking-[2px] mb-8">DLS Value Network</p>
            
            <div class="space-y-3">
                <input id="email-in" type="email" placeholder="Email" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl text-sm outline-none focus:border-white/30">
                <input id="pass-in" type="password" placeholder="Password" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl text-sm outline-none focus:border-white/30">
                <button id="auth-exec" class="w-full btn-primary py-4 rounded-xl text-xs">Enter Dashboard</button>
                <div class="text-[10px] opacity-20 py-2">— OR —</div>
                <button id="google-exec" class="w-full bg-white/5 border border-white/10 py-4 rounded-xl flex items-center justify-center gap-3 text-xs font-semibold">
                    <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" class="w-4">
                    Continue with Google
                </button>
            </div>
        </div>
    </div>

    <div id="dashboard" class="hidden flex flex-col h-full">
        <header class="flex justify-between items-center mb-6">
            <div>
                <h1 class="text-lg font-800 tracking-tight">PROMOTER <span class="opacity-40">HUB</span></h1>
                <p id="user-tag" class="text-[9px] opacity-30 font-mono uppercase"></p>
            </div>
            <button id="logout-btn" class="text-[9px] opacity-40 border border-white/10 px-3 py-1 rounded">LOGOUT</button>
        </header>

        <div class="slate-card p-4 mb-4">
            <label class="text-[9px] opacity-40 uppercase font-bold mb-2 block">Your Tracking Link</label>
            <div class="flex gap-2">
                <input id="ref-link" type="text" readonly class="bg-black/40 border border-white/5 rounded-lg p-2 text-[10px] flex-1 text-white/80">
                <button id="copy-ref" class="bg-white/10 px-4 rounded-lg text-[10px] font-bold">COPY</button>
            </div>
        </div>

        <div class="slate-card p-6 mb-4 text-center">
            <p class="text-[10px] opacity-40 uppercase mb-1">Current Earnings</p>
            <div class="flex items-center justify-center gap-2 mb-4">
                <h2 id="bal-amount" class="text-5xl font-800 italic">0.00</h2>
                <span id="currency-code" class="text-xs opacity-40 font-bold mt-4">USD</span>
            </div>
            <button id="withdraw-trigger" class="w-full btn-primary py-3 rounded-xl text-[10px]">Request Payout ($5 Min)</button>
        </div>

        <div class="grid grid-cols-3 gap-3 mb-6">
            <div class="slate-card p-3 text-center">
                <p class="text-[8px] opacity-40 uppercase">Clicks</p>
                <p id="stat-c" class="text-lg font-bold">0</p>
            </div>
            <div class="slate-card p-3 text-center">
                <p class="text-[8px] opacity-40 uppercase">Regs</p>
                <p id="stat-r" class="text-lg font-bold">0</p>
            </div>
            <div class="slate-card p-3 text-center">
                <p class="text-[8px] opacity-40 uppercase">Paid</p>
                <p id="stat-p" class="text-lg font-bold">0</p>
            </div>
        </div>

        <div class="flex justify-between items-center mb-2 px-1">
            <h3 class="text-[10px] font-bold opacity-40 uppercase">Real-time Logs</h3>
            <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
        </div>
        <div id="log-container" class="flex-1 overflow-y-auto space-y-2 pr-1 pb-4">
            </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, GoogleAuthProvider, signInWithPopup, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-auth.js";
        import { getDatabase, ref, onValue, get, set } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDFHskUWiyHhZke3KT9kkOtFI_gPsKfiGo",
            authDomain: "itzhoyoo-f9f7e.firebaseapp.com",
            databaseURL: "https://itzhoyoo-f9f7e-default-rtdb.firebaseio.com",
            projectId: "itzhoyoo-f9f7e",
            appId: "1:1094792075584:web:d49e9c3f899d3cd31082a5"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        const googleProvider = new GoogleAuthProvider();

        let userCurrency = "USD";
        let exchangeRate = 1;

        // 1. Get User Location & Currency
        async function fetchCurrency() {
            try {
                const res = await fetch('https://ipapi.co/json/');
                const data = await res.json();
                userCurrency = data.currency || "USD";
                document.getElementById('currency-code').innerText = userCurrency;
                
                // Get exchange rate (Example using a public mock or real API)
                if(userCurrency !== "USD") {
                    const rateRes = await fetch(`https://api.exchangerate-api.com/v4/latest/USD`);
                    const rates = await rateRes.json();
                    exchangeRate = rates.rates[userCurrency] || 1;
                }
            } catch (e) { console.error("Currency API Fail"); }
        }

        // 2. Auth State Controller
        onAuthStateChanged(auth, async (user) => {
            await fetchCurrency();
            document.getElementById('api-loader').classList.add('hidden');
            
            if (user) {
                document.getElementById('auth-modal').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
                document.getElementById('user-tag').innerText = `ID: ${user.uid.substring(0,8)}`;
                initData(user);
            } else {
                document.getElementById('auth-modal').classList.remove('hidden');
                document.getElementById('dashboard').classList.add('hidden');
            }
        });

        // 3. Data Integration
        async function initData(user) {
            const userRef = ref(db, `promoters/${user.uid}`);
            
            // Check if profile exists
            const snap = await get(userRef);
            if(!snap.exists()) {
                const refId = Math.random().toString(36).substring(7).toUpperCase();
                await set(userRef, { refId, balance: 0, clicks: 0, regs: 0, paid: 0, logs: [] });
            }

            onValue(userRef, (s) => {
                const d = s.val();
                document.getElementById('ref-link').value = `https://dlsvalue.site/?ref=${d.refId}`;
                document.getElementById('bal-amount').innerText = (d.balance * exchangeRate).toLocaleString(undefined, {minimumFractionDigits: 2});
                document.getElementById('stat-c').innerText = d.clicks;
                document.getElementById('stat-r').innerText = d.regs;
                document.getElementById('stat-p').innerText = d.paid;
                
                // Update Logs
                const logBox = document.getElementById('log-container');
                logBox.innerHTML = (d.logs || []).reverse().map(l => `
                    <div class="slate-card p-3 flex justify-between items-center bg-white/5 border-none">
                        <span class="text-[10px] font-medium">${l.msg}</span>
                        <span class="text-[9px] opacity-40 italic">${new Date(l.time).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span>
                    </div>
                `).join('') || '<p class="text-[9px] opacity-20 text-center py-4">No recent activity</p>';
            });
        }

        // Actions
        document.getElementById('google-exec').onclick = () => signInWithPopup(auth, googleProvider);
        document.getElementById('logout-btn').onclick = () => signOut(auth);
        document.getElementById('copy-ref').onclick = () => {
            const el = document.getElementById('ref-link');
            el.select();
            document.execCommand('copy');
            alert("Copied to clipboard");
        };
        document.getElementById('auth-exec').onclick = async () => {
            const e = document.getElementById('email-in').value;
            const p = document.getElementById('pass-in').value;
            try { await signInWithEmailAndPassword(auth, e, p); }
            catch { await createUserWithEmailAndPassword(auth, e, p); }
        };
    </script>
</body>
</html>
