<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DLS UCL | Influencer Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #050505; color: white; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .neon-border { border: 1px solid #06b6d4; box-shadow: 0 0 15px rgba(6, 182, 212, 0.2); }
        .btn-primary { background: linear-gradient(90deg, #06b6d4, #3b82f6); transition: all 0.2s; }
        .btn-primary:active { transform: scale(0.95); }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4 pb-20">

    <div id="authSection" class="w-full max-w-sm mt-12 flex flex-col items-center">
        <h1 class="text-4xl font-black uppercase italic tracking-tighter mb-2 text-cyan-400">Partner Hub</h1>
        <p class="text-[10px] text-white/40 uppercase tracking-[0.3em] mb-8">Earn from every recruit</p>
        
        <div class="glass w-full p-8 rounded-[2.5rem] space-y-4">
            <button id="googleBtn" class="w-full bg-white text-black py-4 rounded-2xl font-black uppercase text-[10px] tracking-widest flex items-center justify-center gap-3">
                <img src="https://www.gstatic.com/images/branding/product/1x/googleg_48dp.png" class="w-5 h-5">
                Continue with Google
            </button>
            <div class="flex items-center gap-4 py-2">
                <div class="h-[1px] flex-1 bg-white/10"></div>
                <span class="text-[8px] text-white/20 font-bold uppercase">or email</span>
                <div class="h-[1px] flex-1 bg-white/10"></div>
            </div>
            <input type="email" id="email" placeholder="Email Address" class="w-full bg-white/5 border border-white/10 rounded-xl p-4 text-sm outline-none focus:border-cyan-500 transition-all">
            <input type="password" id="password" placeholder="Password" class="w-full bg-white/5 border border-white/10 rounded-xl p-4 text-sm outline-none focus:border-cyan-500 transition-all">
            <button id="authBtn" class="btn-primary w-full py-4 rounded-xl font-black uppercase text-[10px] tracking-[0.2em]">Sign In / Register</button>
        </div>
    </div>

    <div id="dashSection" class="hidden w-full max-w-sm space-y-6">
        <div class="flex justify-between items-center mt-4">
            <div class="flex items-center gap-3">
                <img id="userPhoto" src="" class="w-10 h-10 rounded-full border border-cyan-500">
                <div>
                    <p id="userName" class="text-[10px] font-black uppercase leading-none text-white"></p>
                    <p class="text-[8px] font-bold text-cyan-400 uppercase tracking-widest mt-1">Verified Partner</p>
                </div>
            </div>
            <button onclick="signOutUser()" class="text-[8px] font-black text-white/30 uppercase underline">Logout</button>
        </div>

        <div class="glass p-8 rounded-[2.5rem] relative overflow-hidden">
            <div class="absolute -top-10 -right-10 w-32 h-32 bg-cyan-500/10 rounded-full blur-3xl"></div>
            <p class="text-[10px] font-black text-white/40 uppercase tracking-widest mb-2">Available Balance</p>
            <h2 id="balanceText" class="text-5xl font-black tracking-tighter text-white mb-1">$0.00</h2>
            <p id="localBalance" class="text-[10px] font-bold text-cyan-400 uppercase"></p>
            
            <div class="grid grid-cols-2 gap-4 mt-8 pt-6 border-t border-white/5">
                <div>
                    <p class="text-[8px] font-black text-white/20 uppercase">Total Clicks</p>
                    <p id="clickCount" class="text-xl font-black">0</p>
                </div>
                <div>
                    <p class="text-[8px] font-black text-white/20 uppercase">Registrations</p>
                    <p id="regCount" class="text-xl font-black">0</p>
                </div>
            </div>
        </div>

        <div class="glass p-6 rounded-3xl space-y-3">
            <p class="text-[10px] font-black uppercase text-white/40">Your Unique Link</p>
            <div class="flex items-center gap-2 bg-black/40 p-2 rounded-xl border border-white/5">
                <input id="refLink" readonly class="bg-transparent flex-1 text-[10px] font-mono text-cyan-400 outline-none truncate px-2">
                <button onclick="copyLink()" class="bg-white/10 px-4 py-2 rounded-lg text-[8px] font-black uppercase active:bg-cyan-500 transition-colors">Copy</button>
            </div>
        </div>

        <div id="withdrawArea" class="space-y-4">
            <div class="flex justify-between items-center px-2">
                <span class="text-[8px] font-black text-white/30 uppercase">Min. Withdrawal:</span>
                <span id="minLimitDisplay" class="text-[8px] font-black text-white/30 uppercase"></span>
            </div>
            <button id="withdrawBtn" disabled class="w-full bg-white/5 border border-white/10 text-white/20 py-5 rounded-2xl font-black uppercase text-[10px] tracking-widest transition-all">
                Insufficient Funds
            </button>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
