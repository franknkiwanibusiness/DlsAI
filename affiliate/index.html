<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Affiliate Dashboard | DLS Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .pro-elite-gradient { background: linear-gradient(135deg, #000000 0%, #0a0a0a 100%); }
        .neon-border { border: 1px solid rgba(0, 242, 255, 0.3); box-shadow: 0 0 15px rgba(0, 242, 255, 0.1); }
        .shimmer-band {
            position: relative; overflow: hidden;
        }
        .shimmer-band::after {
            content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
            transform: skewX(-20deg); animation: shimmer 3s infinite;
        }
        @keyframes shimmer { 100% { left: 150%; } }
    </style>
</head>
<body class="pro-elite-gradient text-white min-h-screen p-4 md:p-10 font-sans">

    <div class="max-w-4xl mx-auto">
        <div class="mb-10">
            <h1 class="text-5xl font-black italic uppercase tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-purple-500">
                Affiliate Hub
            </h1>
            <p class="text-white/40 text-[10px] font-bold uppercase tracking-[0.3em] mt-2">Earn $0.50 Per Visit • $1.00 Per Entry</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
            <div class="shimmer-band bg-white/5 p-6 rounded-3xl neon-border">
                <p class="text-[10px] font-black text-cyan-400 uppercase tracking-widest mb-1">Total Clicks</p>
                <h2 id="display-clicks" class="text-4xl font-black">0</h2>
            </div>
            <div class="shimmer-band bg-white/5 p-6 rounded-3xl border border-white/10">
                <p class="text-[10px] font-black text-purple-400 uppercase tracking-widest mb-1">Conversions</p>
                <h2 id="display-conversions" class="text-4xl font-black">0</h2>
            </div>
            <div class="shimmer-band bg-white/5 p-6 rounded-3xl border border-white/10">
                <p class="text-[10px] font-black text-green-400 uppercase tracking-widest mb-1">Current Balance</p>
                <h2 id="display-balance" class="text-4xl font-black">$0.00</h2>
            </div>
        </div>

        <div class="bg-cyan-500/10 border border-cyan-500/20 p-6 rounded-[2rem] mb-10">
            <h3 class="text-xs font-black uppercase tracking-widest mb-4">Your Referral URL</h3>
            <div class="flex gap-2">
                <input id="ref-url" type="text" readonly class="w-full bg-black/40 border border-white/10 rounded-xl px-4 py-3 text-sm font-mono text-cyan-300" value="Loading...">
                <button onclick="copyLink()" class="bg-cyan-500 hover:bg-cyan-400 text-black font-black uppercase text-[10px] px-6 rounded-xl transition-all active:scale-95">Copy</button>
            </div>
        </div>

        <div class="bg-white/5 rounded-[2rem] p-6 border border-white/5">
            <h3 class="text-xs font-black uppercase tracking-widest mb-6">Live Earnings Log</h3>
            <div id="log-container" class="space-y-3">
                <p class="text-white/20 text-center py-10 text-xs italic">No transactions found yet...</p>
            </div>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDFHskUWiyHhZke3KT9kkOtFI_gPsKfiGo",
        authDomain: "itzhoyoo-f9f7e.firebaseapp.com",
        databaseURL: "https://itzhoyoo-f9f7e-default-rtdb.firebaseio.com",
        projectId: "itzhoyoo-f9f7e",
        storageBucket: "itzhoyoo-f9f7e.filestorage.app",
        messagingSenderId: "1094792075584",
        appId: "1:1094792075584:web:d49e9c3f899d3cd31082a5"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    
    // Get the current user's ID from the same localStorage your homepage uses
    const deviceId = localStorage.getItem('dls_ucl_final_v9');

    if (deviceId) {
        // Update URL Display
        document.getElementById('ref-url').value = `https://dlsvalue.site/?ref=${deviceId}`;

        // Listen for Stats Changes (Clicks & Balance)
        const userRef = ref(db, `users/${deviceId}`);
        onValue(userRef, (snapshot) => {
            if (snapshot.exists()) {
                const data = snapshot.val();
                document.getElementById('display-clicks').innerText = data.clicks || 0;
                document.getElementById('display-balance').innerText = `$${parseFloat(data.balance || 0).toFixed(2)}`;
                
                // If you add a 'conversions' count in your confirmPaymentReward function:
                document.getElementById('display-conversions').innerText = data.conversions || 0;
            }
        });

        // Listen for Logs (Assumes you push to users/ID/logs on the homepage)
        const logsRef = ref(db, `users/${deviceId}/logs`);
        onValue(logsRef, (snapshot) => {
            const container = document.getElementById('log-container');
            if (snapshot.exists()) {
                container.innerHTML = '';
                snapshot.forEach((child) => {
                    const log = child.val();
                    container.innerHTML += `
                        <div class="flex items-center justify-between bg-white/5 p-4 rounded-2xl border border-white/5">
                            <div>
                                <p class="text-[10px] font-black uppercase text-white">${log.type || 'Visit Reward'}</p>
                                <p class="text-[8px] font-bold text-white/30 uppercase mt-1">${new Date(log.time).toLocaleString()}</p>
                            </div>
                            <div class="text-right">
                                <p class="text-xs font-black text-green-400">+$${log.amount}</p>
                                <p class="text-[7px] font-black text-white/20 uppercase">Status: PAID</p>
                            </div>
                        </div>`;
                });
            }
        });
    } else {
        document.getElementById('ref-url').value = "Register on homepage first!";
    }

    window.copyLink = () => {
        const copyText = document.getElementById("ref-url");
        copyText.select();
        navigator.clipboard.writeText(copyText.value);
        alert("Referral Link Copied!");
    };
</script>
</body>
</html>
