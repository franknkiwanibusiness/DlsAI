<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DLS UCL | Partner Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #050505; color: white; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .btn-primary { background: linear-gradient(90deg, #06b6d4, #3b82f6); transition: all 0.2s; }
        .btn-primary:active { transform: scale(0.95); }
        .input-box { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); transition: all 0.3s; }
        .input-box:focus { border-color: #06b6d4; outline: none; background: rgba(255, 255, 255, 0.08); }
        body::-webkit-scrollbar { display: none; }
        
        /* Matching homepage aggression */
        .heavy-impact { font-weight: 900; font-style: italic; text-transform: uppercase; letter-spacing: -0.05em; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4">

    <div id="authSection" class="fixed inset-0 z-[100] bg-black flex flex-col items-center justify-center p-6 transition-opacity duration-500">
        <h1 class="text-5xl heavy-impact mb-1 text-cyan-400 italic">Partner Hub</h1>
        <p class="text-[9px] text-white/40 uppercase tracking-[0.4em] mb-10">UCL Tournament Affiliates</p>
        
        <div class="glass w-full max-w-sm p-8 rounded-[2.5rem] space-y-4">
            <button onclick="window.handleGoogleAuth()" class="w-full bg-white text-black py-4 rounded-2xl font-black uppercase text-[10px] tracking-widest flex items-center justify-center gap-3 active:scale-95 transition-transform">
                <img src="https://www.gstatic.com/images/branding/product/1x/googleg_48dp.png" class="w-5 h-5">
                Continue with Google
            </button>
            <div class="flex items-center gap-4 py-2">
                <div class="h-[1px] flex-1 bg-white/10"></div>
                <span class="text-[8px] text-white/20 font-bold uppercase">or email</span>
                <div class="h-[1px] flex-1 bg-white/10"></div>
            </div>
            <input type="email" id="email" placeholder="EMAIL ADDRESS" class="input-box w-full rounded-xl p-4 text-[10px] font-bold uppercase tracking-widest">
            <input type="password" id="password" placeholder="PASSWORD" class="input-box w-full rounded-xl p-4 text-[10px] font-bold uppercase tracking-widest">
            <button onclick="window.handleEmailAuth()" class="btn-primary w-full py-4 rounded-xl font-black uppercase text-[10px] tracking-[0.2em]">Enter Dashboard</button>
        </div>
    </div>

    <div id="dashSection" class="hidden w-full max-w-sm space-y-6 pt-4 pb-24">
        <div class="flex justify-between items-center px-2">
            <div class="flex items-center gap-3">
                <img id="userPhoto" src="" class="w-10 h-10 rounded-full border-2 border-cyan-500 object-cover">
                <div>
                    <p id="userName" class="text-[11px] font-black uppercase leading-none text-white tracking-tighter"></p>
                    <p class="text-[7px] font-bold text-cyan-400 uppercase tracking-[0.2em] mt-1">Verified Partner</p>
                </div>
            </div>
            <button onclick="window.signOutUser()" class="text-[8px] font-black text-white/30 uppercase underline tracking-widest">Logout</button>
        </div>

        <div class="glass p-8 rounded-[2.5rem] relative overflow-hidden shadow-2xl border-white/10">
            <div class="absolute -top-10 -right-10 w-32 h-32 bg-cyan-500/10 rounded-full blur-3xl"></div>
            <p class="text-[9px] font-black text-white/30 uppercase tracking-widest mb-2">Available Credits</p>
            <h2 id="balanceText" class="text-5xl heavy-impact text-white mb-1">$0.000</h2>
            <p id="localBalance" class="text-[10px] font-bold text-cyan-400 uppercase tracking-tighter">Calculating Exchange...</p>
            
            <div class="grid grid-cols-2 gap-4 mt-8 pt-6 border-t border-white/5">
                <div class="bg-white/5 p-4 rounded-2xl">
                    <p class="text-[7px] font-black text-white/20 uppercase tracking-widest mb-1">Total Clicks</p>
                    <p id="clickCount" class="text-xl heavy-impact">0</p>
                </div>
                <div class="bg-white/5 p-4 rounded-2xl">
                    <p class="text-[7px] font-black text-white/20 uppercase tracking-widest mb-1">Recruits</p>
                    <p id="regCount" class="text-xl heavy-impact">0</p>
                </div>
            </div>
        </div>

        <div class="glass p-6 rounded-3xl space-y-3">
            <p class="text-[9px] font-black uppercase text-white/30 tracking-widest">Your Live Tracking Link</p>
            <div class="flex items-center gap-2 bg-black/40 p-2 rounded-xl border border-white/5">
                <input id="refLink" readonly class="bg-transparent flex-1 text-[10px] font-mono text-cyan-400 outline-none truncate px-2">
                <button onclick="window.copyLink()" class="bg-white/10 px-4 py-2 rounded-lg text-[8px] font-black uppercase active:bg-cyan-500 transition-colors">Copy</button>
            </div>
            <p class="text-[7px] text-white/20 uppercase text-center font-bold italic tracking-widest italic">Earn $0.001 per visit & $0.05 per registration</p>
        </div>

        <div class="space-y-4">
            <div class="flex justify-between items-center px-4">
                <span class="text-[8px] font-black text-white/30 uppercase tracking-widest">Min Withdrawal:</span>
                <span id="minLimitDisplay" class="text-[8px] font-black text-cyan-400 uppercase tracking-widest">--</span>
            </div>
            <button id="withdrawBtn" disabled class="w-full bg-white/5 border border-white/10 text-white/20 py-5 rounded-2xl font-black uppercase text-[10px] tracking-widest transition-all">
                Insufficient Balance
            </button>
        </div>
    </div>

    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 z-[200] opacity-0 translate-y-4 transition-all duration-300 bg-white text-black px-6 py-3 rounded-full font-black uppercase text-[9px] tracking-widest pointer-events-none shadow-2xl">
        ACTION COMPLETED
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-database.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDFHskUWiyHhZke3KT9kkOtFI_gPsKfiGo",
            authDomain: "itzhoyoo-f9f7e.firebaseapp.com",
            databaseURL: "https://itzhoyoo-f9f7e-default-rtdb.firebaseio.com",
            projectId: "itzhoyoo-f9f7e",
            storageBucket: "itzhoyoo-f9f7e.filestorage.app",
            messagingSenderId: "1094792075584",
            appId: "1:1094792075584:web:d49e9c3f899d3cd31082a5"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        let localGeo = { currency: "USD", rate: 1 };
        const MIN_WITHDRAW_USD = 5.00;

        window.showToast = (msg) => {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.classList.remove('opacity-0', 'translate-y-4');
            setTimeout(() => t.classList.add('opacity-0', 'translate-y-4'), 3000);
        };

        window.toggleScroll = (isLocked) => {
            document.body.style.overflow = isLocked ? 'hidden' : 'auto';
        };

        window.copyLink = () => {
            const link = document.getElementById("refLink").value;
            navigator.clipboard.writeText(link);
            window.showToast("TRACKING LINK COPIED");
        };

        window.handleGoogleAuth = () => signInWithPopup(auth, provider);

        window.handleEmailAuth = async () => {
            const e = document.getElementById('email').value.trim();
            const p = document.getElementById('password').value.trim();
            if(!e || !p) return window.showToast("FILL ALL FIELDS");
            try {
                await signInWithEmailAndPassword(auth, e, p);
            } catch (err) {
                try {
                    await createUserWithEmailAndPassword(auth, e, p);
                } catch (e2) {
                    window.showToast(e2.message.replace("Firebase: ", ""));
                }
            }
        };

        window.signOutUser = () => signOut(auth);

        async function initGeo() {
            try {
                const gRes = await fetch('https://ipapi.co/json/');
                const gData = await gRes.json();
                const rRes = await fetch(`https://open.er-api.com/v6/latest/USD`);
                const rData = await rRes.json();
                
                localGeo.currency = gData.currency || "USD";
                localGeo.rate = rData.rates[localGeo.currency] || 1;

                const minVal = (MIN_WITHDRAW_USD * localGeo.rate).toFixed(2);
                document.getElementById('minLimitDisplay').innerText = `Min: ${minVal} ${localGeo.currency}`;
            } catch (e) { 
                console.error("Geo fail", e); 
                document.getElementById('minLimitDisplay').innerText = `Min: $5.00 USD`;
            }
        }

        onAuthStateChanged(auth, (user) => {
            const aUI = document.getElementById('authSection');
            const dUI = document.getElementById('dashSection');
            
            if (user) {
                aUI.classList.add('hidden');
                dUI.classList.remove('hidden');
                window.toggleScroll(false); 
                loadDashboard(user);
            } else {
                aUI.classList.remove('hidden');
                dUI.classList.add('hidden');
                window.toggleScroll(true); 
            }
        });

        function loadDashboard(user) {
            const userRef = ref(db, `users/${user.uid}`);
            document.getElementById('userPhoto').src = user.photoURL || 'https://via.placeholder.com/100';
            document.getElementById('userName').innerText = user.displayName || user.email.split('@')[0];
            
            // NO LOCALSTORAGE: Directly construct the URL for the main homepage
            document.getElementById('refLink').value = `${window.location.origin}/index.html?ref=${user.uid}`;

            onValue(userRef, (snap) => {
                const d = snap.val() || {};
                // Precision display to show micro-earnings ($0.001)
                const usd = parseFloat(d.balance || 0);
                
                document.getElementById('balanceText').innerText = `$${usd.toFixed(3)}`;
                document.getElementById('localBalance').innerText = `≈ ${(usd * localGeo.rate).toFixed(2)} ${localGeo.currency}`;
                document.getElementById('clickCount').innerText = d.clicks || 0;
                document.getElementById('regCount').innerText = d.registrations || 0;

                const btn = document.getElementById('withdrawBtn');
                if (usd >= MIN_WITHDRAW_USD) {
                    btn.disabled = false;
                    btn.innerText = "Request Withdrawal";
                    btn.className = "w-full btn-primary text-white py-5 rounded-2xl font-black uppercase text-[10px] tracking-widest shadow-lg shadow-cyan-500/40 animate-bounce";
                } else {
                    btn.disabled = true;
                    btn.innerText = "Insufficient Balance";
                    btn.className = "w-full bg-white/5 border border-white/10 text-white/20 py-5 rounded-2xl font-black uppercase text-[10px] tracking-widest";
                }
            });
        }

        initGeo();
    </script>
</body>
</html>
